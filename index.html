function useIsMobile() {
  const [mob, setMob] = useState(typeof window !== "undefined" ? window.innerWidth < 768 : false);
  useEffect(() => {
    const h = () => setMob(window.innerWidth < 768);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return mob;
}

function useLocalStorageState(key, initial, opts = {}) {
  const { version, migrate } = opts;
  const [state, setState] = useState(() => {
    try {
      const s = localStorage.getItem(key);
      if (!s) return typeof initial === "function" ? initial() : initial;
      let d = JSON.parse(s);
      if (migrate && typeof migrate === "function") d = migrate(d, version);
      return d;
    } catch (e) { return typeof initial === "function" ? initial() : initial; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(state)); } catch (e) {} }, [key, state]);
  return [state, setState];
}

function useToasts(duration = 2500) {
  const [toast, setToast] = useState({ visible: false, message: "" });
  const showToast = msg => { setToast({ visible: true, message: msg }); setTimeout(() => setToast({ visible: false, message: "" }), duration); };
  return { toast, showToast };
}

function useModal() {
  const [modal, setModal] = useState(null);
  const [payload, setPayload] = useState(null);
  const openModal = (type, data) => { setModal(type); setPayload(data ?? null); };
  const closeModal = () => { setModal(null); setPayload(null); };
  return { modal, payload, openModal, closeModal };
}

const fullTask = (text, prio="medium") => ({id:uid(),text,done:false,taskStatus:"in_proces",priority:prio,cr:new Date().toISOString().split("T")[0],due:"",subtasks:[],notes:"",tags:[],chats:[],uploads:[]});
const toggleInTree = (tasks, id) => tasks.map(t=>t.id===id?{...t,done:!t.done,taskStatus:!t.done?"done":"in_proces"}:{...t,subtasks:toggleInTree(t.subtasks||[],id)});
const delInTree = (tasks, id) => tasks.filter(t=>t.id!==id).map(t=>({...t,subtasks:delInTree(t.subtasks||[],id)}));
const addSubInTree = (tasks, parentId, sub) => tasks.map(t=>t.id===parentId?{...t,subtasks:[...(t.subtasks||[]),sub]}:{...t,subtasks:addSubInTree(t.subtasks||[],parentId,sub)});
const updInTree = (tasks, id, upd) => tasks.map(t=>t.id===id?(typeof upd==="function"?upd(t):{...t,...upd}):{...t,subtasks:updInTree(t.subtasks||[],id,upd)});

const delMultipleInTree = (tasks, ids) => tasks.filter(t=>!ids.includes(t.id)).map(t=>({...t,subtasks:delMultipleInTree(t.subtasks||[],ids)}));

function TasksView({ tasks, setTasks, th, sty, mob, compact=false }) {
  const [newText, setNewText] = useState("");
  const [newPrio, setNewPrio] = useState("medium");
  const [expandedIds, setExpandedIds] = useState(new Set());
  const [viewMode, setViewMode] = useState("list"); // list | calendar | kanban
  const [selectedIds, setSelectedIds] = useState([]);
  const [kanbanDragCol, setKanbanDragCol] = useState(null);
  const [calendarDate, setCalendarDate] = useState(()=>{const n=new Date(); return {y:n.getFullYear(),m:n.getMonth()};});
  const calendarScrollRef = useRef(null);
  const calendarScrolling = useRef(false);
  const MONTHS_RO_CAL = ["ianuarie","februarie","martie","aprilie","mai","iunie","iulie","august","septembrie","octombrie","noiembrie","decembrie"];
  const PC = {high:"#ef4444", medium:"#f59e0b", low:"#22c55e"};
  const PL = {high:"Urgent", medium:"Normal", low:"Low"};
  const TSL = {in_proces:"În proces",in_lucru:"În lucru",done:"Done"};
  const TSC = {in_proces:"#6366f1",in_lucru:"#f59e0b",done:"#22c55e"};

  const add = () => {
    if(!newText.trim()) return;
    setTasks(p=>[...p,fullTask(newText.trim(),newPrio)]);
    setNewText("");
  };
  const toggle = id => setTasks(p=>toggleInTree(p,id));
  const del = id => setTasks(p=>delInTree(p,id));
  const addSub = (parentId, txt) => { if(!txt.trim()) return; setTasks(p=>addSubInTree(p,parentId,fullTask(txt.trim(),"medium"))); };
  const updTask = (id, upd) => setTasks(p=>updInTree(p,id,upd));
  const addTag = (tid, tag) => { if(!tag.trim()) return; updTask(tid,t=>({...t,tags:[...(t.tags||[]),tag.trim()]})); };
  const remTag = (tid, tag) => updTask(tid,t=>({...t,tags:(t.tags||[]).filter(x=>x!==tag)}));
  const addChat = (tid, txt, replyToId) => { if(!txt.trim()) return; updTask(tid,t=>{const nc={id:uid(),text:txt.trim(),date:new Date().toISOString(),author:"Eu",replyTo:replyToId,replies:[]}; return {...t,chats:[...(t.chats||[]),nc]};}); setReplyingTo(null); };
  const addReply = (tid, chatId, txt) => { if(!txt.trim()) return; updTask(tid,t=>({...t,chats:(t.chats||[]).map(c=>c.id===chatId?{...c,replies:[...(c.replies||[]),{id:uid(),text:txt.trim(),date:new Date().toISOString(),author:"Eu"}]}:c)})); setReplyingTo(null); };
  const toggleExpanded = (id) => setExpandedIds(s=>{const n=new Set(s);if(n.has(id))n.delete(id);else n.add(id);return n;});

  const [replyingTo, setReplyingTo] = useState(null); // {tid, chatId}

  const taskStatus = t => (t.taskStatus==="done"||t.done)?"done":(t.taskStatus||"in_proces");
  const active = tasks.filter(t=>taskStatus(t)!=="done").sort((a,b)=>({high:0,medium:1,low:2})[a.priority||"medium"]-({high:0,medium:1,low:2})[b.priority||"medium"]);
  const done = tasks.filter(t=>taskStatus(t)==="done");
  const allTaskIds = [...active,...done].map(t=>t.id);
  const allSelected = allTaskIds.length>0&&allTaskIds.every(id=>selectedIds.includes(id));
  const selectAll = () => setSelectedIds(allSelected?[]:allTaskIds);
  const delSelected = () => { if(selectedIds.length===0) return; if(!window.confirm(`Ștergi ${selectedIds.length} task/taskuri?`)) return; setTasks(p=>delMultipleInTree(p,selectedIds)); setSelectedIds([]); };

  useEffect(()=>{
    const el=calendarScrollRef.current; if(!el||viewMode!=="calendar"||compact) return;
    calendarScrolling.current=true; el.scrollTop=el.clientHeight; setTimeout(()=>{calendarScrolling.current=false;},100);
  },[calendarDate,viewMode,compact]);

  const handleCalendarScroll = () => {
    if (calendarScrolling.current) return;
    const el = calendarScrollRef.current;
    if (!el) return;
    const idx = Math.round(el.scrollTop / el.clientHeight);
    if (idx === 0) {
      setCalendarDate(p => { let m = p.m - 1, y = p.y; if (m < 0) { m = 11; y--; } return { m, y }; });
    } else if (idx === 2) {
      setCalendarDate(p => { let m = p.m + 1, y = p.y; if (m > 11) { m = 0; y++; } return { m, y }; });
    }
  };

  const renderMonth = (y,m) => {
    const first=new Date(y,m,1);
    const startOffset=(first.getDay()+6)%7;
    const start=new Date(y,m,1-startOffset);
    return Array.from({length:42}).map((_,i)=>{
      const d=new Date(start); d.setDate(start.getDate()+i);
      const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
      const isCurMonth=d.getMonth()===m;
      const dayTasks=active.filter(t=>t.due===ds);
      const today=new Date(); const isToday=d.getDate()===today.getDate()&&d.getMonth()===today.getMonth()&&d.getFullYear()===today.getFullYear();
      return <div key={i} style={{minHeight:72,padding:6,borderRadius:8,border:`1px solid ${th.bl}`,background:dayTasks.length>0?th.ab:"transparent",opacity:isCurMonth?1:0.5}}>
        <div style={{fontSize:11,color:isToday?th.a:th.tm,marginBottom:2,fontWeight:isToday?700:600}}>{d.getDate()}</div>
        {dayTasks.map(t=><div key={t.id} onClick={()=>toggleExpanded(t.id)} style={{fontSize:9,padding:"2px 4px",borderRadius:4,background:PC[t.priority||"medium"]+"33",marginBottom:2,cursor:"pointer",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",borderLeft:`2px solid ${PC[t.priority||"medium"]}`}}>{t.text}</div>)}
      </div>;
    });
  };

  const TaskCard = ({ t, isDone, depth=0, showSelect }) => {
    const ex = expandedIds.has(t.id);
    const subs = t.subtasks||[];
    const doneSubs = subs.filter(s=>s.done).length;
    const isReplying = replyingTo&&replyingTo.tid===t.id;
    return (
      <div key={t.id} style={{borderRadius:12,background:th.c,border:`1px solid ${th.b}`,borderLeft:`5px solid ${PC[t.priority||"medium"]}`,overflow:"hidden",marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,.06)",marginLeft:depth*16,borderWidth:showSelect&&selectedIds.includes(t.id)?2:1}}>
        <div onClick={()=>toggleExpanded(t.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px",cursor:"pointer",flexWrap:"wrap"}}>
          {showSelect&&<div onClick={e=>e.stopPropagation()}><input type="checkbox" checked={selectedIds.includes(t.id)} onChange={()=>setSelectedIds(s=>s.includes(t.id)?s.filter(x=>x!==t.id):[...s,t.id])} style={{cursor:"pointer",width:16,height:16}}/></div>}
          <div onClick={e=>{e.stopPropagation();toggle(t.id);}} style={{width:20,height:20,borderRadius:5,border:`2px solid ${PC[t.priority||"medium"]}`,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:isDone?th.b:"transparent"}}>{isDone&&<IcCheck s={12}/>}</div>
          <div style={{flex:1,minWidth:120,fontSize:16,fontWeight:500,textDecoration:isDone?"line-through":undefined,color:isDone?th.tm:th.t,lineHeight:1.4}}>{t.text}</div>
          <select value={t.priority||"medium"} onChange={e=>{e.stopPropagation();updTask(t.id,{priority:e.target.value});}} onClick={e=>e.stopPropagation()} className="modernSel" style={{...sty.i,padding:"6px 24px 6px 10px",fontSize:12,borderRadius:8,border:`1px solid ${PC[t.priority||"medium"]}`,background:PC[t.priority||"medium"]+"15",color:PC[t.priority||"medium"],fontWeight:600,width:"auto",minWidth:90,cursor:"pointer"}}>
            <option value="high">Urgent</option><option value="medium">Normal</option><option value="low">Low</option>
          </select>
          <input type="date" value={t.due||""} onChange={e=>{e.stopPropagation();updTask(t.id,{due:e.target.value});}} onClick={e=>e.stopPropagation()} style={{...sty.i,padding:"6px 10px",fontSize:12,borderRadius:8,border:`1px solid ${th.b}`,width:"auto",minWidth:130,cursor:"pointer"}} title="Deadline"/>
          {(t.tags||[]).length>0&&<span style={{fontSize:11,color:th.tm}}>{(t.tags||[]).slice(0,2).map(tg=><span key={tg}>#{tg} </span>)}</span>}
          {subs.length>0&&<span style={{fontSize:12,color:th.tm,fontWeight:500}}>{doneSubs}/{subs.length}</span>}
          <span style={{fontSize:14,color:th.tm,fontWeight:400,transition:"transform .2s",transform:ex?"rotate(90deg)":"rotate(0)"}}>▶</span>
          <button onClick={e=>{e.stopPropagation();del(t.id);}} style={{padding:4,border:"none",background:"transparent",color:th.tm,cursor:"pointer",opacity:.7}}><IcTrash s={12}/></button>
        </div>
        {ex&&<div style={{padding:"20px 24px 24px 60px",borderTop:`1px solid ${th.bl}`,background:th.bg==="#09090b"?"rgba(255,255,255,.02)":"rgba(0,0,0,.02)"}}>
          <div style={{display:"flex",gap:10,marginTop:12,marginBottom:12,flexWrap:"wrap"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <input type="date" value={t.due||""} onChange={e=>updTask(t.id,{due:e.target.value})} style={{...sty.i,padding:"12px 14px",fontSize:14,borderRadius:10}}/>
              <span style={{fontSize:13,color:th.tm}}>📅 Deadline</span>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
              {(t.tags||[]).map(tag=><span key={tag} style={{fontSize:12,padding:"6px 12px",borderRadius:10,background:th.ab,color:th.t,display:"flex",alignItems:"center",gap:6}}>{tag}<button onClick={()=>remTag(t.id,tag)} style={{padding:0,border:"none",background:"transparent",cursor:"pointer",fontSize:12,color:th.tm}}>×</button></span>)}
              <input placeholder="+ Tag (Enter)" onKeyDown={e=>{if(e.key==="Enter"){addTag(t.id,e.target.value);e.target.value="";}}} style={{...sty.i,width:140,padding:"12px 14px",fontSize:14,borderRadius:10}}/>
            </div>
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:13,color:th.tm,fontWeight:600,marginBottom:8}}>Subtasks</div>
            {subs.map(s=><TaskCard key={s.id} t={{...s,subtasks:s.subtasks||[],tags:s.tags||[],chats:s.chats||[],uploads:s.uploads||[]}} isDone={s.done} depth={depth+1} showSelect={false}/>)}
            <input placeholder="+ Adaugă subtask (Enter)" onKeyDown={e=>{if(e.key==="Enter"){addSub(t.id,e.target.value);e.target.value="";}}} style={{...sty.i,width:"100%",padding:"14px 16px",fontSize:15,marginTop:8,borderRadius:10}}/>
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:13,color:th.tm,fontWeight:600,marginBottom:8}}>Conversații</div>
            {(t.chats||[]).map(c=><div key={c.id} style={{padding:"14px 16px",background:th.c,borderRadius:10,marginBottom:8,fontSize:14,borderLeft:`4px solid ${th.b}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:12,color:th.tm}}>{c.author} · {new Date(c.date).toLocaleString("ro")}</span>
                <button onClick={()=>setReplyingTo({tid:t.id,chatId:c.id})} style={{padding:"6px 12px",border:"none",background:"transparent",color:th.tm,cursor:"pointer",fontSize:12}}>Răspunde</button>
              </div>
              <div style={{marginTop:6,marginBottom:4}}>{c.text}</div>
              {(c.replies||[]).map(r=><div key={r.id} style={{marginTop:6,marginLeft:16,padding:"10px 12px",background:th.h,borderRadius:8,borderLeft:`3px solid ${th.b}`}}><span style={{fontSize:11,color:th.tm}}>↳ {r.author} · {new Date(r.date).toLocaleString("ro")}</span><div style={{marginTop:4,fontSize:13}}>{r.text}</div></div>)}
              {isReplying&&replyingTo.chatId===c.id&&<div style={{marginTop:8,marginLeft:16}}><input placeholder="Răspunde... (Enter)" autoFocus onKeyDown={e=>{if(e.key==="Enter"){addReply(t.id,c.id,e.target.value);e.target.value="";}if(e.key==="Escape")setReplyingTo(null);}} style={{...sty.i,width:"100%",padding:"12px 14px",fontSize:14,borderRadius:10}}/><button onClick={()=>setReplyingTo(null)} style={{fontSize:12,marginTop:6,color:th.tm,cursor:"pointer",background:"transparent",border:"none"}}>Anulează</button></div>}
            </div>)}
            <input placeholder="+ Mesaj nou (Enter)" onKeyDown={e=>{if(e.key==="Enter"){addChat(t.id,e.target.value);e.target.value="";}}} style={{...sty.i,width:"100%",padding:"14px 16px",fontSize:15,marginTop:8,borderRadius:10}}/>
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:13,color:th.tm,fontWeight:600,marginBottom:8}}>Link / Fișier</div>
            <input placeholder="Link sau nume fișier (Enter)" onKeyDown={e=>{if(e.key==="Enter"){const v=e.target.value.trim();if(v){updTask(t.id,{uploads:[...(t.uploads||[]),{id:uid(),name:v,url:v}]});e.target.value="";}}}} style={{...sty.i,width:"100%",padding:"14px 16px",fontSize:15,borderRadius:10}}/>
            {(t.uploads||[]).map(u=>u&&<div key={u.id} style={{fontSize:13,padding:"10px 14px",marginTop:8,background:th.h,borderRadius:8}}>📎 {u.name}</div>)}
          </div>
          <div>
            <div style={{fontSize:13,color:th.tm,fontWeight:600,marginBottom:8}}>Note</div>
            <textarea value={t.notes||""} onChange={e=>updTask(t.id,{notes:e.target.value})} placeholder="Scrie note aici..." style={{...sty.i,minHeight:80,fontSize:15,resize:"vertical",width:"100%",padding:"14px 16px",borderRadius:10}}/>
          </div>
        </div>}
      </div>
    );
  };

  return (
    <div>
      {compact && <div style={{fontSize:15,fontWeight:700,marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>📋 Tasks</span><span style={{fontSize:13,color:th.tm,fontWeight:400}}>{active.length} active</span>
      </div>}

      {!compact&&<div style={{display:"flex",gap:6,padding:8,background:th.bg==="#09090b"?th.h:"#f8f7f5",borderRadius:12,border:`1px solid ${th.bl}`,marginBottom:20}}>
        <button onClick={()=>setViewMode("list")} style={{padding:"12px 20px",borderRadius:10,border:"none",fontSize:15,fontWeight:viewMode==="list"?600:500,cursor:"pointer",background:viewMode==="list"?th.c:"transparent",color:viewMode==="list"?th.t:th.tm,boxShadow:viewMode==="list"?"0 1px 3px rgba(0,0,0,.06)":"none",transition:"all .15s"}}>Listă</button>
        <button onClick={()=>setViewMode("kanban")} style={{padding:"12px 20px",borderRadius:10,border:"none",fontSize:15,fontWeight:viewMode==="kanban"?600:500,cursor:"pointer",background:viewMode==="kanban"?th.c:"transparent",color:viewMode==="kanban"?th.t:th.tm,boxShadow:viewMode==="kanban"?"0 1px 3px rgba(0,0,0,.06)":"none",transition:"all .15s"}}>Kanban</button>
        <button onClick={()=>setViewMode("calendar")} style={{padding:"12px 20px",borderRadius:10,border:"none",fontSize:15,fontWeight:viewMode==="calendar"?600:500,cursor:"pointer",background:viewMode==="calendar"?th.c:"transparent",color:viewMode==="calendar"?th.t:th.tm,boxShadow:viewMode==="calendar"?"0 1px 3px rgba(0,0,0,.06)":"none",transition:"all .15s"}}>Calendar</button>
      </div>}

      <div style={{display:"flex",gap:12,marginBottom:24}}>
        <input value={newText} onChange={e=>setNewText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}
          style={{...sty.i,flex:1,padding:"18px 22px",fontSize:17,borderRadius:12,border:`2px solid ${th.bl}`}} placeholder="Ce ai de făcut? Scrie aici și apasă Enter..."/>
        {!compact && <select value={newPrio} onChange={e=>setNewPrio(e.target.value)} className="modernSel" style={{...sty.i,width:150,padding:"18px 36px 18px 18px",fontSize:15,borderRadius:12,border:`2px solid ${th.bl}`}}>
          <option value="high">Urgent</option><option value="medium">Normal</option><option value="low">Low</option>
        </select>}
        <button onClick={add} style={{...sty.b,padding:"18px 24px",flexShrink:0,borderRadius:12,fontWeight:600,fontSize:15}}><IcPlus s={18}/></button>
      </div>

      {!compact&&allTaskIds.length>0&&<div style={{display:"flex",gap:8,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}>
        <button onClick={selectAll} style={{...sty.bg,padding:"6px 12px",fontSize:11}}>{allSelected?"Deselectează":"Selectează toate"}</button>
        {selectedIds.length>0&&<><span style={{fontSize:11,color:th.tm}}>{selectedIds.length} selectate</span><button onClick={delSelected} style={{padding:"6px 12px",fontSize:11,borderRadius:8,border:"1px solid #ef4444",background:"transparent",color:"#ef4444",cursor:"pointer"}}><IcTrash s={12}/> Șterge</button></>}
      </div>}

      <div style={{display:"flex",flexDirection:"column",gap:0}}>
        {active.length===0 && <div style={{padding:56,textAlign:"center",color:th.tm,fontSize:17,lineHeight:1.6,background:th.bg==="#09090b"?th.h:"#faf9f7",borderRadius:16,border:`2px dashed ${th.bl}`}}>Niciun task activ — scrie mai sus ce ai de făcut și apasă Enter 🎉</div>}
        {viewMode==="kanban"&&!compact ? (
          <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"repeat(3,1fr)",gap:16,minHeight:400}}>
            {(["in_proces","in_lucru","done"]).map(col=>{
              const colTasks = col==="done" ? done : active.filter(t=>taskStatus(t)===col);
              return <div key={col} onDragOver={e=>{e.preventDefault();setKanbanDragCol(col);}} onDragLeave={()=>setKanbanDragCol(null)} onDrop={e=>{e.preventDefault();setKanbanDragCol(null);const id=e.dataTransfer.getData("taskId");if(id){updTask(id,{taskStatus:col,done:col==="done"});}}}
                style={{background:th.bg==="#09090b"?th.h:"#faf9f7",borderRadius:14,padding:18,border:`2px dashed ${kanbanDragCol===col?TSC[col]:th.bl}`,minHeight:220,transition:"all .2s"}}>
                <div style={{fontSize:14,fontWeight:700,color:TSC[col],marginBottom:14,display:"flex",alignItems:"center",gap:10}}><span style={{width:12,height:12,borderRadius:"50%",background:TSC[col]}}/> {TSL[col]} ({colTasks.length})</div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {colTasks.map(t=>(
                    <div key={t.id} draggable onDragStart={e=>e.dataTransfer.setData("taskId",t.id)} onClick={()=>toggleExpanded(t.id)}
                      style={{background:th.c,borderRadius:12,padding:18,cursor:"grab",border:`${selectedIds.includes(t.id)?2:1}px solid ${selectedIds.includes(t.id)?th.a:th.bl}`,boxShadow:"0 1px 4px rgba(0,0,0,.05)",transition:"all .15s"}}
                      onMouseOver={e=>{e.currentTarget.style.transform="translateY(-1px)";e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,.08)";}}
                      onMouseOut={e=>{e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="0 1px 4px rgba(0,0,0,.05)";}}>
                      <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                        {!compact&&<div onClick={e=>e.stopPropagation()}><input type="checkbox" checked={selectedIds.includes(t.id)} onChange={()=>setSelectedIds(s=>s.includes(t.id)?s.filter(x=>x!==t.id):[...s,t.id])} style={{cursor:"pointer",width:16,height:16}}/></div>}
                        <div onClick={e=>{e.stopPropagation();toggle(t.id);}} style={{width:20,height:20,borderRadius:5,border:`2px solid ${TSC[taskStatus(t)]}`,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:taskStatus(t)==="done"?th.b:"transparent",marginTop:2}}>{taskStatus(t)==="done"&&<IcCheck s={12}/>}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:16,fontWeight:600,textDecoration:taskStatus(t)==="done"?"line-through":undefined,color:taskStatus(t)==="done"?th.tm:th.t,lineHeight:1.4}}>{t.text}</div>
                          <div style={{display:"flex",alignItems:"center",gap:6,marginTop:6,flexWrap:"wrap"}}>
                            <select value={t.priority||"medium"} onChange={e=>{e.stopPropagation();updTask(t.id,{priority:e.target.value});}} onClick={e=>e.stopPropagation()} className="modernSel" style={{...sty.i,padding:"8px 28px 8px 12px",fontSize:13,borderRadius:8,border:`1px solid ${th.b}`}}>
                              <option value="high">Urgent</option><option value="medium">Normal</option><option value="low">Low</option>
                            </select>
                            {t.due&&<span style={{fontSize:10,color:th.tm}}><IcClock s={10}/> {fD(t.due)}</span>}
                            {(t.subtasks||[]).length>0&&<span style={{fontSize:10,color:th.tm}}>{(t.subtasks||[]).filter(s=>s.done).length}/{(t.subtasks||[]).length}</span>}
                          </div>
                        </div>
                        <button onClick={e=>{e.stopPropagation();del(t.id);}} style={{padding:4,border:"none",background:"transparent",color:th.tm,cursor:"pointer",opacity:.6}}><IcTrash s={14}/></button>
                      </div>
                      {expandedIds.has(t.id)&&<div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${th.b}`}}>
                        <div style={{fontSize:13,color:th.tm,fontWeight:600,marginBottom:8}}>Subtasks</div>
                        {(t.subtasks||[]).map(s=><TaskCard key={s.id} t={{...s,subtasks:s.subtasks||[],tags:s.tags||[],chats:s.chats||[],uploads:s.uploads||[]}} isDone={s.done} depth={1} showSelect={false}/>)}
                        <input placeholder="+ Adaugă subtask (Enter)" onKeyDown={e=>{if(e.key==="Enter"){addSub(t.id,e.target.value);e.target.value="";}}} style={{...sty.i,padding:"14px 16px",fontSize:15,marginTop:10,borderRadius:10}}/>
                      </div>}
                    </div>
                  ))}
                </div>
              </div>;
            })}
          </div>
        ) : viewMode==="calendar"&&!compact ? (
          <div style={{overflow:"hidden"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <button onClick={()=>setCalendarDate(p=>{let m=p.m-1;let y=p.y;if(m<0){m=11;y--;}return{m:m,y:y};})} style={{...sty.bg,padding:"8px 14px",fontSize:13}}>←</button>
              <div style={{fontSize:17,fontWeight:700,color:th.t,textTransform:"capitalize",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><span>{MONTHS_RO_CAL[calendarDate.m]} {calendarDate.y}</span><span style={{fontSize:10,color:th.tm,fontWeight:400}}>scroll ↑↓</span></div>
              <button onClick={()=>setCalendarDate(p=>{let m=p.m+1;let y=p.y;if(m>11){m=0;y++;}return{m:m,y:y};})} style={{...sty.bg,padding:"8px 14px",fontSize:13}}>→</button>
              <button onClick={()=>{const n=new Date();setCalendarDate({m:n.getMonth(),y:n.getFullYear()});}} style={{...sty.bg,padding:"6px 12px",fontSize:12}}>Azi</button>
            </div>
            <div ref={calendarScrollRef} onScroll={handleCalendarScroll} style={{height:420,overflowY:"auto",scrollSnapType:"y mandatory",scrollBehavior:"smooth",WebkitOverflowScrolling:"touch"}}>
              {[-1,0,1].map(offset=>{
                let m=calendarDate.m+offset; let y=calendarDate.y;
                if(m<0){m+=12;y--;} if(m>11){m-=12;y++;}
                return <div key={`${y}-${m}`} style={{minHeight:420,scrollSnapAlign:"start",scrollSnapStop:"always"}}>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
                    {["Lu","Ma","Mi","Jo","Vi","Sâ","Du"].map(d=><div key={d} style={{fontSize:10,color:th.tm,textAlign:"center",fontWeight:600,padding:"4px 0"}}>{d}</div>)}
                    {renderMonth(y,m)}
                  </div>
                </div>;
              })}
            </div>
          </div>
        ) : (
          active.map(t=><TaskCard key={t.id} t={t} isDone={false} showSelect={!compact}/>)
        )}
      </div>

      {done.length>0 && <>
        <div style={{fontSize:13,color:th.tm,fontWeight:600,textTransform:"uppercase",letterSpacing:1.2,marginTop:32,marginBottom:14}}>Finalizate ({done.length})</div>
        {(compact?done.slice(0,2):done).map(t=><TaskCard key={t.id} t={t} isDone={true} showSelect={!compact}/>)}
      </>}
    </div>
  );
}

// ─── Offers board, contract, offer preview ───
function OffersBoard({ evs, th, sty, mob, onSelect, onAddOffer, onStatusChange, onAvansToggle, onDeleteSelected, showSelection }) {
  const [sortBy, setSortBy] = useState("date");
  const [filterSt, setFilterSt] = useState("");
  const [filterCat, setFilterCat] = useState("");
  const [viewMode, setViewMode] = useState("list"); // list | grid | kanban
  const [dragOverCol, setDragOverCol] = useState(null);
  const [selectedIds, setSelectedIds] = useState([]);
  const toggleSel = (id) => setSelectedIds(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  let base = evs.filter(e=>{
    if(filterSt) { if(e.st!==filterSt) return false; }
    else { if(!["oferta","asteptare","plata_avans","confirmat"].includes(e.st)) return false; }
    if(filterCat&&e.cat!==filterCat) return false;
    return true;
  });
  const active = [...base].sort((a,b)=>{
    if(sortBy==="date") return new Date(a.date||0)-new Date(b.date||0);
    if(sortBy==="dateDesc") return new Date(b.date||0)-new Date(a.date||0);
    if(sortBy==="cr") return new Date(b.cr||0)-new Date(a.cr||0);
    if(sortBy==="crAsc") return new Date(a.cr||0)-new Date(b.cr||0);
    if(sortBy==="fee") return (b.fee||0)-(a.fee||0);
    if(sortBy==="feeAsc") return (a.fee||0)-(b.fee||0);
    if(sortBy==="client") return (a.cn||"").localeCompare(b.cn||"");
    if(sortBy==="status") return (a.st||"").localeCompare(b.st||"");
    return 0;
  });
  const allIds = active.map(e=>e.id);
  const allSelected = allIds.length>0&&allIds.every(id=>selectedIds.includes(id));
  const selectAll = () => setSelectedIds(allSelected?[]:allIds);
  const delSelected = () => { if(selectedIds.length===0||!onDeleteSelected) return; if(!window.confirm(`Ștergi ${selectedIds.length} ofertă/oferte?`)) return; onDeleteSelected(selectedIds); setSelectedIds([]); };
  return (

// Imagine header draggabilă — trage poza în chenar pentru poziționare
function HeroImageEditor({ src, position, onChange }) {
  const parseY = (p) => { const s=String(p||""); if(s.includes("top"))return 0; if(s.includes("bottom"))return 100; const m=s.match(/(\d+\.?\d*)%?/); return m?Math.max(0,Math.min(100,parseFloat(m[1])||50)):50; };
  const [drag, setDrag] = useState(null);
  const posY = parseY(position);
  useEffect(() => {
    if (!drag) return;
    const onMove = (e) => {
      const dy = (e.touches?.[0]?.clientY ?? e.clientY) - drag.startY;
      const newY = Math.max(0, Math.min(100, drag.startPos - dy * 0.3));
      onChange("center " + Math.round(newY) + "%");
    };
    const onEnd = () => setDrag(null);
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onEnd);
    window.addEventListener("touchmove", onMove, { passive: true });
    window.addEventListener("touchend", onEnd);
    return () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onEnd); window.removeEventListener("touchmove", onMove); window.removeEventListener("touchend", onEnd); };
  }, [drag]);
  return (
    <div
      onMouseDown={e=>setDrag({startY:e.clientY,startPos:posY})}
      onTouchStart={e=>setDrag({startY:e.touches[0].clientY,startPos:posY})}
      style={{position:"relative",overflow:"hidden",height:260,borderRadius:10,border:"1px solid #ccc",cursor:"grab",userSelect:"none"}}
    >
      <img src={src} alt="" style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:position||"center 50%",pointerEvents:"none"}} onError={e=>{e.target.style.display="none";}}/>
      <div style={{position:"absolute",bottom:8,left:"50%",transform:"translateX(-50%)",fontSize:10,color:"rgba(255,255,255,.7)",background:"rgba(0,0,0,.5)",padding:"4px 8px",borderRadius:6}}>Trage poza pentru poziționare</div>
    </div>
  );
}

function LocationSearch({ venue, city, dist, onUpdate, sty, th, mob }) {
  const [venueVal, setVenueVal] = useState(venue||"");
  const [cityQuery, setCityQuery] = useState(city||"");
  const [showCityDrop, setShowCityDrop] = useState(false);
  const [venueResults, setVenueResults] = useState([]);
  const [showVenueDrop, setShowVenueDrop] = useState(false);
  const [venueAddress, setVenueAddress] = useState("");
  const [venueMapUrl, setVenueMapUrl] = useState("");
  const [searching, setSearching] = useState(false);
  const debounceRef = useRef(null);
  const iStyle = {...sty.i, fontSize: mob?"16px":"14px"};

  // Caută pe OpenStreetMap Nominatim după ce userul termină de scris (debounce 600ms)
  const searchNominatim = (query) => {
    if (debounceRef.current) clearTimeout(debounceRef.current);
    if (!query || query.length < 3) { setVenueResults([]); setShowVenueDrop(false); return; }
    debounceRef.current = setTimeout(async () => {

      try {
        // Adaugă orașul în query dacă e completat — rezultate mai precise
        const q = cityQuery ? `${query}, ${cityQuery}` : `${query}, Romania`;
        const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&addressdetails=1&accept-language=ro&countrycodes=ro`;
        const res = await fetch(url);
        const data = await res.json();
        setVenueResults(data);
        setShowVenueDrop(data.length > 0);
      } catch(e) {
        setVenueResults([]);
      }
      setSearching(false);
    }, 600);
  };

  const pickVenue = (place) => {
    // Numele venue-ului — prima parte din display_name (înainte de prima virgulă)
    const nameParts = (place.display_name || "").split(",");
    const name = nameParts[0].trim();
    const addr = place.display_name || "";
    const a = place.address || {};
    const cityName = a.city || a.town || a.village || a.municipality || a.county || "";
    const mapUrl = `https://www.openstreetmap.org/?mlat=${place.lat}&mlon=${place.lon}&zoom=17`;

    // Distanță față de TM
    const cityMatch = RO_CITIES.find(c =>
      cityName.toLowerCase().includes(c.n.toLowerCase()) ||
      c.n.toLowerCase().includes(cityName.toLowerCase())
    );
    const distKm = cityMatch ? cityMatch.km : 0;

    setVenueVal(name);
    setCityQuery(cityName);
    setVenueAddress(addr);
    setVenueMapUrl(mapUrl);
    setShowVenueDrop(false);
    setVenueResults([]);
    onUpdate({ venue: name, city: cityName, dist: distKm });
  };

  const handleVenueChange = (v) => {
    setVenueVal(v);
    setVenueAddress("");
    setVenueMapUrl("");
    onUpdate({ venue: v, city: cityQuery, dist: dist||0 });
    searchNominatim(v);
  };

  const filteredCities = cityQuery.length>0
    ? RO_CITIES.filter(c=>c.n.toLowerCase().includes(cityQuery.toLowerCase())).slice(0,6)
    : [];

  const pickCity = (c) => {
    setCityQuery(c.n);
    setShowCityDrop(false);
    onUpdate({ venue: venueVal, city: c.n, dist: c.km });
  };

  // Formatare adresă scurtă pentru dropdown (scoate România și codul poștal)
  const shortAddr = (displayName) => {
    return displayName.split(",").slice(1,4).join(",").replace(/\d{6}/g,"").replace("România","").replace("Romania","").trim().replace(/,\s*$/,"");
  };

  return (
    <div style={{gridColumn:"1/-1", display:"flex", flexDirection:"column", gap:10}}>
      <div style={{display:"grid", gridTemplateColumns:mob?"1fr":"1fr 1fr", gap:10}}>

        {/* Venue cu Nominatim autocomplete */}
        <div style={{position:"relative"}}>
          <label style={sty.l}>
            Locație / Venue
            {searching && <span style={{color:"#fbbf24",fontSize:10,marginLeft:6}}>● caută...</span>}
          </label>
          <input
            value={venueVal}
            onChange={e=>handleVenueChange(e.target.value)}
            onBlur={()=>setTimeout(()=>setShowVenueDrop(false),200)}
            onFocus={()=>venueResults.length>0 && setShowVenueDrop(true)}
            style={iStyle}
            placeholder="🔍  Scrie numele locației..."
            autoComplete="off"
          />
          {showVenueDrop && venueResults.length>0 && (
            <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:1000,background:th.c,border:`1px solid ${th.b}`,borderRadius:10,boxShadow:"0 8px 28px rgba(0,0,0,.3)",marginTop:3,overflow:"hidden"}}>
              {venueResults.map((place,i)=>{
                const name = place.display_name.split(",")[0].trim();
                const sub = shortAddr(place.display_name);
                return (
                  <div key={place.place_id} onClick={()=>pickVenue(place)}
                    style={{padding:"10px 14px",cursor:"pointer",borderBottom:i<venueResults.length-1?`1px solid ${th.bl}`:"none"}}
                    onMouseOver={e=>e.currentTarget.style.background=th.h}
                    onMouseOut={e=>e.currentTarget.style.background="transparent"}>
                    <div style={{fontWeight:600,fontSize:13,color:th.t}}>{name}</div>
                    {sub && <div style={{fontSize:11,color:th.tm,marginTop:2}}>{sub}</div>}
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* Oraș cu autocomplete offline */}
        <div style={{position:"relative"}}>
          <label style={sty.l}>
            Oraș {dist>0 && <span style={{color:"#22c55e",fontWeight:700,marginLeft:6}}>🚗 {dist} km de TM</span>}
          </label>
          <input
            value={cityQuery}
            onChange={e=>{setCityQuery(e.target.value);setShowCityDrop(true);onUpdate({venue:venueVal,city:e.target.value,dist:0});}}
            onFocus={()=>setShowCityDrop(true)}
            onBlur={()=>setTimeout(()=>setShowCityDrop(false),150)}
            style={iStyle}
            placeholder="Caută oraș..."
          />
          {showCityDrop && filteredCities.length>0 && (
            <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:999,background:th.c,border:`1px solid ${th.b}`,borderRadius:8,boxShadow:"0 8px 24px rgba(0,0,0,.2)",marginTop:2,overflow:"hidden"}}>
              {filteredCities.map((c,i)=>(
                <div key={c.n} onClick={()=>pickCity(c)}
                  style={{padding:"9px 14px",cursor:"pointer",borderBottom:i<filteredCities.length-1?`1px solid ${th.bl}`:"none",display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:13}}
                  onMouseOver={e=>e.currentTarget.style.background=th.h}
                  onMouseOut={e=>e.currentTarget.style.background="transparent"}>
                  <span style={{fontWeight:500,color:th.t}}>{c.n}</span>
                  <span style={{fontSize:10,color:c.km===0?"#22c55e":th.tm,fontWeight:c.km<50?600:400}}>{c.km===0?"local":c.km+" km"}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Adresă completă + link hartă (apare după selecție) */}
      {venueAddress && (
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:th.ab||"rgba(251,191,36,.06)",borderRadius:8,border:`1px solid ${th.bl}`}}>
          <span style={{fontSize:11,color:th.tm,flex:1,lineHeight:1.5}}>📍 {venueAddress}</span>
          <a href={venueMapUrl} target="_blank" rel="noopener noreferrer"
            style={{fontSize:11,color:"#60a5fa",whiteSpace:"nowrap",fontWeight:600,textDecoration:"none",padding:"4px 10px",borderRadius:6,background:"rgba(96,165,250,.12)"}}>
            ↗ Hartă
          </a>
        </div>
      )}
    </div>
  );
}

function buildAIContext(evs, tasks) {
  var confirmed = evs.filter(function(e){return e.st==="confirmat";});
  var pending   = evs.filter(function(e){return e.st==="asteptare";});
  var totalRev  = confirmed.reduce(function(s,e){return s+(e.fee||0);},0);
  var upcoming  = evs.filter(function(e){return e.date&&new Date(e.date)>=new Date();}).sort(function(a,b){return a.date>b.date?1:-1;}).slice(0,5).map(function(e){return "  - "+e.date+" | "+(e.cn||e.title||"—")+" | "+(e.type||"")+" | "+e.st+" | "+(e.fee||0)+" RON";}).join("\n")||"  (niciun eveniment viitor)";
  var activeTasks = tasks.filter(function(t){return !t.done;}).slice(0,8).map(function(t){return "  - ["+(t.priority||"medium")+"] "+t.text;}).join("\n")||"  (niciun task activ)";
  return "Esti un asistent AI in Phaser Manager.\n\nDATE LIVE:\nEvenimente: "+evs.length+" (confirmate: "+confirmed.length+", asteptare: "+pending.length+")\nVenit: "+totalRev+" RON\nTasks: "+tasks.filter(function(t){return !t.done;}).length+"\n\nEVENIMENTE VIITOARE:\n"+upcoming+"\n\nTASKS ACTIVE:\n"+activeTasks+"\n\nRaspunde in romana. Fii concis si util.";
}

function processLocalCmd(input, evs, tasks) {
  var cmd = input.trim();
  var norm = function(s){ return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); };
  var nc = norm(cmd);
  var cur = new Date(); cur.setHours(0,0,0,0);
  var fmtE = function(e){ return "• O"+(e.offerNr||"?")+" · "+(e.type||"—")+(e.cn?" | "+(e.cn):"")+" | "+(e.date||"—")+" | "+(e.fee||0).toLocaleString("ro-RO")+" € ["+(e.st||"—")+"]"; };
  var PX = {r:{3:4100,2:3100,1:2350},sunet:350,lumini:500,ecran:600,scena:300,dj:600,pub:2000};
  var ST_LABEL = {oferta:"Ofertă",asteptare:"Așt. contract",plata_avans:"Plată avans",confirmat:"Confirmat",respins:"Respins"};
  var MEMBERS = [{id:"m1",n:"Carina Dumitru",r:"Vocal"},{id:"m2",n:"Radu Racz",r:"Bass"},{id:"m3",n:"Lucian Oprișan",r:"Clape"},{id:"m4",n:"Arnold Birta",r:"Tobe"},{id:"m5",n:"Sebastian Bârzeianu",r:"Chitară"}];

  // ── helpers ──
  var evByNr = function(nr){ return evs.find(function(e){return String(e.offerNr)===String(nr);}); };
  var getOfferNr = function(){ var m=nc.match(/o(\d+)/); return m?m[1]:null; };
  var svcTot = function(e){ var p=e.svcp||PX; var t=0; ["sunet","lumini","ecran","scena","dj"].forEach(function(k){if(e.svc&&e.svc[k])t+=p[k]||0;}); return t; };
  var evTot = function(e){ return (e.fee||0)+svcTot(e); };

  // ══════════════════════════════════════════════
  // 1. RAPORT FINANCIAR
  // ══════════════════════════════════════════════
  if(nc.match(/raport|financiar|incasat|bani total|situatie financiara/)) {
    var conf=evs.filter(function(e){return e.st==="confirmat";}),
        oferta=evs.filter(function(e){return e.st==="oferta";}),
        ast=evs.filter(function(e){return e.st==="asteptare";}),
        plata=evs.filter(function(e){return e.st==="plata_avans";}),
        resp=evs.filter(function(e){return e.st==="respins";});
    var tC=conf.reduce(function(s,e){return s+evTot(e);},0),
        tO=oferta.reduce(function(s,e){return s+(e.fee||0);},0),
        tA=ast.reduce(function(s,e){return s+(e.fee||0);},0),
        tP=plata.reduce(function(s,e){return s+(e.fee||0);},0),
        pipe=tO+tA+tP;
    return "📊 RAPORT FINANCIAR\n\n✅ Confirmate: "+conf.length+" → "+tC.toLocaleString("ro-RO")+" €\n🟣 Așt. contract: "+ast.length+" → "+tA.toLocaleString("ro-RO")+" €\n🔵 Plată avans: "+plata.length+" → "+tP.toLocaleString("ro-RO")+" €\n🟡 În ofertă: "+oferta.length+" → "+tO.toLocaleString("ro-RO")+" €\n🔴 Respinse: "+resp.length+"\n\n💰 Pipeline activ: "+pipe.toLocaleString("ro-RO")+" €\n📁 Total oferte: "+evs.length;
  }

  // ══════════════════════════════════════════════
  // 2. VENITURI (doar confirmate)
  // ══════════════════════════════════════════════
  if(nc.match(/venit|incasat|confirmat[e]? total|cat am facut/)) {
    var c=evs.filter(function(e){return e.st==="confirmat";});
    var tot=c.reduce(function(s,e){return s+evTot(e);},0);
    var avTotal=c.reduce(function(s,e){return s+(e.dp?e.dep||0:0);},0);
    return "💰 VENITURI CONFIRMATE\n\nEvenimente confirmate: "+c.length+"\nTotal valoare: "+tot.toLocaleString("ro-RO")+" €\nAvansuri încasate: "+avTotal.toLocaleString("ro-RO")+" €\nRest de încasat: "+(tot-avTotal).toLocaleString("ro-RO")+" €";
  }

  // ══════════════════════════════════════════════
  // 3. PIPELINE
  // ══════════════════════════════════════════════
  if(nc.match(/pipeline|potential|in asteptare|in oferta|neconfirmat/)) {
    var pp=evs.filter(function(e){return ["oferta","asteptare","plata_avans"].indexOf(e.st)>-1;});
    var tpp=pp.reduce(function(s,e){return s+(e.fee||0);},0);
    return "🔄 PIPELINE ACTIV ("+pp.length+" oferte)\n\nValoare totală: "+tpp.toLocaleString("ro-RO")+" €\n\n"+pp.map(fmtE).join("\n");
  }

  // ══════════════════════════════════════════════
  // 4. STATISTICI
  // ══════════════════════════════════════════════
  if(nc.match(/statistici|stat |breakdown|distributie|structura/)) {
    var types={}, stati={};
    evs.forEach(function(e){ types[e.type||"—"]=(types[e.type||"—"]||0)+1; stati[e.st||"—"]=(stati[e.st||"—"]||0)+1; });
    var viit=evs.filter(function(e){return e.date&&new Date(e.date+"T00:00:00")>=cur;}).length;
    var trec=evs.filter(function(e){return e.date&&new Date(e.date+"T00:00:00")<cur;}).length;
    var byType=Object.entries(types).sort(function(a,b){return b[1]-a[1];}).map(function(x){return "  "+x[0]+": "+x[1];}).join("\n");
    var bySt=Object.entries(stati).map(function(x){return "  "+(ST_LABEL[x[0]]||x[0])+": "+x[1];}).join("\n");
    return "📈 STATISTICI\n\nDupă tip:\n"+byType+"\n\nDupă status:\n"+bySt+"\n\n📅 Viitoare: "+viit+" | Trecute: "+trec+" | Total: "+evs.length;
  }

  // ══════════════════════════════════════════════
  // 5. NUNȚI
  // ══════════════════════════════════════════════
  if(nc.match(/nunt[ăa]|nunti/)) {
    var nn=evs.filter(function(e){return norm(e.type||"").includes("nunt");});
    if(nn.length===0) return "Nicio nuntă găsită.";
    var t=nn.reduce(function(s,e){return s+(e.fee||0);},0);
    return "💍 NUNȚI ("+nn.length+")\n\n"+nn.map(fmtE).join("\n")+"\n\nTotal valoare: "+t.toLocaleString("ro-RO")+" €";
  }

  // ══════════════════════════════════════════════
  // 6. FESTIVALURI
  // ══════════════════════════════════════════════
  if(nc.match(/festival/)) {
    var ff=evs.filter(function(e){return norm(e.type||"").includes("festival");});
    if(ff.length===0) return "Niciun festival găsit.";
    return "🎪 FESTIVALURI ("+ff.length+")\n\n"+ff.map(fmtE).join("\n");
  }

  // ══════════════════════════════════════════════
  // 7. CORPORATE
  // ══════════════════════════════════════════════
  if(nc.match(/corporate|corporat/)) {
    var cc=evs.filter(function(e){return norm(e.type||"").includes("corporate");});
    if(cc.length===0) return "Niciun eveniment corporate găsit.";
    return "🏢 CORPORATE ("+cc.length+")\n\n"+cc.map(fmtE).join("\n");
  }

  // ══════════════════════════════════════════════
  // 8. CONFIRMATE
  // ══════════════════════════════════════════════
  if(nc.match(/confirm[ae]t[e]?(?! total)|doar confirm/)) {
    var ev_c=evs.filter(function(e){return e.st==="confirmat";});
    if(ev_c.length===0) return "Niciun eveniment confirmat.";
    return "✅ CONFIRMATE ("+ev_c.length+")\n\n"+ev_c.map(fmtE).join("\n");
  }

  // ══════════════════════════════════════════════
  // 9. RESPINSE
  // ══════════════════════════════════════════════
  if(nc.match(/respins[e]?|pierdut[e]?|refuzat[e]?/)) {
    var ev_r=evs.filter(function(e){return e.st==="respins";});
    if(ev_r.length===0) return "Nicio ofertă respinsă.";
    var lost=ev_r.reduce(function(s,e){return s+(e.fee||0);},0);
    return "🔴 RESPINSE ("+ev_r.length+")\n\n"+ev_r.map(fmtE).join("\n")+"\n\nValoare pierdută: "+lost.toLocaleString("ro-RO")+" €";
  }

  // ══════════════════════════════════════════════
  // 10. URMĂTOARELE EVENIMENTE
  // ══════════════════════════════════════════════
  if(nc.match(/urmat[oă]|urmeaz[aă]|agenda|programul|viitoare|urma/)) {
    var nxt=evs.filter(function(e){return e.date&&new Date(e.date+"T00:00:00")>=cur;}).sort(function(a,b){return a.date>b.date?1:-1;}).slice(0,8);
    if(nxt.length===0) return "📅 Niciun eveniment viitor.";
    return "📅 URMĂTOARELE EVENIMENTE:\n\n"+nxt.map(function(e,i){var d=Math.ceil((new Date(e.date+"T00:00:00")-cur)/864e5); return (i+1)+". "+(e.date)+" (în "+d+"z) | O"+(e.offerNr||"?")+" · "+(e.type||"—")+(e.cn?" | "+e.cn:"")+" | "+(e.fee||0).toLocaleString("ro-RO")+" € ["+(ST_LABEL[e.st]||e.st)+"]";}).join("\n");
  }

  // ══════════════════════════════════════════════
  // 11. DETALII OFERTĂ SPECIFICĂ (ex: "oferta O5" sau "o5")
  // ══════════════════════════════════════════════
  if(nc.match(/\bo\d+\b|oferta\s+\d+|detalii\s+o/)) {
    var nr=getOfferNr(); if(!nr) return "Specifică numărul ofertei. Ex: O5";
    var ev=evByNr(nr); if(!ev) return "Oferta O"+nr+" nu există.";
    var svcs=[]; ["sunet","lumini","ecran","scena","dj"].forEach(function(k){if(ev.svc&&ev.svc[k])svcs.push(k);});
    var tot=evTot(ev); var av=ev.dep||0; var rest=tot-av;
    return "📋 OFERTA O"+nr+"\n\nTip: "+(ev.type||"—")+" ("+(ev.cat==="private"?"Privat":"Public")+")\nClient: "+(ev.cn||"—")+"\nData: "+(ev.date||"—")+"\nLocație: "+(ev.venue||"—")+(ev.city?", "+ev.city:"")+"\nStatus: "+(ST_LABEL[ev.st]||ev.st)+"\n\nTarif: "+(ev.fee||0).toLocaleString("ro-RO")+" €"+(svcs.length>0?"\nServicii: "+svcs.join(", ")+" (+"+svcTot(ev).toLocaleString("ro-RO")+" €)":"")+"\nTotal: "+tot.toLocaleString("ro-RO")+" €\nAvans: "+av.toLocaleString("ro-RO")+" € ("+(ev.dp?"✅ plătit":"⏳ nepreluat")+")\nRest: "+rest.toLocaleString("ro-RO")+" €"+(ev.rep?"\nReprezentații: "+ev.rep+"×"+(ev.repDur||45)+" min":"");
  }

  // ══════════════════════════════════════════════
  // 12. AVANSURI (ce avansuri sunt de luat)
  // ══════════════════════════════════════════════
  if(nc.match(/avans|depozit|deposit/)) {
    var pending=evs.filter(function(e){return !e.dp&&["confirmat","plata_avans","asteptare"].indexOf(e.st)>-1&&(e.dep||0)>0;});
    if(pending.length===0) return "✅ Toate avansurile sunt încasate!";
    var total=pending.reduce(function(s,e){return s+(e.dep||0);},0);
    return "💳 AVANSURI DE ÎNCASAT ("+pending.length+")\n\n"+pending.map(function(e){return "• O"+(e.offerNr||"?")+" · "+(e.type||"—")+(e.cn?" | "+e.cn:"")+" → "+(e.dep||0).toLocaleString("ro-RO")+" €";}).join("\n")+"\n\nTotal de încasat: "+total.toLocaleString("ro-RO")+" €";
  }

  // ══════════════════════════════════════════════
  // 13. PREȚURI / TARIFE
  // ══════════════════════════════════════════════
  if(nc.match(/pret|pret[u]?ri|tarif|cat cost[aă]|cat e/)) {
    // "pret nunta 2" → preț nuntă 2 reprize
    var mPret=nc.match(/(\d)/);
    if(mPret&&nc.match(/nunt|priv|botez|party|corp/)) {
      var sets=parseInt(mPret[1]); if(sets<1||sets>3)sets=2;
      var p=PX.r[sets]||PX.r[2];
      return "💰 Preț "+(sets)+" reprize: "+p.toLocaleString("ro-RO")+" €\nAvans (10%): "+(Math.round(p*0.1/10)*10).toLocaleString("ro-RO")+" €\nRest: "+(p-Math.round(p*0.1/10)*10).toLocaleString("ro-RO")+" €";
    }
    return "💰 LISTA PREȚURI\n\nNuntă/Privat:\n  1 repriză (45 min): "+PX.r[1].toLocaleString("ro-RO")+" €\n  2 reprize (90 min): "+PX.r[2].toLocaleString("ro-RO")+" €\n  3 reprize (135 min): "+PX.r[3].toLocaleString("ro-RO")+" €\n\nPublic (festival/concert): "+PX.pub.toLocaleString("ro-RO")+" €\n\nServicii extra:\n  Sunet: "+PX.sunet+" €\n  Lumini: "+PX.lumini+" €\n  Ecran LED: "+PX.ecran+" €\n  Scenă: "+PX.scena+" €\n  DJ: "+PX.dj+" €";
  }

  // ══════════════════════════════════════════════
  // 14. MEMBRI TRUPĂ
  // ══════════════════════════════════════════════
  if(nc.match(/membr[iu]|trupa|componenta|cine canta|band/)) {
    return "🎸 TRUPA PHASER\n\n"+MEMBERS.map(function(m){return "• "+m.n+" — "+m.r;}).join("\n");
  }

  // ══════════════════════════════════════════════
  // 15. SPLIT MEMBRI PE OFERTĂ
  // ══════════════════════════════════════════════
  if(nc.match(/split|impartit|impartire|cat primeste|platit membr/)) {
    var nr2=getOfferNr();
    if(!nr2){ // arată toate ofertele cu split
      var cu_split=evs.filter(function(e){return e.sp&&Object.keys(e.sp).length>0;});
      if(cu_split.length===0) return "Nicio ofertă nu are split configurat.";
      return "Split configurat pe: "+cu_split.map(function(e){return "O"+(e.offerNr||"?");}).join(", ");
    }
    var ev2=evByNr(nr2); if(!ev2) return "Oferta O"+nr2+" nu există.";
    if(!ev2.sp||Object.keys(ev2.sp).length===0) return "Oferta O"+nr2+" nu are split configurat.";
    var lines=MEMBERS.map(function(m){ var v=ev2.sp[m.id]||0; return v>0?"  "+m.n+": "+v.toLocaleString("ro-RO")+" €":null; }).filter(Boolean);
    return "💸 SPLIT O"+nr2+":\n\n"+lines.join("\n");
  }

  // ══════════════════════════════════════════════
  // 16. TASKURI
  // ══════════════════════════════════════════════
  if(nc.match(/task|taskuri|de facut|todo|sarcin/)) {
    var active=tasks.filter(function(t){return !t.done;});
    if(active.length===0) return "✅ Niciun task activ!";
    var byPrio={high:[],medium:[],low:[]};
    active.forEach(function(t){(byPrio[t.priority||"medium"]).push(t);});
    var out="📋 TASKURI ACTIVE ("+active.length+"):\n";
    if(byPrio.high.length) out+="\n🔴 Urgente ("+byPrio.high.length+"):\n"+byPrio.high.map(function(t){return "  • "+t.text+(t.due?" ["+t.due+"]":"");}).join("\n");
    if(byPrio.medium.length) out+="\n🟡 Normale ("+byPrio.medium.length+"):\n"+byPrio.medium.map(function(t){return "  • "+t.text+(t.due?" ["+t.due+"]":"");}).join("\n");
    if(byPrio.low.length) out+="\n🟢 Low ("+byPrio.low.length+"):\n"+byPrio.low.map(function(t){return "  • "+t.text;}).join("\n");
    return out;
  }

  // ══════════════════════════════════════════════
  // 17. TASKURI URGENTE
  // ══════════════════════════════════════════════
  if(nc.match(/urgent|prioritar|important|foc/)) {
    var urg=tasks.filter(function(t){return !t.done&&t.priority==="high";});
    if(urg.length===0) return "✅ Niciun task urgent!";
    return "🔴 TASKURI URGENTE ("+urg.length+"):\n\n"+urg.map(function(t){return "• "+t.text+(t.due?" → "+t.due:"");}).join("\n");
  }

  // ══════════════════════════════════════════════
  // 18. LUNA / LUNĂ SPECIFICĂ
  // ══════════════════════════════════════════════
  if(nc.match(/luna|lun[aă]|in (ian|feb|mar|apr|mai|iun|iul|aug|sep|oct|nov|dec)/)) {
    var MONTHS={ian:0,feb:1,mar:2,apr:3,mai:4,iun:5,iul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
    var mMatch=nc.match(/(ian|feb|mar|apr|mai|iun|iul|aug|sep|oct|nov|dec)/);
    var targetM=mMatch?MONTHS[mMatch[1]]:cur.getMonth();
    var yr=cur.getFullYear(); var mName=mMatch?mMatch[1]:"luna curentă";
    var evL=evs.filter(function(e){if(!e.date)return false; var d=new Date(e.date+"T00:00:00"); return d.getMonth()===targetM&&d.getFullYear()===yr;});
    if(evL.length===0) return "📅 Niciun eveniment în "+mName+" "+yr+".";
    var tL=evL.reduce(function(s,e){return s+(e.fee||0);},0);
    return "📅 EVENIMENTE ÎN "+mName.toUpperCase()+" "+yr+" ("+evL.length+"):\n\n"+evL.map(fmtE).join("\n")+"\n\nTotal: "+tL.toLocaleString("ro-RO")+" €";
  }

  // ══════════════════════════════════════════════
  // 19. CĂUTARE
  // ══════════════════════════════════════════════
  if(nc.match(/caut[aă]|gasest[e]|gasesc|arata|g[aă]sest/)) {
    var q=cmd.replace(/caut[aă]|gasest[e]|arata/gi,"").trim();
    if(!q) return "Ce să caut? Ex: \"cauta Maria\" sau \"cauta Timisoara\"";
    var nq=norm(q);
    var res=evs.filter(function(e){ return norm(e.type||"").includes(nq)||norm(e.cn||"").includes(nq)||norm(e.venue||"").includes(nq)||norm(e.city||"").includes(nq)||norm(e.ce||"").includes(nq)||norm(e.cp||"").includes(nq)||(e.offerNr&&("o"+e.offerNr).includes(nq)); });
    if(res.length===0) return "🔍 Nimic găsit pentru \""+q+"\"";
    return "🔍 "+res.length+" rezultate pentru \""+q+"\":\n\n"+res.map(fmtE).join("\n");
  }

  // ══════════════════════════════════════════════
  // 20. CLIENT
  // ══════════════════════════════════════════════
  if(nc.match(/client|cine a comandat|de la cine/)) {
    var qc=cmd.replace(/client/gi,"").trim();
    if(!qc) { var withClient=evs.filter(function(e){return e.cn;}); return "Clienți înregistrați ("+withClient.length+"): "+withClient.map(function(e){return e.cn;}).filter(function(v,i,a){return a.indexOf(v)===i;}).join(", "); }
    var nqc=norm(qc); var rc=evs.filter(function(e){return norm(e.cn||"").includes(nqc);});
    if(rc.length===0) return "Niciun client cu \""+qc+"\".";

  }

  // ══════════════════════════════════════════════
  // 21. TRECUTE
  // ══════════════════════════════════════════════
  if(nc.match(/trecut[e]?|istoricul|istori[ck]|terminate|finalizat/)) {
    var past=evs.filter(function(e){return e.date&&new Date(e.date+"T00:00:00")<cur;}).sort(function(a,b){return a.date<b.date?1:-1;}).slice(0,8);
    if(past.length===0) return "Niciun eveniment trecut.";
    return "⏮ ULTIMELE EVENIMENTE:\n\n"+past.map(fmtE).join("\n");
  }

  // ══════════════════════════════════════════════
  // 22. CEL MAI APROPIAT EVENIMENT
  // ══════════════════════════════════════════════
  if(nc.match(/urmatorul|cel mai apropiat|cand e urmatorul|cand cantam/)) {
    var next=evs.filter(function(e){return e.date&&new Date(e.date+"T00:00:00")>=cur&&["confirmat","plata_avans","asteptare"].indexOf(e.st)>-1;}).sort(function(a,b){return a.date>b.date?1:-1;})[0];
    if(!next) return "Niciun eveniment confirmat în viitor.";
    var zile=Math.ceil((new Date(next.date+"T00:00:00")-cur)/864e5);

  }

  // ══════════════════════════════════════════════
  // 23. SERVICII EXTRA
  // ══════════════════════════════════════════════
  if(nc.match(/servicii|sunet|lumini|ecran|scena|dj service/)) {
    var cuSvc=evs.filter(function(e){return e.svc&&(e.svc.sunet||e.svc.lumini||e.svc.ecran||e.svc.scena||e.svc.dj);});
    if(cuSvc.length===0) return "Nicio ofertă cu servicii extra.";
    return "🔊 OFERTE CU SERVICII EXTRA ("+cuSvc.length+"):\n\n"+cuSvc.map(function(e){ var s=[]; ["sunet","lumini","ecran","scena","dj"].forEach(function(k){if(e.svc&&e.svc[k])s.push(k);}); return "• O"+(e.offerNr||"?")+" · "+(e.type||"—")+" | "+s.join(", ")+" (+"+svcTot(e).toLocaleString("ro-RO")+" €)"; }).join("\n");
  }

  // ══════════════════════════════════════════════
  // 24. RATA DE CONVERSIE
  // ══════════════════════════════════════════════
  if(nc.match(/conversie|rata|procent|cat la suta|procent[a]/)) {
    var tot_e=evs.length; if(tot_e===0) return "Nu există oferte.";
    var ok=evs.filter(function(e){return e.st==="confirmat";}).length;
    var nos=evs.filter(function(e){return e.st==="respins";}).length;
    var pct=Math.round(ok/tot_e*100);
    return "📊 RATĂ CONVERSIE\n\nOferte totale: "+tot_e+"\nConfirmate: "+ok+" ("+pct+"%)\nRespinse: "+nos+" ("+Math.round(nos/tot_e*100)+"%)\nÎn negociere: "+(tot_e-ok-nos);
  }

  // ══════════════════════════════════════════════
  // 25. AZI
  // ══════════════════════════════════════════════
  if(nc.match(/^azi$|astazi|eveniment azi|ce avem azi/)) {
    var azi=new Date(); var aziStr=azi.toISOString().split("T")[0];
    var ev_azi=evs.filter(function(e){return e.date===aziStr;});
    if(ev_azi.length===0) return "📅 Niciun eveniment azi ("+aziStr+").";
    return "📅 AZI - "+aziStr+":\n\n"+ev_azi.map(fmtE).join("\n");
  }

  // ══════════════════════════════════════════════
  // 26. REZUMAT / SUMAR RAPID
  // ══════════════════════════════════════════════
  if(nc.match(/rezumat|sumar|overview|pe scurt|summary/)) {
    var tot_ev=evs.length, conf_=evs.filter(function(e){return e.st==="confirmat";}).length;
    var pipe_=evs.filter(function(e){return ["oferta","asteptare","plata_avans"].indexOf(e.st)>-1;});
    var vConf=evs.filter(function(e){return e.st==="confirmat";}).reduce(function(s,e){return s+evTot(e);},0);

    var nxt_=evs.filter(function(e){return e.date&&new Date(e.date+"T00:00:00")>=cur;}).sort(function(a,b){return a.date>b.date?1:-1;})[0];
    return "⚡ REZUMAT RAPID\n\n📁 Oferte totale: "+tot_ev+"\n✅ Confirmate: "+conf_+" → "+vConf.toLocaleString("ro-RO")+" €\n🔄 Pipeline: "+pipe_.length+" → "+vPipe.toLocaleString("ro-RO")+" €\n📋 Tasks active: "+actTasks+"\n📅 Următor: "+(nxt_?"O"+(nxt_.offerNr||"?")+" · "+(nxt_.type||"—")+" | "+(nxt_.date||"—"):"—");
  }

  // ══════════════════════════════════════════════
  // 27. AJUTOR
  // ══════════════════════════════════════════════
  if(nc.match(/ajutor|help|comenzi|ce poti|ce stii|ce faci|manual/)) {
    return "🤖 COMENZI DISPONIBILE:\n\n📊 FINANCIAR:\n  raport · venituri · pipeline · avansuri · preturi · conversie\n\n📅 EVENIMENTE:\n  urmatoarele · azi · urmatorul · trecute\n  nunti · festivaluri · corporate\n  confirmate · respinse\n\n🔍 CĂUTARE:\n  cauta [text] · client [nume] · O5 (ofertă specifică)\n  in iun · in mar (events pe lună)\n\n💰 CALCULE:\n  pret nunta 2 · split O5 · servicii\n\n📋 TASKURI:\n  taskuri · urgente\n\n🎸 ALTELE:\n  membri · statistici · rezumat";
  }

  return null; // nu e comandă locală → merge la AI
}

    if (!token || exp < Date.now() || !ev.date) return null;
    const startTime = ev.ss || ev.li || "20:00";
    const [sh, sm] = startTime.split(":").map(Number);

          const uid=pendingUser.memberId||pendingUser.id;
          const hasPw=!!getPasswords()[uid];
          const doSet=async()=>{
            setPwError("");
            if(!pwInput.trim()){ setPwError("Introdu parola"); return; }
            if(hasPw){
              const h=await hashPw(pwInput);
              if(getPasswords()[uid]!==h){ setPwError("Parolă greșită"); return; }
              setTrustedUser(pendingUser);
              setUser(pendingUser); setPendingUser(null); setPwInput("");
            } else {
              if(pwInput!==pwConfirm){ setPwError("Parolele nu coincid"); return; }
              if(pwInput.length<4){ setPwError("Minim 4 caractere"); return; }
              setPasswordFor(uid, await hashPw(pwInput));
              setTrustedUser(pendingUser);
              setUser(pendingUser); setPendingUser(null); setPwInput(""); setPwConfirm("");
            }
          };
          const doForgot=()=>{ clearPasswordFor(uid); setPendingUser(null); setPwInput(""); setPwConfirm(""); setPwError(""); };
          return <div style={{display:"flex",flexDirection:"column",gap:10}}>

            {!hasPw&&<input type="password" value={pwConfirm} onChange={e=>{setPwConfirm(e.target.value);setPwError("");}} placeholder="Confirmă parola" style={{width:"100%",padding:14,background:"#161616",border:"1px solid #222",borderRadius:10,color:"#fff",fontSize:14}} onKeyDown={e=>e.key==="Enter"&&doSet()}/>}

            </label>
            {pwError&&<div style={{fontSize:12,color:"#ef4444"}}>{pwError}</div>}
            <button onClick={()=>{setPwLoading(true);doSet().finally(()=>setPwLoading(false));}} disabled={pwLoading} style={{width:"100%",padding:14,background:"#333",color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:600,cursor:pwLoading?"default":"pointer"}}>{hasPw?"Intră":pwLoading?"Se salvează...":"Setează parola"}</button>

                <div><div style={{fontSize:13,fontWeight:600}}>{ev.offerNr?"O"+ev.offerNr:"???"} · {ev.type}</div><div style={{fontSize:11,color:th.tm}}>{fD(ev.date)} · {ev.venue}</div></div>

                  <div key={ev.id} onClick={()=>openModal("detail",ev.id)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",borderRadius:7,marginBottom:3,cursor:"pointer"}}

                <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}><input type="radio" name="pa" checked={!ev.plataAvansFirma} onChange={()=>upd({plataAvansFirma:false,sumaAvansLei:0})}/><span style={{fontSize:12}}>Direct</span></label>
                <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}><input type="radio" name="pa" checked={!!ev.plataAvansFirma} onChange={()=>upd({plataAvansFirma:true,sumaAvansLei:ev.sumaAvansLei||Math.round(dep*cursLei)})}/><span style={{fontSize:12}}>Firmă (lei)</span></label>
                {ev.plataAvansFirma&&<input type="number" value={ev.sumaAvansLei??""} onChange={e=>upd({sumaAvansLei:Number(e.target.value)})} placeholder="Suma lei" style={{...sty.i,width:100,padding:6,fontSize:12}}/>}
              </div>
              <div style={{fontSize:9,color:th.tm,fontWeight:600,textTransform:"uppercase",marginBottom:8}}>Plată Rest</div>
              <div style={{display:"flex",gap:16,marginBottom:12,flexWrap:"wrap"}}>
                <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}><input type="radio" name="pr" checked={!ev.plataRestFirma} onChange={()=>upd({plataRestFirma:false,sumaRestLei:0})}/><span style={{fontSize:12}}>Direct</span></label>
                <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}><input type="radio" name="pr" checked={!!ev.plataRestFirma} onChange={()=>upd({plataRestFirma:true,sumaRestLei:ev.sumaRestLei||Math.round(rest*cursLei)})}/><span style={{fontSize:12}}>Firmă (lei)</span></label>
                {ev.plataRestFirma&&<input type="number" value={ev.sumaRestLei??""} onChange={e=>upd({sumaRestLei:Number(e.target.value)})} placeholder="Suma lei" style={{...sty.i,width:100,padding:6,fontSize:12}}/>}
              </div>
              {(ev.plataAvansFirma||ev.plataRestFirma)&&<div style={{marginBottom:12}}><label style={{fontSize:9,color:th.tm}}>Curs EUR→lei</label><input type="number" value={ev.cursLei??5} onChange={e=>upd({cursLei:Number(e.target.value)||5})} style={{...sty.i,width:60,padding:6,marginLeft:8}}/></div>}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
                <div><label style={{fontSize:9,color:th.tm,display:"block",marginBottom:4}}>Modalitate plată avans</label><input value={ev.modalitatePlataAvans||""} onChange={e=>upd({modalitatePlataAvans:e.target.value})} placeholder="ex. Transfer" style={{...sty.i,width:"100%",padding:8,fontSize:12}}/></div>
                <div><label style={{fontSize:9,color:th.tm,display:"block",marginBottom:4}}>Modalitate plată rest</label><input value={ev.modalitatePlataRest||""} onChange={e=>upd({modalitatePlataRest:e.target.value})} placeholder="ex. Numerar" style={{...sty.i,width:"100%",padding:8,fontSize:12}}/></div>
              </div>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:9,color:th.tm,fontWeight:600,textTransform:"uppercase",marginBottom:6}}>Fond (avans + cheltuieli fixe % + fond trupa %)</div>
                <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
                  <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}><input type="radio" name="fond" checked={ev.cuFond!==false} onChange={()=>upd({cuFond:true})}/><span style={{fontSize:12}}>Da</span></label>
                  <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}><input type="radio" name="fond" checked={ev.cuFond===false} onChange={()=>upd({cuFond:false})}/><span style={{fontSize:12}}>Nu</span></label>
                  {ev.cuFond!==false&&<><span style={{fontSize:11,color:th.tm}}>Cheltuieli fixe</span><input type="number" value={ev.fondPct??10} onChange={e=>upd({fondPct:Number(e.target.value)||0})} style={{...sty.i,width:50,padding:6,fontSize:13}} min={0} max={100}/><span style={{fontSize:12,color:th.tm}}>%</span><span style={{fontSize:11,color:th.tm}}>Fond trupa</span><input type="number" value={ev.fondPct2??10} onChange={e=>upd({fondPct2:Number(e.target.value)||0})} style={{...sty.i,width:50,padding:6,fontSize:13}} min={0} max={100}/><span style={{fontSize:12,color:th.tm}}>%</span></>}
                </div>
              </div>
              <div style={{fontSize:9,color:th.tm,fontWeight:600,textTransform:"uppercase",marginBottom:8}}>Cheltuieli (ordine deducere)</div>
              <div style={{fontSize:11,padding:"8px 12px",background:th.h,borderRadius:8,marginBottom:10,lineHeight:1.8}}>
                {onFirma&&impozit1>0&&<div style={{display:"flex",justifyContent:"space-between"}}><span>Impozit pe venit 1%</span><span style={{color:"#ef4444"}}>-{fFmt(impozit1,"lei")}</span></div>}
                <div style={{display:"flex",justifyContent:"space-between"}}><span>Avans în fond</span><span style={{color:"#22c55e"}}>+{fFmt(avansInFond,ev.valuta)}</span></div>
                {cheltSvc>0&&<div style={{display:"flex",justifyContent:"space-between"}}><span>Servicii ofertă (lumini, sunet, etc.)</span><span style={{color:"#ef4444"}}>-{fFmt(cheltSvc,ev.valuta)}</span></div>}
                <div style={{display:"flex",justifyContent:"space-between"}}><span>Backline</span><span style={{color:"#ef4444"}}>-{fFmt(backline,ev.valuta)}</span></div>
                <div style={{display:"flex",justifyContent:"space-between"}}><span>Tehnic 200 €{tehnicDiv>0?" +16% div.":""}</span><span style={{color:"#ef4444"}}>-{fFmt(tehnic+tehnicDiv,ev.valuta)}</span></div>
                {cheltOficiu>0&&<div style={{display:"flex",justifyContent:"space-between"}}><span>Alte cheltuieli oficiu</span><span style={{color:"#ef4444"}}>-{fFmt(cheltOficiu,ev.valuta)}</span></div>}
                {cheltNeprevazute>0&&<div style={{display:"flex",justifyContent:"space-between"}}><span>Alte cheltuieli neprevăzute{cheltNeprevazuteDiv>0?" +16% div.":""}</span><span style={{color:"#ef4444"}}>-{fFmt(cheltNeprevazute+cheltNeprevazuteDiv,ev.valuta)}</span></div>}
                <div style={{display:"flex",justifyContent:"space-between"}}><span>Stage manager intern 30 €{stageMgrDiv>0?" +16% div.":""}</span><span style={{color:"#ef4444"}}>-{fFmt(stageMgr+stageMgrDiv,ev.valuta)}</span></div>
                <div style={{display:"flex",justifyContent:"space-between"}}><span>Call booker 3%</span><span style={{color:"#ef4444"}}>-{fFmt(callBooker+callBookerDiv,ev.valuta)}</span></div>
                <div style={{display:"flex",justifyContent:"space-between"}}><span>Fond cheltuieli fixe {fondPct}%</span><span style={{color:"#6366f1"}}>-{fFmt(fondFixe,ev.valuta)}</span></div>
                <div style={{display:"flex",justifyContent:"space-between"}}><span>Fond trupa {fondPct2}%</span><span style={{color:"#6366f1"}}>-{fFmt(fondTrupa,ev.valuta)}</span></div>
                {div16>0&&<div style={{display:"flex",justifyContent:"space-between"}}><span>Dividende 16%</span><span style={{color:"#ef4444"}}>-{fFmt(div16,ev.valuta)}</span></div>}
              </div>
              <div style={{marginTop:16,padding:12,borderRadius:8,background:th.ab,textAlign:"center"}}>
                <div style={{fontSize:9,color:th.tm,textTransform:"uppercase"}}>De împărțit</div>
                <div style={{fontSize:20,fontWeight:800,color:ramas>=0?"#22c55e":"#ef4444"}}>{fFmt(ramas,ev.valuta)}</div>
                {isPrivate&&splitPct&&<div style={{fontSize:10,color:th.tm,marginTop:8}}>Split standard (evenimente private): Carina 26%, Arni 20%, Radu 18%, Sebi 18%, Luci 18%</div>}
              </div>
              {isPrivate&&<div style={{marginTop:12}}>
                <div style={{fontSize:9,color:th.tm,fontWeight:600,textTransform:"uppercase",marginBottom:6}}>Split per membru</div>
                {MEMBERS.map(m=>{
                  const pct=splitPct?.[m.id]??(100/MEMBERS.length);
                  const val=Math.round(ramas*pct/100);
                  return <div key={m.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                    <span style={{fontSize:12,flex:1}}>{m.n.split(" ")[0]} {splitPct?`(${pct}%)`:""}</span>
                    <span style={{fontSize:12,fontWeight:600}}>{fFmt(val,ev.valuta)}</span>
                  </div>;
                })}
              </div>}
              <div style={{marginTop:12}}>
                <div style={{fontSize:9,color:th.tm,fontWeight:600,textTransform:"uppercase",marginBottom:6}}>Plăți servicii ofertă</div>
                {Object.entries(ev.svcp||{}).filter(([k])=>ev.svc?.[k]).map(([k,v])=><div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"2px 0"}}><span style={{textTransform:"capitalize"}}>{k}</span><span style={{fontWeight:600}}>{fFmt(v,ev.valuta)}</span></div>)}
              </div>
              {exNeprevazute.length>0&&<div style={{marginTop:10}}>
                <div style={{fontSize:9,color:th.tm,fontWeight:600,textTransform:"uppercase",marginBottom:6}}>Alte cheltuieli neprevăzute</div>
                {exNeprevazute.map(x=><div key={x.id} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"2px 0"}}><span>{x.n||"Cheltuială"}{x.direct?" (direct)":""}</span><span style={{fontWeight:600,color:"#ef4444"}}>{fFmt(x.a,ev.valuta)}</span></div>)}
              </div>}
            </div>
          </div>
        </div>;
      })()}

            {/* OFFER PREVIEW */}
      {modal==="oferta"&&mData&&<OfferPreview
        ev={mData}
        evStatus={mData.st}
        onStatusChange={updSt}
        onOfferUpdate={(id,up)=>{setEvs(p=>p.map(e=>e.id===id?{...e,...up}:e));}}
        th={th}
        mob={mob}
        onClose={closeModal}
        onEdit={p.e?()=>{closeModal();setTimeout(()=>openModal("form",mData.id),80);}:undefined}
        memberProfiles={memberProfiles}
        sty={sty}
        templates={templates}
        showToast={showToast}
      />}

      {/* Swipe indicator dots — mobile only */}
      {mob&&(()=>{
        const allNav=["acasa","events","offers","docs","tasks","calendar",...(p.f?["finances"]:[]),...(user?.memberId?["contul"]:[])];
        return <div style={{position:"fixed",bottom:10,left:"50%",transform:"translateX(-50%)",display:"flex",gap:5,zIndex:500,pointerEvents:"none"}}>
          {allNav.map(id=><div key={id} style={{width:id===tab?20:5,height:5,borderRadius:3,background:id===tab?"rgba(255,255,255,.9)":"rgba(255,255,255,.2)",transition:"all .25s"}}/>)}
        </div>;
      })()}

      {showChangePw&&user&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1200}} onClick={()=>{setShowChangePw(false);setChPwCur("");setChPwNew("");setChPwConf("");setChPwErr("");}}>
        <div style={{background:th.c,borderRadius:14,border:`1px solid ${th.b}`,padding:24,width:mob?"90%":360}} onClick={e=>e.stopPropagation()}>
          <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>Schimbă parola</h3>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <input type="password" value={chPwCur} onChange={e=>{setChPwCur(e.target.value);setChPwErr("");}} placeholder="Parola actuală" style={{...sty.i,padding:12,fontSize:14}}/>
            <input type="password" value={chPwNew} onChange={e=>{setChPwNew(e.target.value);setChPwErr("");}} placeholder="Parolă nouă" style={{...sty.i,padding:12,fontSize:14}}/>
            <input type="password" value={chPwConf} onChange={e=>{setChPwConf(e.target.value);setChPwErr("");}} placeholder="Confirmă parola nouă" style={{...sty.i,padding:12,fontSize:14}}/>
            {chPwErr&&<div style={{fontSize:12,color:"#ef4444"}}>{chPwErr}</div>}
            <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
              <button onClick={()=>{setShowChangePw(false);setChPwCur("");setChPwNew("");setChPwConf("");setChPwErr("");}} style={{...sty.bg,padding:"8px 16px"}}>Anulează</button>
              <button onClick={async()=>{
                setChPwErr("");
                const uid=user.memberId||user.id;
                const stored=getPasswords()[uid];
                if(!stored){ setChPwErr("Nu există parolă setată"); return; }
                const hCur=await hashPw(chPwCur);
                if(stored!==hCur){ setChPwErr("Parola actuală e greșită"); return; }
                if(!chPwNew||chPwNew.length<4){ setChPwErr("Parola nouă: minim 4 caractere"); return; }
                if(chPwNew!==chPwConf){ setChPwErr("Parolele nu coincid"); return; }
                setPasswordFor(uid, await hashPw(chPwNew));
                setShowChangePw(false); setChPwCur(""); setChPwNew(""); setChPwConf("");
                showToast("Parola a fost schimbată ✓");
              }} style={{...sty.b,padding:"8px 16px"}}>Salvează</button>
            </div>
          </div>
        </div>
      </div>}

      <AIChatWidget th={th} evs={evs} tasks={tasks} mob={mob}/>
      <Toast message={toast.message} visible={toast.visible}/>
    </div>
  );
}

// Error Boundary — prinde erori de randare React
class AppErrorBoundary extends React.Component {
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(err){return{err};}
  componentDidCatch(err,info){console.error("AppErrorBoundary:",err,info);}
  render(){if(this.state.err){return <div style={{padding:24,maxWidth:480,margin:"40px auto",fontFamily:"system-ui",background:"#1a1a1a",color:"#fff",borderRadius:12,border:"1px solid #333"}}><h2 style={{color:"#ef4444"}}>Eroare aplicație</h2><pre style={{margin:"12px 0",fontSize:12,whiteSpace:"pre-wrap",color:"#fca5a5"}}>{String(this.state.err.message||this.state.err)}</pre><p style={{marginTop:12,color:"#a1a1aa",fontSize:12}}>Deschide Consola (F12) pentru detalii.</p></div>;}return this.props.children;}
}
// Mount the app — cu handler de erori pentru debug
try {
  if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
    document.getElementById('root').innerHTML = '<div style="padding:24px;max-width:480px;margin:40px auto;font-family:system-ui;background:#1a1a1a;color:#fff;border-radius:12px"><h2 style="color:#ef4444">Scripturile nu s-au încărcat</h2><p style="margin:12px 0;line-height:1.6">Deschizi fișierul direct (file://). Unele browsere blochează încărcarea de pe CDN.</p><p style="margin:12px 0"><strong>Rezolvare:</strong> Rulează un server local în folderul proiectului:</p><pre style="background:#222;padding:12px;border-radius:6px;font-size:12px;overflow:auto">cd "/Users/raczradu/Downloads/Phaser Manager"\npython3 -m http.server 8080</pre><p style="margin:12px 0">Apoi deschide <a href="http://localhost:8080" style="color:#60a5fa">http://localhost:8080</a></p></div>';
  } else {
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AppErrorBoundary><App/></AppErrorBoundary>);
  }
} catch (e) {
  document.getElementById('root').innerHTML = '<div style="padding:24px;font-family:monospace;color:#ef4444;white-space:pre-wrap;font-size:12px">Eroare: ' + (e.message||e) + '\n\n' + (e.stack||'') + '</div>';
}

  </script>
</body>
