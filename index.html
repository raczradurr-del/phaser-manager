// ═══════════════════════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  const [themeMode, setThemeMode] = useState(gTheme());
  const [systemTheme, setSystemTheme] = useState(getSystemTheme);
  const [user, setUser] = useState(null);
  const [authReady, setAuthReady] = useState(false);
  const [sbSession, setSbSession] = useState(null);
  const [authResolved, setAuthResolved] = useState(undefined);
  const [authBusy, setAuthBusy] = useState(false);
  const [authErr, setAuthErr] = useState("");
  const [pinUnlocked, setPinUnlocked] = useState(() => {
    try {
      if (localStorage.getItem(LS_KEY_PIN_REMEMBER) === "1") return true;
      if (sessionStorage.getItem(SS_KEY_PIN_SESSION) === "1") return true;
    } catch (e) {}
    return false;
  });
  const [gatePinInput, setGatePinInput] = useState("");
  const [gatePinRemember, setGatePinRemember] = useState(false);
  const [gatePinErr, setGatePinErr] = useState("");
  const [showGatePin, setShowGatePin] = useState(false);
  const [showLoginPw, setShowLoginPw] = useState(false);
  const [showPwNew, setShowPwNew] = useState(false);
  const [showPwConfirm, setShowPwConfirm] = useState(false);
  const [showPinChNew, setShowPinChNew] = useState(false);
  const [showPinChConf, setShowPinChConf] = useState(false);
  const [pinChangeNew, setPinChangeNew] = useState("");
  const [pinChangeConfirm, setPinChangeConfirm] = useState("");
  const [loginStep, setLoginStep] = useState("pick"); // "pick" | "signin"
  const [loginPick, setLoginPick] = useState("");
  const [loginEmail, setLoginEmail] = useState("");
  const [loginPw, setLoginPw] = useState("");
  const [pwNew, setPwNew] = useState("");
  const [pwConfirm, setPwConfirm] = useState("");
  const [pwSaveBusy, setPwSaveBusy] = useState(false);
  const [contulSub, setContulSub] = useState("activitate"); // "activitate" | "setari" — subsecțiuni în Contul meu
  const [sbMode, setSbMode] = useState("full");
  const [tab, setTab]     = useState("acasa");
  const [mobileMoreOpen, setMobileMoreOpen] = useState(false);
  const [evs, setEvs]     = useLocalStorageState(LS_KEYS.evs, loadEvs);
  const [genExp, setGE]   = useLocalStorageState(LS_KEYS.genExp, loadGenExp);
  const [annualCosts, setAC] = useLocalStorageState(LS_KEYS.annualCosts, loadAnnualCosts);
  const [gigsPerYear, setGigsPerYear] = useLocalStorageState(LS_KEYS.gigsPerYear, ()=>12);
  const [tasks, setTasks] = useLocalStorageState(LS_KEYS.tasks, loadTasks);
  const [songs, setSongs] = useLocalStorageState(LS_KEYS.songs, loadSongs);
  const [calBlocks, setCalBlocks] = useLocalStorageState(LS_KEYS.calBlocks, loadCalBlocks);
  const [bandNotifications, setBandNotifications] = useLocalStorageState(LS_KEYS.bandNotifications, loadBandNotifications);
  const [aiSettings, setAiSettings] = useState({llamaWorker:DEFAULT_AI_WORKER_URL,offerHtmlProxy:""});
  const htmlShareProxyBase = useMemo(() => offerHtmlProxyBaseFromSettings(aiSettings), [aiSettings.offerHtmlProxy]);
  const [finMember, setFinMember] = useState(null);
  const [templates, setTemplates] = useState(loadTemplates);
  const { modal, payload, openModal, closeModal } = useModal();
  const [detailTab, setDetailTab] = useState("fisa");
  useEffect(()=>{ if(modal==="detail") setDetailTab("fisa"); },[modal]);
  const mData = useMemo(() => {
    if (!modal || payload == null) return null;
    if (modal === "detail") return typeof payload === "string" ? evs.find(e => e.id === payload) : payload;
    if (modal === "finance") { const p=payload; if(typeof p==="object"&&p?.evId){const e=evs.find(x=>x.id===p.evId);return e?{...e,_from:p.from}:null;} return typeof p==="string"?evs.find(e=>e.id===p):p; }
    if (modal === "oferta") {
      const p = payload;
      if (typeof p === "object" && p?.evId) {
        const ev = evs.find(e => e.id === p.evId);
        return ev ? { ev, initialTab: p.initialTab, from: p.from } : null;
      }
      const ev = typeof payload === "string" ? evs.find(e => e.id === payload) : payload;
      return ev && typeof ev==="object" ? { ev, initialTab: undefined, from: undefined } : ev;
    }
    if (modal === "form") return typeof payload === "string" ? evs.find(e => e.id === payload) : payload;
    if (modal === "pick") return payload;
    if (modal === "pickEvent") return payload;
    if (modal === "calQuickAdd") return payload;
    if (modal === "calOccNew") return payload;
    if (modal === "calDay") return typeof payload === "string" ? payload : null;
    if (modal === "calOcc") return typeof payload === "string" ? (calBlocks || []).find(b => b.id === payload) || null : payload;
    if (modal === "calTask") return typeof payload === "string" ? findTaskInTree(tasks, payload) || null : payload;
    return null;
  }, [modal, payload, evs, calBlocks, tasks]);
  useEffect(()=>{
    if (modal === "calOcc" && !mData) closeModal();
    if (modal === "calTask" && !mData) closeModal();
  }, [modal, mData, closeModal]);
  useEffect(()=>{
    if (modal !== "calDay" || !mData) return;
    const ds = mData;
    const nEv = evs.filter(e => e.date === ds).length;
    const nOcc = (calBlocks || []).filter(b => b.date === ds).length;
    const nTask = collectTasksForDate(tasks, ds).length;
    if (nEv + nOcc + nTask === 0) closeModal();
  }, [modal, mData, evs, calBlocks, tasks, closeModal]);
  const [search, setSearch] = useState("");
  const [selectedEvIds, setSelectedEvIds] = useState([]);
  const [evBulkStatusPick, setEvBulkStatusPick] = useState("");
  const [calM, setCalM]   = useState(new Date());
  const [calSidebarDate, setCalSidebarDate] = useState(null);
  const [calDragEvId, setCalDragEvId] = useState(null);
  const [calDropDate, setCalDropDate] = useState(null);
  const [calTouchDragActive, setCalTouchDragActive] = useState(false);
  const calLongPressTimerRef = useRef(null);
  const calTouchDragMetaRef = useRef({ evId: "", fromDs: "", x: 0, y: 0 });
  const calLastDropDsRef = useRef(null);
  const calSuppressChipClickRef = useRef(false);
  const calTouchDropHandledRef = useRef(false);
  const [calDateSearch, setCalDateSearch] = useState("");
  const [calNewOccMember, setCalNewOccMember] = useState("");
  const [calNewOccNote, setCalNewOccNote] = useState("");
  const [calNewOccTent, setCalNewOccTent] = useState(false);
  const [taskCalendarFocusId, setTaskCalendarFocusId] = useState(null);
  const consumeTaskCalendarFocus = useCallback(() => setTaskCalendarFocusId(null), []);
  const [taskMemberFilter, setTaskMemberFilter] = useState("");
  const tasksPageRootsFiltered = useMemo(() => filterRootTasksByMember(tasks, taskMemberFilter), [tasks, taskMemberFilter]);
  const taskRootIsDone = t => (t.taskStatus === "done" || t.done);
  const calCellClickTimerRef = useRef(null);
  useEffect(()=>()=>{
    if (calCellClickTimerRef.current) clearTimeout(calCellClickTimerRef.current);
    if (calLongPressTimerRef.current) clearTimeout(calLongPressTimerRef.current);
  }, []);
  const [dashboardDateSearch, setDashboardDateSearch] = useState("");
  useEffect(() => {
    setCalNewOccMember("");
    setCalNewOccNote("");
    setCalNewOccTent(false);
  }, [calSidebarDate]);
  const [globalSearch, setGlobalSearch] = useState("");
  const [sectTab, setSectTab] = useState("playlist");
  const docsSectTab = sectTab==="poveste" ? "playlist" : sectTab;
  const [riderVersions, setRiderVersions] = useState(loadRiderVersions);
  const [pressKitVersions, setPressKitVersions] = useState(loadPressKitVersions);
  const [playlistVersions, setPlaylistVersions] = useState(loadPlaylistVersions);
  const [playlistPublicBusy, setPlaylistPublicBusy] = useState(false);
  const [playlistPublicUrl, setPlaylistPublicUrl] = useState("");
  const [memberProfiles, setMemberProfiles] = useState(loadMemberProfiles);
  const { toast, showToast } = useToasts();
  const saveMemberProfile = (memberId, data) => { setMemberProfiles(p=>{ const n={...p,[memberId]:{...(p[memberId]||{}),...data}}; try{localStorage.setItem(LS_KEYS.memberProfiles,JSON.stringify(n));}catch(e){} return n; }); };

  const onNotifyAssign = useCallback(({ taskId, taskText, toMemberId, fromMemberId }) => {
    if (!toMemberId || toMemberId === fromMemberId) return;
    const fromM = MEMBERS.find(m => m.id === fromMemberId);
    const fromName = fromM ? (fromM.short || fromM.n) : "Cineva";
    setBandNotifications(prev => {
      const idx = prev.findIndex(n => !n.read && n.taskId === taskId && n.memberId === toMemberId);
      const entry = { id: idx >= 0 ? prev[idx].id : uid(), ts: Date.now(), memberId: toMemberId, taskId, title: (taskText || "Task").slice(0, 200), fromMemberId, fromName, read: false };
      if (idx >= 0) { const copy = [...prev]; copy[idx] = entry; return copy; }
      return [entry, ...prev].slice(0, 300);
    });
  }, [setBandNotifications]);

  // ─── SUPABASE CLOUD SYNC ───
  // Supabase e sursa de adevăr. localStorage e doar cache pentru încărcare rapidă.
  const [tourStep, setTourStep] = useState(null);
  const [syncStatus, setSyncStatus] = useState("idle"); // idle | syncing | synced | error
  const [syncErrorMsg, setSyncErrorMsg] = useState("");
  const syncTimerRef = useRef(null);
  const initialSyncDoneRef = useRef(false);
  const canCloudSync = authReady && !!sbSession && authResolved && !authResolved.pending && authResolved.ok === true;

  useEffect(() => {
    const sb = getSbClient();
    if (!sb) {
      setAuthReady(true);
      setSbSession(null);
      return;
    }
    sb.auth.getSession()
      .then(({ data: { session } }) => setSbSession(session))
      .catch(() => setSbSession(null))
      .finally(() => setAuthReady(true));
    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
      setSbSession(session);
    });
    return () => subscription.unsubscribe();
  }, []);

  useEffect(() => {
    const sb = getSbClient();
    if (!sb) return;
    const onVis = () => {
      if (document.visibilityState !== "visible") return;
      sb.auth.getSession().then(({ data: { session } }) => {
        if (session) setSbSession(session);
      });
    };
    document.addEventListener("visibilitychange", onVis);
    return () => document.removeEventListener("visibilitychange", onVis);
  }, []);

  useEffect(() => {
    if (!authReady) return;
    const sb = getSbClient();
    if (!sbSession) {
      setAuthResolved(null);
      setUser(null);
      initialSyncDoneRef.current = false;
      try { localStorage.removeItem(LS_SESSION_MEMBER); } catch (e) {}
      return;
    }
    let cancelled = false;
    setAuthResolved({ pending: true });
    resolveBandUserAfterAuth(sbSession, sb).then((r) => {
      if (cancelled) return;
      setAuthResolved(r);
      if (r.ok && r.user) {
        setUser(r.user);
        try { localStorage.setItem(LS_SESSION_MEMBER, r.user.memberId); } catch (e) {}
      } else {
        setUser(null);
      }
    });
    return () => { cancelled = true; };
  }, [authReady, sbSession]);

  useEffect(() => {
    if (sbSession) return;
    if (loginStep === "signin" && !loginPick) setLoginStep("pick");
  }, [sbSession, loginStep, loginPick]);

  /** Fără sesiune dar cu ultimul profil salvat → direct la parolă (ex. token expirat). */
  useEffect(() => {
    if (!authReady || sbSession) return;
    if (!getSbClient()) return;
    let last = "";
    try { last = sessionStorage.getItem(SS_KEY_LOGIN_LAST) || ""; } catch (e) { return; }
    if (!last) return;
    if (last === "admin") {
      setLoginPick("admin");
      setLoginEmail(CONTACT_ADMIN_EMAIL);
      setLoginStep("signin");
    } else if (MEMBER_AUTH_EMAIL[last]) {
      setLoginPick(last);
      setLoginEmail(MEMBER_AUTH_EMAIL[last]);
      setLoginStep("signin");
    }
  }, [authReady, sbSession]);

  const doAuthLogin = async (e) => {
    e?.preventDefault?.();
    setAuthErr("");
    const sb = getSbClient();
    if (!sb) { setAuthErr("Supabase nu e configurat."); return; }
    if (!loginPick) { setAuthErr("Alege cine te loghezi din listă."); return; }
    const want = loginPick === "admin" ? CONTACT_ADMIN_EMAIL : MEMBER_AUTH_EMAIL[loginPick];
    if (!want || loginEmail.trim().toLowerCase() !== want.trim().toLowerCase()) {
      setAuthErr("Realege contul din listă.");
      return;
    }
    setAuthBusy(true);
    const { error } = await sb.auth.signInWithPassword({ email: loginEmail.trim(), password: loginPw });
    setAuthBusy(false);
    if (error) { setAuthErr(formatSbPasswordLoginError(error)); return; }
    try { sessionStorage.setItem(SS_KEY_LOGIN_LAST, loginPick); } catch (e) {}
    setLoginPw("");
  };
  const tryGatePin = (e) => {
    e?.preventDefault?.();
    setGatePinErr("");
    if (gatePinInput.trim() !== getAppAccessPin()) {
      setGatePinErr("PIN incorect.");
      setGatePinInput("");
      return;
    }
    if (gatePinRemember) {
      try { localStorage.setItem(LS_KEY_PIN_REMEMBER, "1"); } catch (err) {}
    } else {
      try { sessionStorage.setItem(SS_KEY_PIN_SESSION, "1"); } catch (err) {}
    }
    setPinUnlocked(true);
    setGatePinInput("");
    setGatePinRemember(false);
  };
  const revokePinBrowserTrust = () => {
    try { localStorage.removeItem(LS_KEY_PIN_REMEMBER); } catch (e) {}
    showToast("Am uitat «Salvează în browser». La următoarea deschidere a site-ului vei introduce din nou PIN-ul.");
  };
  const saveAppPinFromSettings = () => {
    const a = (pinChangeNew || "").trim();
    const b = (pinChangeConfirm || "").trim();
    if (a.length < 4) { showToast("PIN-ul nou: minim 4 caractere.", "error"); return; }
    if (a !== b) { showToast("PIN-urile nu coincid.", "error"); return; }
    try { localStorage.setItem(LS_KEY_APP_PIN, a); } catch (e) { showToast("Nu s-a putut salva.", "error"); return; }
    showToast("PIN acces actualizat ✓");
    setPinChangeNew("");
    setPinChangeConfirm("");
  };
  const doAuthLogout = async () => {
    try { localStorage.removeItem(LS_SESSION_MEMBER); } catch (e) {}
    try { sessionStorage.removeItem(SS_KEY_LOGIN_LAST); } catch (e) {}
    try { sessionStorage.removeItem(SS_KEY_PIN_SESSION); } catch (e) {}
    let remembered = false;
    try { remembered = localStorage.getItem(LS_KEY_PIN_REMEMBER) === "1"; } catch (e) {}
    if (!remembered) setPinUnlocked(false);
    setUser(null);
    setLoginStep("pick");
    setLoginPick("");
    setLoginEmail("");
    setLoginPw("");
    setAuthErr("");
    const sb = getSbClient();
    if (sb) await sb.auth.signOut();
  };
  const doPasswordChange = async () => {
    if ((pwNew || "").length < 6) { showToast("Parola nouă: minim 6 caractere.", "error"); return; }
    if (pwNew !== pwConfirm) { showToast("Parolele nu coincid.", "error"); return; }
    const sb = getSbClient();
    if (!sb) return;
    setPwSaveBusy(true);
    const { error } = await sb.auth.updateUser({ password: pwNew });
    setPwSaveBusy(false);
    if (error) { showToast(error.message || "Nu s-a putut actualiza parola.", "error"); return; }
    showToast("Parolă actualizată ✓");
    setPwNew("");
    setPwConfirm("");
  };

  // ─── BACKUP STATE ───
  const [backups, setBackups] = useState([]);
  const [backupStatus, setBackupStatus] = useState(""); // "" | "saving" | "saved" | "error"
  const [restoreStatus, setRestoreStatus] = useState(""); // "" | "restoring" | "done" | "error"

  // Filtrare date pentru backup: oferte (±3 luni trecut, +6 luni viitor), calendar, financiar
  const buildBackupData = () => {
    const now = new Date(); now.setHours(0,0,0,0);
    const past3 = new Date(now); past3.setMonth(past3.getMonth()-3);
    const future6 = new Date(now); future6.setMonth(future6.getMonth()+6);
    const filteredEvs = evs.filter(e => {
      const k = getEventDateKind(e);
      if (k === "none" || k === "text") return true;
      if (k === "day" && !e.date) return true;
      const st = evPeriodStartMs(e);
      const en = evPeriodEndMs(e);
      if (!st && !en) return true;
      return en >= past3.getTime() && st <= future6.getTime();
    });
    const filteredBlocks = (calBlocks||[]).filter(b => {
      if(!b.date) return true;
      const d = new Date(b.date+"T00:00:00");
      return d >= past3 && d <= future6;
    });
    return { evs: filteredEvs, calBlocks: filteredBlocks, genExp, annualCosts, gigsPerYear, tasks, _backedAt: new Date().toISOString() };
  };

  // Creează backup dacă nu există deja unul pentru ziua de azi
  const runDailyBackup = async () => {
    const client = getSbClient(); if(!client) return;
    const today = new Date().toISOString().split("T")[0];
    const { data: existing } = await client.from("backups").select("id").eq("backup_date", today).maybeSingle();
    if(existing) return; // backup-ul de azi există deja
    setBackupStatus("saving");
    const label = new Date().toLocaleDateString("ro-RO",{weekday:"short",day:"numeric",month:"short",year:"numeric"});
    const bdata = buildBackupData();
    const { error } = await client.from("backups").insert({ backup_date: today, label, data: bdata });
    if(error){ setBackupStatus("error"); return; }
    // Rotație: șterge backup-uri mai vechi de 3 zile
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-3);
    await client.from("backups").delete().lt("backup_date", cutoff.toISOString().split("T")[0]);
    setBackupStatus("saved");
    setTimeout(()=>setBackupStatus(""),3000);
    loadBackupsList();
  };

  // Încarcă lista backup-urilor disponibile
  const loadBackupsList = async () => {
    const client = getSbClient(); if(!client) return;
    const { data } = await client.from("backups").select("id,backup_date,label,created_at").order("backup_date",{ascending:false}).limit(5);
    if(data) setBackups(data);
  };

  // Restaurează un backup
  const restoreBackup = async (backup) => {
    const client = getSbClient(); if(!client) return;
    setRestoreStatus("restoring");
    const { data: row } = await client.from("backups").select("data").eq("id",backup.id).maybeSingle();
    if(!row?.data){ setRestoreStatus("error"); return; }
    const d = row.data;
    if(Array.isArray(d.evs)) setEvs(d.evs);
    if(Array.isArray(d.calBlocks)) setCalBlocks(d.calBlocks);
    if(Array.isArray(d.genExp)) setGE(d.genExp);
    if(Array.isArray(d.annualCosts)) setAC(d.annualCosts);
    if(typeof d.gigsPerYear==="number") setGigsPerYear(d.gigsPerYear);
    if(Array.isArray(d.tasks)) setTasks(d.tasks);
    setRestoreStatus("done");
    setTimeout(()=>setRestoreStatus(""),4000);
  };

  // Manual backup (on demand)
  const createManualBackup = async () => {
    const client = getSbClient(); if(!client) return;
    setBackupStatus("saving");
    const today = new Date().toISOString().split("T")[0];
    const label = "Manual · "+new Date().toLocaleDateString("ro-RO",{weekday:"short",day:"numeric",month:"short",year:"numeric"})+" "+new Date().toLocaleTimeString("ro-RO",{hour:"2-digit",minute:"2-digit"});
    const bdata = buildBackupData();
    // Upsert pe data de azi (înlocuiește cel automat dacă există)
    await client.from("backups").upsert({backup_date: today, label, data: bdata},{onConflict:"backup_date"});
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-3);
    await client.from("backups").delete().lt("backup_date", cutoff.toISOString().split("T")[0]);
    setBackupStatus("saved");
    setTimeout(()=>setBackupStatus(""),3000);
    loadBackupsList();
  };

  // La pornire: încarcă din Supabase doar după login + rezolvare membru (JWT valid)
  useEffect(()=>{
    if (!canCloudSync) {
      if (!sbSession) initialSyncDoneRef.current = false;
      return;
    }
    const client = getSbClient();
    if(!client) { initialSyncDoneRef.current = true; return; }
    setSyncStatus("syncing");
    setSyncErrorMsg("");
    client.from("app_data").select("data").eq("id","phaser_main").maybeSingle()
      .then(({data:row,error})=>{
        if(error){
          console.error("[Supabase] Eroare la citire:", error.message, error.code, error.details);
          setSyncErrorMsg(error.message||String(error.code||""));
          setSyncStatus("error");
          initialSyncDoneRef.current = true;
          return;
        }
        if(!row?.data){ setSyncStatus("idle"); initialSyncDoneRef.current = true; return; }
        const remote=row.data;
        // Supabase e mereu sursa de adevăr — aplicăm datele indiferent de timestamp
        if(Array.isArray(remote.evs)) setEvs(remote.evs);
        if(Array.isArray(remote.tasks)) setTasks(remote.tasks);
        if(Array.isArray(remote.songs)) setSongs(remote.songs);
        if(Array.isArray(remote.genExp)) setGE(remote.genExp);
        if(Array.isArray(remote.annualCosts)) setAC(remote.annualCosts);
        if(typeof remote.gigsPerYear==="number") setGigsPerYear(remote.gigsPerYear);
        if(remote.templates) setTemplates(remote.templates);
        if(Array.isArray(remote.riderVersions)) setRiderVersions(remote.riderVersions);
        if(Array.isArray(remote.pressKitVersions)) setPressKitVersions(remote.pressKitVersions);
        if(Array.isArray(remote.playlistVersions)) setPlaylistVersions(remote.playlistVersions);
        if(remote.memberProfiles) setMemberProfiles(remote.memberProfiles);
        if(Array.isArray(remote.bandNotifications)) setBandNotifications(remote.bandNotifications);
        if(Array.isArray(remote.calBlocks)) setCalBlocks(remote.calBlocks);
        if(remote.aiSettings&&typeof remote.aiSettings==="object") setAiSettings(function(prev){
          const r=remote.aiSettings;
          const lw = phaserWorkersMigrateUrl(r.llamaWorker || prev.llamaWorker) || DEFAULT_AI_WORKER_URL;
          const oh = "offerHtmlProxy" in r
            ? normalizeStoredOfferHtmlProxy(r.offerHtmlProxy)
            : normalizeStoredOfferHtmlProxy(prev.offerHtmlProxy);
          return Object.assign({},prev,r,{
            llamaWorker:lw,
            offerHtmlProxy:oh
          });
        });
        setSyncStatus("synced");
        initialSyncDoneRef.current = true;
        // Backup automat zilnic — după ce datele sunt încărcate
        setTimeout(()=>{ runDailyBackup(); loadBackupsList(); }, 3000);
      })
      .catch((err)=>{
        console.error("[Supabase] Eroare la citire (catch):", err);
        setSyncErrorMsg(err?.message||String(err));
        setSyncStatus("error");
        initialSyncDoneRef.current = true;
      });
  },[canCloudSync, sbSession?.user?.id]);

  // La orice modificare: salvează în Supabase (debounced 2s)
  // Nu salva înainte ca sync-ul inițial să fi terminat (evită suprascrierea datelor remote)
  useEffect(()=>{
    if(!initialSyncDoneRef.current || !canCloudSync) return;
    if(syncTimerRef.current) clearTimeout(syncTimerRef.current);
    syncTimerRef.current=setTimeout(()=>{
      const client=getSbClient();

      const ts=Date.now();

      };

      client.from("app_data").upsert({id:"phaser_main",data:syncData,updated_at:new Date().toISOString()},{onConflict:"id"})
        .then(({error})=>{
          if(error){
            console.error("[Supabase] Eroare la salvare:", error.message, error.code, error.details);
            setSyncErrorMsg(error.message||String(error.code||""));
            setSyncStatus("error");
          } else {
            setSyncStatus("synced");
            setSyncErrorMsg("");
          }
        })
        .catch((err)=>{
          console.error("[Supabase] Eroare la salvare (catch):", err);
          setSyncErrorMsg(err?.message||String(err));
          setSyncStatus("error");
        });
    },2000);
  },[canCloudSync,evs,tasks,songs,calBlocks,genExp,annualCosts,gigsPerYear,templates,riderVersions,pressKitVersions,playlistVersions,memberProfiles,bandNotifications,aiSettings]);

  // Salvare imediată în Supabase (ocolește debounce-ul de 2s) — folosit la ștergere
  const saveNow = (overrides={}) => {
    if (!canCloudSync) return;
    const client=getSbClient(); if(!client) return;
    if(syncTimerRef.current) clearTimeout(syncTimerRef.current); // anulează debounce pending
    const syncData={
      evs, tasks, songs, calBlocks, genExp, annualCosts, gigsPerYear, templates,
      riderVersions, pressKitVersions, playlistVersions, memberProfiles,
      bandNotifications, aiSettings,
      creative:loadCreative(),
      _ts:Date.now(),
      ...overrides
    };
    setSyncStatus("syncing");
    client.from("app_data").upsert({id:"phaser_main",data:syncData,updated_at:new Date().toISOString()},{onConflict:"id"})
      .then(({error})=>{ setSyncStatus(error?"error":"synced"); if(error) setSyncErrorMsg(error.message||""); })
      .catch(err=>{ setSyncStatus("error"); setSyncErrorMsg(err?.message||String(err)); });
  };

  // ─── GOOGLE CALENDAR STATE ───
  const [gcalToken, setGcalToken] = useState(() => {
    if (GCAL_USE_SERVER_OAUTH) return null;
    const t = localStorage.getItem(GCAL_LS_TOKEN);
    const exp = parseInt(localStorage.getItem(GCAL_LS_EXPIRY)||"0");
    return (t && exp > Date.now()) ? t : null;
  });
  const [gcalServerConnected, setGcalServerConnected] = useState(false);
  const gcalEdgeCacheRef = useRef({ token: "", exp: 0 });
  const gcalActive = GCAL_USE_SERVER_OAUTH ? gcalServerConnected : !!gcalToken;
  const tokenClientRef = useRef(null);
  const gcalSilentRef = useRef(false); // previne multiple silent refresh simultane
  const gcalPendingSyncsRef = useRef([]); // syncuri în așteptare după refresh token
  const gcalManualConnectToastRef = useRef(false); // toast doar la click „Conectează Calendar”, nu la refresh silențios
  const gcalMirrorDeleteBusyRef = useRef(false); // evită rulări paralele pentru reconcilierea delete-urilor din Google
  const gcalTaskSyncBusyRef = useRef(false);
  const gcalCreateInFlightRef = useRef(new Map()); // key -> Promise<gcalId|null>, previne dubluri la create
  const gcalLinkedEventsKey = useMemo(
    () => evs.filter(e => e?.gcalId).map(e => `${e.id}:${e.gcalId}`).join("|"),
    [evs]
  );
  const gcalLinkedBlocksKey = useMemo(
    () => (calBlocks || []).filter(b => b?.gcalId).map(b => `${b.id}:${b.gcalId}`).join("|"),
    [calBlocks]
  );
  const gcalLinkedTasksKey = useMemo(
    () => collectTasksWithGcal(tasks).map(t => `${t.id}:${t.gcalId}`).join("|"),
    [tasks]
  );
  const gcalTaskSyncKey = useMemo(() => {
    const all = [];
    const walk = (arr) => {
      for (const t of arr || []) {
        all.push(`${t.id}|${t.due || ""}|${t.gcalId || ""}|${t.text || ""}`);
        walk(t.subtasks || []);
      }
    };
    walk(tasks || []);
    return all.join("~");
  }, [tasks]);

  // Salvează token GCal în Supabase (cloud) — oricine reconectează, toți beneficiază
  const saveGCalToCloud = async (token, exp) => {
    const client = getSbClient(); if(!client) return;
    const existing = await client.from("app_data").select("data").eq("id","phaser_gcal").maybeSingle();
    const d = existing?.data?.data || {};
    await client.from("app_data").upsert({id:"phaser_gcal", data:{...d, token, exp, updated_at: Date.now()}, updated_at: new Date().toISOString()},{onConflict:"id"});
  };

  // Încearcă silent refresh — fără popup, fără prompt
  const gcalSilentTimerRef = useRef(null);
  const trySilentRefresh = () => {
    if(gcalSilentRef.current) return;
    if(!tokenClientRef.current) return;
    gcalSilentRef.current = true;
    // Timeout de siguranță: dacă Google nu cheamă niciun callback (refuz silențios),
    // resetăm flagul după 10s ca să permitem reîncercări viitoare
    if(gcalSilentTimerRef.current) clearTimeout(gcalSilentTimerRef.current);
    gcalSilentTimerRef.current = setTimeout(() => { gcalSilentRef.current = false; }, 10000);
    try {
      // `prompt: "none"` = Google încearcă fără UI (silent) și folosește tokenurile existente.
      tokenClientRef.current.requestAccessToken({ prompt: "none", include_granted_scopes: true });
    } catch(e) { gcalSilentRef.current = false; }
  };

  useEffect(() => {
    if (GCAL_USE_SERVER_OAUTH) return;
    const tryInit = () => {
      if (typeof google === "undefined" || !google.accounts?.oauth2) { setTimeout(tryInit, 600); return; }
      tokenClientRef.current = google.accounts.oauth2.initTokenClient({
        client_id: GCAL_CLIENT_ID,
        scope: GCAL_SCOPE,
        callback: (resp) => {
          gcalSilentRef.current = false;
          if(gcalSilentTimerRef.current) { clearTimeout(gcalSilentTimerRef.current); gcalSilentTimerRef.current=null; }
          if (resp.access_token) {
            const exp = Date.now() + (resp.expires_in - 60) * 1000;
            localStorage.setItem(GCAL_LS_TOKEN, resp.access_token);
            localStorage.setItem(GCAL_LS_EXPIRY, String(exp));
            setGcalToken(resp.access_token);
            saveGCalToCloud(resp.access_token, exp);
            // Procesează syncurile în așteptare după refresh
            const pending = gcalPendingSyncsRef.current.splice(0);
            if(pending.length > 0) {
              setTimeout(async () => {
                for(const pendingEv of pending) {
                  const newId = await syncToGCal(pendingEv);
                  if(newId) setEvs(p=>p.map(e=>e.id===pendingEv.id?{...e,gcalId:newId}:e));
                }
              }, 500);
            }
            if(resp.error) return; // silent refresh eșuat silențios
            if(!pending.length && gcalManualConnectToastRef.current) {
              gcalManualConnectToastRef.current = false;
              showToast("📅 Google Calendar conectat!");
            }
          }
        },
        error_callback: () => { gcalSilentRef.current = false; if(gcalSilentTimerRef.current){clearTimeout(gcalSilentTimerRef.current);gcalSilentTimerRef.current=null;} }
      });
      // La pornire: încearcă să încarce token din cloud dacă local e expirat
      const localT = localStorage.getItem(GCAL_LS_TOKEN);
      const localExp = parseInt(localStorage.getItem(GCAL_LS_EXPIRY)||"0");
      if(!localT || localExp <= Date.now()) {
        // Încearcă din Supabase
        const client = getSbClient();
        if(client) {
          client.from("app_data").select("data").eq("id","phaser_gcal").maybeSingle().then(({data:row})=>{
            if(row?.data?.token && row.data.exp > Date.now()) {
              localStorage.setItem(GCAL_LS_TOKEN, row.data.token);
              localStorage.setItem(GCAL_LS_EXPIRY, String(row.data.exp));
              setGcalToken(row.data.token);
            } else {
              // Token cloud expirat — silent refresh + retry dacă primul eșuează silențios
              setTimeout(trySilentRefresh, 1500);
              setTimeout(() => { if(!localStorage.getItem(GCAL_LS_TOKEN) || parseInt(localStorage.getItem(GCAL_LS_EXPIRY)||"0") <= Date.now()) trySilentRefresh(); }, 13000);
            }
          });
        } else {
          setTimeout(trySilentRefresh, 1500);
          setTimeout(() => { if(!localStorage.getItem(GCAL_LS_TOKEN) || parseInt(localStorage.getItem(GCAL_LS_EXPIRY)||"0") <= Date.now()) trySilentRefresh(); }, 13000);
        }
      }
    };
    setTimeout(tryInit, 800);
  }, []);

  // După login Supabase: token GCal e în `app_data` — la primul mount Cererea rulează înainte de sesiune, deci cu RLS nu citea `phaser_gcal`. Reîncercăm când sesiunea e gata ca să nu mai cerem „Conectează Calendar” la fiecare deschidere. (Doar flux vechi GIS.)
  useEffect(() => {
    if (GCAL_USE_SERVER_OAUTH) return;
    if (!authReady || !sbSession) return;
    const localT = localStorage.getItem(GCAL_LS_TOKEN);
    const localExp = parseInt(localStorage.getItem(GCAL_LS_EXPIRY) || "0", 10);
    if (localT && localExp > Date.now() + 30_000) {
      setGcalToken(localT);
      return;
    }
    const client = getSbClient();
    if (!client) return;
    client.from("app_data").select("data").eq("id", "phaser_gcal").maybeSingle().then(({ data: row }) => {
      const blob = row?.data;
      if (blob?.token && blob.exp > Date.now()) {
        localStorage.setItem(GCAL_LS_TOKEN, blob.token);
        localStorage.setItem(GCAL_LS_EXPIRY, String(blob.exp));
        setGcalToken(blob.token);
      } else if (tokenClientRef.current) {
        setTimeout(() => trySilentRefresh(), 600);
      }
    });
  }, [authReady, sbSession?.user?.id]);

  // Auto-refresh cu 5 minute înainte de expirare (flux vechi GIS)
  useEffect(() => {
    if (GCAL_USE_SERVER_OAUTH) return;
    if(!gcalToken) return;
    const exp = parseInt(localStorage.getItem(GCAL_LS_EXPIRY)||"0");
    const msUntilRefresh = exp - Date.now() - 5*60*1000; // cu 5 min înainte
    if(msUntilRefresh <= 0) { trySilentRefresh(); return; }
    const timer = setTimeout(trySilentRefresh, msUntilRefresh);
    return () => clearTimeout(timer);
  }, [gcalToken]);

  // Revenire în tab / focus: tokenul expiră la ~1h — reîncarcă din Supabase sau silent refresh (fără popup dacă ești logat în Google în același browser). Flux vechi GIS.
  useEffect(() => {
    if (GCAL_USE_SERVER_OAUTH) return;
    const restoreGCalIfNeeded = () => {
      if (document.visibilityState && document.visibilityState !== "visible") return;
      const exp = parseInt(localStorage.getItem(GCAL_LS_EXPIRY) || "0", 10);
      const t = localStorage.getItem(GCAL_LS_TOKEN);
      if (t && exp > Date.now() + 90 * 1000) return;
      const client = getSbClient();
      const applyCloud = (row) => {
        if (row?.data?.token && row.data.exp > Date.now()) {
          localStorage.setItem(GCAL_LS_TOKEN, row.data.token);
          localStorage.setItem(GCAL_LS_EXPIRY, String(row.data.exp));
          setGcalToken(row.data.token);
          return true;
        }
        return false;
      };
      if (client) {
        client.from("app_data").select("data").eq("id", "phaser_gcal").maybeSingle().then(({ data: row }) => {
          if (!applyCloud(row) && tokenClientRef.current) trySilentRefresh();
        });
      } else if (tokenClientRef.current) {
        trySilentRefresh();
      }
    };
    document.addEventListener("visibilitychange", restoreGCalIfNeeded);
    window.addEventListener("focus", restoreGCalIfNeeded);
    return () => {
      document.removeEventListener("visibilitychange", restoreGCalIfNeeded);
      window.removeEventListener("focus", restoreGCalIfNeeded);
    };
  }, []);

  // Ref pentru a opri polling-ul când componenta se demontează sau OAuth e rezolvat
  const gcalPollingRef = useRef(null);

  useEffect(() => {
    if (!GCAL_USE_SERVER_OAUTH || !authReady || !sbSession) return;

    const calErrMsg = {
      redirect_uri_mismatch: "Google: redirect URI nu coincide cu cel din Google Cloud (vezi setup).",
      access_denied: "Ai anulat sau Google a refuzat accesul la Calendar.",
      server_config: "Server: lipsește GOOGLE_CLIENT_SECRET sau OAUTH_STATE_SECRET în Supabase.",
      bad_state: "Sesiune OAuth expirată — încearcă Conectează din nou.",
      db_save_failed: "Nu s-a putut salva tokenul — rulează migrarea SQL google_calendar_credentials pe Supabase.",
      no_refresh_token: "Google nu a trimis refresh token — revocă accesul app în contul Google și reconectează.",
      invalid_grant: "Codul OAuth a expirat — încearcă Conectează din nou.",
    };

    // ── Helper: interoghează Edge Function și actualizează state-ul ──
    const checkAndSetConnected = async (session, base, fromOauth) => {
      try {
        const headers = { Authorization: `Bearer ${session.access_token}`, apikey: SUPABASE_CFG.key };
        let connected = false;
        for (let attempt = 0; attempt < 6; attempt++) {
          const r = await fetch(`${base}/google-calendar-connection-status`, { headers });
          if (r.ok) {
            const j = await r.json();
            connected = !!j.connected;
            if (connected || fromOauth !== "ok") break;
          }
          await new Promise((res) => setTimeout(res, 350));
        }
        setGcalServerConnected(connected);
        if (fromOauth === "ok") {
          if (connected) showToast("📅 Google Calendar conectat (persistă cu refresh token)!");
          else showToast("Calendar: te-ai întors de la Google dar conexiunea nu apare salvată — verifică migrarea DB și logurile funcției callback.", "error");
        }
        return connected;
      } catch (e) { return false; }
    };

    const run = async () => {
      const sb = getSbClient();
      if (!sb) return;
      const { data: { session } } = await sb.auth.getSession();
      if (!session) return;
      const base = `${String(SUPABASE_CFG.url||"").replace(/\/$/,"")}/functions/v1`;
      let fromOauth = null;
      try {
        const u = new URL(window.location.href);
        fromOauth = u.searchParams.get("gcal_oauth");
        if (fromOauth === "ok") {
          gcalEdgeCacheRef.current = { token: "", exp: 0 };
          u.searchParams.delete("gcal_oauth");
          u.searchParams.delete("reason");
          window.history.replaceState({}, "", u.pathname + (u.searchParams.toString() ? "?" + u.searchParams.toString() : "") + u.hash);
          // Suntem în popup (window.name setat de window.open) — notificăm fereastra principală
          // via BroadcastChannel și închidem. Fereastra principală are și polling activ ca fallback.
          if (window.name === "gcal_oauth_popup" || window.opener) {
            try { new BroadcastChannel("gcal_oauth_result").postMessage({ status: "ok" }); } catch(e) {}
            window.close();
            return;
          }
        } else if (fromOauth === "err") {
          const raw = u.searchParams.get("reason") || "eroare";
          u.searchParams.delete("gcal_oauth");
          u.searchParams.delete("reason");
          window.history.replaceState({}, "", u.pathname + (u.searchParams.toString() ? "?" + u.searchParams.toString() : "") + u.hash);
          if (window.name === "gcal_oauth_popup" || window.opener) {
            try { new BroadcastChannel("gcal_oauth_result").postMessage({ status: "err", reason: raw }); } catch(e) {}
            window.close();
            return;
          }
          showToast("Calendar: " + (calErrMsg[raw] || decodeURIComponent(raw)), "error");
        }
      } catch (e) {}
      // Verifică statusul la pornire (sau după redirect full-page)
      await checkAndSetConnected(session, base, fromOauth);
    };
    run();

    // ── BroadcastChannel: notificare instantă din popup (Chrome, Firefox, Safari≥15.4) ──
    let bc = null;
    try {
      bc = new BroadcastChannel("gcal_oauth_result");
      bc.onmessage = async (e) => {
        if (gcalPollingRef.current) { clearInterval(gcalPollingRef.current); gcalPollingRef.current = null; }
        bc.close(); bc = null;
        gcalEdgeCacheRef.current = { token: "", exp: 0 };
        const sb = getSbClient();
        if (!sb) return;
        const { data: { session } } = await sb.auth.getSession();
        if (!session) return;
        const base = `${String(SUPABASE_CFG.url||"").replace(/\/$/,"")}/functions/v1`;
        if (e.data?.status === "ok") await checkAndSetConnected(session, base, "ok");
        else if (e.data?.status === "err") showToast("Calendar: " + (calErrMsg[e.data.reason || "eroare"] || decodeURIComponent(e.data.reason || "eroare")), "error");
      };
    } catch(e) {}

    return () => {
      if (bc) bc.close();
      if (gcalPollingRef.current) { clearInterval(gcalPollingRef.current); gcalPollingRef.current = null; }
    };
  }, [authReady, sbSession?.user?.id]);

  const getGcalAccessTokenUnified = async () => {
    if (GCAL_USE_SERVER_OAUTH) {
      const c = gcalEdgeCacheRef.current;
      if (c.token && c.exp > Date.now() + 20_000) return c.token;
      const sb = getSbClient();
      if (!sb) return null;
      const { data: { session } } = await sb.auth.getSession();
      if (!session) return null;
      const base = `${String(SUPABASE_CFG.url||"").replace(/\/$/,"")}/functions/v1`;
      const r = await fetch(`${base}/google-calendar-access-token`, {
        method: "POST",
        headers: { Authorization: `Bearer ${session.access_token}`, apikey: SUPABASE_CFG.key },
      });
      if (!r.ok) return null;
      const j = await r.json();
      if (!j.access_token) return null;
      const ttl = (Number(j.expires_in) || 3600) * 1000;
      gcalEdgeCacheRef.current = { token: j.access_token, exp: Date.now() + ttl - 120_000 };
      return j.access_token;
    }
    const t = localStorage.getItem(GCAL_LS_TOKEN);
    const exp = parseInt(localStorage.getItem(GCAL_LS_EXPIRY)||"0", 10);
    if (!t || exp < Date.now()) return null;
    return t;
  };

  const connectGCal = () => {
    if (GCAL_USE_SERVER_OAUTH) {
      // Flux robust: fără popup (evită popup blockers și tab-uri blocate în loading).
      // După ce primim URL-ul OAuth de la Edge Function, facem redirect full-page.
      (async () => {
        const sb = getSbClient();
        if (!sb) {
          showToast("Nu ești autentificat.", "error");
          return;
        }
        const { data: { session } } = await sb.auth.getSession();
        if (!session) {
          showToast("Sesiune expirată — autentifică-te din nou.", "error");
          return;
        }
        const base = `${String(SUPABASE_CFG.url||"").replace(/\/$/,"")}/functions/v1`;
        const r = await fetch(`${base}/google-calendar-oauth-start`, {
          method: "POST",
          headers: { Authorization: `Bearer ${session.access_token}`, apikey: SUPABASE_CFG.key },
        });
        const j = await r.json().catch(() => ({}));
        if (!r.ok || !j.url) {
          showToast(j.error || "Nu pornesc OAuth Google. Deploy Edge Functions + secrete (vezi GOOGLE_CALENDAR_EDGE_SETUP.md).", "error");
          return;
        }
        window.location.assign(j.url);
      })();
      return;
    }
    if (tokenClientRef.current) {
      gcalManualConnectToastRef.current = true;
      // GIS Token Client: doar opțiuni documentate (prompt, include_granted_scopes, hint). NU `access_type` — poate forța un flux cu redirect_uri invalid → Error 400 redirect_uri_mismatch.
      tokenClientRef.current.requestAccessToken({ prompt: "consent", include_granted_scopes: true });
    }
    else showToast("Google API nu s-a încărcat încă, încearcă din nou");
  };

  const disconnectGCal = () => {
    if (!window.confirm("Sigur vrei să deconectezi Google Calendar? Vei opri sync până reconectezi.")) return;
    if (GCAL_USE_SERVER_OAUTH) {
      gcalEdgeCacheRef.current = { token: "", exp: 0 };
      (async () => {
        const client = getSbClient();
        if (client) {
          const { data: { session } } = await client.auth.getSession();
          let disconnectOk = true;
          if (session) {
            const base = `${String(SUPABASE_CFG.url||"").replace(/\/$/,"")}/functions/v1`;
            const dr = await fetch(`${base}/google-calendar-disconnect`, {
              method: "POST",
              headers: { Authorization: `Bearer ${session.access_token}`, apikey: SUPABASE_CFG.key, "X-Disconnect-Confirm": "yes" },
            });
            disconnectOk = dr.ok;
            if (!dr.ok) {
              const dj = await dr.json().catch(() => ({}));
              showToast(dj.error || "Nu s-a putut deconecta calendarul global.", "error");
            }
          }
          if (disconnectOk) {
            try { await client.from("app_data").delete().eq("id","phaser_gcal"); } catch (e) {}
          }
          if (!disconnectOk) return;
        }
        setGcalServerConnected(false);
        showToast("Calendar deconectat");
      })();
      return;
    }
    localStorage.removeItem(GCAL_LS_TOKEN);
    localStorage.removeItem(GCAL_LS_EXPIRY);
    setGcalToken(null);
    const client = getSbClient();
    if(client) client.from("app_data").delete().eq("id","phaser_gcal");
    showToast("Calendar deconectat");
  };

  const syncToGCal = async (ev) => {

      const t = e.touches && e.touches[0];
      if (!t) return;
      const ds = findCalDate(t.clientX, t.clientY);
      calLastDropDsRef.current = ds;
      setCalDropDate(ds || null);
    };
    const onEnd = () => {
      if (calTouchDropHandledRef.current) return;
      calTouchDropHandledRef.current = true;
      const meta = calTouchDragMetaRef.current;
      const targetDs = calLastDropDsRef.current;
      setCalTouchDragActive(false);
      setCalDragEvId(null);
      setCalDropDate(null);
      calLastDropDsRef.current = null;
      if (meta.evId && targetDs && targetDs !== meta.fromDs) {
        moveEvToDateRef.current(meta.evId, targetDs);
        calSuppressChipClickRef.current = true;
        setTimeout(()=>{ calSuppressChipClickRef.current = false; }, 500);
      }
    };
    window.addEventListener("touchmove", onMove, { passive: false });
    window.addEventListener("touchend", onEnd, { capture: true });
    window.addEventListener("touchcancel", onEnd, { capture: true });
    return () => {
      window.removeEventListener("touchmove", onMove);
      window.removeEventListener("touchend", onEnd, { capture: true });
      window.removeEventListener("touchcancel", onEnd, { capture: true });
    };

    const q = (globalSearch||"").trim().toLowerCase();

    let qDate = q.replace(/\./g,"-").replace(/(\d{1,2})-(\d{1,2})-(\d{4})/,(_,d,m,y)=>`${y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`);
    const now = new Date();
    const y = now.getFullYear();
    const yearMatch = q.match(/\b(20\d{2})\b/);
    const searchYear = yearMatch ? parseInt(yearMatch[1],10) : y;
    for (const [name, num] of Object.entries(MONTHS_RO)) {
      if (q.includes(name)) {
        const dMatch = q.replace(/\b20\d{2}\b/,"").match(/\b(\d{1,2})\b/);
        const day = dMatch ? parseInt(dMatch[1],10) : null;
        if (day!=null&&day>=1&&day<=31) qDate = `${searchYear}-${String(num).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
        else qDate = `${searchYear}-${String(num).padStart(2,"0")}`;
        break;
      }
    }
    // Detectează dacă query-ul e o dată exactă (YYYY-MM-DD)
    let parsedDate = null;
    if (/^\d{4}-\d{2}-\d{2}$/.test(qDate)) {
      const testD = new Date(qDate+"T00:00:00");
      if (!isNaN(testD.getTime())) parsedDate = qDate;
    }
    // Detectează format DD.MM sau DD.MM.YYYY scris direct
    if (!parsedDate) {
      const dmMatch = q.match(/^(\d{1,2})[.\-\/](\d{1,2})(?:[.\-\/](\d{2,4}))?$/);
      if (dmMatch) {
        const dd=dmMatch[1].padStart(2,"0"), mm=dmMatch[2].padStart(2,"0"), yy=dmMatch[3]?(dmMatch[3].length===2?"20"+dmMatch[3]:dmMatch[3]):String(y);
        const candidate=`${yy}-${mm}-${dd}`;
        const testD2=new Date(candidate+"T00:00:00");
        if(!isNaN(testD2.getTime())&&testD2.getMonth()===parseInt(mm,10)-1) parsedDate=candidate;
      }
    }
    const evMatches = evs.filter(e=>{
      if([e.cn,e.type,e.venue,e.city,e.notes,e.desc,e.title,e.dateNote].some(f=>String(f||"").toLowerCase().includes(q))) return true;
      if(String(fEvDate(e)||"").toLowerCase().includes(q)) return true;
      if((e.dateOptions||[]).some(d=>String(d).toLowerCase().includes(q)||String(d).includes(qDate))) return true;
      if(e.dateMonth&&(e.dateMonth.includes(q)||e.dateMonth.includes(qDate))) return true;
      if(e.date&&(e.date.includes(q)||e.date.includes(qDate)||fD(e.date).toLowerCase().includes(q))) return true;
      if(e.date) for (const [name, num] of Object.entries(MONTHS_RO)) if (q.includes(name) && e.date.startsWith(`${searchYear}-${String(num).padStart(2,"0")}`)) return true;
      if(e.dateMonth) for (const [name, num] of Object.entries(MONTHS_RO)) if (q.includes(name) && e.dateMonth.startsWith(`${searchYear}-${String(num).padStart(2,"0")}`)) return true;
      return false;
    });

                          <td style={{padding:"8px 10px",fontWeight:700,color:roleColor}}>{fv2(amt)}</td>

                        </tr>;

                    </table>
                  </div>
                </div>;

              return <div style={{animation:"su .3s ease"}}>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
                  <button onClick={()=>setFinMember(null)} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 14px",borderRadius:8,border:`1px solid ${th.b}`,background:"transparent",color:th.t,fontSize:12,cursor:"pointer",fontWeight:600}}>← Finanțe</button>
                  <div style={{width:44,height:44,borderRadius:"50%",background:th.a,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:18,color:th.bg,flexShrink:0}}>{m.n[0]}</div>
                  <div>
                    <div style={{fontSize:20,fontWeight:800}}>{m.n}</div>
                    <div style={{fontSize:12,color:th.tm}}>{m.r}</div>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:mob?"1fr 1fr":"repeat(3,1fr)",gap:10,marginBottom:16}}>
                  <div style={{...sty.cd,border:"1px solid rgba(34,197,94,.3)"}}>
                    <div style={{fontSize:10,color:"#22c55e",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>✅ Încasat</div>
                    <div style={{fontSize:22,fontWeight:800,color:"#22c55e"}}>{fv2(totPaid)}</div>
                    <div style={{fontSize:10,color:th.tm,marginTop:3}}>{paid.filter(e=>memberDetail(e,finMember).total>0).length} evenimente plătite</div>
                  </div>
                  <div style={{...sty.cd,border:"1px solid rgba(245,158,11,.3)"}}>
                    <div style={{fontSize:10,color:"#f59e0b",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>⏳ Urmează</div>
                    <div style={{fontSize:22,fontWeight:800,color:"#f59e0b"}}>{fv2(totWait)}</div>
                    <div style={{fontSize:10,color:th.tm,marginTop:3}}>{waiting.filter(e=>memberDetail(e,finMember).total>0).length} evenimente confirmate</div>
                  </div>
                  <div style={{...sty.cd}}>
                    <div style={{fontSize:10,color:th.tm,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>💰 Total general</div>
                    <div style={{fontSize:22,fontWeight:800}}>{fv2(totPaid+totWait)}</div>
                    <div style={{fontSize:10,color:th.tm,marginTop:3}}>{allEvs.filter(e=>memberDetail(e,finMember).total>0).length} evenimente total</div>
                  </div>
                </div>
                {totPaid>0&&<div style={{...sty.cd,marginBottom:16}}>
                  <div style={{fontSize:11,color:th.tm,fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Sumar sursă câștig (încasat)</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                    {totBase>0&&<div style={{padding:"8px 14px",borderRadius:10,background:"rgba(99,102,241,.1)",border:"1px solid rgba(99,102,241,.2)"}}>
                      <div style={{fontSize:9,color:"#a5b4fc",textTransform:"uppercase",letterSpacing:1}}>🎵 Cantat</div>
                      <div style={{fontSize:16,fontWeight:700,color:"#a5b4fc"}}>{fv2(totBase)}</div>
                    </div>}
                    {totLead>0&&<div style={{padding:"8px 14px",borderRadius:10,background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.2)"}}>
                      <div style={{fontSize:9,color:"#fbbf24",textTransform:"uppercase",letterSpacing:1}}>⭐ Lead</div>
                      <div style={{fontSize:16,fontWeight:700,color:"#fbbf24"}}>{fv2(totLead)}</div>
                    </div>}
                    {totAdmin>0&&<div style={{padding:"8px 14px",borderRadius:10,background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.2)"}}>
                      <div style={{fontSize:9,color:"#fbbf24",textTransform:"uppercase",letterSpacing:1}}>🗂 Admin</div>
                      <div style={{fontSize:16,fontWeight:700,color:"#fbbf24"}}>{fv2(totAdmin)}</div>
                    </div>}
                    {totSocial>0&&<div style={{padding:"8px 14px",borderRadius:10,background:"rgba(139,92,246,.1)",border:"1px solid rgba(139,92,246,.2)"}}>
                      <div style={{fontSize:9,color:"#c4b5fd",textTransform:"uppercase",letterSpacing:1}}>📱 Social Media Mgr</div>
                      <div style={{fontSize:16,fontWeight:700,color:"#c4b5fd"}}>{fv2(totSocial)}</div>
                    </div>}
                    {totStage>0&&<div style={{padding:"8px 14px",borderRadius:10,background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.2)"}}>
                      <div style={{fontSize:9,color:"#fbbf24",textTransform:"uppercase",letterSpacing:1}}>🎭 Stage Mgr</div>
                      <div style={{fontSize:16,fontWeight:700,color:"#fbbf24"}}>{fv2(totStage)}</div>
                    </div>}
                  </div>
                </div>}
                {ROLES.map(r=><RoleSection key={r.k} roleKey={r.k} roleLabel={r.l} roleColor={r.c} roleBg={r.bg} tot={{base:totBaseAll,lead:totLeadAll,admin:totAdminAll,social:totSocialAll,stage:totStageAll}[r.k]}/>)}
                {allEvs.length===0&&<div style={{padding:40,textAlign:"center",color:th.tm,fontSize:13}}>Niciun eveniment confirmat încă</div>}
              </div>;
            }

            // ── OVERVIEW ──
            return <div style={{animation:"su .3s ease"}}>
              <h1 style={{fontSize:22,fontWeight:700,marginBottom:16}}>Finanțe</h1>
              <div style={{display:"grid",gridTemplateColumns:mob?"1fr 1fr":"repeat(4,1fr)",gap:10,marginBottom:16}}>
                {[{l:"Venituri confirmate",v:f$(stats.rev),ac:"#22c55e"},{l:"Profit net",v:f$(stats.net),ac:stats.net>=0?"#22c55e":"#ef4444"},{l:"În așteptare",v:f$(stats.pipe)},{l:"Avansuri restante",v:f$(stats.pd),ac:stats.pd>0?"#ef4444":"#22c55e"}].map((c,i)=>
                  <div key={i} style={sty.cd}><div style={sty.l}>{c.l}</div><div style={{fontSize:mob?16:20,fontWeight:700,marginTop:5,color:c.ac||th.t}}>{c.v}</div></div>
                )}
              </div>
              <div style={{...sty.cd,marginBottom:16}}>
                <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>Split per membru</div>
                <div style={{display:"grid",gridTemplateColumns:mob?"repeat(2,1fr)":"repeat(5,1fr)",gap:8}}>
                  {MEMBERS.map(m=>{
                    const primit=evs.filter(e=>e.st==="confirmat"&&e.restPaid).reduce((s,e)=>s+memberDetail(e,m.id).total,0);
                    const asteptConf=evs.filter(e=>e.st==="confirmat"&&!e.restPaid).reduce((s,e)=>s+memberDetail(e,m.id).total,0);
                    return <div key={m.id} onClick={()=>setFinMember(m.id)} style={{padding:14,borderRadius:10,background:th.h,textAlign:"center",cursor:"pointer",border:`1px solid ${th.b}`,transition:"all .15s"}} onMouseEnter={e=>{e.currentTarget.style.border=`1px solid ${th.a}`;e.currentTarget.style.background=th.ab;}} onMouseLeave={e=>{e.currentTarget.style.border=`1px solid ${th.b}`;e.currentTarget.style.background=th.h;}}>

                      <div style={{fontSize:13,fontWeight:600}}>{m.n}</div>
                      <div style={{fontSize:10,color:th.tm,marginBottom:6}}>{m.r}</div>
                      <div style={{fontSize:17,fontWeight:800,color:"#22c55e"}}>{f$(primit)}</div>
                      {asteptConf>0&&<div style={{fontSize:10,color:"#f59e0b",fontWeight:600,marginTop:3}}>⏳ {f$(asteptConf)}</div>}
                      <div style={{fontSize:9,color:th.tm,marginTop:6,opacity:.7}}>Vezi detalii →</div>
                    </div>;
                  })}
                </div>
              </div>

            {/* Cheltuieli generale — scad din profit net */}
            <div style={{...sty.cd,marginTop:16,border:genExp.length>0?`1px solid rgba(239,68,68,.3)`:"none"}}>
              <div style={{marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                <div style={{fontSize:13,fontWeight:600}}>Cheltuieli generale</div>
                {genExp.length>0&&<button onClick={()=>{if(window.confirm("Ștergi toate cheltuielile generale? Profitul net va fi recalculat.")){setGE([]);showToast("Cheltuieli generale șterse");}}} style={{padding:"5px 12px",fontSize:11,borderRadius:7,border:"1px solid #ef4444",background:"transparent",color:"#ef4444",cursor:"pointer",fontWeight:600}}>Șterge toate</button>}
              </div>
              <p style={{fontSize:11,color:th.tm,marginBottom:10}}>Cheltuieli neprevăzute (asigurări, etc.) — scad din Profit net</p>
              {genExp.length===0&&<div style={{padding:20,textAlign:"center",color:th.tm,fontSize:11}}>Nicio cheltuială generală</div>}
              {genExp.length>0&&<div className={mob?"table-scroll-mob":""} style={{overflow:mob?"auto":"visible"}}><table style={{width:"100%",minWidth:mob?400:undefined,fontSize:12}}><thead><tr style={{borderBottom:`1px solid ${th.b}`}}><th style={{padding:"8px 10px",textAlign:"left",fontSize:9,color:th.tm,textTransform:"uppercase"}}>Perioadă</th><th style={{padding:"8px 10px",textAlign:"left",fontSize:9,color:th.tm,textTransform:"uppercase"}}>Descriere</th><th style={{padding:"8px 10px",textAlign:"right",fontSize:9,color:th.tm,textTransform:"uppercase"}}>Sumă</th><th style={{width:36}}/></tr></thead><tbody>{genExp.map((g,i)=><tr key={g.id||i} style={{borderBottom:`1px solid ${th.bl}`}}><td style={{padding:"8px 10px"}}>{g.d||"—"}</td><td style={{padding:"8px 10px",color:th.tm}}>{g.desc||"—"}</td><td style={{padding:"8px 10px",textAlign:"right",fontWeight:600,color:"#ef4444"}}>-{f$((g.a||0))}</td><td style={{padding:"4px"}}><button onClick={()=>{setGE(genExp.filter((_,j)=>j!==i));showToast("Cheltuială ștearsă");}} style={{padding:mob?8:4,minWidth:mob?44:undefined,minHeight:mob?44:undefined,border:"none",background:"transparent",color:"#ef4444",cursor:"pointer"}}>✕</button></td></tr>)}</tbody></table></div>}
              <button onClick={()=>{const d=prompt("Perioadă (ex: 2025-01 sau descriere):");const desc=prompt("Descriere:");const a=Number(prompt("Sumă €:")||0);if(d!==null&&a)setGE([...genExp,{id:uid(),d,desc:desc||"",a}]);}} style={{...sty.bg,fontSize:11,padding:"5px 10px",marginTop:10}}>+ Adaugă</button>
            </div>

            <div style={{...sty.cd,marginTop:16}}>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:13,fontWeight:600}}>Cheltuieli anuale fixe</div>
              </div>
              {annualCosts.map((x,i)=><div key={x.id} style={{display:"flex",gap:6,marginBottom:6,alignItems:"center"}}>
                <input value={x.n} onChange={e=>{const ac=[...annualCosts];ac[i]={...ac[i],n:e.target.value};setAC(ac);}} style={{...sty.i,padding:8,fontSize:12,flex:2}} placeholder="Ex: Contabilă"/>
                <input type="number" value={x.a} onChange={e=>{const ac=[...annualCosts];ac[i]={...ac[i],a:Number(e.target.value)||0};setAC(ac);}} style={{...sty.i,padding:8,fontSize:12,flex:1,minWidth:70}} placeholder="0"/>
                <div style={{display:"flex",borderRadius:7,overflow:"hidden",border:`1px solid ${th.b}`,flexShrink:0}}>
                  {["lei","€"].map(v=>{const val=v==="lei"?"lei":"eur";const active=(x.v||"lei")===val;return <button key={v} onClick={()=>{const ac=[...annualCosts];ac[i]={...ac[i],v:val};setAC(ac);}} style={{padding:"0 10px",height:34,border:"none",background:active?th.a:"transparent",color:active?th.bg:th.tm,fontSize:11,fontWeight:active?700:400,cursor:"pointer"}}>{v}</button>;})}
                </div>
                <button onClick={()=>setAC(annualCosts.filter((_,j)=>j!==i))} style={{padding:4,border:"none",background:"transparent",color:"#ef4444",cursor:"pointer",flexShrink:0}}>✕</button>
              </div>)}
              <button onClick={()=>setAC([...annualCosts,{id:uid(),n:"",a:0,v:"lei"}])} style={{...sty.bg,fontSize:11,padding:"5px 10px",marginBottom:12}}>+ Adaugă</button>
              {(()=>{
                const CURS=5;
                const totLei=annualCosts.filter(x=>(x.v||"lei")==="lei").reduce((s,x)=>s+(x.a||0),0);
                const totEur=annualCosts.filter(x=>x.v==="eur").reduce((s,x)=>s+(x.a||0),0);
                const totAnualEur=Math.round((totLei/CURS+totEur)*100)/100;
                return <div style={{padding:"10px 14px",borderRadius:8,background:th.h,border:`1px solid ${th.b}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontSize:13,fontWeight:700}}>Target anual: <span style={{color:th.a}}>{f$(totAnualEur)}</span></div>
                  <div style={{fontSize:11,color:th.tm}}>Vezi progresul mai jos ↓</div>
                </div>;
              })()}
            </div>

            {/* Fond trupa */}
            {(()=>{
              const CURS=5;
              const totAnualEur=Math.round((annualCosts.filter(x=>(x.v||"lei")==="lei").reduce((s,x)=>s+(x.a||0),0)/CURS+annualCosts.filter(x=>x.v==="eur").reduce((s,x)=>s+(x.a||0),0))*100)/100;
              // Fond din avansuri intrate (dp=true, event neplătit integral)
              // Avansul intră imediat în fond când e primit
              const fondDinAvans=evs.filter(e=>e.st==="confirmat"&&e.dp).reduce((s,e)=>s+(e.dep||0),0);
              // Fond din 7% — DOAR pentru evenimente plătite integral (restPaid=true)
              const fondDin7pct=evs.filter(e=>e.st==="confirmat"&&e.restPaid).reduce((s,e)=>s+calcFond7(e),0);
              const fondIntrat=fondDinAvans+fondDin7pct;
              // Fond urmează: confirmate neplătite (7%) + pipeline
              const fondConfUrmeaza=evs.filter(e=>e.st==="confirmat"&&!e.restPaid).reduce((s,e)=>s+calcFond7(e),0);
              const fondPipeline=evs.filter(e=>["oferta","asteptare","plata_avans"].includes(e.st)).reduce((s,e)=>s+calcFond7(e),0);
              const fondUrmeaza=fondConfUrmeaza+fondPipeline;
              // Surplus după cheltuieli anuale
              const fondDisponibil=Math.max(0,fondIntrat-totAnualEur);
              const ramasDeCoperit=Math.max(0,totAnualEur-fondIntrat);
              const pctIntrat=totAnualEur>0?Math.min(100,Math.round(fondIntrat/totAnualEur*100)):100;
              const pctCuUrmeaza=totAnualEur>0?Math.min(100,Math.round((fondIntrat+fondUrmeaza)/totAnualEur*100)):100;
              return <div style={{...sty.cd,marginTop:16,border:`1px solid rgba(99,102,241,.3)`}}>
                <div style={{fontSize:13,fontWeight:600,marginBottom:12,color:"#a5b4fc"}}>💰 Fond trupă</div>
                {/* Rânduri fond intrat / urmează */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                  <div style={{padding:"10px 12px",borderRadius:8,background:th.h,border:`1px solid ${fondIntrat>0?"rgba(99,102,241,.3)":th.b}`}}>
                    <div style={{fontSize:9,color:"#818cf8",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>✅ Fond intrat</div>
                    <div style={{fontSize:22,fontWeight:800,color:"#818cf8"}}>{f$(fondIntrat)}</div>
                    {fondDinAvans>0&&<div style={{fontSize:10,color:"#a5b4fc",marginTop:3}}>Avansuri: {f$(fondDinAvans)}</div>}
                    {fondDin7pct>0&&<div style={{fontSize:10,color:"#818cf8",marginTop:1}}>7% finalizat: {f$(fondDin7pct)}</div>}
                    {fondIntrat===0&&<div style={{fontSize:10,color:th.tm,marginTop:2}}>Niciun avans sau eveniment plătit integral</div>}
                  </div>
                  <div style={{padding:"10px 12px",borderRadius:8,background:th.h,border:`1px solid ${fondUrmeaza>0?"rgba(245,158,11,.2)":th.b}`}}>
                    <div style={{fontSize:9,color:"#f59e0b",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>⏳ Fond urmează</div>
                    <div style={{fontSize:22,fontWeight:800,color:"#f59e0b"}}>{f$(fondUrmeaza)}</div>
                    {fondConfUrmeaza>0&&<div style={{fontSize:10,color:th.tm,marginTop:3}}>7% confirmate: {f$(fondConfUrmeaza)}</div>}
                    {fondPipeline>0&&<div style={{fontSize:10,color:th.tm,marginTop:1}}>Pipeline: {f$(fondPipeline)}</div>}
                  </div>
                </div>
                {/* Progress spre cheltuieli anuale */}
                {totAnualEur>0&&<>
                  <div style={{fontSize:10,color:th.tm,marginBottom:6,display:"flex",justifyContent:"space-between"}}>
                    <span>Spre cheltuieli anuale ({f$(totAnualEur)} target)</span>
                    <span style={{color:pctIntrat>=100?"#22c55e":"#818cf8",fontWeight:600}}>{pctIntrat}% acoperit</span>
                  </div>
                  <div style={{height:8,borderRadius:6,background:th.b,overflow:"hidden",marginBottom:6,position:"relative"}}>
                    <div style={{position:"absolute",height:"100%",width:pctCuUrmeaza+"%",borderRadius:6,background:"rgba(245,158,11,.25)"}}/>
                    <div style={{position:"absolute",height:"100%",width:pctIntrat+"%",borderRadius:6,background:pctIntrat>=100?"#22c55e":"#818cf8",transition:"width .6s ease"}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:th.tm,marginBottom:12}}>
                    <span style={{color:"#818cf8"}}>{f$(fondIntrat)} intrat{fondUrmeaza>0&&<span style={{color:"#f59e0b"}}> · +{f$(fondUrmeaza)} urmează</span>}</span>
                    {ramasDeCoperit>0?<span style={{color:"#ef4444"}}>Mai lipsesc {f$(ramasDeCoperit)}</span>:<span style={{color:"#22c55e",fontWeight:600}}>✓ Target acoperit!</span>}
                  </div>
                </>}
                {/* Fond disponibil trupa */}
                <div style={{padding:"10px 12px",borderRadius:8,border:`1px solid ${fondDisponibil>0?"#22c55e":"rgba(99,102,241,.2)"}`,background:fondDisponibil>0?"rgba(34,197,94,.06)":"transparent"}}>
                  <div style={{fontSize:10,color:fondDisponibil>0?"#22c55e":th.tm,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>💸 Fond disponibil trupă</div>
                  <div style={{fontSize:22,fontWeight:800,color:fondDisponibil>0?"#22c55e":"#818cf8"}}>{f$(fondDisponibil)}</div>
                  <div style={{fontSize:10,color:th.tm,marginTop:2}}>{fondDisponibil>0?"Surplus după acoperirea cheltuielilor anuale":"Se formează după acoperirea targetului anual · se adaugă pe măsură ce plătești cheltuielile"}</div>
                </div>
              </div>;
            })()}

            </div>;
          })()}

        </div>
      </div>

      {/* PICK MODAL */}
      {modal==="pick"&&<div style={{position:"fixed",inset:0,background:th.ov,display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}} onClick={closeModal}>
        <div style={{background:th.c,border:`1px solid ${th.b}`,borderRadius:14,width:mob?"90%":360,padding:28}} onClick={e=>e.stopPropagation()}>
          <div style={{textAlign:"center",marginBottom:20}}>
            <h2 style={{fontSize:17,fontWeight:700,color:th.t}}>Ofertă nouă</h2>
            <p style={{color:th.tm,fontSize:12,marginTop:3}}>Ce tip de eveniment?</p>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <button onClick={()=>{closeModal();setTimeout(()=>openModal("form",{cat:"private",...(mData?.date&&{date:mData.date})}),80);}} style={{background:"#fff",border:"2px solid #333",cursor:"pointer",textAlign:"center",padding:mob?24:22,borderRadius:10,color:"#111",boxShadow:"0 2px 8px rgba(0,0,0,.2)",minHeight:mob?100:undefined}}>
              <div style={{fontSize:28,marginBottom:8}}>🎉</div><div style={{fontWeight:700,fontSize:14}}>Privat</div><div style={{fontSize:10,color:"#666",marginTop:4}}>ZăGoodVibes</div>
            </button>
            <button onClick={()=>{closeModal();setTimeout(()=>openModal("form",{cat:"public",...(mData?.date&&{date:mData.date})}),80);}} style={{background:"#fff",border:"2px solid #333",cursor:"pointer",textAlign:"center",padding:mob?24:22,borderRadius:10,color:"#111",boxShadow:"0 2px 8px rgba(0,0,0,.2)",minHeight:mob?100:undefined}}>
              <div style={{fontSize:28,marginBottom:8}}>🎸</div><div style={{fontWeight:700,fontSize:14}}>Public</div><div style={{fontSize:10,color:"#666",marginTop:4}}>PHASER</div>
            </button>
          </div>
          <button onClick={closeModal} style={{...sty.bg,width:"100%",justifyContent:"center",marginTop:12}}>Anulează</button>
        </div>
      </div>}

      {/* PICK CERERE MODAL */}
      {modal==="pickCerere"&&<div style={{position:"fixed",inset:0,background:th.ov,display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}} onClick={closeModal}>
        <div style={{background:th.c,border:`1px solid ${th.b}`,borderRadius:14,width:mob?"90%":360,padding:28}} onClick={e=>e.stopPropagation()}>
          <div style={{textAlign:"center",marginBottom:20}}>
            <h2 style={{fontSize:17,fontWeight:700,color:th.t}}>Cerere nouă</h2>
            <p style={{color:th.tm,fontSize:12,marginTop:3,lineHeight:1.45}}>Eveniment privat sau public? Apoi completezi detaliile în formular.</p>
          </div>
