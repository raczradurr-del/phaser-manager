// TimeInput — 24h format, datalist + tastare (id unic per instanță — altfel toate câmpurile împart același datalist și dropdown-ul „nu merge”)
function TimeInput({ value, onChange, style, placeholder }) {
  const listId = useId().replace(/:/g, "");
  const norm = (v) => { const m = (v||"").match(/^(\d{1,2}):(\d{2})$/); if(m){ const h=Math.min(23,Math.max(0,parseInt(m[1],10))); const min=Math.min(59,Math.max(0,parseInt(m[2],10))); return String(h).padStart(2,"0")+":"+String(min).padStart(2,"0"); } return v||""; };
  const handleChange = (e) => { const v = norm(e.target.value); onChange(v); };
  return (
    <div style={{position:"relative",display:"inline-flex",alignItems:"center",flexShrink:0}}>
      <input list={listId} value={value||""} onChange={handleChange} onBlur={(e)=>onChange(norm(e.target.value))} placeholder={placeholder||"09:00"} style={{boxSizing:"border-box",fontVariantNumeric:"tabular-nums",minWidth:"7.5ch",...style}} maxLength={5}/>
      <datalist id={listId}>{TIME_OPTIONS.map(t=><option key={t} value={t}/>)}</datalist>
    </div>
  );
}

// DateTimeInput — dată + oră (24h), pentru Load In etc.
function DateTimeInput({ value, evDate, onChange, style, iStyle }) {
  const {date,time}=parseDateTime(value,evDate);
  const handleDate = (d) => onChange(formatDateTime(d,time));
  const handleTime = (t) => onChange(formatDateTime(date,t));
  const baseStyle = iStyle||{};
  return (
    <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
      <input type="date" value={date||""} onChange={e=>handleDate(e.target.value)} style={{...baseStyle,flex:"1 1 120px",minWidth:100}}/>
      <TimeInput value={time} onChange={handleTime} style={{...baseStyle,width:80,textAlign:"center"}} placeholder="09:00"/>
    </div>
  );
}

// FisaPdfButton — descarcă PDF doar fișa evenimentului
function FisaPdfButton({ ev, showToast }) {
  const [loading, setLoading] = useState(false);
  const handleDownload = async () => {
    setLoading(true);
    try {
      let blob = null;
      try { blob = await generatePdfFromHtml(getFisaBodyHtmlForWorker(ev)); } catch (e) { blob = null; }
      if (!blob && typeof html2pdf !== "undefined") {
        const div = document.createElement("div");
        div.innerHTML = getFisaBodyHtmlForWorker(ev);
        div.style.cssText = "position:absolute;left:-9999px;top:0;width:560px;background:#fff;padding:20px";
        document.body.appendChild(div);
        blob = await html2pdf().set({ margin: 12, filename: `Fisa-O${ev.offerNr||"?"}-${fisaPdfDateSlug(ev)}.pdf`, image: { type: "jpeg", quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: "mm", format: "a4", orientation: "portrait" } }).from(div).outputPdf("blob");
        document.body.removeChild(div);
      }
      if (!blob) throw new Error("Nu s-a putut genera PDF");
      const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `Fisa-O${ev.offerNr||"?"}-${fisaPdfDateSlug(ev)}.pdf`;
      a.click(); URL.revokeObjectURL(a.href);
      showToast?.("PDF descărcat ✓");
    } catch (e) { showToast?.("Eroare la generare PDF"); console.error(e); }
    setLoading(false);
  };
  return (
    <button onClick={handleDownload} disabled={loading} style={{padding:"8px 16px",borderRadius:8,border:"none",background:"#22c55e",color:"#fff",fontWeight:700,fontSize:12,cursor:loading?"wait":"pointer",display:"flex",alignItems:"center",gap:6,opacity:loading?0.7:1}}>
      {loading?"⏳":"⬇"} Descarcă PDF
    </button>
  );
}

// FisaLinkButton — generează link partajabil pentru fișa evenimentului (Supabase Storage)
// Fișier deterministic: fisa-{ev.id}.html — același fișier, actualizat la re-upload
function FisaLinkButton({ ev, showToast, pdfLoading, getSbClient, updEv, htmlProxyBase }) {
  const [loading, setLoading] = useState(false);
  const [show, setShow] = useState(false);
  const [copied, setCopied] = useState(false);
  // URL salvat în event (persistă între sesiuni); fallback la state local
  const savedUrl = ev.fisaUrl || null;
  const [localUrl, setLocalUrl] = useState(savedUrl);
  const url = localUrl || savedUrl;

  const doUpload = async () => {
    const sb = getSbClient?.();
    if (!sb) { showToast?.("Link partajabil necesita Supabase configurat."); return; }
    setLoading(true);
    try {
      const rawHtml = buildFisaHtml(ev);
      const html = encodeHtmlCodePoints(rawHtml);
      const path = `fisa-${ev.id}.html`;
      const blob = new Blob([html], { type: "text/html; charset=utf-8" });
      const { error } = await sb.storage.from(FISA_PUBLIC_BUCKET).upload(path, blob, { contentType: "text/html; charset=utf-8", upsert: true });
      if (error) throw error;
      const publicUrl = buildShareableHtmlPublicUrl(sb, path, htmlProxyBase);
      setLocalUrl(publicUrl);
      if (updEv) updEv({ fisaUrl: publicUrl });
      setShow(true);
      showToast?.("Link generat ✓");
      verifyShareableProxyUrl(publicUrl).then((proxyOk) => {
        if (!proxyOk) {
          showToast?.(
            "Proxy HTML nu răspunde OK — rulează deploy la html-public-proxy și verifică SUPABASE_PUBLIC_OBJECT_BASE în Cloudflare.",
            "error",
          );
        }
      });
    } catch (e) {
      const raw = (e?.message || e?.error_description || "").trim();
      let msg = "Eroare: " + (raw || "Upload esuat.");
      if (/bucket not found/i.test(raw)) {
        msg = "Bucket 'fisa-public' nu exista in Supabase. Dashboard -> Storage -> New bucket: id 'fisa-public', Public.";
      } else if (/row-level security|rls/i.test(raw)) {
        msg = "Supabase blochează upload-ul (RLS). Rulează în SQL Editor fișierul supabase-fix-fisa-rls.sql din proiect.";
      }
      showToast?.(msg, "error");
    }
    setLoading(false);
  };

  const handleGetLink = () => {
    if (url) { setShow(s => !s); }
    else { doUpload(); }
  };

  const copyUrl = async () => {
    if (!url) return;
    const ok = await copyTextToClipboardSafe(url);
    setCopied(!!ok);
    setTimeout(()=>setCopied(false), 2000);
    if (!ok) showToast?.("Selectează URL-ul și Cmd/Ctrl+C", "error");
  };

  return (
    <div style={{position:"relative"}}>
      <button onClick={handleGetLink} disabled={pdfLoading||loading} style={{padding:"8px 16px",borderRadius:8,border:"none",background:show?"#2563eb":"#3b82f6",color:"#fff",fontWeight:700,fontSize:12,cursor:(pdfLoading||loading)?"wait":"pointer",display:"flex",alignItems:"center",gap:6,opacity:(pdfLoading||loading)?0.7:1}}>
        {loading?"⏳":"🔗"} Link
      </button>
      {show&&url&&<>
        <div style={{position:"fixed",inset:0,zIndex:49}} onClick={()=>setShow(false)}/>
        <div style={{position:"fixed",top:"50%",left:"50%",transform:"translate(-50%,-50%)",background:"#1a1a1a",borderRadius:12,padding:16,width:"min(320px, 90vw)",zIndex:1100,boxShadow:"0 12px 40px rgba(0,0,0,.8)",border:"1px solid rgba(255,255,255,.15)"}}>
          <div style={{fontSize:10,color:"rgba(255,255,255,.5)",marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Link partajabil · Fișa evenimentului</div>
          <div style={{display:"flex",gap:6,marginBottom:10}}>
            <input value={url} readOnly onClick={e=>e.target.select()} style={{flex:1,padding:"6px 8px",borderRadius:6,border:"1px solid rgba(255,255,255,.15)",background:"rgba(255,255,255,.06)",color:"rgba(255,255,255,.6)",fontSize:10,fontFamily:"monospace",minWidth:0}}/>
            <button onClick={copyUrl} style={{padding:"6px 10px",borderRadius:6,border:"none",background:copied?"#22c55e":"#333",color:"#fff",fontSize:11,cursor:"pointer",flexShrink:0,fontWeight:600}}>
              {copied?"✓":"📋"}
            </button>
          </div>
          <a href={"https://wa.me/?text="+encodeURIComponent(url)} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"10px 16px",borderRadius:8,background:"#25d366",color:"#fff",fontWeight:700,fontSize:13,textDecoration:"none",width:"100%",marginBottom:8}}>
            <span style={{fontSize:16}}>💬</span> Trimite pe WhatsApp
          </a>
          <button onClick={()=>{setShow(false);doUpload();}} disabled={loading} style={{width:"100%",padding:"6px",borderRadius:6,border:"1px solid rgba(255,255,255,.15)",background:"transparent",color:"rgba(255,255,255,.5)",fontSize:11,cursor:"pointer",marginBottom:4}}>
            {loading?"⏳ Se actualizează...":"↻ Actualizează fișa"}
          </button>
          <button onClick={()=>setShow(false)} style={{width:"100%",padding:"5px",borderRadius:6,border:"none",background:"transparent",color:"rgba(255,255,255,.3)",fontSize:10,cursor:"pointer"}}>Închide</button>
        </div>
      </>}
    </div>
  );
}

function LocationSearch({ venue, city, dist, onUpdate, sty, th, mob }) {
  const [venueVal, setVenueVal] = useState(venue||"");
  const [cityQuery, setCityQuery] = useState(city||"");
  const [showCityDrop, setShowCityDrop] = useState(false);
  const [venueResults, setVenueResults] = useState([]);
  const [showVenueDrop, setShowVenueDrop] = useState(false);
  const [venueAddress, setVenueAddress] = useState("");
  const [venueMapUrl, setVenueMapUrl] = useState("");
  const [searching, setSearching] = useState(false);
  const debounceRef = useRef(null);
  const iStyle = {...sty.i, fontSize: mob?"16px":"14px"};

  // Caută pe OpenStreetMap Nominatim după ce userul termină de scris (debounce 600ms)
  const searchNominatim = (query) => {
    if (debounceRef.current) clearTimeout(debounceRef.current);
    if (!query || query.length < 3) { setVenueResults([]); setShowVenueDrop(false); return; }
    debounceRef.current = setTimeout(async () => {
      setSearching(true);
      try {
        // Adaugă orașul în query dacă e completat — rezultate mai precise
        const q = cityQuery ? `${query}, ${cityQuery}` : `${query}, Romania`;
        const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&addressdetails=1&accept-language=ro&countrycodes=ro`;
        const res = await fetch(url);
        const data = await res.json();
        setVenueResults(data);
        setShowVenueDrop(data.length > 0);
      } catch(e) {
        setVenueResults([]);
      }
      setSearching(false);
    }, 600);
  };

  const pickVenue = (place) => {
    // Numele venue-ului — prima parte din display_name (înainte de prima virgulă)
    const nameParts = (place.display_name || "").split(",");
    const name = nameParts[0].trim();
    const addr = place.display_name || "";
    const a = place.address || {};
    const cityName = a.city || a.town || a.village || a.municipality || a.county || "";
    const mapUrl = `https://www.openstreetmap.org/?mlat=${place.lat}&mlon=${place.lon}&zoom=17`;

    // Distanță față de TM
    const cityMatch = RO_CITIES.find(c =>
      cityName.toLowerCase().includes(c.n.toLowerCase()) ||
      c.n.toLowerCase().includes(cityName.toLowerCase())
    );
    const distKm = cityMatch ? cityMatch.km : 0;

    setVenueVal(name);
    setCityQuery(cityName);
    setVenueAddress(addr);
    setVenueMapUrl(mapUrl);
    setShowVenueDrop(false);
    setVenueResults([]);
    onUpdate({ venue: name, city: cityName, dist: distKm });
  };

  const handleVenueChange = (v) => {
    setVenueVal(v);
    setVenueAddress("");
    setVenueMapUrl("");
    onUpdate({ venue: v, city: cityQuery, dist: dist||0 });
    searchNominatim(v);
  };

  const filteredCities = cityQuery.length>0
    ? RO_CITIES.filter(c=>c.n.toLowerCase().includes(cityQuery.toLowerCase())).slice(0,6)
    : [];

  const pickCity = (c) => {
    setCityQuery(c.n);
    setShowCityDrop(false);
    onUpdate({ venue: venueVal, city: c.n, dist: c.km });
  };

  // Formatare adresă scurtă pentru dropdown (scoate România și codul poștal)
  const shortAddr = (displayName) => {
    return displayName.split(",").slice(1,4).join(",").replace(/\d{6}/g,"").replace("România","").replace("Romania","").trim().replace(/,\s*$/,"");
  };

  return (
    <div style={{gridColumn:"1/-1", display:"flex", flexDirection:"column", gap:10}}>
      <div style={{display:"grid", gridTemplateColumns:mob?"1fr":"1fr 1fr", gap:10}}>

        {/* Venue cu Nominatim autocomplete */}
        <div style={{position:"relative"}}>
          <label style={sty.l}>
            Locație / Venue
            {searching && <span style={{color:"#fbbf24",fontSize:10,marginLeft:6}}>● caută...</span>}
          </label>
          <input
            value={venueVal}
            onChange={e=>handleVenueChange(e.target.value)}
            onBlur={()=>setTimeout(()=>setShowVenueDrop(false),200)}
            onFocus={()=>venueResults.length>0 && setShowVenueDrop(true)}
            style={iStyle}
            placeholder="🔍  Scrie numele locației..."
            autoComplete="off"
          />
          {showVenueDrop && venueResults.length>0 && (
            <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:1000,background:th.c,border:`1px solid ${th.b}`,borderRadius:10,boxShadow:"0 8px 28px rgba(0,0,0,.3)",marginTop:3,overflow:"hidden"}}>
              {venueResults.map((place,i)=>{
                const name = place.display_name.split(",")[0].trim();
                const sub = shortAddr(place.display_name);
                return (
                  <div key={place.place_id} onClick={()=>pickVenue(place)}
                    style={{padding:"10px 14px",cursor:"pointer",borderBottom:i<venueResults.length-1?`1px solid ${th.bl}`:"none"}}
                    onMouseOver={e=>e.currentTarget.style.background=th.h}
                    onMouseOut={e=>e.currentTarget.style.background="transparent"}>
                    <div style={{fontWeight:600,fontSize:13,color:th.t}}>{name}</div>
                    {sub && <div style={{fontSize:11,color:th.tm,marginTop:2}}>{sub}</div>}
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* Oraș cu autocomplete offline */}
        <div style={{position:"relative"}}>
          <label style={sty.l}>
            Oraș {dist>0 && <span style={{color:"#22c55e",fontWeight:700,marginLeft:6}}>🚗 {dist} km de TM</span>}
          </label>
          <input
            value={cityQuery}
            onChange={e=>{setCityQuery(e.target.value);setShowCityDrop(true);onUpdate({venue:venueVal,city:e.target.value,dist:0});}}
            onFocus={()=>setShowCityDrop(true)}
            onBlur={()=>setTimeout(()=>setShowCityDrop(false),150)}
            style={iStyle}
            placeholder="Caută oraș..."
          />
          {showCityDrop && filteredCities.length>0 && (
            <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:999,background:th.c,border:`1px solid ${th.b}`,borderRadius:8,boxShadow:"0 8px 24px rgba(0,0,0,.2)",marginTop:2,overflow:"hidden"}}>
              {filteredCities.map((c,i)=>(
                <div key={c.n} onClick={()=>pickCity(c)}
                  style={{padding:"9px 14px",cursor:"pointer",borderBottom:i<filteredCities.length-1?`1px solid ${th.bl}`:"none",display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:13}}
                  onMouseOver={e=>e.currentTarget.style.background=th.h}
                  onMouseOut={e=>e.currentTarget.style.background="transparent"}>
                  <span style={{fontWeight:500,color:th.t}}>{c.n}</span>
                  <span style={{fontSize:10,color:c.km===0?"#22c55e":th.tm,fontWeight:c.km<50?600:400}}>{c.km===0?"local":c.km+" km"}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Adresă completă + link hartă (apare după selecție) */}
      {venueAddress && (
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:th.ab||"rgba(251,191,36,.06)",borderRadius:8,border:`1px solid ${th.bl}`}}>
          <span style={{fontSize:11,color:th.tm,flex:1,lineHeight:1.5}}>📍 {venueAddress}</span>
          <a href={venueMapUrl} target="_blank" rel="noopener noreferrer"
            style={{fontSize:11,color:"#60a5fa",whiteSpace:"nowrap",fontWeight:600,textDecoration:"none",padding:"4px 10px",borderRadius:6,background:"rgba(96,165,250,.12)"}}>
            ↗ Hartă
          </a>
        </div>
      )}
    </div>
  );
}

        <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:12}}>Meniuri:</span><button type="button" onClick={()=>u("hosp",{...hosp,meniuri:Math.max(0,(hosp.meniuri||6)-1)})} style={{...sty.bg,padding:"4px 10px"}}>−</button><span style={{fontSize:14,fontWeight:700,minWidth:24,textAlign:"center"}}>{hosp.meniuri??6}</span><button type="button" onClick={()=>u("hosp",{...hosp,meniuri:(hosp.meniuri||6)+1})} style={{...sty.bg,padding:"4px 10px"}}>+</button></div>
      </> : <div style={{fontSize:12,color:th.ts}}>{[((hosp.camere||0)>0?`${hosp.camere} camere`:null),((hosp.meniuri||0)>0?`${hosp.meniuri} meniuri`:null)].filter(Boolean).join(" · ")||"—"}</div>}

        {editable ? <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {(ev.repDurs&&ev.repDurs.length>0 ? ev.repDurs : Array(ev.rep||1).fill(ev.repDur||45)).map((d,i)=>(

              <input type="number" value={d} onChange={e=>{const arr=[...(ev.repDurs||Array(ev.rep||1).fill(ev.repDur||45))];arr[i]=Number(e.target.value)||45;u("repDurs",arr);}} style={{...iStyle,width:60}} min={5} max={120}/>

        </div> : <div style={{padding:10,borderRadius:8,background:th.c,border:`1px solid ${th.b}`}}>

        </div>}
      </div>
    </div>
    {/* 6. Servicii — fără prețuri, cu ce aducem + nume furnizor */}
    {ev.svc&&Object.keys(ev.svc).some(k=>ev.svc[k])&&<div style={{padding:16,borderRadius:10,background:th.h,border:`1px solid ${th.b}`}}>

      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {["sunet","lumini","ecran","scena","dj"].filter(k=>ev.svc?.[k]).map(k=>(
          <div key={k} style={{padding:10,borderRadius:8,background:th.c,border:`1px solid ${th.b}`}}>
            <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>{SVC_LABELS[k]||k}</div>
            {editable ? <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <input value={svcInfo[k]?.ceAducem||""} onChange={e=>u("svcInfo",{...svcInfo,[k]:{...svcInfo[k],ceAducem:e.target.value}})} style={{...iStyle,fontSize:12}} placeholder="Ce aducem"/>
              <input value={svcInfo[k]?.furnizor||""} onChange={e=>u("svcInfo",{...svcInfo,[k]:{...svcInfo[k],furnizor:e.target.value}})} style={{...iStyle,fontSize:12}} placeholder="Nume furnizor"/>
            </div> : <div style={{fontSize:11,color:th.ts}}>{(svcInfo[k]?.ceAducem||"—")} {svcInfo[k]?.furnizor&&<span style={{color:th.tm}}>· Furnizor: {svcInfo[k].furnizor}</span>}</div>}
          </div>
        ))}
      </div>
    </div>}
    {/* 7. Alți participanți / furnizori externi — cântă altcineva, DJ extern, sunet/lumini etc. */}
    <div style={{padding:16,borderRadius:10,background:th.h,border:`1px solid ${th.b}`}}>
      <div style={{fontSize:10,color:th.tm,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Alți participanți / furnizori externi</div>
      <div style={{fontSize:11,color:th.ts,marginBottom:10}}>Cântă altcineva, DJ extern, sunet/lumini de la alții — descrieri, nume, telefoane</div>
      {editable ? <>
        <button type="button" onClick={()=>u("fisaExtraItems",[...(ev.fisaExtraItems||[]),{id:uid(),type:"canta_altcineva",desc:"",nume:"",tel:""}])} style={{...sty.bg,fontSize:11,padding:"6px 12px",marginBottom:10}}>+ Adaugă</button>
        {(ev.fisaExtraItems||[]).map((x,i)=>(
          <div key={x.id} style={{padding:12,borderRadius:8,background:th.c,border:`1px solid ${th.b}`,marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <select value={x.type||"canta_altcineva"} onChange={e=>{const arr=[...(ev.fisaExtraItems||[])];arr[i]={...arr[i],type:e.target.value};u("fisaExtraItems",arr);}} className="modernSel" style={{...iStyle,flex:1,maxWidth:280,paddingRight:28}}>
                {FISA_EXTRA_TYPES.map(t=><option key={t.k} value={t.k}>{t.l}</option>)}
              </select>
              <button type="button" onClick={()=>u("fisaExtraItems",(ev.fisaExtraItems||[]).filter((_,j)=>j!==i))} style={{padding:4,border:"none",background:"transparent",color:"#ef4444",cursor:"pointer",marginLeft:6}}>✕</button>
            </div>
            <textarea value={x.desc||""} onChange={e=>{const arr=[...(ev.fisaExtraItems||[])];arr[i]={...arr[i],desc:e.target.value};u("fisaExtraItems",arr);}} style={{...iStyle,minHeight:50,resize:"vertical",fontSize:12,marginBottom:6}} placeholder="Descriere"/>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <input value={x.nume||""} onChange={e=>{const arr=[...(ev.fisaExtraItems||[])];arr[i]={...arr[i],nume:e.target.value};u("fisaExtraItems",arr);}} style={{...iStyle,flex:1,minWidth:120}} placeholder="Nume"/>
              <input value={x.tel||""} onChange={e=>{const arr=[...(ev.fisaExtraItems||[])];arr[i]={...arr[i],tel:e.target.value};u("fisaExtraItems",arr);}} style={{...iStyle,width:140}} placeholder="Telefon (+40...)"/>
            </div>
          </div>
        ))}
        <label style={{...sty.l,fontSize:10,marginTop:12,display:"block"}}>Alte observații</label>
        <textarea value={ev.fisaExtra||""} onChange={e=>u("fisaExtra",e.target.value)} style={{...iStyle,minHeight:60,resize:"vertical",width:"100%"}} placeholder="Orice altceva relevant..."/>
      </> : <>
        {(ev.fisaExtraItems||[]).length>0 ? (ev.fisaExtraItems||[]).map((x,i)=>(
          <div key={x.id} style={{padding:10,borderRadius:8,background:th.c,border:`1px solid ${th.b}`,marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:600,color:th.a}}>{FISA_EXTRA_TYPES.find(t=>t.k===x.type)?.l||x.type}</div>

            {(x.nume||x.tel)&&<div style={{fontSize:11,color:th.tm,marginTop:4}}>{(x.nume||"—")} {x.tel&&<span>· 📞 {x.tel}</span>}</div>}
          </div>
        )) : <div style={{fontSize:12,color:th.tm}}>—</div>}
        {ev.fisaExtra&&<div style={{marginTop:10,padding:10,borderRadius:8,background:th.c,border:`1px solid ${th.b}`}}><div style={{fontSize:10,color:th.tm,marginBottom:4}}>Alte observații</div><div style={{fontSize:12,color:th.ts,whiteSpace:"pre-wrap"}}>{ev.fisaExtra}</div></div>}
      </>}
    </div>
  </div>;
}

// FEATURES — Event form, offer preview, contract, location search
// ═══════════════════════════════════════════════════════════════════════════════
function EventForm({ th, sty, isE, isP, mData, user, onSave, onClose, mob, templates, showToast }) {
  const cerereStart = !!mData?.cerereStart;
  const tplCovers = (templates?.playlist&&templates.playlist.length>0) ? templates.playlist : DEFAULT_COVERS;
  const tplVideos = (templates?.videos&&templates.videos.length>0) ? templates.videos : DEFAULT_VIDEOS;
  const [fm, setFm] = useState({
    cat: mData?.cat||"private",
    type: mData?.type||(isP?"Nuntă":"Festival"),
    st: mData?.st ?? (mData?.directEvent ? "confirmat" : (cerereStart ? "cerere" : "oferta")),
    directEvent: !mData?.id && !!mData?.directEvent,
    date: mData?.date||"",
    dateKind: (()=>{
      if (mData?.dateKind) return mData.dateKind;
      if (mData?.dateMonth && /^\d{4}-\d{2}$/.test(mData.dateMonth)) return "month";
      if (mData?.dateYear != null && mData.dateYear !== "") return "year";
      if ((mData?.dateOptions||[]).length) return "multi";
      if (mData?.id && !(mData?.date||"") && (mData?.dateNote||"").trim()) return "text";
      if (mData?.id && !(mData?.date||"")) return "none";
      return "day";
    })(),
    dateMonth: mData?.dateMonth || "",
    dateYear: mData?.dateYear !== undefined && mData?.dateYear !== null && mData.dateYear !== "" ? mData.dateYear : new Date().getFullYear(),
    dateNote: mData?.dateNote || "",
    dateOptions: (mData?.dateOptions && mData.dateOptions.length) ? [...mData.dateOptions] : [""],
    li: mData?.li||"", sc: mData?.sc||"", ss: mData?.ss||"", lo: mData?.lo||"",
    venue: mData?.venue||"", city: mData?.city||"", dist: mData?.dist||0, locPhone: mData?.locPhone||"", locAddress: mData?.locAddress||"",
    cn: mData?.cn||"", cp: mData?.cp||"", ce: mData?.ce||"",
    rep: mData?.rep||(isP?1:1),
    repDurs: mData?.repDurs||[],
    repStarts: mData?.repStarts||[],
    durataRecital: mData?.durataRecital||"",
    publicShowMinutes: mData?.publicShowMinutes ?? 45,
    responsabilPrincipal: mData?.responsabilPrincipal||(user?.memberId?MEMBERS.find(m=>m.id===user.memberId)?.n||user.n:""),
    responsabili: mData?.responsabili||[],
    fee: mData?.fee||(isP?PX.r[1]:PX.pub),
    valuta: mData?.valuta||"EUR",
    dep: (()=>{const tot=(mData?.fee||PX.r[1])+(isP?Object.entries(mData?.svcp||{}).reduce((s,[k,v])=>s+(mData?.svc?.[k]?v:0),0):0);return mData?.dep??Math.round(tot*0.1/10)*10;})(), dp: mData?.dp||false, zileRest: mData?.zileRest??5,
    sp: mData?.sp||{}, svc: mData?.svc||{}, svcp: mData?.svcp||{sunet:templates?.servicePrices?.sunet??350,lumini:templates?.servicePrices?.lumini??500,ecran:templates?.servicePrices?.ecran??600,scena:templates?.servicePrices?.scena??300,dj:templates?.servicePrices?.dj??600},
    ex: (()=>{const existing=mData?.ex||[];const oficiu=[{id:"ex_tehnicii",n:"Tehnicii",a:200,v:"Oficiu"},{id:"ex_backline",n:"Backline",a:250,v:"Oficiu"},{id:"ex_transport",n:"Transport",a:10,v:"Oficiu"}];const others=existing.filter(x=>!/tehnic/i.test(x.n||"")&&!/backline/i.test(x.n||"")&&!/transport/i.test(x.n||""));return[...oficiu,...others];})(), ven: mData?.ven||[], notes: mData?.notes||"", fisaExtra: mData?.fisaExtra||"", fisaExtraItems: mData?.fisaExtraItems||[], svcInfo: mData?.svcInfo||{},
    impozitVenit: mData?.impozitVenit??1, plataAvansFirma: mData?.plataAvansFirma ?? (mData?.plataDirect===false), plataRestFirma: mData?.plataRestFirma ?? (mData?.plataDirect===false), sumaAvansLei: mData?.sumaAvansLei??0, sumaRestLei: mData?.sumaRestLei??0, modalitatePlataAvans: mData?.modalitatePlataAvans||"", modalitatePlataRest: mData?.modalitatePlataRest||"", dividende: mData?.dividende??16, cuFond: mData?.cuFond??true, fondPct: mData?.fondPct??10, fondPct2: mData?.fondPct2??10,
    videos: mData?.videos||tplVideos, covers: mData?.covers||(tplCovers.map(c=>({...c,checked:true}))),
    desc: mData?.desc||"",
    poveste: mData?.poveste||"",
    customSvc: mData?.customSvc||[],
    hosp: (mData?.hosp && !Array.isArray(mData.hosp)) ? {camere:0,meniuri:6,micDejun:false,pranz:false,extra:[],protocolOverride:"",...mData.hosp,extra:mData.hosp.extra||[],protocolOverride:mData.hosp.protocolOverride||""} : {
      camere: 0, meniuri: 6, micDejun: false, pranz: false, extra: [], protocolOverride: "",
    },
    includeTehnicAnnex: mData?.includeTehnicAnnex||false,
    tehnic: mData?.tehnic||[
      {id:"t1",l:"Sistem de sunet profesional dimensionat corespunzător spațiului",checked:true},
      {id:"t2",l:"Inginer de sistem (sound engineer) la FOH",checked:true},
      {id:"t3",l:"5 monitoare pe scenă (conform plan amplasament)",checked:true},
      {id:"t4",l:"Sistem de lumini profesional + luminist",checked:true},
      {id:"t5",l:"1 cablu UTP (CAT5/CAT6) de la scenă la FOH",checked:true},
      {id:"t6",l:"1 riser mobil 3×2×0.40m (pentru tobe)",checked:true},
      {id:"t7",l:"2 stative microfon tip boom",checked:true},
      {id:"t8",l:"Probe de sunet: 60 min amplasare + 60 min soundcheck",checked:true},
      {id:"t9",l:"2 persoane ajutor la descărcat/încărcat echipamente",checked:true},
      {id:"t10",l:"Loc parcare microbuz în apropierea scenei (de la soundcheck până după concert)",checked:true},
      {id:"t11",l:"Securitate echipamente pe toată durata evenimentului",checked:true},
      {id:"t12",l:"Spațiu depozitare case-uri și huse lângă scenă",checked:true},
      {id:"t13",l:"Sistem video (ecran LED / videoproiector) — logo disponibil pe phaser.ro",checked:false},
    ],
  });
  const [secTab, setSecTab] = useState("detalii");
  const [playlistSearch, setPlaylistSearch] = useState("");
  const u = (k,v) => setFm(p=>({...p,[k]:v}));
  const svcT = isP ? Object.entries(fm.svcp).reduce((s,[k,v])=>s+(fm.svc[k]?v:0),0) : 0;
  const iStyle = {...sty.i, fontSize: mob?"16px":"14px"};

  const packDateForSave = () => {
    const k = fm.dateKind || "day";
    if (k === "day") return { dateKind: "day", date: fm.date || "", dateMonth: null, dateYear: null, dateNote: "", dateOptions: null };
    if (k === "month") return { dateKind: "month", date: "", dateMonth: fm.dateMonth || "", dateYear: null, dateNote: "", dateOptions: null };
    if (k === "year") return { dateKind: "year", date: "", dateMonth: null, dateYear: fm.dateYear === "" || fm.dateYear == null ? null : Number(fm.dateYear), dateNote: "", dateOptions: null };
    if (k === "multi") {
      const opts = (fm.dateOptions || []).map(s => String(s || "").trim()).filter(d => /^\d{4}-\d{2}-\d{2}$/.test(d));
      return { dateKind: "multi", date: "", dateMonth: null, dateYear: null, dateNote: "", dateOptions: opts.length ? opts : null };
    }
    if (k === "text") return { dateKind: "text", date: "", dateMonth: null, dateYear: null, dateNote: (fm.dateNote || "").trim(), dateOptions: null };
    return { dateKind: "none", date: "", dateMonth: null, dateYear: null, dateNote: (fm.dateNote || "").trim(), dateOptions: null };
  };
  const submitForm = (extra = {}) => {
    const k = fm.dateKind || "day";
    if (k === "multi") {
      const ok = (fm.dateOptions || []).some(s => /^\d{4}-\d{2}-\d{2}$/.test(String(s || "").trim()));
      if (!ok) { showToast?.("Adaugă cel puțin o dată completă (AAAA-LL-ZZ) sau alege alt mod.", "error"); return; }
    }
    if (k === "month" && !(fm.dateMonth && /^\d{4}-\d{2}$/.test(fm.dateMonth))) { showToast?.("Alege luna și anul.", "error"); return; }
    const title = fm.cn ? (isP ? `${fm.type} ${fm.cn}` : `${fm.type} - ${fm.cn}`) : "Eveniment nou";
    const dp = packDateForSave();
    onSave({ ...fm, ...dp, title, ...extra });
  };

  const showTehnicTab = !isP || ["Corporate","Private Party","Altele"].includes(fm.type);
  const baseTabs = isP ? (showTehnicTab ? ["detalii","client","servicii","ospitalitate","tehnic","media","playlist","note"] : ["detalii","client","servicii","ospitalitate","media","playlist","note"]) : ["detalii","client","note"];
  const editTabs = isP ? ["detalii","client","servicii","ospitalitate","tehnic","timing","cheltuieli","membri","furnizori","media","playlist","note"]
                       : ["detalii","client","timing","cheltuieli","membri","furnizori","note"];
  const tabs = isE ? editTabs : baseTabs;

  return (
    <div style={{position:"fixed",inset:0,background:th.ov,zIndex:1000}} onClick={onClose}>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",background:mob?th.c:"transparent",alignItems:mob?"stretch":"center",justifyContent:mob?"stretch":"center"}} onClick={e=>e.stopPropagation()}>
        <div style={{background:th.c,border:mob?"none":`1px solid ${th.b}`,borderRadius:mob?0:14,width:mob?"100%":660,maxHeight:mob?"none":"88vh",flex:mob?1:"none",display:"flex",flexDirection:"column",margin:mob?0:"auto",overflow:"hidden"}}>
          
          {/* Header */}
          <div style={{padding:"14px 20px",borderBottom:`1px solid ${th.b}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,background:th.sb}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:14,fontWeight:600,color:"rgba(255,255,255,.9)"}}>{isE?"Editează":cerereStart?"Cerere nouă":fm.directEvent?"Eveniment nou":"Ofertă nouă"} {isP?"(Privat / ZGV)":"(Public / PHASER)"}</span>
            </div>
            <button onClick={onClose} style={{padding:mob?12:3,minWidth:mob?44:undefined,minHeight:mob?44:undefined,border:"none",background:"transparent",color:"rgba(255,255,255,.5)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><IcX s={16}/></button>
          </div>

          {/* Tab bar */}
          <div style={{display:"flex",gap:1,padding:mob?"8px 16px":"8px 20px",borderBottom:`1px solid ${th.b}`,overflowX:"auto",flexShrink:0,WebkitOverflowScrolling:"touch"}}>
            {tabs.map(t=><button key={t} onClick={()=>setSecTab(t)} style={{padding:mob?"8px 12px":"4px 10px",borderRadius:5,border:"none",fontSize:11,fontWeight:secTab===t?700:400,cursor:"pointer",background:secTab===t?th.ab:"transparent",color:secTab===t?th.t:th.tm,textTransform:"capitalize",whiteSpace:"nowrap",flexShrink:0}}>{t}</button>)}
          </div>

          <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>

            {secTab==="detalii"&&<div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:12}}>
              <div style={{gridColumn:"1/-1"}}><label style={sty.l}>Persoana care a preluat oferta</label><input value={fm.responsabilPrincipal||""} onChange={e=>u("responsabilPrincipal",e.target.value)} style={iStyle} placeholder="Numele persoanei care gestionează oferta"/></div>
              <div style={{gridColumn:"1/-1"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <label style={sty.l}>Echipă / Persoane implicate (nume + rol)</label>
                  <button onClick={()=>u("responsabili",[...(fm.responsabili||[]),{id:uid(),nume:"",rol:""}])} style={{...sty.bg,fontSize:10,padding:"3px 8px"}}><IcPlus s={11}/> Adaugă</button>
                </div>

              {(fm.fisaExtraItems||[]).map((x,i)=>(
                <div key={x.id} style={{padding:12,borderRadius:8,background:th.h,border:`1px solid ${th.b}`,marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <select value={x.type||"canta_altcineva"} onChange={e=>{const arr=[...(fm.fisaExtraItems||[])];arr[i]={...arr[i],type:e.target.value};u("fisaExtraItems",arr);}} className="modernSel" style={{...iStyle,flex:1,maxWidth:280,paddingRight:28}}>
                      {FISA_EXTRA_TYPES.map(t=><option key={t.k} value={t.k}>{t.l}</option>)}
                    </select>
                    <button onClick={()=>u("fisaExtraItems",(fm.fisaExtraItems||[]).filter((_,j)=>j!==i))} style={{padding:4,border:"none",background:"transparent",color:"#ef4444",cursor:"pointer",marginLeft:6}}>✕</button>
                  </div>
                  <textarea value={x.desc||""} onChange={e=>{const arr=[...(fm.fisaExtraItems||[])];arr[i]={...arr[i],desc:e.target.value};u("fisaExtraItems",arr);}} style={{...iStyle,minHeight:50,resize:"vertical",fontSize:12,marginBottom:6}} placeholder="Descriere"/>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <input value={x.nume||""} onChange={e=>{const arr=[...(fm.fisaExtraItems||[])];arr[i]={...arr[i],nume:e.target.value};u("fisaExtraItems",arr);}} style={{...iStyle,flex:1,minWidth:120}} placeholder="Nume"/>
                    <input value={x.tel||""} onChange={e=>{const arr=[...(fm.fisaExtraItems||[])];arr[i]={...arr[i],tel:e.target.value};u("fisaExtraItems",arr);}} style={{...iStyle,width:140}} placeholder="Telefon (+40...)"/>
                  </div>
                </div>
              ))}
              <label style={{...sty.l,marginTop:12}}>Alte observații</label>
              <textarea value={fm.fisaExtra||""} onChange={e=>u("fisaExtra",e.target.value)} style={{...iStyle,minHeight:60,resize:"vertical"}} placeholder="Orice altceva relevant..."/>
            </div>}

          </div>

          <div style={{padding:"12px 20px",borderTop:`1px solid ${th.b}`,display:"flex",justifyContent:"space-between",alignItems:"center",gap:6,flexShrink:0,flexWrap:"wrap"}}>
            <button onClick={onClose} style={sty.bg}>Anulează</button>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {!isE&&!fm.directEvent&&!cerereStart&&<button onClick={()=>submitForm({ asCerere:true })} style={{...sty.bg,color:"#64748b",borderColor:"#94a3b8",fontSize:12}} title="Salvează ca cerere — fără ofertă trimisă">📞 Cerere</button>}
              <button onClick={()=>{
                if (isE) submitForm();
                else submitForm(cerereStart ? { asCerere:true } : {});
              }} style={sty.b}>
                {isE?"Salvează":fm.directEvent?"Creează eveniment":cerereStart?"Creează cerere":"Creează ofertă"}
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function buildAIContext(evs, tasks) {
  var confirmed = evs.filter(function(e){return e.st==="confirmat";});
  var pending   = evs.filter(function(e){return e.st==="asteptare";});
  var totalRev  = confirmed.reduce(function(s,e){return s+(e.fee||0);},0);
  var upcoming  = evs.filter(function(e){return evPeriodEndMs(e)>=new Date(new Date().setHours(0,0,0,0));}).sort(function(a,b){return evSortKey(a)-evSortKey(b);}).slice(0,5).map(function(e){return "  - "+fEvDate(e)+" | "+(e.cn||e.title||"—")+" | "+(e.type||"")+" | "+e.st+" | "+(e.fee||0)+" RON";}).join("\n")||"  (niciun eveniment viitor)";
  var activeTasks = tasks.filter(function(t){return !t.done;}).slice(0,8).map(function(t){return "  - ["+(t.priority||"medium")+"] "+t.text;}).join("\n")||"  (niciun task activ)";
  return "Esti un asistent AI in Phaser Manager.\n\nDATE LIVE:\nEvenimente: "+evs.length+" (confirmate: "+confirmed.length+", asteptare: "+pending.length+")\nVenit: "+totalRev+" RON\nTasks: "+tasks.filter(function(t){return !t.done;}).length+"\n\nEVENIMENTE VIITOARE:\n"+upcoming+"\n\nTASKS ACTIVE:\n"+activeTasks+"\n\nRaspunde in romana. Fii concis si util.";
}

function processLocalCmd(input, evs, tasks) {
  var cmd = input.trim();
  var norm = function(s){ return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); };
  var nc = norm(cmd);
  var cur = new Date(); cur.setHours(0,0,0,0);
  var fmtE = function(e){ return "• O"+(e.offerNr||"?")+" · "+(e.type||"—")+(e.cn?" | "+(e.cn):"")+" | "+fEvDate(e)+" | "+(e.fee||0).toLocaleString("ro-RO")+" € ["+(e.st||"—")+"]"; };
  var PX = {r:{3:4100,2:3100,1:2350},sunet:350,lumini:500,ecran:600,scena:300,dj:600,pub:2000};
  var ST_LABEL = {oferta:"Ofertă",asteptare:"Așt. contract",plata_avans:"Plată avans",confirmat:"Confirmat",respins:"Respins"};
  var MEMBERS = [{id:"m1",n:"Carina Dumitru",r:"Vocal"},{id:"m2",n:"Radu Racz",r:"Bass"},{id:"m3",n:"Lucian Oprișan",r:"Clape"},{id:"m4",n:"Arnold Birta",r:"Tobe"},{id:"m5",n:"Sebastian Bârzeianu",r:"Chitară"}];

  // ── helpers ──
  var evByNr = function(nr){ return evs.find(function(e){return String(e.offerNr)===String(nr);}); };
  var getOfferNr = function(){ var m=nc.match(/o(\d+)/); return m?m[1]:null; };
  var svcTot = function(e){ var p=e.svcp||PX; var t=0; ["sunet","lumini","ecran","scena","dj"].forEach(function(k){if(e.svc&&e.svc[k])t+=p[k]||0;}); return t; };
  var evTot = function(e){ return (e.fee||0)+svcTot(e); };

  // ══════════════════════════════════════════════
  // 1. RAPORT FINANCIAR
  // ══════════════════════════════════════════════
  if(nc.match(/raport|financiar|incasat|bani total|situatie financiara/)) {
    var conf=evs.filter(function(e){return e.st==="confirmat";}),
        oferta=evs.filter(function(e){return e.st==="oferta";}),
        ast=evs.filter(function(e){return e.st==="asteptare";}),
        plata=evs.filter(function(e){return e.st==="plata_avans";}),
        resp=evs.filter(function(e){return e.st==="respins";});
    var tC=conf.reduce(function(s,e){return s+evTot(e);},0),
        tO=oferta.reduce(function(s,e){return s+(e.fee||0);},0),
        tA=ast.reduce(function(s,e){return s+(e.fee||0);},0),
        tP=plata.reduce(function(s,e){return s+(e.fee||0);},0),
        pipe=tO+tA+tP;
    return "📊 RAPORT FINANCIAR\n\n✅ Confirmate: "+conf.length+" → "+tC.toLocaleString("ro-RO")+" €\n🟣 Așt. contract: "+ast.length+" → "+tA.toLocaleString("ro-RO")+" €\n🔵 Plată avans: "+plata.length+" → "+tP.toLocaleString("ro-RO")+" €\n🟡 În ofertă: "+oferta.length+" → "+tO.toLocaleString("ro-RO")+" €\n🔴 Respinse: "+resp.length+"\n\n💰 Pipeline activ: "+pipe.toLocaleString("ro-RO")+" €\n📁 Total oferte: "+evs.length;
  }

  // ══════════════════════════════════════════════
  // 2. VENITURI (doar confirmate)
  // ══════════════════════════════════════════════
  if(nc.match(/venit|incasat|confirmat[e]? total|cat am facut/)) {
    var c=evs.filter(function(e){return e.st==="confirmat";});
    var tot=c.reduce(function(s,e){return s+evTot(e);},0);
    var avTotal=c.reduce(function(s,e){return s+(e.dp?e.dep||0:0);},0);
    return "💰 VENITURI CONFIRMATE\n\nEvenimente confirmate: "+c.length+"\nTotal valoare: "+tot.toLocaleString("ro-RO")+" €\nAvansuri încasate: "+avTotal.toLocaleString("ro-RO")+" €\nRest de încasat: "+(tot-avTotal).toLocaleString("ro-RO")+" €";
  }

  // ══════════════════════════════════════════════
  // 3. PIPELINE
  // ══════════════════════════════════════════════
  if(nc.match(/pipeline|potential|in asteptare|in oferta|neconfirmat/)) {
    var pp=evs.filter(function(e){return ["oferta","asteptare","plata_avans"].indexOf(e.st)>-1;});
    var tpp=pp.reduce(function(s,e){return s+(e.fee||0);},0);
    return "🔄 PIPELINE ACTIV ("+pp.length+" oferte)\n\nValoare totală: "+tpp.toLocaleString("ro-RO")+" €\n\n"+pp.map(fmtE).join("\n");
  }

  // ══════════════════════════════════════════════
  // 4. STATISTICI
  // ══════════════════════════════════════════════
  if(nc.match(/statistici|stat |breakdown|distributie|structura/)) {
    var types={}, stati={};
    evs.forEach(function(e){ types[e.type||"—"]=(types[e.type||"—"]||0)+1; stati[e.st||"—"]=(stati[e.st||"—"]||0)+1; });
    var curMs=cur.getTime();
    var viit=evs.filter(function(e){return evPeriodEndMs(e)>=curMs;}).length;
    var trec=evs.filter(function(e){return evPeriodEndMs(e)<curMs;}).length;
    var byType=Object.entries(types).sort(function(a,b){return b[1]-a[1];}).map(function(x){return "  "+x[0]+": "+x[1];}).join("\n");
    var bySt=Object.entries(stati).map(function(x){return "  "+(ST_LABEL[x[0]]||x[0])+": "+x[1];}).join("\n");
    return "📈 STATISTICI\n\nDupă tip:\n"+byType+"\n\nDupă status:\n"+bySt+"\n\n📅 Viitoare: "+viit+" | Trecute: "+trec+" | Total: "+evs.length;
  }

  // ══════════════════════════════════════════════
  // 5. NUNȚI
  // ══════════════════════════════════════════════
  if(nc.match(/nunt[ăa]|nunti/)) {
    var nn=evs.filter(function(e){return norm(e.type||"").includes("nunt");});
    if(nn.length===0) return "Nicio nuntă găsită.";
    var t=nn.reduce(function(s,e){return s+(e.fee||0);},0);
    return "💍 NUNȚI ("+nn.length+")\n\n"+nn.map(fmtE).join("\n")+"\n\nTotal valoare: "+t.toLocaleString("ro-RO")+" €";
  }

  // ══════════════════════════════════════════════
  // 6. FESTIVALURI
  // ══════════════════════════════════════════════
  if(nc.match(/festival/)) {
    var ff=evs.filter(function(e){return norm(e.type||"").includes("festival");});
    if(ff.length===0) return "Niciun festival găsit.";
    return "🎪 FESTIVALURI ("+ff.length+")\n\n"+ff.map(fmtE).join("\n");
  }

  // ══════════════════════════════════════════════
  // 7. CORPORATE
  // ══════════════════════════════════════════════
  if(nc.match(/corporate|corporat/)) {
    var cc=evs.filter(function(e){return norm(e.type||"").includes("corporate");});
    if(cc.length===0) return "Niciun eveniment corporate găsit.";
    return "🏢 CORPORATE ("+cc.length+")\n\n"+cc.map(fmtE).join("\n");
  }

  // ══════════════════════════════════════════════
  // 8. CONFIRMATE
  // ══════════════════════════════════════════════
  if(nc.match(/confirm[ae]t[e]?(?! total)|doar confirm/)) {
    var ev_c=evs.filter(function(e){return e.st==="confirmat";});
    if(ev_c.length===0) return "Niciun eveniment confirmat.";
    return "✅ CONFIRMATE ("+ev_c.length+")\n\n"+ev_c.map(fmtE).join("\n");
  }

  // ══════════════════════════════════════════════
  // 9. RESPINSE
  // ══════════════════════════════════════════════
  if(nc.match(/respins[e]?|pierdut[e]?|refuzat[e]?/)) {
    var ev_r=evs.filter(function(e){return e.st==="respins";});
    if(ev_r.length===0) return "Nicio ofertă respinsă.";
    var lost=ev_r.reduce(function(s,e){return s+(e.fee||0);},0);
    return "🔴 RESPINSE ("+ev_r.length+")\n\n"+ev_r.map(fmtE).join("\n")+"\n\nValoare pierdută: "+lost.toLocaleString("ro-RO")+" €";
  }

  // ══════════════════════════════════════════════
  // 10. URMĂTOARELE EVENIMENTE
  // ══════════════════════════════════════════════
  if(nc.match(/urmat[oă]|urmeaz[aă]|agenda|programul|viitoare|urma/)) {
    var nxt=evs.filter(function(e){return evPeriodEndMs(e)>=cur;}).sort(function(a,b){return evSortKey(a)-evSortKey(b);}).slice(0,8);
    if(nxt.length===0) return "📅 Niciun eveniment viitor.";
    return "📅 URMĂTOARELE EVENIMENTE:\n\n"+nxt.map(function(e,i){var dd=evExactDayCountdown(e);var dayPart=dd!=null?" (în "+dd+"z)":""; return (i+1)+". "+fEvDate(e)+dayPart+" | O"+(e.offerNr||"?")+" · "+(e.type||"—")+(e.cn?" | "+e.cn:"")+" | "+(e.fee||0).toLocaleString("ro-RO")+" € ["+(ST_LABEL[e.st]||e.st)+"]";}).join("\n");
  }

  // ══════════════════════════════════════════════
  // 11. DETALII OFERTĂ SPECIFICĂ (ex: "oferta O5" sau "o5")
  // ══════════════════════════════════════════════
  if(nc.match(/\bo\d+\b|oferta\s+\d+|detalii\s+o/)) {
    var nr=getOfferNr(); if(!nr) return "Specifică numărul ofertei. Ex: O5";
    var ev=evByNr(nr); if(!ev) return "Oferta O"+nr+" nu există.";
    var svcs=[]; ["sunet","lumini","ecran","scena","dj"].forEach(function(k){if(ev.svc&&ev.svc[k])svcs.push(k);});
    var tot=evTot(ev); var av=ev.dep||0; var rest=tot-av;
    return "📋 OFERTA O"+nr+"\n\nTip: "+(ev.type||"—")+" ("+(ev.cat==="private"?"Privat":"Public")+")\nClient: "+(ev.cn||"—")+"\nData: "+fEvDate(ev)+"\nLocație: "+(ev.venue||"—")+(ev.city?", "+ev.city:"")+"\nStatus: "+(ST_LABEL[ev.st]||ev.st)+"\n\nTarif: "+(ev.fee||0).toLocaleString("ro-RO")+" €"+(svcs.length>0?"\nServicii: "+svcs.join(", ")+" (+"+svcTot(ev).toLocaleString("ro-RO")+" €)":"")+"\nTotal: "+tot.toLocaleString("ro-RO")+" €\nAvans: "+av.toLocaleString("ro-RO")+" € ("+(ev.dp?"✅ plătit":"⏳ nepreluat")+")\nRest: "+rest.toLocaleString("ro-RO")+" €"+(ev.rep?"\nReprezentații: "+ev.rep+"×"+(ev.repDur||45)+" min":"");
  }

  // ══════════════════════════════════════════════
  // 12. AVANSURI (ce avansuri sunt de luat)
  // ══════════════════════════════════════════════
  if(nc.match(/avans|depozit|deposit/)) {
    var pending=evs.filter(function(e){return !e.dp&&["confirmat","plata_avans","asteptare"].indexOf(e.st)>-1&&(e.dep||0)>0;});
    if(pending.length===0) return "✅ Toate avansurile sunt încasate!";
    var total=pending.reduce(function(s,e){return s+(e.dep||0);},0);
    return "💳 AVANSURI DE ÎNCASAT ("+pending.length+")\n\n"+pending.map(function(e){return "• O"+(e.offerNr||"?")+" · "+(e.type||"—")+(e.cn?" | "+e.cn:"")+" → "+(e.dep||0).toLocaleString("ro-RO")+" €";}).join("\n")+"\n\nTotal de încasat: "+total.toLocaleString("ro-RO")+" €";
  }

  // ══════════════════════════════════════════════
  // 13. PREȚURI / TARIFE
  // ══════════════════════════════════════════════
  if(nc.match(/pret|pret[u]?ri|tarif|cat cost[aă]|cat e/)) {
    // "pret nunta 2" → preț nuntă 2 reprize
    var mPret=nc.match(/(\d)/);
    if(mPret&&nc.match(/nunt|priv|botez|party|corp/)) {
      var sets=parseInt(mPret[1]); if(sets<1||sets>3)sets=2;
      var p=PX.r[sets]||PX.r[2];
      return "💰 Preț "+(sets)+" reprize: "+p.toLocaleString("ro-RO")+" €\nAvans (10%): "+(Math.round(p*0.1/10)*10).toLocaleString("ro-RO")+" €\nRest: "+(p-Math.round(p*0.1/10)*10).toLocaleString("ro-RO")+" €";
    }
    return "💰 LISTA PREȚURI\n\nNuntă/Privat:\n  1 repriză (45 min): "+PX.r[1].toLocaleString("ro-RO")+" €\n  2 reprize (90 min): "+PX.r[2].toLocaleString("ro-RO")+" €\n  3 reprize (135 min): "+PX.r[3].toLocaleString("ro-RO")+" €\n\nPublic (festival/concert): "+PX.pub.toLocaleString("ro-RO")+" €\n\nServicii extra:\n  Sunet: "+PX.sunet+" €\n  Lumini: "+PX.lumini+" €\n  Ecran LED: "+PX.ecran+" €\n  Scenă: "+PX.scena+" €\n  DJ: "+PX.dj+" €";
  }

  // ══════════════════════════════════════════════
  // 14. MEMBRI TRUPĂ
  // ══════════════════════════════════════════════
  if(nc.match(/membr[iu]|trupa|componenta|cine canta|band/)) {
    return "🎸 TRUPA PHASER\n\n"+MEMBERS.map(function(m){return "• "+m.n+" — "+m.r;}).join("\n");
  }

  // ══════════════════════════════════════════════
  // 15. SPLIT MEMBRI PE OFERTĂ
  // ══════════════════════════════════════════════
  if(nc.match(/split|impartit|impartire|cat primeste|platit membr/)) {
    var nr2=getOfferNr();
    if(!nr2){ // arată toate ofertele cu split
      var cu_split=evs.filter(function(e){return e.sp&&Object.keys(e.sp).length>0;});
      if(cu_split.length===0) return "Nicio ofertă nu are split configurat.";
      return "Split configurat pe: "+cu_split.map(function(e){return "O"+(e.offerNr||"?");}).join(", ");
    }
    var ev2=evByNr(nr2); if(!ev2) return "Oferta O"+nr2+" nu există.";
    if(!ev2.sp||Object.keys(ev2.sp).length===0) return "Oferta O"+nr2+" nu are split configurat.";
    var lines=MEMBERS.map(function(m){ var v=ev2.sp[m.id]||0; return v>0?"  "+m.n+": "+v.toLocaleString("ro-RO")+" €":null; }).filter(Boolean);
    return "💸 SPLIT O"+nr2+":\n\n"+lines.join("\n");
  }

  // ══════════════════════════════════════════════
  // 16. TASKURI
  // ══════════════════════════════════════════════
  if(nc.match(/task|taskuri|de facut|todo|sarcin/)) {
    var active=tasks.filter(function(t){return !t.done;});
    if(active.length===0) return "✅ Niciun task activ!";
    var byPrio={high:[],medium:[],low:[]};
    active.forEach(function(t){(byPrio[t.priority||"medium"]).push(t);});
    var out="📋 TASKURI ACTIVE ("+active.length+"):\n";
    if(byPrio.high.length) out+="\n🔴 Urgente ("+byPrio.high.length+"):\n"+byPrio.high.map(function(t){return "  • "+t.text+(t.due?" ["+t.due+"]":"");}).join("\n");
    if(byPrio.medium.length) out+="\n🟡 Normale ("+byPrio.medium.length+"):\n"+byPrio.medium.map(function(t){return "  • "+t.text+(t.due?" ["+t.due+"]":"");}).join("\n");
    if(byPrio.low.length) out+="\n🟢 Low ("+byPrio.low.length+"):\n"+byPrio.low.map(function(t){return "  • "+t.text;}).join("\n");
    return out;
  }

  // ══════════════════════════════════════════════
  // 17. TASKURI URGENTE
  // ══════════════════════════════════════════════
  if(nc.match(/urgent|prioritar|important|foc/)) {
    var urg=tasks.filter(function(t){return !t.done&&t.priority==="high";});
    if(urg.length===0) return "✅ Niciun task urgent!";
    return "🔴 TASKURI URGENTE ("+urg.length+"):\n\n"+urg.map(function(t){return "• "+t.text+(t.due?" → "+t.due:"");}).join("\n");
  }

  // ══════════════════════════════════════════════
  // 18. LUNA / LUNĂ SPECIFICĂ
  // ══════════════════════════════════════════════
  if(nc.match(/luna|lun[aă]|in (ian|feb|mar|apr|mai|iun|iul|aug|sep|oct|nov|dec)/)) {
    var MONTHS={ian:0,feb:1,mar:2,apr:3,mai:4,iun:5,iul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
    var mMatch=nc.match(/(ian|feb|mar|apr|mai|iun|iul|aug|sep|oct|nov|dec)/);
    var targetM=mMatch?MONTHS[mMatch[1]]:cur.getMonth();
    var yr=cur.getFullYear(); var mName=mMatch?mMatch[1]:"luna curentă";
    var moStart=new Date(yr,targetM,1).getTime(); var moEnd=new Date(yr,targetM+1,0,23,59,59).getTime();
    var evL=evs.filter(function(e){return evPeriodStartMs(e)<=moEnd&&evPeriodEndMs(e)>=moStart;});
    if(evL.length===0) return "📅 Niciun eveniment în "+mName+" "+yr+".";
    var tL=evL.reduce(function(s,e){return s+(e.fee||0);},0);
    return "📅 EVENIMENTE ÎN "+mName.toUpperCase()+" "+yr+" ("+evL.length+"):\n\n"+evL.map(fmtE).join("\n")+"\n\nTotal: "+tL.toLocaleString("ro-RO")+" €";
  }

  // ══════════════════════════════════════════════
  // 19. CĂUTARE
  // ══════════════════════════════════════════════
  if(nc.match(/caut[aă]|gasest[e]|gasesc|arata|g[aă]sest/)) {
    var q=cmd.replace(/caut[aă]|gasest[e]|arata/gi,"").trim();
    if(!q) return "Ce să caut? Ex: \"cauta Maria\" sau \"cauta Timisoara\"";
    var nq=norm(q);
    var res=evs.filter(function(e){ return norm(e.type||"").includes(nq)||norm(e.cn||"").includes(nq)||norm(e.venue||"").includes(nq)||norm(e.city||"").includes(nq)||norm(e.ce||"").includes(nq)||norm(e.cp||"").includes(nq)||(e.offerNr&&("o"+e.offerNr).includes(nq)); });
    if(res.length===0) return "🔍 Nimic găsit pentru \""+q+"\"";
    return "🔍 "+res.length+" rezultate pentru \""+q+"\":\n\n"+res.map(fmtE).join("\n");
  }

  // ══════════════════════════════════════════════
  // 20. CLIENT
  // ══════════════════════════════════════════════
  if(nc.match(/client|cine a comandat|de la cine/)) {
    var qc=cmd.replace(/client/gi,"").trim();
    if(!qc) { var withClient=evs.filter(function(e){return e.cn;}); return "Clienți înregistrați ("+withClient.length+"): "+withClient.map(function(e){return e.cn;}).filter(function(v,i,a){return a.indexOf(v)===i;}).join(", "); }
    var nqc=norm(qc); var rc=evs.filter(function(e){return norm(e.cn||"").includes(nqc);});
    if(rc.length===0) return "Niciun client cu \""+qc+"\".";
    return "👤 OFERTE CLIENT \""+qc+"\" ("+rc.length+"):\n\n"+rc.map(fmtE).join("\n");
  }

  // ══════════════════════════════════════════════
  // 21. TRECUTE
  // ══════════════════════════════════════════════
  if(nc.match(/trecut[e]?|istoricul|istori[ck]|terminate|finalizat/)) {
    var curMs2=cur.getTime();
    var past=evs.filter(function(e){return evPeriodEndMs(e)<curMs2;}).sort(function(a,b){return evSortKey(b)-evSortKey(a);}).slice(0,8);
    if(past.length===0) return "Niciun eveniment trecut.";
    return "⏮ ULTIMELE EVENIMENTE:\n\n"+past.map(fmtE).join("\n");
  }

  // ══════════════════════════════════════════════
  // 22. CEL MAI APROPIAT EVENIMENT
  // ══════════════════════════════════════════════
  if(nc.match(/urmatorul|cel mai apropiat|cand e urmatorul|cand cantam/)) {
    var curMs3=cur.getTime();
    var next=evs.filter(function(e){return evPeriodEndMs(e)>=curMs3&&["confirmat","plata_avans","asteptare"].indexOf(e.st)>-1;}).sort(function(a,b){return evSortKey(a)-evSortKey(b);})[0];
    if(!next) return "Niciun eveniment confirmat în viitor.";
    var zc=evExactDayCountdown(next);
    var zTxt=zc!=null?" (în "+zc+" zile)":"";
    return "🎯 URMĂTORUL EVENIMENT:\n\nO"+(next.offerNr||"?")+" · "+(next.type||"—")+"\nData: "+fEvDate(next)+zTxt+"\nClient: "+(next.cn||"—")+"\nLocație: "+(next.venue||"—")+(next.city?", "+next.city:"")+"\nValoare: "+(next.fee||0).toLocaleString("ro-RO")+" €\nStatus: "+(ST_LABEL[next.st]||next.st);
  }

  // ══════════════════════════════════════════════
  // 23. SERVICII EXTRA
  // ══════════════════════════════════════════════
  if(nc.match(/servicii|sunet|lumini|ecran|scena|dj service/)) {
    var cuSvc=evs.filter(function(e){return e.svc&&(e.svc.sunet||e.svc.lumini||e.svc.ecran||e.svc.scena||e.svc.dj);});
    if(cuSvc.length===0) return "Nicio ofertă cu servicii extra.";
    return "🔊 OFERTE CU SERVICII EXTRA ("+cuSvc.length+"):\n\n"+cuSvc.map(function(e){ var s=[]; ["sunet","lumini","ecran","scena","dj"].forEach(function(k){if(e.svc&&e.svc[k])s.push(k);}); return "• O"+(e.offerNr||"?")+" · "+(e.type||"—")+" | "+s.join(", ")+" (+"+svcTot(e).toLocaleString("ro-RO")+" €)"; }).join("\n");
  }

  // ══════════════════════════════════════════════
  // 24. RATA DE CONVERSIE
  // ══════════════════════════════════════════════
  if(nc.match(/conversie|rata|procent|cat la suta|procent[a]/)) {
    var tot_e=evs.length; if(tot_e===0) return "Nu există oferte.";
    var ok=evs.filter(function(e){return e.st==="confirmat";}).length;
    var nos=evs.filter(function(e){return e.st==="respins";}).length;
    var pct=Math.round(ok/tot_e*100);
    return "📊 RATĂ CONVERSIE\n\nOferte totale: "+tot_e+"\nConfirmate: "+ok+" ("+pct+"%)\nRespinse: "+nos+" ("+Math.round(nos/tot_e*100)+"%)\nÎn negociere: "+(tot_e-ok-nos);
  }

  // ══════════════════════════════════════════════
  // 25. AZI
  // ══════════════════════════════════════════════
  if(nc.match(/^azi$|astazi|eveniment azi|ce avem azi/)) {
    var azi=new Date(); var aziStr=azi.toISOString().split("T")[0];
    var ev_azi=(function(){var ax=aziStr.split("-").map(Number);return evs.filter(function(e){return evMatchesCalendarCell(e,aziStr,ax[0],ax[1]-1,ax[2]);});})();
    if(ev_azi.length===0) return "📅 Niciun eveniment azi ("+aziStr+").";
    return "📅 AZI - "+aziStr+":\n\n"+ev_azi.map(fmtE).join("\n");
  }

  // ══════════════════════════════════════════════
  // 26. REZUMAT / SUMAR RAPID
  // ══════════════════════════════════════════════
  if(nc.match(/rezumat|sumar|overview|pe scurt|summary/)) {
    var tot_ev=evs.length, conf_=evs.filter(function(e){return e.st==="confirmat";}).length;
    var pipe_=evs.filter(function(e){return ["oferta","asteptare","plata_avans"].indexOf(e.st)>-1;});
    var vConf=evs.filter(function(e){return e.st==="confirmat";}).reduce(function(s,e){return s+evTot(e);},0);
    var vPipe=pipe_.reduce(function(s,e){return s+(e.fee||0);},0);
    var actTasks=tasks.filter(function(t){return !t.done;}).length;
    var curMs4=cur.getTime();
    var nxt_=evs.filter(function(e){return evPeriodEndMs(e)>=curMs4;}).sort(function(a,b){return evSortKey(a)-evSortKey(b);})[0];
    return "⚡ REZUMAT RAPID\n\n📁 Oferte totale: "+tot_ev+"\n✅ Confirmate: "+conf_+" → "+vConf.toLocaleString("ro-RO")+" €\n🔄 Pipeline: "+pipe_.length+" → "+vPipe.toLocaleString("ro-RO")+" €\n📋 Tasks active: "+actTasks+"\n📅 Următor: "+(nxt_?"O"+(nxt_.offerNr||"?")+" · "+(nxt_.type||"—")+" | "+fEvDate(nxt_):"—");
  }

  // ══════════════════════════════════════════════
  // 27. AJUTOR
  // ══════════════════════════════════════════════
  if(nc.match(/ajutor|help|comenzi|ce poti|ce stii|ce faci|manual/)) {
    return "🤖 COMENZI DISPONIBILE:\n\n📊 FINANCIAR:\n  raport · venituri · pipeline · avansuri · preturi · conversie\n\n📅 EVENIMENTE:\n  urmatoarele · azi · urmatorul · trecute\n  nunti · festivaluri · corporate\n  confirmate · respinse\n\n🔍 CĂUTARE:\n  cauta [text] · client [nume] · O5 (ofertă specifică)\n  in iun · in mar (events pe lună)\n\n💰 CALCULE:\n  pret nunta 2 · split O5 · servicii\n\n📋 TASKURI:\n  taskuri · urgente\n\n🎸 ALTELE:\n  membri · statistici · rezumat";
  }

  return null; // nu e comandă locală → merge la AI
}

function TourOverlay({ steps, step, setStep, setTab }) {
  const [rect, setRect] = React.useState(null);
  const [tooltipPos, setTooltipPos] = React.useState({});
  const current = steps[step];

  React.useEffect(() => {
    if (current?.tab && setTab) setTab(current.tab);
  }, [step]);

  React.useEffect(() => {
    if (!current?.target) { setRect(null); return; }
    const tryFind = (attempts) => {
      const el = document.querySelector(current.target);
      if (el) {
        el.scrollIntoView({ behavior:"smooth", block:"center", inline:"center" });
        setTimeout(() => {
          const r = el.getBoundingClientRect();
          setRect({ top:r.top, left:r.left, width:r.width, height:r.height });
          // calc tooltip position
          const PAD = 16, TW = 300, TH_EST = 180;
          let t = r.bottom + 12, l = Math.max(PAD, Math.min(r.left, window.innerWidth - TW - PAD));
          if (t + TH_EST > window.innerHeight - PAD) t = r.top - TH_EST - 12;
          if (t < PAD) t = PAD;
          setTooltipPos({ top:t, left:l });
        }, 120);
      } else if (attempts > 0) {
        setTimeout(() => tryFind(attempts - 1), 200);
      } else { setRect(null); }
    };
    tryFind(5);
  }, [step, current?.target]);

  if (step === null || step === undefined) return null;
  const isFirst = step === 0;
  const isLast  = step === steps.length - 1;

  return <div style={{position:"fixed",inset:0,zIndex:99990,pointerEvents:"none"}}>
    {/* Dark veil — nu blochează click-uri (pointer-events none la nivel de container) */}
    <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.65)",pointerEvents:"auto"}} onClick={()=>setStep(null)}/>
    {/* Spotlight ring în jurul elementului țintă */}
    {rect&&<div style={{
      position:"fixed", top:rect.top-8, left:rect.left-8,
      width:rect.width+16, height:rect.height+16,
      borderRadius:12, border:"2px solid #f59e0b",
      boxShadow:"0 0 0 9999px rgba(0,0,0,0)",
      outline:"3px solid rgba(245,158,11,.35)",
      pointerEvents:"none", zIndex:99991,
      animation:"tourPulse 1.5s ease-in-out infinite"
    }}/>}
    {/* Tooltip */}
    <div style={{
      position:"fixed",
      top: current.target ? tooltipPos.top : "50%",
      left: current.target ? tooltipPos.left : "50%",
      transform: current.target ? "none" : "translate(-50%,-50%)",
      width:300, maxWidth:"calc(100vw - 32px)",
      background:"#111", border:"1px solid #2a2a2a",
      borderRadius:16, padding:"20px 20px 16px",
      boxShadow:"0 24px 60px rgba(0,0,0,.7)",
      zIndex:99999, pointerEvents:"auto"
    }}>
      {/* Progress dots */}
      <div style={{display:"flex",gap:4,marginBottom:14}}>
        {steps.map((_,i)=><div key={i} style={{height:3,flex:i===step?3:1,borderRadius:2,background:i===step?"#f59e0b":i<step?"#555":"#2a2a2a",transition:"all .3s"}}/>)}
      </div>
      <div style={{fontSize:11,color:"#f59e0b",fontWeight:700,marginBottom:6,letterSpacing:.5}}>
        {step+1} / {steps.length}
      </div>
      <div style={{fontSize:16,fontWeight:700,color:"#fff",marginBottom:8,lineHeight:1.3}}>{current.title}</div>
      <div style={{fontSize:13,color:"#999",lineHeight:1.65,marginBottom:18}}>{current.desc}</div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        {!isFirst&&<button onClick={()=>setStep(s=>s-1)} style={{padding:"9px 14px",borderRadius:9,border:"1px solid #333",background:"transparent",color:"#ccc",cursor:"pointer",fontSize:13,fontWeight:600}}>← Înapoi</button>}
        <button onClick={()=>isLast?setStep(null):setStep(s=>s+1)} style={{flex:1,padding:"9px 16px",borderRadius:9,border:"none",background:"#f59e0b",color:"#000",cursor:"pointer",fontSize:13,fontWeight:800}}>
          {isLast?"Gata! 🎉":"Următor →"}
        </button>
        {!isLast&&<button onClick={()=>setStep(null)} style={{padding:"9px 12px",borderRadius:9,border:"none",background:"transparent",color:"#555",cursor:"pointer",fontSize:12}}>Skip</button>}
      </div>
    </div>
  </div>;
}
