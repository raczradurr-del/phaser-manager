function useIsMobile() {
  const [mob, setMob] = useState(typeof window !== "undefined" ? window.innerWidth < 768 : false);
  useEffect(() => {
    const h = () => setMob(window.innerWidth < 768);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return mob;
}

function useLocalStorageState(key, initial, opts = {}) {
  const { version, migrate } = opts;
  const [state, setState] = useState(() => {
    try {
      const s = localStorage.getItem(key);
      if (!s) return typeof initial === "function" ? initial() : initial;
      let d = JSON.parse(s);
      if (migrate && typeof migrate === "function") d = migrate(d, version);
      return d;
    } catch (e) { return typeof initial === "function" ? initial() : initial; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(state)); } catch (e) {} }, [key, state]);
  return [state, setState];
}

function useToasts(duration = 2500) {
  const [toast, setToast] = useState({ visible: false, message: "", variant: "success" });
  const showToast = (msg, variant = "success", dur) => {
    const ms = dur != null ? dur : (variant === "error" ? 5200 : duration);
    setToast({ visible: true, message: msg, variant });
    setTimeout(() => setToast({ visible: false, message: "", variant: "success" }), ms);
  };
  return { toast, showToast };
}

function useModal() {
  const [modal, setModal] = useState(null);
  const [payload, setPayload] = useState(null);
  const openModal = (type, data) => { setModal(type); setPayload(data ?? null); };
  const closeModal = () => { setModal(null); setPayload(null); };
  return { modal, payload, openModal, closeModal };
}

  const hasNonDjSvc = !!(svc.sunet || svc.lumini || svc.ecran || svc.scena);
  const techCount = hasNonDjSvc ? 2 : (svc.dj ? 1 : 0);
  const tehnicRate = Math.max(0,Number(p.tehnicPerService ?? 120)||0);

  if(!/[A-Z]/.test(pw)) return "Trebuie cel puțin o literă MARE (ex: A-Z)";
  if(!/[a-z]/.test(pw)) return "Trebuie cel puțin o literă mică (ex: a-z)";
  if(!/[0-9]/.test(pw)) return "Trebuie cel puțin o cifră (0-9)";
  return null;
};

const DEFAULT_FIXED_COSTS = {technician:600,equipment:1000,soundman:400,transport:100}; // lei
const CURS_DEFAULT = 5; // 1€ = 5 lei
const calcFond7 = (ev) => {
  const CURS = ev.cursLei||CURS_DEFAULT;
  const fee = (ev.fee||0) + Object.entries(ev.svcp||{}).reduce((s,[k,v])=>s+(ev.svc?.[k]?v:0),0);
  const onFirma = ev.payType==="firma";
  const taxVenit = onFirma ? fee*0.01 : 0;
  const fc = ev.fixedCosts||DEFAULT_FIXED_COSTS;
  const fcEur = ((fc.technician||0)+(fc.equipment||0)+(fc.soundman||0)+(fc.transport||0))/CURS;
  const netAfterFixed = Math.max(0, fee - taxVenit - fcEur);
  const pct = Math.min(100, Math.max(0, Number(ev.fondDupCheltPct ?? 7)));
  return Math.round(netAfterFixed*pct/100*100)/100;
};

function Logo({ height=28, dark=false }) {
  // Logo-ul original e alb => pe fundal întunecat merge direct
  // Pe fundal alb, îl facem negru cu invert
  return (
    <img
      src={LOGO_URL}
      alt="PHASER"
      style={{
        height,
        objectFit:"contain",
        display:"block",
        filter: dark ? "invert(1) brightness(0)" : "none",
      }}
    />
  );
}

function Badge({s, th}) {
  const c = ST[s]; if(!c) return null;
  const dk = th.bg==="#09090b";
  return <span style={{display:"inline-block",padding:"2px 10px",borderRadius:20,fontSize:10,fontWeight:700,background:dk?c.bd:c.bg,color:c.c,whiteSpace:"nowrap"}}>{c.l}</span>;
}
function BadgeStatusSelect({s, th, evId, onStatusChange}) {
  const [open, setOpen] = useState(false);
  const [pos, setPos] = useState({top:0,left:0,width:0});
  const badgeRef = useRef(null);
  const c = ST[s]; if(!c) return null;
  const dk = th.bg==="#09090b";
  if(!onStatusChange) return <Badge s={s} th={th}/>;
  useEffect(()=>{ if(open&&badgeRef.current){ const r=badgeRef.current.getBoundingClientRect(); setPos({top:r.bottom+4,left:r.left,width:r.width}); } },[open]);
  const handleSelect = (k) => {
    const id=evId; const fn=onStatusChange;
    setOpen(false);
    requestAnimationFrame(()=>{ requestAnimationFrame(()=>{ try { if(id&&fn) fn(id,k); } catch(err){ console.error("BadgeStatusSelect:",err); } }); });
  };
  const opts = Object.entries(ST).map(([k,v])=><div key={k} onClick={e=>{e.preventDefault();e.stopPropagation();handleSelect(k);}} style={{padding:"8px 12px",fontSize:12,cursor:"pointer",borderRadius:6,background:k===s?th.ab:"transparent",color:th.t}} onMouseOver={e=>{e.currentTarget.style.background=th.ab;}} onMouseOut={e=>{e.currentTarget.style.background=k===s?th.ab:"transparent";}}>{v.l}</div>);
  const dropdown = open ? <div style={{position:"fixed",top:pos.top,left:pos.left,zIndex:10001,background:th.c,border:`1px solid ${th.b}`,borderRadius:8,boxShadow:"0 8px 24px rgba(0,0,0,.4)",minWidth:150,padding:4}} onClick={e=>{e.preventDefault();e.stopPropagation();}}>{opts}</div> : null;
  const overlay = open ? <div style={{position:"fixed",inset:0,zIndex:10000,cursor:"default"}} onClick={e=>{e.preventDefault();e.stopPropagation();setOpen(false);}}/> : null;
  return <div style={{position:"relative",display:"inline-block"}} ref={badgeRef}>
    <span onClick={e=>{e.stopPropagation();setOpen(o=>!o);}} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"4px 12px",borderRadius:20,fontSize:10,fontWeight:700,background:dk?c.bd:c.bg,color:c.c,whiteSpace:"nowrap",cursor:"pointer",border:`1px solid ${c.c}33`,boxShadow:open?"0 2px 8px rgba(0,0,0,.15)":"none"}} title="Click pentru a schimba statusul">{c.l}<span style={{fontSize:10,fontWeight:700,opacity:1,marginLeft:2,color:dk?"rgba(255,255,255,.9)":c.c}}>▾</span></span>
    {open&&ReactDOM.createPortal(<>{overlay}{dropdown}</>,document.body)}
  </div>;
}

function Toast({message, visible, variant}) {
  if(!visible) return null;
  const err = variant === "error";
  const c = err ? "#ef4444" : "#22c55e";
  return <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",maxWidth:"min(92vw,420px)",padding:"12px 20px",borderRadius:10,background:"#111",border:`1px solid ${c}`,boxShadow:"0 8px 32px rgba(0,0,0,.4)",zIndex:9999,display:"flex",alignItems:"flex-start",gap:10,fontSize:13,fontWeight:600,color:c,lineHeight:1.4}}>{err?<span style={{flexShrink:0,width:20,textAlign:"center"}}>⚠</span>:<IcCheck s={16}/>}<span style={{flex:1}}>{message}</span></div>;
}

// ─── Tasks (Notion-style) ───
const fullTask = (text, prio="medium") => ({id:uid(),text,done:false,taskStatus:"in_proces",priority:prio,cr:new Date().toISOString().split("T")[0],due:"",subtasks:[],notes:"",tags:[],chats:[],uploads:[]});
const toggleInTree = (tasks, id) => tasks.map(t=>t.id===id?{...t,done:!t.done,taskStatus:!t.done?"done":"in_proces"}:{...t,subtasks:toggleInTree(t.subtasks||[],id)});
const delInTree = (tasks, id) => tasks.filter(t=>t.id!==id).map(t=>({...t,subtasks:delInTree(t.subtasks||[],id)}));
const addSubInTree = (tasks, parentId, sub) => tasks.map(t=>t.id===parentId?{...t,subtasks:[...(t.subtasks||[]),sub]}:{...t,subtasks:addSubInTree(t.subtasks||[],parentId,sub)});
const updInTree = (tasks, id, upd) => tasks.map(t=>t.id===id?(typeof upd==="function"?upd(t):{...t,...upd}):{...t,subtasks:updInTree(t.subtasks||[],id,upd)});

const delMultipleInTree = (tasks, ids) => tasks.filter(t=>!ids.includes(t.id)).map(t=>({...t,subtasks:delMultipleInTree(t.subtasks||[],ids)}));

function TasksView({ tasks, setTasks, th, sty, mob, compact=false }) {
  const [newText, setNewText] = useState("");
  const [newPrio, setNewPrio] = useState("medium");
  const [expandedIds, setExpandedIds] = useState(new Set());
  const [viewMode, setViewMode] = useState("list"); // list | calendar | kanban
  const [selectedIds, setSelectedIds] = useState([]);
  const [kanbanDragCol, setKanbanDragCol] = useState(null);
  const [calendarDate, setCalendarDate] = useState(()=>{const n=new Date(); return {y:n.getFullYear(),m:n.getMonth()};});
  const calendarScrollRef = useRef(null);
  const calendarScrolling = useRef(false);
  const MONTHS_RO_CAL = ["ianuarie","februarie","martie","aprilie","mai","iunie","iulie","august","septembrie","octombrie","noiembrie","decembrie"];
  const PC = {high:"#ef4444", medium:"#f59e0b", low:"#22c55e"};
  const PL = {high:"Urgent", medium:"Normal", low:"Low"};
  const TSL = {in_proces:"În proces",in_lucru:"În lucru",done:"Done"};
  const TSC = {in_proces:"#6366f1",in_lucru:"#f59e0b",done:"#22c55e"};

  const add = () => {
    if(!newText.trim()) return;
    setTasks(p=>[...p,fullTask(newText.trim(),newPrio)]);
    setNewText("");
  };
  const toggle = id => setTasks(p=>toggleInTree(p,id));
  const del = id => setTasks(p=>delInTree(p,id));
  const addSub = (parentId, txt) => { if(!txt.trim()) return; setTasks(p=>addSubInTree(p,parentId,fullTask(txt.trim(),"medium"))); };
  const updTask = (id, upd) => setTasks(p=>updInTree(p,id,upd));
  const addTag = (tid, tag) => { if(!tag.trim()) return; updTask(tid,t=>({...t,tags:[...(t.tags||[]),tag.trim()]})); };
  const remTag = (tid, tag) => updTask(tid,t=>({...t,tags:(t.tags||[]).filter(x=>x!==tag)}));
  const addChat = (tid, txt, replyToId) => { if(!txt.trim()) return; updTask(tid,t=>{const nc={id:uid(),text:txt.trim(),date:new Date().toISOString(),author:"Eu",replyTo:replyToId,replies:[]}; return {...t,chats:[...(t.chats||[]),nc]};}); setReplyingTo(null); };
  const addReply = (tid, chatId, txt) => { if(!txt.trim()) return; updTask(tid,t=>({...t,chats:(t.chats||[]).map(c=>c.id===chatId?{...c,replies:[...(c.replies||[]),{id:uid(),text:txt.trim(),date:new Date().toISOString(),author:"Eu"}]}:c)})); setReplyingTo(null); };
  const toggleExpanded = (id) => setExpandedIds(s=>{const n=new Set(s);if(n.has(id))n.delete(id);else n.add(id);return n;});

  const [replyingTo, setReplyingTo] = useState(null); // {tid, chatId}

  const taskStatus = t => (t.taskStatus==="done"||t.done)?"done":(t.taskStatus||"in_proces");
  const active = tasks.filter(t=>taskStatus(t)!=="done").sort((a,b)=>({high:0,medium:1,low:2})[a.priority||"medium"]-({high:0,medium:1,low:2})[b.priority||"medium"]);
  const done = tasks.filter(t=>taskStatus(t)==="done");
  const allTaskIds = [...active,...done].map(t=>t.id);
  const allSelected = allTaskIds.length>0&&allTaskIds.every(id=>selectedIds.includes(id));
  const selectAll = () => setSelectedIds(allSelected?[]:allTaskIds);
  const delSelected = () => { if(selectedIds.length===0) return; if(!window.confirm(`Ștergi ${selectedIds.length} task/taskuri?`)) return; setTasks(p=>delMultipleInTree(p,selectedIds)); setSelectedIds([]); };

  useEffect(()=>{
    const el=calendarScrollRef.current; if(!el||viewMode!=="calendar"||compact) return;
    calendarScrolling.current=true; el.scrollTop=el.clientHeight; setTimeout(()=>{calendarScrolling.current=false;},100);
  },[calendarDate,viewMode,compact]);

  const handleCalendarScroll = () => {
    if (calendarScrolling.current) return;
    const el = calendarScrollRef.current;
    if (!el) return;
    const idx = Math.round(el.scrollTop / el.clientHeight);
    if (idx === 0) {
      setCalendarDate(p => { let m = p.m - 1, y = p.y; if (m < 0) { m = 11; y--; } return { m, y }; });
    } else if (idx === 2) {
      setCalendarDate(p => { let m = p.m + 1, y = p.y; if (m > 11) { m = 0; y++; } return { m, y }; });
    }
  };

  const renderMonth = (y,m) => {
    const first=new Date(y,m,1);
    const startOffset=(first.getDay()+6)%7;
    const start=new Date(y,m,1-startOffset);
    return Array.from({length:42}).map((_,i)=>{
      const d=new Date(start); d.setDate(start.getDate()+i);
      const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
      const isCurMonth=d.getMonth()===m;
      const dayTasks=active.filter(t=>t.due===ds);
      const today=new Date(); const isToday=d.getDate()===today.getDate()&&d.getMonth()===today.getMonth()&&d.getFullYear()===today.getFullYear();
      return <div key={i} style={{minHeight:72,padding:6,borderRadius:8,border:`1px solid ${th.bl}`,background:dayTasks.length>0?th.ab:"transparent",opacity:isCurMonth?1:0.5}}>
        <div style={{fontSize:11,color:isToday?th.a:th.tm,marginBottom:2,fontWeight:isToday?700:600}}>{d.getDate()}</div>
        {dayTasks.map(t=><div key={t.id} onClick={()=>toggleExpanded(t.id)} style={{fontSize:9,padding:"2px 4px",borderRadius:4,background:PC[t.priority||"medium"]+"33",marginBottom:2,cursor:"pointer",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",borderLeft:`2px solid ${PC[t.priority||"medium"]}`}}>{t.text}</div>)}
      </div>;
    });
  };

  const TaskCard = ({ t, isDone, depth=0, showSelect }) => {
    const ex = expandedIds.has(t.id);
    const subs = t.subtasks||[];
    const doneSubs = subs.filter(s=>s.done).length;
    const isReplying = replyingTo&&replyingTo.tid===t.id;
    return (
      <div key={t.id} style={{borderRadius:12,background:th.c,border:`1px solid ${th.b}`,borderLeft:`5px solid ${PC[t.priority||"medium"]}`,overflow:"hidden",marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,.06)",marginLeft:depth*16,borderWidth:showSelect&&selectedIds.includes(t.id)?2:1}}>
        <div onClick={()=>toggleExpanded(t.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px",cursor:"pointer",flexWrap:"wrap"}}>
          {showSelect&&<div onClick={e=>e.stopPropagation()}><input type="checkbox" checked={selectedIds.includes(t.id)} onChange={()=>setSelectedIds(s=>s.includes(t.id)?s.filter(x=>x!==t.id):[...s,t.id])} style={{cursor:"pointer",width:16,height:16}}/></div>}
          <div onClick={e=>{e.stopPropagation();toggle(t.id);}} style={{width:20,height:20,borderRadius:5,border:`2px solid ${PC[t.priority||"medium"]}`,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:isDone?th.b:"transparent"}}>{isDone&&<IcCheck s={12}/>}</div>
          <div style={{flex:1,minWidth:120,fontSize:16,fontWeight:500,textDecoration:isDone?"line-through":undefined,color:isDone?th.tm:th.t,lineHeight:1.4}}>{t.text}</div>
          <select value={t.priority||"medium"} onChange={e=>{e.stopPropagation();updTask(t.id,{priority:e.target.value});}} onClick={e=>e.stopPropagation()} className="modernSel" style={{...sty.i,padding:"6px 24px 6px 10px",fontSize:12,borderRadius:8,border:`1px solid ${PC[t.priority||"medium"]}`,background:PC[t.priority||"medium"]+"15",color:PC[t.priority||"medium"],fontWeight:600,width:"auto",minWidth:90,cursor:"pointer"}}>
            <option value="high">Urgent</option><option value="medium">Normal</option><option value="low">Low</option>
          </select>
          <input type="date" value={t.due||""} onChange={e=>{e.stopPropagation();updTask(t.id,{due:e.target.value});}} onClick={e=>e.stopPropagation()} style={{...sty.i,padding:"6px 10px",fontSize:12,borderRadius:8,border:`1px solid ${th.b}`,width:"auto",minWidth:130,cursor:"pointer"}} title="Deadline"/>
          {(t.tags||[]).length>0&&<span style={{fontSize:11,color:th.tm}}>{(t.tags||[]).slice(0,2).map(tg=><span key={tg}>#{tg} </span>)}</span>}
          {subs.length>0&&<span style={{fontSize:12,color:th.tm,fontWeight:500}}>{doneSubs}/{subs.length}</span>}
          <span style={{fontSize:14,color:th.tm,fontWeight:400,transition:"transform .2s",transform:ex?"rotate(90deg)":"rotate(0)"}}>▶</span>
          <button onClick={e=>{e.stopPropagation();del(t.id);}} style={{padding:4,border:"none",background:"transparent",color:th.tm,cursor:"pointer",opacity:.7}}><IcTrash s={12}/></button>
        </div>
        {ex&&<div style={{padding:"20px 24px 24px 60px",borderTop:`1px solid ${th.bl}`,background:th.bg==="#09090b"?"rgba(255,255,255,.02)":"rgba(0,0,0,.02)"}}>
          <div style={{display:"flex",gap:10,marginTop:12,marginBottom:12,flexWrap:"wrap"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <input type="date" value={t.due||""} onChange={e=>updTask(t.id,{due:e.target.value})} style={{...sty.i,padding:"12px 14px",fontSize:14,borderRadius:10}}/>
              <span style={{fontSize:13,color:th.tm}}>📅 Deadline</span>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
              {(t.tags||[]).map(tag=><span key={tag} style={{fontSize:12,padding:"6px 12px",borderRadius:10,background:th.ab,color:th.t,display:"flex",alignItems:"center",gap:6}}>{tag}<button onClick={()=>remTag(t.id,tag)} style={{padding:0,border:"none",background:"transparent",cursor:"pointer",fontSize:12,color:th.tm}}>×</button></span>)}
              <input placeholder="+ Tag (Enter)" onKeyDown={e=>{if(e.key==="Enter"){addTag(t.id,e.target.value);e.target.value="";}}} style={{...sty.i,width:140,padding:"12px 14px",fontSize:14,borderRadius:10}}/>
            </div>
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:13,color:th.tm,fontWeight:600,marginBottom:8}}>Subtasks</div>
            {subs.map(s=><TaskCard key={s.id} t={{...s,subtasks:s.subtasks||[],tags:s.tags||[],chats:s.chats||[],uploads:s.uploads||[]}} isDone={s.done} depth={depth+1} showSelect={false}/>)}
            <input placeholder="+ Adaugă subtask (Enter)" onKeyDown={e=>{if(e.key==="Enter"){addSub(t.id,e.target.value);e.target.value="";}}} style={{...sty.i,width:"100%",padding:"14px 16px",fontSize:15,marginTop:8,borderRadius:10}}/>
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:13,color:th.tm,fontWeight:600,marginBottom:8}}>Conversații</div>
            {(t.chats||[]).map(c=><div key={c.id} style={{padding:"14px 16px",background:th.c,borderRadius:10,marginBottom:8,fontSize:14,borderLeft:`4px solid ${th.b}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:12,color:th.tm}}>{c.author} · {new Date(c.date).toLocaleString("ro")}</span>
                <button onClick={()=>setReplyingTo({tid:t.id,chatId:c.id})} style={{padding:"6px 12px",border:"none",background:"transparent",color:th.tm,cursor:"pointer",fontSize:12}}>Răspunde</button>
              </div>
              <div style={{marginTop:6,marginBottom:4}}>{c.text}</div>
              {(c.replies||[]).map(r=><div key={r.id} style={{marginTop:6,marginLeft:16,padding:"10px 12px",background:th.h,borderRadius:8,borderLeft:`3px solid ${th.b}`}}><span style={{fontSize:11,color:th.tm}}>↳ {r.author} · {new Date(r.date).toLocaleString("ro")}</span><div style={{marginTop:4,fontSize:13}}>{r.text}</div></div>)}
              {isReplying&&replyingTo.chatId===c.id&&<div style={{marginTop:8,marginLeft:16}}><input placeholder="Răspunde... (Enter)" autoFocus onKeyDown={e=>{if(e.key==="Enter"){addReply(t.id,c.id,e.target.value);e.target.value="";}if(e.key==="Escape")setReplyingTo(null);}} style={{...sty.i,width:"100%",padding:"12px 14px",fontSize:14,borderRadius:10}}/><button onClick={()=>setReplyingTo(null)} style={{fontSize:12,marginTop:6,color:th.tm,cursor:"pointer",background:"transparent",border:"none"}}>Anulează</button></div>}
            </div>)}
            <input placeholder="+ Mesaj nou (Enter)" onKeyDown={e=>{if(e.key==="Enter"){addChat(t.id,e.target.value);e.target.value="";}}} style={{...sty.i,width:"100%",padding:"14px 16px",fontSize:15,marginTop:8,borderRadius:10}}/>
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:13,color:th.tm,fontWeight:600,marginBottom:8}}>Link / Fișier</div>
            <input placeholder="Link sau nume fișier (Enter)" onKeyDown={e=>{if(e.key==="Enter"){const v=e.target.value.trim();if(v){updTask(t.id,{uploads:[...(t.uploads||[]),{id:uid(),name:v,url:v}]});e.target.value="";}}}} style={{...sty.i,width:"100%",padding:"14px 16px",fontSize:15,borderRadius:10}}/>
            {(t.uploads||[]).map(u=>u&&<div key={u.id} style={{fontSize:13,padding:"10px 14px",marginTop:8,background:th.h,borderRadius:8}}>📎 {u.name}</div>)}
          </div>
          <div>
            <div style={{fontSize:13,color:th.tm,fontWeight:600,marginBottom:8}}>Note</div>
            <textarea value={t.notes||""} onChange={e=>updTask(t.id,{notes:e.target.value})} placeholder="Scrie note aici..." style={{...sty.i,minHeight:80,fontSize:15,resize:"vertical",width:"100%",padding:"14px 16px",borderRadius:10}}/>
          </div>
        </div>}
      </div>
    );
  };

  return (
    <div>
      {compact && <div style={{fontSize:15,fontWeight:700,marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>📋 Tasks</span><span style={{fontSize:13,color:th.tm,fontWeight:400}}>{active.length} active</span>
      </div>}

      {!compact&&<div style={{display:"flex",gap:6,padding:8,background:th.bg==="#09090b"?th.h:"#f8f7f5",borderRadius:12,border:`1px solid ${th.bl}`,marginBottom:20}}>
        <button onClick={()=>setViewMode("list")} style={{padding:"12px 20px",borderRadius:10,border:"none",fontSize:15,fontWeight:viewMode==="list"?600:500,cursor:"pointer",background:viewMode==="list"?th.c:"transparent",color:viewMode==="list"?th.t:th.tm,boxShadow:viewMode==="list"?"0 1px 3px rgba(0,0,0,.06)":"none",transition:"all .15s"}}>Listă</button>
        <button onClick={()=>setViewMode("kanban")} style={{padding:"12px 20px",borderRadius:10,border:"none",fontSize:15,fontWeight:viewMode==="kanban"?600:500,cursor:"pointer",background:viewMode==="kanban"?th.c:"transparent",color:viewMode==="kanban"?th.t:th.tm,boxShadow:viewMode==="kanban"?"0 1px 3px rgba(0,0,0,.06)":"none",transition:"all .15s"}}>Kanban</button>
        <button onClick={()=>setViewMode("calendar")} style={{padding:"12px 20px",borderRadius:10,border:"none",fontSize:15,fontWeight:viewMode==="calendar"?600:500,cursor:"pointer",background:viewMode==="calendar"?th.c:"transparent",color:viewMode==="calendar"?th.t:th.tm,boxShadow:viewMode==="calendar"?"0 1px 3px rgba(0,0,0,.06)":"none",transition:"all .15s"}}>Calendar</button>
      </div>}

      <div style={{display:"flex",gap:12,marginBottom:24}}>
        <input value={newText} onChange={e=>setNewText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}
          style={{...sty.i,flex:1,padding:"18px 22px",fontSize:17,borderRadius:12,border:`2px solid ${th.bl}`}} placeholder="Ce ai de făcut? Scrie aici și apasă Enter..."/>
        {!compact && <select value={newPrio} onChange={e=>setNewPrio(e.target.value)} className="modernSel" style={{...sty.i,width:150,padding:"18px 36px 18px 18px",fontSize:15,borderRadius:12,border:`2px solid ${th.bl}`}}>
          <option value="high">Urgent</option><option value="medium">Normal</option><option value="low">Low</option>
        </select>}
        <button onClick={add} style={{...sty.b,padding:"18px 24px",flexShrink:0,borderRadius:12,fontWeight:600,fontSize:15}}><IcPlus s={18}/></button>
      </div>

      {!compact&&allTaskIds.length>0&&<div style={{display:"flex",gap:8,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}>
        <button onClick={selectAll} style={{...sty.bg,padding:"6px 12px",fontSize:11}}>{allSelected?"Deselectează":"Selectează toate"}</button>
        {selectedIds.length>0&&<><span style={{fontSize:11,color:th.tm}}>{selectedIds.length} selectate</span><button onClick={delSelected} style={{padding:"6px 12px",fontSize:11,borderRadius:8,border:"1px solid #ef4444",background:"transparent",color:"#ef4444",cursor:"pointer"}}><IcTrash s={12}/> Șterge</button></>}
      </div>}

      <div style={{display:"flex",flexDirection:"column",gap:0}}>
        {active.length===0 && <div style={{padding:56,textAlign:"center",color:th.tm,fontSize:17,lineHeight:1.6,background:th.bg==="#09090b"?th.h:"#faf9f7",borderRadius:16,border:`2px dashed ${th.bl}`}}>Niciun task activ — scrie mai sus ce ai de făcut și apasă Enter 🎉</div>}
        {viewMode==="kanban"&&!compact ? (
          <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"repeat(3,1fr)",gap:16,minHeight:400}}>
            {(["in_proces","in_lucru","done"]).map(col=>{
              const colTasks = col==="done" ? done : active.filter(t=>taskStatus(t)===col);
              return <div key={col} onDragOver={e=>{e.preventDefault();setKanbanDragCol(col);}} onDragLeave={()=>setKanbanDragCol(null)} onDrop={e=>{e.preventDefault();setKanbanDragCol(null);const id=e.dataTransfer.getData("taskId");if(id){updTask(id,{taskStatus:col,done:col==="done"});}}}
                style={{background:th.bg==="#09090b"?th.h:"#faf9f7",borderRadius:14,padding:18,border:`2px dashed ${kanbanDragCol===col?TSC[col]:th.bl}`,minHeight:220,transition:"all .2s"}}>
                <div style={{fontSize:14,fontWeight:700,color:TSC[col],marginBottom:14,display:"flex",alignItems:"center",gap:10}}><span style={{width:12,height:12,borderRadius:"50%",background:TSC[col]}}/> {TSL[col]} ({colTasks.length})</div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {colTasks.map(t=>(
                    <div key={t.id} draggable onDragStart={e=>e.dataTransfer.setData("taskId",t.id)} onClick={()=>toggleExpanded(t.id)}
                      style={{background:th.c,borderRadius:12,padding:18,cursor:"grab",border:`${selectedIds.includes(t.id)?2:1}px solid ${selectedIds.includes(t.id)?th.a:th.bl}`,boxShadow:"0 1px 4px rgba(0,0,0,.05)",transition:"all .15s"}}
                      onMouseOver={e=>{e.currentTarget.style.transform="translateY(-1px)";e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,.08)";}}
                      onMouseOut={e=>{e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="0 1px 4px rgba(0,0,0,.05)";}}>
                      <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                        {!compact&&<div onClick={e=>e.stopPropagation()}><input type="checkbox" checked={selectedIds.includes(t.id)} onChange={()=>setSelectedIds(s=>s.includes(t.id)?s.filter(x=>x!==t.id):[...s,t.id])} style={{cursor:"pointer",width:16,height:16}}/></div>}
                        <div onClick={e=>{e.stopPropagation();toggle(t.id);}} style={{width:20,height:20,borderRadius:5,border:`2px solid ${TSC[taskStatus(t)]}`,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:taskStatus(t)==="done"?th.b:"transparent",marginTop:2}}>{taskStatus(t)==="done"&&<IcCheck s={12}/>}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:16,fontWeight:600,textDecoration:taskStatus(t)==="done"?"line-through":undefined,color:taskStatus(t)==="done"?th.tm:th.t,lineHeight:1.4}}>{t.text}</div>
                          <div style={{display:"flex",alignItems:"center",gap:6,marginTop:6,flexWrap:"wrap"}}>
                            <select value={t.priority||"medium"} onChange={e=>{e.stopPropagation();updTask(t.id,{priority:e.target.value});}} onClick={e=>e.stopPropagation()} className="modernSel" style={{...sty.i,padding:"8px 28px 8px 12px",fontSize:13,borderRadius:8,border:`1px solid ${th.b}`}}>
                              <option value="high">Urgent</option><option value="medium">Normal</option><option value="low">Low</option>
                            </select>
                            {t.due&&<span style={{fontSize:10,color:th.tm}}><IcClock s={10}/> {fD(t.due)}</span>}
                            {(t.subtasks||[]).length>0&&<span style={{fontSize:10,color:th.tm}}>{(t.subtasks||[]).filter(s=>s.done).length}/{(t.subtasks||[]).length}</span>}
                          </div>
                        </div>
                        <button onClick={e=>{e.stopPropagation();del(t.id);}} style={{padding:4,border:"none",background:"transparent",color:th.tm,cursor:"pointer",opacity:.6}}><IcTrash s={14}/></button>
                      </div>
                      {expandedIds.has(t.id)&&<div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${th.b}`}}>
                        <div style={{fontSize:13,color:th.tm,fontWeight:600,marginBottom:8}}>Subtasks</div>
                        {(t.subtasks||[]).map(s=><TaskCard key={s.id} t={{...s,subtasks:s.subtasks||[],tags:s.tags||[],chats:s.chats||[],uploads:s.uploads||[]}} isDone={s.done} depth={1} showSelect={false}/>)}
                        <input placeholder="+ Adaugă subtask (Enter)" onKeyDown={e=>{if(e.key==="Enter"){addSub(t.id,e.target.value);e.target.value="";}}} style={{...sty.i,padding:"14px 16px",fontSize:15,marginTop:10,borderRadius:10}}/>
                      </div>}
                    </div>
                  ))}
                </div>
              </div>;
            })}
          </div>
        ) : viewMode==="calendar"&&!compact ? (
          <div style={{overflow:"hidden"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <button onClick={()=>setCalendarDate(p=>{let m=p.m-1;let y=p.y;if(m<0){m=11;y--;}return{m:m,y:y};})} style={{...sty.bg,padding:"8px 14px",fontSize:13}}>←</button>
              <div style={{fontSize:17,fontWeight:700,color:th.t,textTransform:"capitalize",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><span>{MONTHS_RO_CAL[calendarDate.m]} {calendarDate.y}</span><span style={{fontSize:10,color:th.tm,fontWeight:400}}>scroll ↑↓</span></div>
              <button onClick={()=>setCalendarDate(p=>{let m=p.m+1;let y=p.y;if(m>11){m=0;y++;}return{m:m,y:y};})} style={{...sty.bg,padding:"8px 14px",fontSize:13}}>→</button>
              <button onClick={()=>{const n=new Date();setCalendarDate({m:n.getMonth(),y:n.getFullYear()});}} style={{...sty.bg,padding:"6px 12px",fontSize:12}}>Azi</button>
            </div>
            <div ref={calendarScrollRef} onScroll={handleCalendarScroll} style={{height:420,overflowY:"auto",scrollSnapType:"y mandatory",scrollBehavior:"smooth",WebkitOverflowScrolling:"touch"}}>
              {[-1,0,1].map(offset=>{
                let m=calendarDate.m+offset; let y=calendarDate.y;
                if(m<0){m+=12;y--;} if(m>11){m-=12;y++;}
                return <div key={`${y}-${m}`} style={{minHeight:420,scrollSnapAlign:"start",scrollSnapStop:"always"}}>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
                    {["Lu","Ma","Mi","Jo","Vi","Sâ","Du"].map(d=><div key={d} style={{fontSize:10,color:th.tm,textAlign:"center",fontWeight:600,padding:"4px 0"}}>{d}</div>)}
                    {renderMonth(y,m)}
                  </div>
                </div>;
              })}
            </div>
          </div>
        ) : (
          active.map(t=><TaskCard key={t.id} t={t} isDone={false} showSelect={!compact}/>)
        )}
      </div>

      {done.length>0 && <>
        <div style={{fontSize:13,color:th.tm,fontWeight:600,textTransform:"uppercase",letterSpacing:1.2,marginTop:32,marginBottom:14}}>Finalizate ({done.length})</div>
        {(compact?done.slice(0,2):done).map(t=><TaskCard key={t.id} t={t} isDone={true} showSelect={!compact}/>)}
      </>}
    </div>
  );
}

// ─── Offers board, contract, offer preview ───
function OffersBoard({ evs, th, sty, mob, onSelect, onAddOffer, onStatusChange, onAvansToggle, onDeleteSelected, showSelection }) {
  const [sortBy, setSortBy] = useState("date");
  const [filterSt, setFilterSt] = useState("");
  const [filterCat, setFilterCat] = useState("");
  const [viewMode, setViewMode] = useState("list"); // list | grid | kanban
  const [dragOverCol, setDragOverCol] = useState(null);
  const [selectedIds, setSelectedIds] = useState([]);
  const toggleSel = (id) => setSelectedIds(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const now = new Date();
  const confConfirmate = evs.filter(e=>e.st==="confirmat"&&(!filterCat||e.cat===filterCat)).sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));
  const respinseOffers = evs.filter(e=>e.st==="respins"&&(!filterCat||e.cat===filterCat)).sort((a,b)=>new Date(b.cr||0)-new Date(a.cr||0));
  const activeOffers = evs.filter(e=>["oferta","asteptare","plata_avans"].includes(e.st)&&(!filterCat||e.cat===filterCat));
  const activeSorted = [...activeOffers].sort((a,b)=>{
    if(sortBy==="date") return new Date(a.date||0)-new Date(b.date||0);
    if(sortBy==="dateDesc") return new Date(b.date||0)-new Date(a.date||0);
    if(sortBy==="cr") return new Date(b.cr||0)-new Date(a.cr||0);
    if(sortBy==="crAsc") return new Date(a.cr||0)-new Date(b.cr||0);
    if(sortBy==="fee") return (b.fee||0)-(a.fee||0);
    if(sortBy==="feeAsc") return (a.fee||0)-(b.fee||0);
    if(sortBy==="client") return (a.cn||"").localeCompare(b.cn||"");
    if(sortBy==="status") return (a.st||"").localeCompare(b.st||"");
    return 0;
  });
  let base = evs.filter(e=>{
    if(filterSt) { if(e.st!==filterSt) return false; }
    else { if(!["oferta","asteptare","plata_avans","confirmat"].includes(e.st)) return false; }
    if(filterCat&&e.cat!==filterCat) return false;
    return true;
  });
  const active = [...base].sort((a,b)=>{
    if(sortBy==="date") return new Date(a.date||0)-new Date(b.date||0);
    if(sortBy==="dateDesc") return new Date(b.date||0)-new Date(a.date||0);
    if(sortBy==="cr") return new Date(b.cr||0)-new Date(a.cr||0);
    if(sortBy==="crAsc") return new Date(a.cr||0)-new Date(b.cr||0);
    if(sortBy==="fee") return (b.fee||0)-(a.fee||0);
    if(sortBy==="feeAsc") return (a.fee||0)-(b.fee||0);
    if(sortBy==="client") return (a.cn||"").localeCompare(b.cn||"");
    if(sortBy==="status") return (a.st||"").localeCompare(b.st||"");
    return 0;
  });
  const allIds = active.map(e=>e.id);
  const allSelected = allIds.length>0&&allIds.every(id=>selectedIds.includes(id));
  const selectAll = () => setSelectedIds(allSelected?[]:allIds);
  const delSelected = () => { if(selectedIds.length===0||!onDeleteSelected) return; if(!window.confirm(`Ștergi ${selectedIds.length} ofertă/oferte?`)) return; onDeleteSelected(selectedIds); setSelectedIds([]); };
  return (
    <div style={{animation:"su .3s ease"}}>
      <div style={{marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:700,letterSpacing:"-0.5px"}}>Oferte</h1>
          <p style={{color:th.tm,fontSize:12,marginTop:2}}>{filterSt===""?activeOffers.length+confConfirmate.length+respinseOffers.length:active.length} oferte</p>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <div style={{display:"flex",gap:2,padding:4,background:th.h,borderRadius:8,border:`1px solid ${th.b}`}}>
            <button onClick={()=>setViewMode("list")} style={{padding:"6px 12px",borderRadius:6,border:"none",fontSize:12,fontWeight:600,cursor:"pointer",background:viewMode==="list"?th.ab:"transparent",color:viewMode==="list"?th.t:(th.bg==="#09090b"?"#e5e5e5":th.tm),fontFamily:"inherit"}}>Listă</button>
            <button onClick={()=>setViewMode("grid")} style={{padding:"6px 12px",borderRadius:6,border:"none",fontSize:12,fontWeight:600,cursor:"pointer",background:viewMode==="grid"?th.ab:"transparent",color:viewMode==="grid"?th.t:(th.bg==="#09090b"?"#e5e5e5":th.tm),fontFamily:"inherit"}}>Grid</button>
            <button onClick={()=>setViewMode("kanban")} style={{padding:"6px 12px",borderRadius:6,border:"none",fontSize:12,fontWeight:600,cursor:"pointer",background:viewMode==="kanban"?th.ab:"transparent",color:viewMode==="kanban"?th.t:(th.bg==="#09090b"?"#e5e5e5":th.tm),fontFamily:"inherit"}}>Kanban</button>
          </div>
          {onAddOffer&&<button onClick={onAddOffer} style={sty.b}><IcPlus s={14}/> Ofertă nouă</button>}
        </div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <select value={filterSt} onChange={e=>setFilterSt(e.target.value)} className="modernSel" style={{padding:"8px 32px 8px 12px",minWidth:160,borderRadius:8,border:`1px solid ${th.b}`,background:th.i,color:th.t,fontSize:13,cursor:"pointer"}}>
          <option value="">Toate (active + confirmate + respinse)</option>
          {Object.entries(ST).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}
        </select>
        <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} className="modernSel" style={{padding:"8px 32px 8px 12px",minWidth:100,borderRadius:8,border:`1px solid ${th.b}`,background:th.i,color:th.t,fontSize:13,cursor:"pointer"}}>
          <option value="">Toate</option>
          <option value="private">Privat</option>
          <option value="public">Public</option>
        </select>
        <select value={sortBy} onChange={e=>setSortBy(e.target.value)} className="modernSel" style={{padding:"8px 32px 8px 12px",minWidth:140,borderRadius:8,border:`1px solid ${th.b}`,background:th.i,color:th.t,fontSize:13,cursor:"pointer"}}>
          <option value="date">Data eveniment ↑</option>
          <option value="dateDesc">Data eveniment ↓</option>
          <option value="cr">Data adăugării (nou)</option>
          <option value="crAsc">Data adăugării (vechi)</option>
          <option value="fee">Onorariu ↓</option>
          <option value="feeAsc">Onorariu ↑</option>
          <option value="client">Client A-Z</option>
          <option value="status">Status</option>
        </select>
        {(showSelection||onDeleteSelected)&&<div style={{display:"flex",gap:6,alignItems:"center",marginLeft:"auto"}}>
          <button onClick={selectAll} style={{...sty.bg,padding:"6px 12px",fontSize:11}}>{allSelected?"Deselectează":"Selectează toate"}</button>
          {selectedIds.length>0&&<><span style={{fontSize:11,color:th.tm}}>{selectedIds.length} selectate</span>{onDeleteSelected&&<button onClick={delSelected} style={{padding:"6px 12px",fontSize:11,borderRadius:8,border:"1px solid #ef4444",background:"transparent",color:"#ef4444",cursor:"pointer"}}><IcTrash s={12}/> Șterge</button>}</>}
        </div>}
      </div>
      {viewMode==="kanban" ? (
        <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"repeat(4,1fr)",gap:12,minHeight:400}}>
          {["oferta","asteptare","plata_avans","confirmat","respins"].map(col=>{
            const colEvs = evs.filter(e=>e.st===col&&(!filterCat||e.cat===filterCat));
            return <div key={col} onDragOver={e=>{e.preventDefault();setDragOverCol(col);}} onDragLeave={()=>setDragOverCol(null)} onDrop={e=>{e.preventDefault();setDragOverCol(null);const id=e.dataTransfer.getData("evId");if(id&&onStatusChange){const ev=evs.find(x=>x.id===id);if(ev)onStatusChange(ev.id,col);}}}
              style={{background:th.h,borderRadius:12,padding:12,border:`2px dashed ${dragOverCol===col?ST[col]?.c:th.b}`,minHeight:200,transition:"border-color .2s"}}>
              <div style={{fontSize:11,fontWeight:700,color:ST[col]?.c,marginBottom:10,display:"flex",alignItems:"center",gap:6}}><span style={{width:8,height:8,borderRadius:"50%",background:ST[col]?.c}}/> {ST[col]?.l||col} ({colEvs.length})</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {colEvs.map(ev=>{
                  const d=dU(ev.date); const urgent=d<=14;
                  return <div key={ev.id} draggable onDragStart={e=>e.dataTransfer.setData("evId",ev.id)} onClick={()=>onSelect(ev)}
                    style={{background:th.c,borderRadius:8,padding:12,cursor:"grab",border:`${selectedIds.includes(ev.id)?2:1}px solid ${selectedIds.includes(ev.id)?th.a:th.b}`,boxShadow:"0 1px 3px rgba(0,0,0,.1)",transition:"transform .15s",position:"relative"}}
                    onMouseOver={e=>{e.currentTarget.style.transform="translateY(-1px)";e.currentTarget.style.cursor="grab";}}
                    onMouseOut={e=>{e.currentTarget.style.transform="translateY(0)";}}>
                    {(showSelection||onDeleteSelected)&&<div style={{position:"absolute",top:8,right:8}} onClick={e=>e.stopPropagation()}><input type="checkbox" checked={selectedIds.includes(ev.id)} onChange={()=>toggleSel(ev.id)} style={{cursor:"pointer",width:14,height:14}}/></div>}
                    <div style={{fontSize:10,color:th.tm,marginBottom:2}}>{ev.type} {ev.cat==="private"?"· ZGV":"· PHASER"}</div>
                    <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>{ev.offerNr?"O"+ev.offerNr:"???"} · {ev.type}</div>
                    <div style={{fontSize:13,fontWeight:600,marginBottom:2}}>{fD(ev.date)}</div>
                    <div style={{fontSize:10,color:th.tm,marginBottom:6}}>{fFmt(ev.fee,ev.valuta)}</div>
                    <div onClick={e=>e.stopPropagation()} style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                      <BadgeStatusSelect s={ev.st} th={th} evId={ev.id} onStatusChange={onStatusChange}/>
                      {onAvansToggle&&["plata_avans","confirmat"].includes(ev.st)&&<span onClick={()=>onAvansToggle(ev.id)} style={{cursor:"pointer",fontSize:10,padding:"2px 6px",borderRadius:6,border:`1px solid ${ev.dp?"#22c55e":"#ef4444"}`,color:ev.dp?"#22c55e":"#ef4444",fontWeight:600}} title="Click: bifează avans încasat">{ev.dp?"✓ Avans":"✗ Avans"}</span>}
                    </div>
                  </div>;
                })}
              </div>
            </div>;
          })}
        </div>
      ) : viewMode==="list" ? (
        filterSt==="" ? (
          <>
            {/* Oferte active */}
            <div style={{fontSize:11,fontWeight:700,color:th.tm,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Oferte active ({activeSorted.length})</div>
            <div style={{...sty.cd,padding:0,overflow:mob?"auto":"hidden",marginBottom:20}} className={mob?"table-scroll-mob":""}>
              {activeSorted.length===0&&<div style={{padding:30,textAlign:"center",color:th.tm,fontSize:12}}>Nicio ofertă activă</div>}
              {activeSorted.length>0&&<table style={{width:"100%",borderCollapse:"collapse",minWidth:mob?520:undefined}}>
                <thead><tr style={{borderBottom:`2px solid ${th.b}`}}>
                  {(showSelection||onDeleteSelected)&&<th style={{padding:"10px 12px",width:36}}><input type="checkbox" checked={activeSorted.length>0&&activeSorted.every(e=>selectedIds.includes(e.id))} onChange={()=>{const ids=activeSorted.map(e=>e.id);const all=activeSorted.every(e=>selectedIds.includes(e.id));setSelectedIds(all?selectedIds.filter(id=>!ids.includes(id)):[...new Set([...selectedIds,...ids])]);}} onClick={e=>e.stopPropagation()} style={{cursor:"pointer"}}/></th>}
                  {["Nr","Ofertă","Tip","Locație","Data eveniment","Adăugată","Onorariu","Status"].map(h=><th key={h} style={{padding:"10px 12px",textAlign:"left",fontSize:10,color:th.tm,textTransform:"uppercase",letterSpacing:1,fontWeight:600}}>{h}</th>)}
                </tr></thead>
                <tbody>{activeSorted.map((ev,i)=>(
                  <tr key={ev.id} onClick={()=>onSelect(ev)} style={{borderBottom:`1px solid ${th.bl}`,cursor:"pointer",background:selectedIds.includes(ev.id)?th.ab:"transparent"}} onMouseOver={e=>{if(!selectedIds.includes(ev.id))e.currentTarget.style.background=th.ab}} onMouseOut={e=>{if(!selectedIds.includes(ev.id))e.currentTarget.style.background="transparent"}}>
                    {(showSelection||onDeleteSelected)&&<td style={{padding:"10px 12px"}} onClick={e=>e.stopPropagation()}><input type="checkbox" checked={selectedIds.includes(ev.id)} onChange={()=>toggleSel(ev.id)} onClick={e=>e.stopPropagation()} style={{cursor:"pointer"}}/></td>}

// Imagine header draggabilă — trage poza în chenar pentru poziționare
function HeroImageEditor({ src, position, onChange }) {
  const parseY = (p) => { const s=String(p||""); if(s.includes("top"))return 0; if(s.includes("bottom"))return 100; const m=s.match(/(\d+\.?\d*)%?/); return m?Math.max(0,Math.min(100,parseFloat(m[1])||50)):50; };
  const [drag, setDrag] = useState(null);
  const posY = parseY(position);
  useEffect(() => {
    if (!drag) return;
    const onMove = (e) => {
      const dy = (e.touches?.[0]?.clientY ?? e.clientY) - drag.startY;
      const newY = Math.max(0, Math.min(100, drag.startPos - dy * 0.3));
      onChange("center " + Math.round(newY) + "%");
    };
    const onEnd = () => setDrag(null);
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onEnd);
    window.addEventListener("touchmove", onMove, { passive: true });
    window.addEventListener("touchend", onEnd);
    return () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onEnd); window.removeEventListener("touchmove", onMove); window.removeEventListener("touchend", onEnd); };
  }, [drag]);
  return (
    <div
      onMouseDown={e=>setDrag({startY:e.clientY,startPos:posY})}
      onTouchStart={e=>setDrag({startY:e.touches[0].clientY,startPos:posY})}
      style={{position:"relative",overflow:"hidden",height:260,borderRadius:10,border:"1px solid #ccc",cursor:"grab",userSelect:"none"}}
    >
      <img src={src} alt="" style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:position||"center 50%",pointerEvents:"none"}} onError={e=>{e.target.style.display="none";}}/>
      <div style={{position:"absolute",bottom:8,left:"50%",transform:"translateX(-50%)",fontSize:10,color:"rgba(255,255,255,.7)",background:"rgba(0,0,0,.5)",padding:"4px 8px",borderRadius:6}}>Trage poza pentru poziționare</div>
    </div>
  );
}

// TimeInput — 24h format, datalist + tastare (id unic per instanță — altfel toate câmpurile împart același datalist și dropdown-ul „nu merge”)
function TimeInput({ value, onChange, style, placeholder }) {
  const listId = useId().replace(/:/g, "");
  const norm = (v) => { const m = (v||"").match(/^(\d{1,2}):(\d{2})$/); if(m){ const h=Math.min(23,Math.max(0,parseInt(m[1],10))); const min=Math.min(59,Math.max(0,parseInt(m[2],10))); return String(h).padStart(2,"0")+":"+String(min).padStart(2,"0"); } return v||""; };
  const handleChange = (e) => { const v = norm(e.target.value); onChange(v); };
  return (
    <div style={{position:"relative",display:"inline-flex",alignItems:"center",flexShrink:0}}>
      <input list={listId} value={value||""} onChange={handleChange} onBlur={(e)=>onChange(norm(e.target.value))} placeholder={placeholder||"09:00"} style={{boxSizing:"border-box",fontVariantNumeric:"tabular-nums",minWidth:"7.5ch",...style}} maxLength={5}/>
      <datalist id={listId}>{TIME_OPTIONS.map(t=><option key={t} value={t}/>)}</datalist>
    </div>
  );
}

function DateTimeInput({ value, evDate, onChange, style, iStyle }) {

}

function FisaPdfButton({ ev, showToast }) {
  const [loading, setLoading] = useState(false);

    setLoading(true);
    try {
      let blob = null;
      try { blob = await generatePdfFromHtml(getFisaBodyHtmlForWorker(ev)); } catch (e) { blob = null; }

        document.body.removeChild(div);

// FisaLinkButton — generează link partajabil pentru fișa evenimentului (Supabase Storage)
function FisaLinkButton({ ev, showToast, pdfLoading, getSbClient }) {
  const [loading, setLoading] = useState(false);
  const [copied, setCopied] = useState(false);
  const handleCopyLink = async () => {
    const sb = getSbClient?.();
    if (!sb) { showToast?.("Link partajabil necesită Supabase. Configurează bucket-ul fisa-public."); return; }
    setLoading(true);
    try {
      const html = buildFisaHtml(ev);
      const fid = uid();
      const path = `fisa-${fid}.html`;
      const { error } = await sb.storage.from("fisa-public").upload(path, html, { contentType: "text/html; charset=utf-8", upsert: true });
      if (error) throw error;
      const { data: { publicUrl } } = sb.storage.from("fisa-public").getPublicUrl(path);
      await navigator.clipboard.writeText(publicUrl);
      setCopied(true); setTimeout(()=>setCopied(false), 2500);
      showToast?.("Link copiat în clipboard ✓ Trimite-l oricui.");
    } catch (e) {
      console.error(e);
      const raw = (e?.message || e?.error_description || "").trim();
      const bucketMissing = /bucket not found/i.test(raw);
      const msg = bucketMissing
        ? "Bucket „fisa-public” nu există în Supabase. Dashboard → Storage → New bucket: id „fisa-public”, Public. Sau rulează secțiunea 3b din supabase-setup.sql (proiectul Phaser)."
        : ("Eroare: " + (raw || "Upload eșuat."));
      showToast?.(msg, "error");
    }
    setLoading(false);
  };
  return (
    <button onClick={handleCopyLink} disabled={pdfLoading||loading} style={{padding:"8px 16px",borderRadius:8,border:"none",background:"#3b82f6",color:"#fff",fontWeight:700,fontSize:12,cursor:(pdfLoading||loading)?"wait":"pointer",display:"flex",alignItems:"center",gap:6,opacity:(pdfLoading||loading)?0.7:1}}>

  );
}

function LocationSearch({ venue, city, dist, onUpdate, sty, th, mob }) {
  const [venueVal, setVenueVal] = useState(venue||"");
  const [cityQuery, setCityQuery] = useState(city||"");
  const [showCityDrop, setShowCityDrop] = useState(false);
  const [venueResults, setVenueResults] = useState([]);
  const [showVenueDrop, setShowVenueDrop] = useState(false);
  const [venueAddress, setVenueAddress] = useState("");
  const [venueMapUrl, setVenueMapUrl] = useState("");
  const [searching, setSearching] = useState(false);
  const debounceRef = useRef(null);
  const iStyle = {...sty.i, fontSize: mob?"16px":"14px"};

  // Caută pe OpenStreetMap Nominatim după ce userul termină de scris (debounce 600ms)
  const searchNominatim = (query) => {
    if (debounceRef.current) clearTimeout(debounceRef.current);
    if (!query || query.length < 3) { setVenueResults([]); setShowVenueDrop(false); return; }
    debounceRef.current = setTimeout(async () => {
      setSearching(true);
      try {
        // Adaugă orașul în query dacă e completat — rezultate mai precise
        const q = cityQuery ? `${query}, ${cityQuery}` : `${query}, Romania`;
        const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&addressdetails=1&accept-language=ro&countrycodes=ro`;
        const res = await fetch(url);
        const data = await res.json();
        setVenueResults(data);
        setShowVenueDrop(data.length > 0);
      } catch(e) {
        setVenueResults([]);
      }
      setSearching(false);
    }, 600);
  };

  const pickVenue = (place) => {
    // Numele venue-ului — prima parte din display_name (înainte de prima virgulă)
    const nameParts = (place.display_name || "").split(",");
    const name = nameParts[0].trim();
    const addr = place.display_name || "";
    const a = place.address || {};
    const cityName = a.city || a.town || a.village || a.municipality || a.county || "";
    const mapUrl = `https://www.openstreetmap.org/?mlat=${place.lat}&mlon=${place.lon}&zoom=17`;

    // Distanță față de TM
    const cityMatch = RO_CITIES.find(c =>
      cityName.toLowerCase().includes(c.n.toLowerCase()) ||
      c.n.toLowerCase().includes(cityName.toLowerCase())
    );
    const distKm = cityMatch ? cityMatch.km : 0;

    setVenueVal(name);
    setCityQuery(cityName);
    setVenueAddress(addr);
    setVenueMapUrl(mapUrl);
    setShowVenueDrop(false);
    setVenueResults([]);
    onUpdate({ venue: name, city: cityName, dist: distKm });
  };

  const handleVenueChange = (v) => {
    setVenueVal(v);
    setVenueAddress("");
    setVenueMapUrl("");
    onUpdate({ venue: v, city: cityQuery, dist: dist||0 });
    searchNominatim(v);
  };

  const filteredCities = cityQuery.length>0
    ? RO_CITIES.filter(c=>c.n.toLowerCase().includes(cityQuery.toLowerCase())).slice(0,6)
    : [];

  const pickCity = (c) => {
    setCityQuery(c.n);
    setShowCityDrop(false);
    onUpdate({ venue: venueVal, city: c.n, dist: c.km });
  };

  // Formatare adresă scurtă pentru dropdown (scoate România și codul poștal)
  const shortAddr = (displayName) => {
    return displayName.split(",").slice(1,4).join(",").replace(/\d{6}/g,"").replace("România","").replace("Romania","").trim().replace(/,\s*$/,"");
  };

  return (
    <div style={{gridColumn:"1/-1", display:"flex", flexDirection:"column", gap:10}}>
      <div style={{display:"grid", gridTemplateColumns:mob?"1fr":"1fr 1fr", gap:10}}>

        {/* Venue cu Nominatim autocomplete */}
        <div style={{position:"relative"}}>
          <label style={sty.l}>
            Locație / Venue
            {searching && <span style={{color:"#fbbf24",fontSize:10,marginLeft:6}}>● caută...</span>}
          </label>
          <input
            value={venueVal}
            onChange={e=>handleVenueChange(e.target.value)}
            onBlur={()=>setTimeout(()=>setShowVenueDrop(false),200)}
            onFocus={()=>venueResults.length>0 && setShowVenueDrop(true)}
            style={iStyle}
            placeholder="🔍  Scrie numele locației..."
            autoComplete="off"
          />
          {showVenueDrop && venueResults.length>0 && (
            <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:1000,background:th.c,border:`1px solid ${th.b}`,borderRadius:10,boxShadow:"0 8px 28px rgba(0,0,0,.3)",marginTop:3,overflow:"hidden"}}>
              {venueResults.map((place,i)=>{
                const name = place.display_name.split(",")[0].trim();
                const sub = shortAddr(place.display_name);
                return (
                  <div key={place.place_id} onClick={()=>pickVenue(place)}
                    style={{padding:"10px 14px",cursor:"pointer",borderBottom:i<venueResults.length-1?`1px solid ${th.bl}`:"none"}}
                    onMouseOver={e=>e.currentTarget.style.background=th.h}
                    onMouseOut={e=>e.currentTarget.style.background="transparent"}>
                    <div style={{fontWeight:600,fontSize:13,color:th.t}}>{name}</div>
                    {sub && <div style={{fontSize:11,color:th.tm,marginTop:2}}>{sub}</div>}
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* Oraș cu autocomplete offline */}
        <div style={{position:"relative"}}>
          <label style={sty.l}>
            Oraș {dist>0 && <span style={{color:"#22c55e",fontWeight:700,marginLeft:6}}>🚗 {dist} km de TM</span>}
          </label>
          <input
            value={cityQuery}
            onChange={e=>{setCityQuery(e.target.value);setShowCityDrop(true);onUpdate({venue:venueVal,city:e.target.value,dist:0});}}
            onFocus={()=>setShowCityDrop(true)}
            onBlur={()=>setTimeout(()=>setShowCityDrop(false),150)}
            style={iStyle}
            placeholder="Caută oraș..."
          />
          {showCityDrop && filteredCities.length>0 && (
            <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:999,background:th.c,border:`1px solid ${th.b}`,borderRadius:8,boxShadow:"0 8px 24px rgba(0,0,0,.2)",marginTop:2,overflow:"hidden"}}>
              {filteredCities.map((c,i)=>(
                <div key={c.n} onClick={()=>pickCity(c)}
                  style={{padding:"9px 14px",cursor:"pointer",borderBottom:i<filteredCities.length-1?`1px solid ${th.bl}`:"none",display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:13}}
                  onMouseOver={e=>e.currentTarget.style.background=th.h}
                  onMouseOut={e=>e.currentTarget.style.background="transparent"}>
                  <span style={{fontWeight:500,color:th.t}}>{c.n}</span>
                  <span style={{fontSize:10,color:c.km===0?"#22c55e":th.tm,fontWeight:c.km<50?600:400}}>{c.km===0?"local":c.km+" km"}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Adresă completă + link hartă (apare după selecție) */}
      {venueAddress && (
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:th.ab||"rgba(251,191,36,.06)",borderRadius:8,border:`1px solid ${th.bl}`}}>
          <span style={{fontSize:11,color:th.tm,flex:1,lineHeight:1.5}}>📍 {venueAddress}</span>
          <a href={venueMapUrl} target="_blank" rel="noopener noreferrer"
            style={{fontSize:11,color:"#60a5fa",whiteSpace:"nowrap",fontWeight:600,textDecoration:"none",padding:"4px 10px",borderRadius:6,background:"rgba(96,165,250,.12)"}}>
            ↗ Hartă
          </a>
        </div>
      )}
    </div>
  );
}

// ─── FIȘA EVENIMENTULUI (tab în modal detalii) ───
// Ordine: Tip eveniment, Locație (tel+adresă), Client, Ospitalitate, Timing, Servicii, Extra
function FisaEveniment({ ev, updEv, th, SVC_LABELS, fFmt, fD, editable, sty, mob, showPaymentCards, showToast }) {
  const iStyle = {...sty.i, fontSize: mob?"16px":"14px"};
  const hosp = ev.hosp && !Array.isArray(ev.hosp) ? ev.hosp : {camere:0,meniuri:6,micDejun:false,pranz:false,extra:[],protocolOverride:""};
  const svc = Object.entries(ev.svcp||{}).reduce((s,[k,v])=>s+(ev.svc?.[k]?v:0),0);
  const u = (k,v) => editable && updEv && updEv({[k]:v});
  const svcInfo = ev.svcInfo||{};
  return <div style={{display:"flex",flexDirection:"column",gap:16}}>
    {showPaymentCards&&<div style={{display:"flex",gap:10}}>
      <div onClick={()=>{const nd=!ev.dp;updEv({dp:nd,...(nd?{st:"confirmat"}:{})});showToast&&showToast(nd?"Avans încasat ✓ — eveniment confirmat":"Avans: neîncasat");}} style={{flex:1,padding:12,borderRadius:10,border:`2px solid ${ev.dp?"#22c55e":th.b}`,cursor:"pointer",textAlign:"center",background:ev.dp?"rgba(34,197,94,.06)":"transparent"}}>
        <div style={{fontSize:18,marginBottom:4}}>{ev.dp?"✅":"⬜"}</div>
        <div style={{fontSize:10,color:th.tm,textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>Platit avans</div>
        <div style={{fontSize:14,fontWeight:700,color:ev.dp?"#22c55e":"#ef4444"}}>{fFmt(ev.dep||0,ev.valuta)}</div>
      </div>
      <div onClick={()=>{updEv({restPaid:!ev.restPaid});showToast&&showToast(ev.restPaid?"Rest: neplătit":"Rest: plătit integral ✓");}} style={{flex:1,padding:12,borderRadius:10,border:`2px solid ${ev.restPaid?"#22c55e":th.b}`,cursor:"pointer",textAlign:"center",background:ev.restPaid?"rgba(34,197,94,.06)":"transparent"}}>
        <div style={{fontSize:18,marginBottom:4}}>{ev.restPaid?"✅":"⬜"}</div>
        <div style={{fontSize:10,color:th.tm,textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>Platit integral</div>
        <div style={{fontSize:14,fontWeight:700,color:ev.restPaid?"#22c55e":"#ef4444"}}>{fFmt(Math.max(0,(ev.fee||0)+svc-(ev.dep||0)),ev.valuta)}</div>
      </div>
    </div>}
    {/* 1. Tip eveniment */}
    <div style={{padding:16,borderRadius:10,background:th.h,border:`1px solid ${th.b}`}}>
      <div style={{fontSize:9,color:th.tm,textTransform:"uppercase",marginBottom:2}}>Tip eveniment</div>
      {editable ? <input value={ev.type||""} onChange={e=>u("type",e.target.value)} style={iStyle} placeholder="ex: Nuntă"/> : <div style={{fontSize:15,fontWeight:700}}>{ev.type||"—"}</div>}
    </div>
    {/* 2. Locație — nume, telefon, adresă */}
    <div style={{padding:16,borderRadius:10,background:th.h,border:`1px solid ${th.b}`}}>
      <div style={{fontSize:10,color:th.tm,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Locație</div>
      {editable ? <div style={{display:"flex",flexDirection:"column",gap:6}}>
        <input value={ev.venue||""} onChange={e=>u("venue",e.target.value)} style={iStyle} placeholder="Nume locație"/>
        <input value={ev.locPhone||""} onChange={e=>u("locPhone",e.target.value)} style={iStyle} placeholder="Telefon locație (+40...)"/>
        <input value={ev.locAddress||""} onChange={e=>u("locAddress",e.target.value)} style={iStyle} placeholder="Adresă completă"/>
      </div> : <div style={{fontSize:13}}>
        <div style={{fontWeight:600}}>{ev.venue||"—"}{ev.city?", "+ev.city:""}</div>
        {ev.locPhone&&<div style={{fontSize:11,color:th.ts,marginTop:4}}>📞 {ev.locPhone}</div>}
        {ev.locAddress&&<div style={{fontSize:11,color:th.ts,marginTop:2}}>📍 {ev.locAddress}</div>}
      </div>}
    </div>
    {/* 3. Client */}
    <div style={{padding:16,borderRadius:10,background:th.h,border:`1px solid ${th.b}`}}>
      <div style={{fontSize:10,color:th.tm,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Client</div>
      {editable ? <><input value={ev.cn||""} onChange={e=>u("cn",e.target.value)} style={iStyle} placeholder="Nume client"/><input value={ev.cp||""} onChange={e=>u("cp",e.target.value)} style={{...iStyle,marginTop:6}} placeholder="Telefon"/><input value={ev.ce||""} onChange={e=>u("ce",e.target.value)} style={{...iStyle,marginTop:6}} placeholder="Email"/></> : <><div style={{fontSize:14,fontWeight:600}}>{ev.cn||"—"}</div>{ev.cp&&<div style={{fontSize:11,color:th.ts,marginTop:2}}>{ev.cp}</div>}{ev.ce&&<div style={{fontSize:11,color:th.ts}}>{ev.ce}</div>}</>}
    </div>
    {/* 4. Ospitalitate — cazare doar dacă există în ofertă (>0 camere); fără „Adaugă cazare” pe fișă */}
    {ev.cat==="private"&&<div style={{padding:16,borderRadius:10,background:th.h,border:`1px solid ${th.b}`}}>
      <div style={{fontSize:10,color:th.tm,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Ospitalitate</div>
      {editable ? <>
        {(hosp.camere||0)>0&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><span style={{fontSize:12}}>Camere:</span><button type="button" onClick={()=>u("hosp",{...hosp,camere:Math.max(0,(hosp.camere||0)-1)})} style={{...sty.bg,padding:"4px 10px"}}>−</button><span style={{fontSize:14,fontWeight:700,minWidth:24,textAlign:"center"}}>{hosp.camere??0}</span><button type="button" onClick={()=>u("hosp",{...hosp,camere:(hosp.camere||0)+1})} style={{...sty.bg,padding:"4px 10px"}}>+</button></div>}
        <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:12}}>Meniuri:</span><button type="button" onClick={()=>u("hosp",{...hosp,meniuri:Math.max(0,(hosp.meniuri||6)-1)})} style={{...sty.bg,padding:"4px 10px"}}>−</button><span style={{fontSize:14,fontWeight:700,minWidth:24,textAlign:"center"}}>{hosp.meniuri??6}</span><button type="button" onClick={()=>u("hosp",{...hosp,meniuri:(hosp.meniuri||6)+1})} style={{...sty.bg,padding:"4px 10px"}}>+</button></div>
      </> : <div style={{fontSize:12,color:th.ts}}>{[((hosp.camere||0)>0?`${hosp.camere} camere`:null),((hosp.meniuri||0)>0?`${hosp.meniuri} meniuri`:null)].filter(Boolean).join(" · ")||"—"}</div>}
    </div>}
    {/* 5. Timing — Load in, Soundcheck, Show start, Load out (dată+oră 24h) + reprize (oră start) */}
    <div style={{padding:16,borderRadius:10,background:th.h,border:`2px solid #22c55e`}}>
      <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:12,color:"#22c55e",display:"flex",alignItems:"center",gap:6}}>📋 Timing</div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:9,color:th.tm,fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Load in · Soundcheck · Show start · Load out</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
          {[{l:"Load In",v:ev.li,i:"📦",k:"li"},{l:"Soundcheck",v:ev.sc,i:"🎛",k:"sc"},{l:"Show Start",v:ev.ss,i:"🎤",k:"ss"},{l:"Load Out",v:ev.lo,i:"🚐",k:"lo"}].map((x,i)=>(
            <div key={i} style={{padding:10,borderRadius:8,background:th.c,textAlign:"center",border:`1px solid ${th.b}`}}>
              <div style={{fontSize:14,marginBottom:3}}>{x.i}</div>
              <div style={{fontSize:9,color:th.tm,textTransform:"uppercase",letterSpacing:.5,marginBottom:3}}>{x.l}</div>
              {editable ? <DateTimeInput value={ev[x.k]} evDate={ev.date} onChange={v=>u(x.k,v)} iStyle={{...iStyle,fontSize:12}}/> : <div style={{fontSize:15,fontWeight:800,color:x.v?th.t:th.tm}}>{formatDisplayDateTime(x.v,ev.date)}</div>}
            </div>
          ))}
        </div>
      </div>
      <div style={{marginTop:12}}>
        <div style={{fontSize:9,color:th.tm,fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Timing show (reprize)</div>
        {editable ? <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {(ev.repDurs&&ev.repDurs.length>0 ? ev.repDurs : Array(ev.rep||1).fill(ev.repDur||45)).map((d,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span style={{fontSize:11,color:th.tm,minWidth:28}}>R{i+1}:</span>
              <TimeInput value={(ev.repStarts||[])[i]} onChange={t=>{const arr=[...(ev.repStarts||[])].slice(0,ev.rep||1);arr[i]=t;while(arr.length<(ev.rep||1))arr.push("");u("repStarts",arr);}} style={{...iStyle,width:mob?96:84,textAlign:"center"}} placeholder="21:00"/>
              <input type="number" value={d} onChange={e=>{const arr=[...(ev.repDurs||Array(ev.rep||1).fill(ev.repDur||45))];arr[i]=Number(e.target.value)||45;u("repDurs",arr);}} style={{...iStyle,width:60}} min={5} max={120}/>
              <span style={{fontSize:11,color:th.tm}}>min</span>
            </div>
          ))}
        </div> : <div style={{padding:10,borderRadius:8,background:th.c,border:`1px solid ${th.b}`}}>
          {(ev.repDurs&&ev.repDurs.length>0 ? ev.repDurs : Array(ev.rep||1).fill(ev.repDur||45)).map((d,i)=>{const st=(ev.repStarts||[])[i];return <span key={i} style={{padding:"4px 10px",borderRadius:6,background:th.ab,fontSize:11,fontWeight:600,marginRight:6,marginBottom:4,display:"inline-block"}}>R{i+1}: {st?st+" ":""}{d} min</span>})}
        </div>}
      </div>
    </div>
    {/* 6. Servicii — fără prețuri, cu ce aducem + nume furnizor */}
    {ev.svc&&Object.keys(ev.svc).some(k=>ev.svc[k])&&<div style={{padding:16,borderRadius:10,background:th.h,border:`1px solid ${th.b}`}}>
      <div style={{fontSize:10,color:th.tm,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Servicii</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {["sunet","lumini","ecran","scena","dj"].filter(k=>ev.svc?.[k]).map(k=>(
          <div key={k} style={{padding:10,borderRadius:8,background:th.c,border:`1px solid ${th.b}`}}>
            <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>{SVC_LABELS[k]||k}</div>
            {editable ? <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <input value={svcInfo[k]?.ceAducem||""} onChange={e=>u("svcInfo",{...svcInfo,[k]:{...svcInfo[k],ceAducem:e.target.value}})} style={{...iStyle,fontSize:12}} placeholder="Ce aducem"/>
              <input value={svcInfo[k]?.furnizor||""} onChange={e=>u("svcInfo",{...svcInfo,[k]:{...svcInfo[k],furnizor:e.target.value}})} style={{...iStyle,fontSize:12}} placeholder="Nume furnizor"/>
            </div> : <div style={{fontSize:11,color:th.ts}}>{(svcInfo[k]?.ceAducem||"—")} {svcInfo[k]?.furnizor&&<span style={{color:th.tm}}>· Furnizor: {svcInfo[k].furnizor}</span>}</div>}
          </div>
        ))}
      </div>
    </div>}
    {/* 7. Alți participanți / furnizori externi — cântă altcineva, DJ extern, sunet/lumini etc. */}
    <div style={{padding:16,borderRadius:10,background:th.h,border:`1px solid ${th.b}`}}>
      <div style={{fontSize:10,color:th.tm,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Alți participanți / furnizori externi</div>
      <div style={{fontSize:11,color:th.ts,marginBottom:10}}>Cântă altcineva, DJ extern, sunet/lumini de la alții — descrieri, nume, telefoane</div>
      {editable ? <>
        <button type="button" onClick={()=>u("fisaExtraItems",[...(ev.fisaExtraItems||[]),{id:uid(),type:"canta_altcineva",desc:"",nume:"",tel:""}])} style={{...sty.bg,fontSize:11,padding:"6px 12px",marginBottom:10}}>+ Adaugă</button>
        {(ev.fisaExtraItems||[]).map((x,i)=>(
          <div key={x.id} style={{padding:12,borderRadius:8,background:th.c,border:`1px solid ${th.b}`,marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <select value={x.type||"canta_altcineva"} onChange={e=>{const arr=[...(ev.fisaExtraItems||[])];arr[i]={...arr[i],type:e.target.value};u("fisaExtraItems",arr);}} style={{...iStyle,flex:1,maxWidth:280}}>
                {FISA_EXTRA_TYPES.map(t=><option key={t.k} value={t.k}>{t.l}</option>)}
              </select>
              <button type="button" onClick={()=>u("fisaExtraItems",(ev.fisaExtraItems||[]).filter((_,j)=>j!==i))} style={{padding:4,border:"none",background:"transparent",color:"#ef4444",cursor:"pointer",marginLeft:6}}>✕</button>
            </div>
            <textarea value={x.desc||""} onChange={e=>{const arr=[...(ev.fisaExtraItems||[])];arr[i]={...arr[i],desc:e.target.value};u("fisaExtraItems",arr);}} style={{...iStyle,minHeight:50,resize:"vertical",fontSize:12,marginBottom:6}} placeholder="Descriere"/>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <input value={x.nume||""} onChange={e=>{const arr=[...(ev.fisaExtraItems||[])];arr[i]={...arr[i],nume:e.target.value};u("fisaExtraItems",arr);}} style={{...iStyle,flex:1,minWidth:120}} placeholder="Nume"/>
              <input value={x.tel||""} onChange={e=>{const arr=[...(ev.fisaExtraItems||[])];arr[i]={...arr[i],tel:e.target.value};u("fisaExtraItems",arr);}} style={{...iStyle,width:140}} placeholder="Telefon (+40...)"/>
            </div>
          </div>
        ))}
        <label style={{...sty.l,fontSize:10,marginTop:12,display:"block"}}>Alte observații</label>
        <textarea value={ev.fisaExtra||""} onChange={e=>u("fisaExtra",e.target.value)} style={{...iStyle,minHeight:60,resize:"vertical",width:"100%"}} placeholder="Orice altceva relevant..."/>
      </> : <>
        {(ev.fisaExtraItems||[]).length>0 ? (ev.fisaExtraItems||[]).map((x,i)=>(
          <div key={x.id} style={{padding:10,borderRadius:8,background:th.c,border:`1px solid ${th.b}`,marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:600,color:th.a}}>{FISA_EXTRA_TYPES.find(t=>t.k===x.type)?.l||x.type}</div>
            {x.desc&&<div style={{fontSize:12,color:th.ts,marginTop:4,whiteSpace:"pre-wrap"}}>{x.desc}</div>}
            {(x.nume||x.tel)&&<div style={{fontSize:11,color:th.tm,marginTop:4}}>{(x.nume||"—")} {x.tel&&<span>· 📞 {x.tel}</span>}</div>}
          </div>
        )) : <div style={{fontSize:12,color:th.tm}}>—</div>}
        {ev.fisaExtra&&<div style={{marginTop:10,padding:10,borderRadius:8,background:th.c,border:`1px solid ${th.b}`}}><div style={{fontSize:10,color:th.tm,marginBottom:4}}>Alte observații</div><div style={{fontSize:12,color:th.ts,whiteSpace:"pre-wrap"}}>{ev.fisaExtra}</div></div>}
      </>}
    </div>
  </div>;
}

// FEATURES — Event form, offer preview, contract, location search
// ═══════════════════════════════════════════════════════════════════════════════
function EventForm({ th, sty, isE, isP, mData, user, onSave, onClose, mob, templates }) {
  const tplCovers = (templates?.playlist&&templates.playlist.length>0) ? templates.playlist : DEFAULT_COVERS;
  const tplVideos = (templates?.videos&&templates.videos.length>0) ? templates.videos : DEFAULT_VIDEOS;
  const [fm, setFm] = useState({
    cat: mData?.cat||"private",
    type: mData?.type||(isP?"Nuntă":"Festival"),
    st: mData?.st||"oferta",
    date: mData?.date||"",
    li: mData?.li||"", sc: mData?.sc||"", ss: mData?.ss||"", lo: mData?.lo||"",
    venue: mData?.venue||"", city: mData?.city||"", dist: mData?.dist||0, locPhone: mData?.locPhone||"", locAddress: mData?.locAddress||"",
    cn: mData?.cn||"", cp: mData?.cp||"", ce: mData?.ce||"",
    rep: mData?.rep||(isP?1:1),
    repDurs: mData?.repDurs||[],
    repStarts: mData?.repStarts||[],
    durataRecital: mData?.durataRecital||"",
    responsabilPrincipal: mData?.responsabilPrincipal||(user?.memberId?MEMBERS.find(m=>m.id===user.memberId)?.n||user.n:""),
    responsabili: mData?.responsabili||[],
    fee: mData?.fee||(isP?PX.r[1]:PX.pub),

                    <input value={x.tel||""} onChange={e=>{const arr=[...(fm.fisaExtraItems||[])];arr[i]={...arr[i],tel:e.target.value};u("fisaExtraItems",arr);}} style={{...iStyle,width:140}} placeholder="Telefon (+40...)"/>

              onSave({...fm, title, date: fm.date||"2026-06-15"});
            }} style={sty.b}>{isE?"Salvează":"Creează ofertă"}</button>

  );

function buildAIContext(evs, tasks) {
  var confirmed = evs.filter(function(e){return e.st==="confirmat";});
  var pending   = evs.filter(function(e){return e.st==="asteptare";});
  var totalRev  = confirmed.reduce(function(s,e){return s+(e.fee||0);},0);
  var upcoming  = evs.filter(function(e){return e.date&&new Date(e.date)>=new Date();}).sort(function(a,b){return a.date>b.date?1:-1;}).slice(0,5).map(function(e){return "  - "+e.date+" | "+(e.cn||e.title||"—")+" | "+(e.type||"")+" | "+e.st+" | "+(e.fee||0)+" RON";}).join("\n")||"  (niciun eveniment viitor)";
  var activeTasks = tasks.filter(function(t){return !t.done;}).slice(0,8).map(function(t){return "  - ["+(t.priority||"medium")+"] "+t.text;}).join("\n")||"  (niciun task activ)";
  return "Esti un asistent AI in Phaser Manager.\n\nDATE LIVE:\nEvenimente: "+evs.length+" (confirmate: "+confirmed.length+", asteptare: "+pending.length+")\nVenit: "+totalRev+" RON\nTasks: "+tasks.filter(function(t){return !t.done;}).length+"\n\nEVENIMENTE VIITOARE:\n"+upcoming+"\n\nTASKS ACTIVE:\n"+activeTasks+"\n\nRaspunde in romana. Fii concis si util.";
}
