      {/* FINANCE POPUP — Fișa financiară E(nr) (data) */}
      {modal==="finance"&&(()=>{
        if(!mData) return null;
        const fromDetail=mData._from==="detail";
        const ev={adminId:"m4",stageId:"m4",...mData};
        // Auto-calculates shares on every update — no "Aplică" needed
        const calcShares=(e)=>{
          const C=e.cursLei||CURS_DEFAULT;const isP=e.cat==="private";
          const svcT=Object.entries(e.svcp||{}).reduce((s,[k,v])=>s+(e.svc?.[k]?v:0),0);
          const tot=(e.fee||0)+svcT;const d=e.dep||0;const r=tot-d;
          const avF=e.avFirma??(e.payType==="firma");const rF=e.restFirma??(e.payType==="firma");
          const impV=Math.round(((avF?d:0)+(rF?r:0))*0.01*100)/100;
          const fc={...DEFAULT_FIXED_COSTS,...(e.fixedCosts||{})};
          const fcL=(fc.technician||0)+(fc.equipment||0)+(fc.soundman||0)+(fc.transport||0);
          const fcE=fcL/C;const fc16=rF?Math.round(fcE*0.16*100)/100:0;
          const net=Math.max(0,tot-impV-fcE-fc16);
          const f5=Math.round(net*0.05*100)/100;const dF=net-f5;
          const d16=rF?Math.round(dF*0.16*100)/100:0;const dD=dF-d16;
          const lPct=isP?0.02:0.01;
          const lAmt=(e.leadId||e.leadCustom)?Math.round(dD*lPct*100)/100:0;
          const aAmt=e.adminId?Math.round(dD*0.02*100)/100:0;
          const sAmt=Math.round(dD*0.02*100)/100;
          const stAmt=e.stageId?Math.round(dD*0.02*100)/100:0;
          const avFondDeduct=e.dp?(e.dep||0):0;
          const promoDeduct=Math.round(dD*0.01*100)/100;
          const pool=Math.max(0,dD-lAmt-aAmt-sAmt-stAmt-avFondDeduct-promoDeduct);
          const sh={};
          MEMBERS.forEach(m=>{sh[m.id]=isP?Math.round(pool*(SPLIT_PRIVATE[m.id]||0)/100*100)/100:Math.round(pool/5*100)/100;});
          if(e.leadId&&!e.leadCustom)sh[e.leadId]=(sh[e.leadId]||0)+lAmt;
          if(e.adminId)sh[e.adminId]=(sh[e.adminId]||0)+aAmt;
          sh["m1"]=(sh["m1"]||0)+sAmt;
          if(e.stageId)sh[e.stageId]=(sh[e.stageId]||0)+stAmt;
          const out={};Object.entries(sh).forEach(([k,v])=>{out[k]=Math.round(v*100)/100;});
          return out;
        };
        const upd=(patch)=>setEvs(p=>p.map(e=>{
          if(e.id!==ev.id)return e;
          const ne={...e,...patch};
          return {...ne,sp:calcShares(ne)};
        }));
        const CURS=ev.cursLei||CURS_DEFAULT;
        const isLei=ev.valuta==="lei";
        const MULT=isLei?CURS:1; // multiplicator: conversia EUR→moneda evenimentului
        const isPrivate=ev.cat==="private";
        // Partial firmă: avans și/sau rest separat
        const avFirma=ev.avFirma??(ev.payType==="firma");
        const restFirma=ev.restFirma??(ev.payType==="firma");
        const anyFirma=avFirma||restFirma;

        // Total brut
        const svcTot=Object.entries(ev.svcp||{}).reduce((s,[k,v])=>s+(ev.svc?.[k]?v:0),0);
        const total=(ev.fee||0)+svcTot;
        const dep=ev.dep||0; const rest=total-dep;

        // 1. Impozit pe venit 1% — doar pe porțiunea pe firmă
        const impVenit=Math.round(((avFirma?dep:0)+(restFirma?rest:0))*0.01*100)/100;
        const svcCostEur=typeof getSvcCost==="function"?getSvcCost(ev,templates?.servicePrices):0;
        const svcCost=Math.round(svcCostEur*MULT*100)/100; // în moneda evenimentului
        const netDupaTax=Math.max(0,total-impVenit-svcCost);

        // 2. Cheltuieli fixe — în moneda evenimentului
        const fc={...DEFAULT_FIXED_COSTS,...(ev.fixedCosts||{})};
        const fcLeiTotal=(fc.technician||0)+(fc.equipment||0)+(fc.soundman||0)+(fc.transport||0);
        const fcEur=fcLeiTotal/CURS;
        const fcBase=isLei?fcLeiTotal:fcEur; // în moneda evenimentului
        // Dacă restul e pe firmă, logistica se bruttifică cu 16% dividende
        const fc16=restFirma?Math.round(fcBase*0.16*100)/100:0;
        const fcEurEffective=fcBase+fc16; // în moneda evenimentului

        // 3. Net după cheltuieli fixe
        const netDupaFixed=Math.max(0,netDupaTax-fcEurEffective);

        // 4. Fond după cheltuieli (implicit 7%, editabil pe eveniment)
        const fondDupCheltPct=Math.min(100,Math.max(0,Number(ev.fondDupCheltPct??7)));
        const fond7=Math.round(netDupaFixed*fondDupCheltPct/100*100)/100;
        const dupaFond=netDupaFixed-fond7;

        // 5. Dividende 16% pe profit — doar când restul e pe firmă
        const div16=restFirma?Math.round(dupaFond*0.16*100)/100:0;
        const dupaDiv=dupaFond-div16;
        // alias pentru compatibilitate cu rezumat
        const onFirma=anyFirma;

        // 6. Roluri
        const leadPct=isPrivate?0.02:0.01;
        const leadName=ev.leadCustom||MEMBERS.find(m=>m.id===ev.leadId)?.short||"";
        const leadAmt=(ev.leadId||ev.leadCustom)?Math.round(dupaDiv*leadPct*100)/100:0;
        const adminAmt=ev.adminId?Math.round(dupaDiv*0.02*100)/100:0;
        const socialAmt=Math.round(dupaDiv*0.02*100)/100; // Carina întotdeauna
        const stageAmt=ev.stageId?Math.round(dupaDiv*0.02*100)/100:0;
        const totalRoluri=leadAmt+adminAmt+socialAmt+stageAmt;

        // 7. Pool de împărțit
        const avansInFond=ev.dp?dep:0;
        const pool=Math.max(0,dupaDiv-totalRoluri-avansInFond);

        // 8. Split per membru — partea de cantat (base) și roluri separate
        const baseShares={};
        const roleBonus={};
        MEMBERS.forEach(m=>{
          const base=isPrivate?Math.round(pool*(SPLIT_PRIVATE[m.id]||0)/100*100)/100:Math.round(pool/5*100)/100;
          baseShares[m.id]=base;
          roleBonus[m.id]=0;
        });
        if(ev.leadId&&!ev.leadCustom){ roleBonus[ev.leadId]=(roleBonus[ev.leadId]||0)+leadAmt; }
        if(ev.adminId){ roleBonus[ev.adminId]=(roleBonus[ev.adminId]||0)+adminAmt; }
        roleBonus["m1"]=(roleBonus["m1"]||0)+socialAmt; // Carina Social Media
        if(ev.stageId){ roleBonus[ev.stageId]=(roleBonus[ev.stageId]||0)+stageAmt; }
        const shares={};
        MEMBERS.forEach(m=>{ shares[m.id]=(baseShares[m.id]||0)+(roleBonus[m.id]||0); });
        /* Rotunjire la pași de 10 lei / 10 €, dar cotele folosesc ÎNTOTDEAUNA suma(shares) ca numitor — rotunjirile la „cantat” fac ca Σ shares ≠ pool; fără normalizare, quota/pool depășea 100% și „ajustarea fond” exploda. */
        const shareTotal = MEMBERS.reduce((s, m) => s + (shares[m.id] || 0), 0);
        const poolLeiExact = pool * CURS;
        const exactLeiNormalized = {};
        MEMBERS.forEach(m => {
          exactLeiNormalized[m.id] =
            shareTotal > 0 && pool > 0 ? poolLeiExact * ((shares[m.id] || 0) / shareTotal) : 0;
        });
        const roundedShares={};
        const roundedSharesLei={};
        let roundingInLei=false;
        let roundUnit=10;
        let roundingAdjFond=0;
        let roundingAdjLei=0;
        const allocateSteps = (targetUnits, step, quotaFn) => {
          const alloc = {};
          MEMBERS.forEach(m => {
            const q = Math.max(0, quotaFn(m.id));
            alloc[m.id] = Math.floor(q / step) * step;
          });
          let slack = targetUnits - MEMBERS.reduce((s, m) => s + (alloc[m.id] || 0), 0);
          let guard = 0;
          while (slack >= step - 1e-9 && guard++ < 10000) {
            let pick = MEMBERS[0].id;
            let best = -Infinity;
            MEMBERS.forEach(m => {
              const rem = quotaFn(m.id) - (alloc[m.id] || 0);
              if (rem > best) {
                best = rem;
                pick = m.id;
              }
            });
            if (best <= 1e-9) break;
            alloc[pick] += step;
            slack -= step;
          }
          return { alloc, slackRemain: slack };
        };
        if (pool <= 0) {
          MEMBERS.forEach(m => {
            roundedSharesLei[m.id] = 0;
            roundedShares[m.id] = 0;
          });
        } else if (restFirma) {
          roundingInLei=true;
          roundUnit=10;
          const poolLei=poolLeiExact;
          const targetBani=Math.round(poolLei*100);
          const stepBani=1000;
          const quotaBani=(id)=>{
            if (shareTotal <= 0) return targetBani / MEMBERS.length;
            return targetBani * ((shares[id]||0) / shareTotal);
          };
          const { alloc: baniAlloc } = allocateSteps(targetBani, stepBani, quotaBani);
          MEMBERS.forEach(m=>{
            roundedSharesLei[m.id]=baniAlloc[m.id]/100;
            roundedShares[m.id]=Math.round((roundedSharesLei[m.id]/CURS)*100)/100;
          });
          roundingAdjLei=Math.round((poolLei-MEMBERS.reduce((s,m)=>s+(roundedSharesLei[m.id]||0),0))*100)/100;
          const roundedPoolTotalEur=MEMBERS.reduce((acc,m)=>acc+(roundedShares[m.id]||0),0);
          roundingAdjFond=Math.round((pool-roundedPoolTotalEur)*100)/100;
        } else {
          roundUnit=10;
          const targetCents=Math.round(pool*100);
          const stepCents=1000;
          const quotaC=(id)=>{
            if (shareTotal <= 0) return targetCents / MEMBERS.length;
            return targetCents * ((shares[id]||0) / shareTotal);
          };
          const { alloc: centAlloc } = allocateSteps(targetCents, stepCents, quotaC);
          MEMBERS.forEach(m=>{ roundedShares[m.id]=Math.round(centAlloc[m.id]/100*100)/100; });
          const roundedPoolTotal=MEMBERS.reduce((acc,m)=>acc+(roundedShares[m.id]||0),0);
          roundingAdjFond=Math.round((pool-roundedPoolTotal)*100)/100;
        }
        const hasRounding=roundingInLei?Math.abs(roundingAdjLei)>=0.01:Math.abs(roundingAdjFond)>0.001;

        const fv=(v)=>v.toLocaleString("ro-RO",{minimumFractionDigits:0,maximumFractionDigits:2})+(isLei?" lei":"€");
        const fvl=(v)=>Math.round(v).toLocaleString("ro-RO")+" lei";
        const Row=({l,v,c,bold})=><div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:`1px solid ${th.bl}`}}>
          <span style={{fontSize:12,color:th.tm}}>{l}</span>
          <span style={{fontSize:12,fontWeight:bold?700:500,color:c||th.t}}>{v}</span>
        </div>;

        return <div style={{position:"fixed",inset:0,background:th.ov,display:"flex",alignItems:mob?"flex-end":"center",justifyContent:"center",zIndex:1100}} onClick={closeModal}>
          <div style={{background:th.c,border:mob?"none":`1px solid ${th.b}`,borderRadius:mob?"16px 16px 0 0":14,width:mob?"100%":500,maxHeight:mob?"92dvh":"92vh",overflow:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{padding:"16px 20px",borderBottom:`1px solid ${th.b}`,display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>
              <div style={{flex:1,display:"flex",alignItems:"center",gap:10}}>
                {fromDetail&&<button onClick={()=>{closeModal();setTimeout(()=>openModal("detail",ev.id),80);}} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:8,border:`1px solid ${th.b}`,background:"transparent",color:th.t,fontSize:12,cursor:"pointer",fontWeight:600}}>← Înapoi</button>}
                <div>
                  <div style={{fontSize:15,fontWeight:700}}>Fișa financiară · O{ev.offerNr||"?"}</div>
                  <div style={{fontSize:11,color:th.tm,marginTop:2}}>{isPrivate?"Privat":"Public"} · {fEvDate(ev)}</div>
                </div>
              </div>
              <button onClick={closeModal} style={{padding:mob?12:4,minWidth:mob?44:undefined,minHeight:mob?44:undefined,border:"none",background:"transparent",color:th.tm,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><IcX s={14}/></button>
            </div>

            <div style={{padding:mob?"16px":"16px 20px",display:"flex",flexDirection:"column",gap:16}}>

              {/* Tip plată */}
              {(()=>{
                const fetchBnr = async (patch) => {
                  try {
                    showToast("Se preia cursul BNR...", "success", 1500);
                    const res = await fetch("https://api.frankfurter.app/latest?from=EUR&to=RON");
                    const data = await res.json();
                    const rate = Math.round(data.rates.RON * 100) / 100;
                    const today = data.date;
                    upd({cursLei: rate, ...(patch||{})});
                    showToast(`Curs BNR ${today}: 1€ = ${rate} lei ✓`);
                  } catch(e) {
                    upd(patch||{});
                    showToast("Nu s-a putut prelua cursul BNR — introdu manual", "error");
                  }
                };
                const handlePayType = (av, re) => {
                  const switchingToFirma = (av || re) && !(avFirma || restFirma);
                  if (switchingToFirma) fetchBnr({avFirma:av, restFirma:re});
                  else upd({avFirma:av, restFirma:re});
                };
                const handleToggle = (k, currentVal) => {
                  const willBeFirma = !currentVal;
                  const alreadyFirma = avFirma || restFirma;
                  if (willBeFirma && !alreadyFirma) fetchBnr({[k]: true});
                  else upd({[k]: !currentVal});
                };
                const CURS_ACT = ev.cursLei || CURS_DEFAULT;
                return <div>
                  <div style={{fontSize:10,color:th.tm,fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Tip plată</div>
                  {/* Shortcuts rapide */}
                  <div style={{display:"flex",gap:6,marginBottom:10}}>
                    {[{l:"🤝 Direct",av:false,re:false},{l:"📤 Avans pe firmă",av:true,re:false},{l:"🏢 Tot pe firmă",av:true,re:true}].map(({l,av,re})=>{
                      const active=avFirma===av&&restFirma===re;
                      return <button key={l} onClick={()=>handlePayType(av,re)} style={{flex:1,padding:"8px 4px",borderRadius:8,border:`1px solid ${active?th.a:th.b}`,background:active?th.ab:"transparent",color:active?th.a:th.tm,fontWeight:active?700:400,fontSize:10,cursor:"pointer",textAlign:"center"}}>{l}</button>;
                    })}
                  </div>
                  {/* Granular toggles */}
                  <div style={{display:"flex",gap:6,marginBottom:8}}>
                    {[{k:"avFirma",l:"Avans pe firmă",v:avFirma,amt:dep},{k:"restFirma",l:"Rest pe firmă",v:restFirma,amt:rest}].map(({k,l,v,amt})=>(
                      <div key={k} onClick={()=>handleToggle(k,v)} style={{flex:1,padding:"8px 10px",borderRadius:8,border:`2px solid ${v?"#f59e0b":th.b}`,cursor:"pointer",background:v?"rgba(245,158,11,.07)":"transparent",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{fontSize:11,color:v?"#f59e0b":th.tm,fontWeight:v?600:400}}>{l}</span>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:11,fontWeight:700,color:v?"#f59e0b":th.tm}}>{fv(amt)}</div>
                          {v&&isLei&&<div style={{fontSize:9,color:"#f59e0b",marginTop:1}}>{Math.round(amt*CURS_ACT).toLocaleString("ro-RO")} lei</div>}
                          {v&&!isLei&&<div style={{fontSize:9,color:"#f59e0b",marginTop:1}}>{Math.round(amt*CURS_ACT).toLocaleString("ro-RO")} lei · imp. 1%: {Math.round(amt*0.01*CURS_ACT).toLocaleString("ro-RO")} lei</div>}
                          {!v&&<div style={{fontSize:9,color:th.tm}}>impozit 1%: {fv(amt*0.01)}</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                  {/* Curs BNR */}
                  <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                    <span style={{fontSize:11,color:th.tm}}>Curs 1€ =</span>
                    <input type="number" min={1} max={100} step={0.01} defaultValue={ev.cursLei||5} key={ev.id+"_curs_"+(ev.cursLei||5)} onBlur={e=>{const v=parseFloat(e.target.value)||5;upd({cursLei:v});}} style={{...sty.i,width:70,padding:5,fontSize:12}} placeholder="5.00"/>
                    <span style={{fontSize:11,color:th.tm}}>lei</span>
                    <button onClick={()=>fetchBnr()} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 10px",borderRadius:7,border:`1px solid ${th.b}`,background:"transparent",color:"#f59e0b",fontSize:11,cursor:"pointer",fontWeight:600}}>↻ BNR azi</button>
                    {(avFirma||restFirma)&&<div style={{fontSize:10,color:th.tm,width:"100%",marginTop:2}}>
                      {avFirma&&<span>Avans: <strong style={{color:"#f59e0b"}}>{Math.round(dep*CURS_ACT).toLocaleString("ro-RO")} lei</strong></span>}
                      {avFirma&&restFirma&&<span style={{margin:"0 6px"}}>·</span>}
                      {restFirma&&<span>Rest: <strong style={{color:"#f59e0b"}}>{Math.round(rest*CURS_ACT).toLocaleString("ro-RO")} lei</strong></span>}
                    </div>}
                  </div>
                </div>;
              })()}

              {/* Plăți primite */}
              <div>
                <div style={{fontSize:10,color:th.tm,fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Plăți primite</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  <div onClick={()=>{const nd=!ev.dp;upd({dp:nd,...(nd&&ev.st==="plata_avans"?{st:"confirmat"}:{})});showToast(nd?(ev.st==="plata_avans"?"Avans încasat ✓ — confirmat":"Avans: încasat ✓"):"Avans: neîncasat");}} style={{padding:12,borderRadius:8,background:th.h,textAlign:"center",cursor:"pointer",border:`2px solid ${ev.dp?"#22c55e":th.b}`,transition:"border-color .15s"}}>
                    <div style={{fontSize:9,color:th.tm,textTransform:"uppercase",marginBottom:4}}>Avans {ev.dp?"✓":""}</div>
                    <div style={{fontSize:16,fontWeight:700,color:ev.dp?"#22c55e":"#ef4444"}}>{fv(dep)}</div>
                    <div style={{fontSize:9,color:ev.dp?"#22c55e":"#ef4444",marginTop:2}}>{ev.dp?"Încasat":"Neîncasat · click"}</div>
                  </div>
                  <div onClick={()=>{upd({restPaid:!ev.restPaid});showToast(ev.restPaid?"Rest: neplătit":"Rest: plătit integral ✓");}} style={{padding:12,borderRadius:8,background:th.h,textAlign:"center",cursor:"pointer",border:`2px solid ${ev.restPaid?"#22c55e":th.b}`,transition:"border-color .15s"}}>
                    <div style={{fontSize:9,color:th.tm,textTransform:"uppercase",marginBottom:4}}>Rest {ev.restPaid?"✓":""}</div>
                    <div style={{fontSize:16,fontWeight:700,color:ev.restPaid?"#22c55e":th.t}}>{fv(rest)}</div>
                    <div style={{fontSize:9,color:ev.restPaid?"#22c55e":"#f59e0b",marginTop:2}}>{ev.restPaid?"Plătit integral":"Neîncasat · click"}</div>
                  </div>
                </div>
                {ev.dp&&ev.restPaid&&<div style={{fontSize:10,color:"#22c55e",fontWeight:600,textAlign:"center",marginTop:6}}>✓ Eveniment plătit integral — {fondDupCheltPct}% fond activ</div>}
              </div>

              {/* Fond după cheltuieli — procent din net (după logistică), standard 7% */}
              <div style={{padding:"12px 14px",borderRadius:8,background:th.h,border:`1px solid ${th.b}`}}>
                <div style={{fontSize:10,color:th.tm,fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>{ev.dp?"Fond extra":"Fond"}</div>
                <div style={{fontSize:11,color:th.ts,marginBottom:10,lineHeight:1.4}}>Procent din <strong>netul după logistică</strong> (vezi „Net după cheltuieli” în distribuție). Implicit 7%.</div>
                <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                  <input type="number" min={0} max={100} step={0.5} value={ev.fondDupCheltPct==null?7:ev.fondDupCheltPct} onChange={e=>{const raw=e.target.value;const v=raw===""?7:Math.min(100,Math.max(0,Number(raw)||0));upd({fondDupCheltPct:v});}} style={{...sty.i,width:72,padding:8,fontSize:14,textAlign:"right"}}/>
                  <span style={{fontSize:13,color:th.tm}}>%</span>
                  <span style={{fontSize:12,color:th.tm,flex:1,minWidth:120}}>→ {fv(fond7)} reținut pentru fond</span>
                </div>
              </div>

              {/* Cheltuieli fixe editabile */}
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{fontSize:10,color:th.tm,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Cheltuieli fixe logistică</div>
                  <button onClick={()=>upd({fixedCosts:{...DEFAULT_FIXED_COSTS}})} style={{...sty.bg,fontSize:9,padding:"2px 8px"}}>Reset</button>
                </div>
                {[{k:"technician",l:"Tehnician (bază)"},{k:"equipment",l:"Scule"},{k:"soundman",l:"Sunetist"},{k:"transport",l:"Transport"}].map(({k,l})=>(
                  <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                    <span style={{fontSize:12,flex:1}}>{l}</span>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <input type="number" value={(ev.fixedCosts||DEFAULT_FIXED_COSTS)[k]??""} onChange={e=>{const v=e.target.value;upd({fixedCosts:{...DEFAULT_FIXED_COSTS,...(ev.fixedCosts||{}),[k]:v===''?0:Number(v)||0}});}} style={{...sty.i,width:70,padding:4,fontSize:12,textAlign:"right"}} placeholder="0"/>
                      <span style={{fontSize:11,color:th.tm,width:22}}>lei</span>
                      {!isLei&&<span style={{fontSize:11,color:th.tm,width:36}}>{fv(((ev.fixedCosts||DEFAULT_FIXED_COSTS)[k]||0)/CURS)}</span>}
                    </div>
                  </div>
                ))}
                <div style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderTop:`1px solid ${th.b}`,marginTop:4}}>
                  <span style={{fontSize:12,fontWeight:600}}>Total logistică</span>
                  <span style={{fontSize:12,fontWeight:700,color:"#ef4444"}}>{isLei?fv(fcBase):`${fvl(fcLeiTotal)} / ${fv(fcEur)}`}{onFirma?<span style={{fontSize:10,color:th.tm}}> (+16% div. = {fv(fcBase*1.16)})</span>:null}</span>
                </div>
              </div>

              {/* Calcul distribuție */}
              <div>
                <div style={{fontSize:10,color:th.tm,fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Distribuție</div>
                <div style={{background:th.h,borderRadius:8,padding:"10px 12px",display:"flex",flexDirection:"column",gap:2}}>
                  <Row l="Total brut" v={fv(total)} bold/>
                  {avFirma&&<Row l={`Avans pe firmă 1% (din ${fv(dep)})`} v={"-"+fv(dep*0.01)} c="#f59e0b"/>}
                  {restFirma&&<Row l={`Rest pe firmă 1% (din ${fv(rest)})`} v={"-"+fv(rest*0.01)} c="#f59e0b"/>}
                  {impVenit>0&&<Row l="Total impozit venit 1%" v={"-"+fv(impVenit)} c="#ef4444"/>}
                  {svcCost>0&&<>{typeof getSvcCostBreakdown==="function"&&getSvcCostBreakdown(ev,templates?.servicePrices).map(({label,cost})=><Row key={label} l={label} v={"-"+fv(Math.round(cost*MULT*100)/100)} c="#ef4444"/>)}{<Row l="Cost servicii tehnice (furnizori) — total" v={"-"+fv(svcCost)} c="#ef4444" bold/>}</>}

                  <Row l={isLei?`Cheltuieli fixe`:`Cheltuieli fixe (${fvl(fcLeiTotal)})`} v={"-"+fv(fcBase)} c="#ef4444"/>
                  {fc16>0&&<Row l="16% div. pe logistică (pe firmă)" v={"-"+fv(fc16)} c="#ef4444"/>}

                  {(ev.leadId||ev.leadCustom)&&<Row l={`Lead ${isPrivate?"2%":"1%"} — ${leadName}`} v={"-"+fv(leadAmt)} c="#f59e0b"/>}
                  {ev.adminId&&<Row l={`Administrator 2% — ${MEMBERS.find(m=>m.id===ev.adminId)?.short||""}`} v={"-"+fv(adminAmt)} c="#f59e0b"/>}
                  {ev.stageId&&<Row l={`Stage Manager 2% — ${MEMBERS.find(m=>m.id===ev.stageId)?.short||""}`} v={"-"+fv(stageAmt)} c="#f59e0b"/>}
                </div>
                <div style={{padding:"10px 12px",borderRadius:8,background:th.ab,display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
                  <span style={{fontSize:13,fontWeight:600}}>De împărțit</span>
                  <span style={{fontSize:20,fontWeight:800,color:"#22c55e"}}>{fv(pool)}</span>

              {/* Rezumat taxe */}
              <div style={{padding:"10px 14px",borderRadius:8,background:th.h,border:`1px solid ${th.b}`}}>

                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  {/* Cost total servicii — furnizori tehnici + logistică fixă */}
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}><span style={{color:th.tm}}>Cost servicii tehnice (furnizori)</span><span style={{color:"#ef4444",fontWeight:600}}>-{fv(svcCost+fcBase)}</span></div>
                  {/* Impozit pe venit */}
                  {impVenit>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:11}}><span style={{color:th.tm}}>Impozit pe venit 1% {avFirma&&restFirma?"(total)":avFirma?"(avans)":"(rest)"}</span><span style={{color:"#ef4444",fontWeight:600}}>-{fv(impVenit)}</span></div>}
                  {/* Dividende — logistică + profit */}
                  {(fc16+div16)>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:11}}><span style={{color:th.tm}}>Dividende 16%</span><span style={{color:"#ef4444",fontWeight:600}}>-{fv(fc16+div16)}</span></div>}
                  {/* Fond total — avans intrat + fond % */}
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}><span style={{color:th.tm}}>{ev.dp?`Fond extra (${fondDupCheltPct}%) + avans fond`:`Fond (${fondDupCheltPct}%)`}</span><span style={{color:"#6366f1",fontWeight:600}}>-{fv(ev.dp?avansInFond+fond7:fond7)}</span></div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,borderTop:`1px solid ${th.b}`,paddingTop:6,marginTop:2}}><span style={{fontWeight:600}}>Total reținut</span><span style={{color:"#ef4444",fontWeight:700}}>-{fv(impVenit+svcCost+fcEurEffective+(ev.dp?avansInFond+fond7:fond7)+div16)}</span></div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12}}><span style={{fontWeight:600,color:"#22c55e"}}>Net trupă</span><span style={{color:"#22c55e",fontWeight:700}}>{fv(pool)}</span></div>
                </div>
              </div>

              {/* Roluri */}
              <div>
                <div style={{fontSize:10,color:th.tm,fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Roluri eveniment</div>
                {/* Lead */}
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:11,color:th.tm,marginBottom:6}}>Lead ({isPrivate?"2%":"1%"}) · cine a adus evenimentul</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:(ev.leadCustom!==undefined&&ev.leadCustom!==null&&ev.leadCustom!=='')?6:0}}>
                    <button onClick={()=>upd({leadId:null,leadCustom:null})} style={{padding:"4px 11px",borderRadius:20,border:`1px solid ${(!ev.leadId&&!ev.leadCustom)?th.a:th.b}`,background:(!ev.leadId&&!ev.leadCustom)?th.ab:"transparent",color:(!ev.leadId&&!ev.leadCustom)?th.a:th.tm,fontSize:11,cursor:"pointer",fontWeight:(!ev.leadId&&!ev.leadCustom)?700:400}}>Nimeni</button>
                    {MEMBERS.map(m=><button key={m.id} onClick={()=>upd({leadId:m.id,leadCustom:null})} style={{padding:"4px 11px",borderRadius:20,border:`1px solid ${(ev.leadId===m.id&&!ev.leadCustom)?th.a:th.b}`,background:(ev.leadId===m.id&&!ev.leadCustom)?th.ab:"transparent",color:(ev.leadId===m.id&&!ev.leadCustom)?th.a:th.tm,fontSize:11,cursor:"pointer",fontWeight:(ev.leadId===m.id&&!ev.leadCustom)?700:400}}>{m.short}</button>)}
                    <button onClick={()=>upd({leadId:null,leadCustom:ev.leadCustom||""})} style={{padding:"4px 11px",borderRadius:20,border:`1px solid ${ev.leadCustom?th.a:th.b}`,background:ev.leadCustom?th.ab:"transparent",color:ev.leadCustom?th.a:th.tm,fontSize:11,cursor:"pointer",fontWeight:ev.leadCustom?700:400}}>Altcineva…</button>
                  </div>
                  {ev.leadCustom!==undefined&&ev.leadCustom!==null&&<input value={ev.leadCustom||""} onChange={e=>upd({leadCustom:e.target.value})} placeholder="Nume persoană externă" style={{...sty.i,width:"100%",padding:"6px 10px",fontSize:12,boxSizing:"border-box"}}/>}
                </div>
                {/* Administrator */}
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:11,color:th.tm,marginBottom:6}}>Administrator (2%)</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                    <button onClick={()=>upd({adminId:null})} style={{padding:"4px 11px",borderRadius:20,border:`1px solid ${!ev.adminId?th.a:th.b}`,background:!ev.adminId?th.ab:"transparent",color:!ev.adminId?th.a:th.tm,fontSize:11,cursor:"pointer",fontWeight:!ev.adminId?700:400}}>Nimeni</button>
                    {MEMBERS.map(m=><button key={m.id} onClick={()=>upd({adminId:m.id})} style={{padding:"4px 11px",borderRadius:20,border:`1px solid ${ev.adminId===m.id?th.a:th.b}`,background:ev.adminId===m.id?th.ab:"transparent",color:ev.adminId===m.id?th.a:th.tm,fontSize:11,cursor:"pointer",fontWeight:ev.adminId===m.id?700:400}}>{m.short}</button>)}
                  </div>
                </div>
                {/* Stage Manager */}
                <div style={{marginBottom:4}}>
                  <div style={{fontSize:11,color:th.tm,marginBottom:6}}>Stage Manager (2%)</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                    <button onClick={()=>upd({stageId:null})} style={{padding:"4px 11px",borderRadius:20,border:`1px solid ${!ev.stageId?th.a:th.b}`,background:!ev.stageId?th.ab:"transparent",color:!ev.stageId?th.a:th.tm,fontSize:11,cursor:"pointer",fontWeight:!ev.stageId?700:400}}>Nimeni</button>
                    {MEMBERS.map(m=><button key={m.id} onClick={()=>upd({stageId:m.id})} style={{padding:"4px 11px",borderRadius:20,border:`1px solid ${ev.stageId===m.id?th.a:th.b}`,background:ev.stageId===m.id?th.ab:"transparent",color:ev.stageId===m.id?th.a:th.tm,fontSize:11,cursor:"pointer",fontWeight:ev.stageId===m.id?700:400}}>{m.short}</button>)}
                  </div>
                </div>
              </div>

              {/* Split per membru */}
              <div>
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:10,color:th.tm,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Total per membru</div>
                </div>
                {MEMBERS.map(m=>{
                  const base=baseShares[m.id]||0;
                  const rol=roleBonus[m.id]||0;
                  const total=shares[m.id]||0;
                  const exactEurNorm=shareTotal>0?pool*((shares[m.id]||0)/shareTotal):0;
                  const socialInCantat=m.id==="m1";
                  const baseDisp=socialInCantat?base+socialAmt:base;
                  const rolDisp=socialInCantat?rol-socialAmt:rol;
                  const hasRol=rolDisp>0.005;
                  const rolLabel=ev.leadId===m.id&&!ev.leadCustom?"Lead":ev.adminId===m.id?"Administrator":ev.stageId===m.id?"Stage Manager":null;
                  const exLei=exactLeiNormalized[m.id]||0;
                  return (
                  <div key={m.id} style={{padding:"8px 0",borderBottom:`1px solid ${th.bl}`}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:26,height:26,borderRadius:"50%",background:th.a,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:th.bg,flexShrink:0}}>{m.n[0]}</div>
                      <span style={{fontSize:12,flex:1}}>{m.n.split(" ")[0]}</span>
                      <div style={{textAlign:"right"}}>
                      {roundingInLei?<>
                        <div style={{fontSize:13,fontWeight:700}}>{(roundedSharesLei[m.id]||0).toLocaleString("ro-RO")} lei</div>
                        <div style={{fontSize:9,color:th.tm}}>≈ {fv(roundedShares[m.id])} (ref. €)</div>
                        {hasRounding&&Math.abs((roundedSharesLei[m.id]||0)-exLei)>=0.5&&<div style={{fontSize:9,color:th.tm,textDecoration:"line-through",textAlign:"right"}}>{Math.round(exLei).toLocaleString("ro-RO")} lei · {fv(exactEurNorm)} <span style={{opacity:.85}}>(ref. închis la pool)</span></div>}
                      </>:<>
                        <div style={{fontSize:13,fontWeight:700}}>{hasRounding?fv(roundedShares[m.id]):fv(total)}</div>
                        {hasRounding&&Math.abs((roundedShares[m.id]||0)-exactEurNorm)>=0.05&&<div style={{fontSize:9,color:th.tm,textDecoration:"line-through",textAlign:"right"}}>{fv(exactEurNorm)} <span style={{opacity:.85}}>(ref. închis la pool)</span></div>}
                      </>}
                    </div>
                    </div>
                    {hasRol&&<div style={{display:"flex",justifyContent:"flex-end",gap:12,marginTop:4,marginLeft:34,fontSize:11,color:th.tm}}>
                      <span>Parte cantat: {fv(baseDisp)}</span>
                      <span style={{color:"#f59e0b",fontWeight:600}}>{rolLabel||"Bonus rol"}: {fv(rolDisp)}</span>
                    </div>}
                  </div>
                );})}
                {hasRounding&&<div style={{marginTop:8,padding:"8px 10px",borderRadius:8,background:(roundingInLei?roundingAdjLei:roundingAdjFond)>0?"rgba(34,197,94,.08)":"rgba(245,158,11,.08)",border:`1px solid ${(roundingInLei?roundingAdjLei:roundingAdjFond)>0?"rgba(34,197,94,.3)":"rgba(245,158,11,.3)"}`,fontSize:11,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
                  <span style={{color:th.tm}}>{roundingInLei?`📐 Rotunjire la ${roundUnit} lei (curs 1€ = ${CURS} lei) · ajustare fond`:`📐 Rotunjire la ${roundUnit}€ · ajustare fond`}</span>
                  <strong style={{color:(roundingInLei?roundingAdjLei:roundingAdjFond)>0?"#22c55e":"#f59e0b"}}>
                    {roundingInLei
                      ? <>{roundingAdjLei>0?"+":""}{roundingAdjLei.toLocaleString("ro-RO")} lei <span style={{fontWeight:600,opacity:.85}}>(≈ {roundingAdjFond>0?"+":""}{fv(roundingAdjFond)})</span></>
                      : <>{roundingAdjFond>0?"+":""}{fv(roundingAdjFond)}</>}
                  </strong>
                </div>}
              </div>


            </div>
          </div>
        </div>;
      })()}

            {/* OFFER PREVIEW */}
      {modal==="oferta"&&mData&&(()=>{const ev=mData.ev||mData; const fromDetail=mData.from==="detail"; return <OfferPreview
        ev={ev}
        initialTab={mData.initialTab}
        fromDetail={fromDetail}
        onBackToDetail={fromDetail?()=>{closeModal();setTimeout(()=>openModal("detail",ev.id),80);}:undefined}
        evStatus={ev.st}
        onStatusChange={updSt}
        onOfferUpdate={(id,up)=>{
          setEvs(p=>p.map(e=>e.id===id?{...e,...up}:e));
          // Sync GCal în afara updater-ului (side effects nu se pun în setEvs)
          const gcalFields=["responsabilPrincipal","type","date","venue","city","st"];
          if(gcalActive && Object.keys(up).some(k=>gcalFields.includes(k))){
            const ev=evs.find(e=>e.id===id);
            if(ev?.gcalId){
              const updatedEv={...ev,...up};
              syncToGCal(updatedEv).then(newId=>{
                if(newId) setEvs(p=>p.map(e=>e.id===id?{...e,gcalId:newId}:e));
              });
            }
          }
        }}
        th={th}
        mob={mob}
        onClose={closeModal}
        onEdit={p.e?()=>{closeModal();setTimeout(()=>openModal("form",ev.id),80);}:undefined}
        memberProfiles={memberProfiles}
        sty={sty}
        templates={templates}
        showToast={showToast}
        htmlProxyBase={htmlShareProxyBase}
      />})()}

      {tourStep!==null&&<TourOverlay steps={TOUR_STEPS} step={tourStep} setStep={setTourStep} setTab={setTab}/>}
      <AIChatWidget th={th} evs={evs} tasks={tasks} mob={mob} aiSettings={aiSettings} setAiSettings={setAiSettings}/>
      <Toast message={toast.message} visible={toast.visible} variant={toast.variant}/>
    </div>
  );
}

// Error Boundary — prinde erori de randare React
class AppErrorBoundary extends React.Component {
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(err){return{err};}
  componentDidCatch(err,info){console.error("AppErrorBoundary:",err,info);}
  render(){if(this.state.err){return <div style={{padding:24,maxWidth:480,margin:"40px auto",fontFamily:"system-ui",background:"#1a1a1a",color:"#fff",borderRadius:12,border:"1px solid #333"}}><h2 style={{color:"#ef4444"}}>Eroare aplicație</h2><pre style={{margin:"12px 0",fontSize:12,whiteSpace:"pre-wrap",color:"#fca5a5"}}>{String(this.state.err.message||this.state.err)}</pre><p style={{marginTop:12,color:"#a1a1aa",fontSize:12}}>Deschide Consola (F12) pentru detalii.</p></div>;}return this.props.children;}
}

  if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {

  } else {
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AppErrorBoundary><App/></AppErrorBoundary>);
  }
} catch (e) {
  document.getElementById('root').innerHTML = '<div style="padding:24px;font-family:monospace;color:#ef4444;white-space:pre-wrap;font-size:12px">Eroare: ' + (e.message||e) + '\n\n' + (e.stack||'') + '</div>';
}

  </script>
