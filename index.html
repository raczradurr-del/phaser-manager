  const t = String(raw ?? "").trim();
  if (/^https?:\/\/offer\.phaser\.ro\b/i.test(t)) return "";
  if (t.startsWith("http")) return t.replace(/\/$/, "");
  return "";
}

  `https://${String(workerName || "").trim()}.${PHASER_CF_WORKERS_SUBDOMAIN}.workers.dev`;

  const c = normalizeOfferHtmlProxyBase(customFullUrl);

function phaserWorkersMigrateUrl(url) {
  if (!url || typeof url !== "string") return url;
  const suffix = `.${PHASER_CF_WORKERS_SUBDOMAIN}.workers.dev`;
  return url
    .replace(/\.raczradurr\.workers\.dev\b/gi, suffix)
    .replace(/\.phaser\.workers\.dev\b/gi, suffix)
    .replace(/\.billowing-cherry-1e3b\.workers\.dev\b/gi, suffix);
}

/** Normalizează URL salvat: workers.dev vechi → subdomeniu curent; phaser-html-proxy.*.workers.dev → WORKER_PUBLIC_HTML_BASE dacă e setat. */
function normalizeStoredOfferHtmlProxy(str) {
  let u = normalizeOfferHtmlProxyBase(phaserWorkersMigrateUrl(String(str || "")));
  if (!u) return u;
  const branded = normalizeOfferHtmlProxyBase(WORKER_PUBLIC_HTML_BASE);
  if (branded && /phaser-html-proxy\./i.test(u) && /\.workers\.dev/i.test(u)) return branded;

}

  let u = normalizeOfferHtmlProxyBase(aiSettings?.offerHtmlProxy);

/** Link partajabil: dacă shareBase are https → acel host + fișier; altfel getPublicUrl (Supabase). Al treilea argument = baza deja rezolvată (ex. htmlShareProxyBase). */
const buildShareableHtmlPublicUrl = (sb, objectPath, shareBaseResolved) => {
  const p = String(objectPath || "").replace(/^\/+/, "");
  if (!p || !sb) return "";
  const proxy = normalizeOfferHtmlProxyBase(shareBaseResolved);
  if (proxy) return `${proxy}/${p}`;
  const { data } = sb.storage.from(FISA_PUBLIC_BUCKET).getPublicUrl(p);
  return data?.publicUrl || "";
};
/** HEAD către linkul proxy (CORS pe worker) — detectează 404 pe root sau worker nealiniat cu Supabase. */
const verifyShareableProxyUrl = async (url) => {
  const u = String(url || "");
  if (!/^https?:\/\//i.test(u)) return true;
  if (!/workers\.dev|html-proxy|offer\.phaser\.ro/i.test(u)) return true;
  try {
    const r = await fetch(u, { method: "HEAD", mode: "cors", cache: "no-store" });
    return r.ok;
  } catch (_) {
    return false;
  }
};
const generatePdfFromHtml = async (html, timeoutMs) => {
  if (!PDF_WORKER_URL || !PDF_WORKER_URL.startsWith("http") || !html) return null;
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), typeof timeoutMs === "number" ? timeoutMs : 5000);
  const res = await fetch(PDF_WORKER_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ html, baseUrl: window.location.origin + "/" }), signal: ctrl.signal });
  clearTimeout(t);
  if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error || err.details || "Eroare Worker"); }
  return await res.blob();
};

function useIsMobile() {
  const [mob, setMob] = useState(typeof window !== "undefined" ? window.innerWidth < 768 : false);

    const h = () => setMob(window.innerWidth < 768);
    window.addEventListener("resize", h);

  }, []);
  return mob;
}

function useLocalStorageState(key, initial, opts = {}) {
  const { version, migrate } = opts;
  const [state, setState] = useState(() => {
    try {
      const s = localStorage.getItem(key);
      if (!s) return typeof initial === "function" ? initial() : initial;
      let d = JSON.parse(s);
      if (migrate && typeof migrate === "function") d = migrate(d, version);
      return d;
    } catch (e) { return typeof initial === "function" ? initial() : initial; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(state)); } catch (e) {} }, [key, state]);
  return [state, setState];
}

function useToasts(duration = 2500) {
  const [toast, setToast] = useState({ visible: false, message: "", variant: "success" });
  const showToast = (msg, variant = "success", dur) => {
    const ms = dur != null ? dur : (variant === "error" ? 5200 : duration);
    setToast({ visible: true, message: msg, variant });
    setTimeout(() => setToast({ visible: false, message: "", variant: "success" }), ms);
  };
  return { toast, showToast };
}

function useModal() {
  const [modal, setModal] = useState(null);
  const [payload, setPayload] = useState(null);
  const openModal = (type, data) => { setModal(type); setPayload(data ?? null); };
  const closeModal = () => { setModal(null); setPayload(null); };
  return { modal, payload, openModal, closeModal };
}

const fDFisa = d => { if(!d) return "—"; return new Date(d+"T00:00:00").toLocaleDateString("ro",{day:"2-digit",month:"2-digit",year:"numeric"}); };
/** Afișare dată eveniment: zi exactă, lună, an, variante, text liber, fără dată */
const MONTHS_SHORT_RO = ["ian.","feb.","mar.","apr.","mai","iun.","iul.","aug.","sep.","oct.","nov.","dec."];
const getEventDateKind = (ev) => {
  if (!ev) return "none";
  if (ev.dateKind) return ev.dateKind;
  if (ev.dateMonth && /^\d{4}-\d{2}$/.test(ev.dateMonth)) return "month";
  if (ev.dateYear != null && ev.dateYear !== "") return "year";
  if ((ev.dateOptions || []).length) return "multi";
  if (ev.date && /^\d{4}-\d{2}-\d{2}$/.test(ev.date)) return "day";
  return "none";
};
const fEvDate = (ev) => {
  if (!ev) return "—";
  const k = getEventDateKind(ev);
  if (k === "none") return (ev.dateNote || "").trim() || "Fără dată";
  if (k === "text") return (ev.dateNote || "").trim() || "—";
  if (k === "month" && ev.dateMonth && /^\d{4}-\d{2}$/.test(ev.dateMonth)) {
    const [y, mo] = ev.dateMonth.split("-").map(Number);
    return `${MONTHS_SHORT_RO[mo - 1]} ${y}`;
  }
  if (k === "year" && ev.dateYear != null && ev.dateYear !== "") return String(ev.dateYear);
  if (k === "multi") {
    const o = (ev.dateOptions || []).filter(d => /^\d{4}-\d{2}-\d{2}$/.test(d));
    return o.length ? o.map(fD).join(" · ") : "—";
  }
  if (ev.date) return fD(ev.date);
  return "—";
};
const evPeriodStartMs = (ev) => {
  if (!ev) return 0;
  const k = getEventDateKind(ev);
  if (k === "day" && ev.date && /^\d{4}-\d{2}-\d{2}$/.test(ev.date)) return new Date(ev.date + "T00:00:00").getTime();
  if (k === "month" && ev.dateMonth && /^\d{4}-\d{2}$/.test(ev.dateMonth)) {
    const [y, mo] = ev.dateMonth.split("-").map(Number);
    return new Date(y, mo - 1, 1).getTime();

  if (k === "multi") {
    const opts = (ev.dateOptions || []).filter(d => /^\d{4}-\d{2}-\d{2}$/.test(d));
    if (opts.length) return Math.min(...opts.map(d => new Date(d + "T00:00:00").getTime()));
  }
  if (k === "text" || k === "none") {
    if (ev.cr && /^\d{4}-\d{2}-\d{2}$/.test(ev.cr)) return new Date(ev.cr + "T12:00:00").getTime();

/**
 * După await (ex. upload Supabase), clipboard.writeText poate eșua fără gesture.
 * Fallback-ul cu execCommand('copy') copiază SELECȚIA CURENTĂ din pagină dacă textarea
 * nu primește focus (mobil) — de aici paste cu tot HTML-ul ofertei. Ștergem selecția și forțăm focus.
 */
const copyTextToClipboardSafe = async (text) => {
  const s = String(text ?? "").trim();
  if (!s) return false;
  try {
    if (typeof navigator !== "undefined" && navigator.clipboard?.writeText) {
      await navigator.clipboard.writeText(s);
      return true;
    }
  } catch (e) { /* continuă cu fallback */ }
  try {
    const sel = typeof window !== "undefined" && window.getSelection && window.getSelection();
    if (sel && sel.rangeCount) sel.removeAllRanges();
  } catch (e) { /* ignore */ }
  const ta = document.createElement("textarea");
  ta.value = s;
  ta.setAttribute("readonly", "");
  ta.setAttribute("aria-hidden", "true");
  ta.style.cssText = "position:fixed;top:0;left:0;width:2px;height:2px;padding:0;margin:0;border:0;outline:0;opacity:0.01;z-index:2147483647;font-size:16px;";
  document.body.appendChild(ta);
  let ok = false;
  try {
    ta.focus();
    ta.select();
    if (typeof ta.setSelectionRange === "function") ta.setSelectionRange(0, s.length);
    ok = document.execCommand("copy");
  } catch (e) {
    ok = false;
  } finally {
    try { document.body.removeChild(ta); } catch (e2) { /* ignore */ }
  }
  return !!ok;
};

const normalizeCssUrlPathForExport = (raw) => {
  let p = String(raw || "")
    .replace(/&quot;/gi, '"')
    .replace(/&#(?:0*34|[xX]22);/g, '"')
    .replace(/&apos;|&#(?:0*39|[xX]27);/g, "'")
    .replace(/&amp;/g, "&")
    .trim();
  while ((p.startsWith('"') && p.endsWith('"')) || (p.startsWith("'") && p.endsWith("'")))
    p = p.slice(1, -1).trim();
  return p;
};
/** Relativ → absolut; https deja valid rămasă; https „stricat” (ex. …/ &quot;assets/… ) reparat. */
const resolveCssUrlToAbsoluteForExport = (pathOrUrl, base) => {
  let x = normalizeCssUrlPathForExport(pathOrUrl);
  if (!x || x.startsWith("data:") || x.startsWith("#")) return null;
  if (/^[a-z]+:/i.test(x) && !/^https?:/i.test(x)) return null;
  if (/^https?:\/\//i.test(x)) {
    const needsUnmangle = /&quot;|\/"|\/%22/i.test(x);
    if (!needsUnmangle) return x;
    const om = x.match(/^https?:\/\/[^/]+/i);
    if (!om) return null;
    const origin = om[0];
    let rest = normalizeCssUrlPathForExport(x.slice(origin.length).replace(/^\/+/, ""));
    try { return new URL(rest, origin + "/").href; } catch (e) { return null; }
  }
  try { return new URL(x, base).href; } catch (e) { return null; }
};
/** CSSOM (style.backgroundImage) e fără &quot; — rezolvăm înainte de innerHTML. */
const rewriteBackgroundImageUrlsInClone = (root, base) => {
  if (!root || !base) return;
  root.querySelectorAll("*").forEach((el) => {
    const bi = el.style && el.style.backgroundImage;
    if (!bi || bi === "none") return;
    const next = bi.replace(/\burl\s*\(\s*([^)]+)\s*\)/gi, (full, inner0) => {
      let inner = inner0.trim();
      const q = inner[0];
      if ((q === '"' || q === "'") && inner.endsWith(q)) inner = inner.slice(1, -1).trim();
      const href = resolveCssUrlToAbsoluteForExport(inner, base);
      if (!href) return full;
      return `url("${href.replace(/"/g, '\\"')}")`;
    });
    if (next !== bi) el.style.backgroundImage = next;
  });
};

    if (error) {
      const msg = (error.message || String(error)).trim();
      console.warn("Supabase Storage remove:", error);
      return msg || "Eroare la ștergerea din Storage";
    }
  } catch (e) {
    console.warn("Supabase Storage remove:", e);
    return (e?.message || String(e)).trim() || "Eroare la ștergerea din Storage";
  }
  return null;

// ─── Tasks (Notion-style) ───
const REPEAT_OPTS = [
  { v: "none", l: "O dată" },
  { v: "daily", l: "Zilnic" },
  { v: "weekly", l: "Săptămânal" },
  { v: "monthly", l: "Lunar" },
  { v: "yearly", l: "Anual" },
];
const addRepeatToDue = (fromStr, repeat) => {
  if (!repeat || repeat === "none") return null;
  let d;
  if (fromStr && /^\d{4}-\d{2}-\d{2}$/.test(fromStr)) {
    const [y, mo, da] = fromStr.split("-").map(Number);
    d = new Date(y, mo - 1, da);
  } else d = new Date();
  if (repeat === "daily") d.setDate(d.getDate() + 1);
  else if (repeat === "weekly") d.setDate(d.getDate() + 7);
  else if (repeat === "monthly") d.setMonth(d.getMonth() + 1);
  else if (repeat === "yearly") d.setFullYear(d.getFullYear() + 1);
  else return null;
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
};
const findTaskInTree = (tasks, id) => {
  for (const t of tasks || []) {
    if (t.id === id) return t;
    const x = findTaskInTree(t.subtasks || [], id);
    if (x) return x;
  }
  return null;
};
const collectTasksForDate = (tasks, ds, out = []) => {
  for (const t of tasks || []) {
    if (t.due === ds) out.push(t);
    collectTasksForDate(t.subtasks || [], ds, out);
  }
  return out;
};
const collectTasksWithGcal = (tasks, out = []) => {
  for (const t of tasks || []) {
    if (t?.gcalId) out.push(t);
    collectTasksWithGcal(t.subtasks || [], out);
  }
  return out;
};
const mapTasksTree = (tasks, fn) => (tasks || []).map(t => {
  const next = fn(t);
  return { ...next, subtasks: mapTasksTree(next.subtasks || [], fn) };
});
const removeTasksByIds = (tasks, idsSet) =>
  (tasks || [])
    .filter(t => !idsSet.has(t.id))
    .map(t => ({ ...t, subtasks: removeTasksByIds(t.subtasks || [], idsSet) }));
const cloneTaskForRepeat = (t) => {
  const rep = t.repeat;
  if (!rep || rep === "none") return null;
  const base = (t.due && /^\d{4}-\d{2}-\d{2}$/.test(t.due)) ? t.due : new Date().toISOString().split("T")[0];
  const nextDue = addRepeatToDue(base, rep);
  if (!nextDue) return null;
  return {
    id: uid(),
    text: t.text,
    done: false,
    taskStatus: "in_proces",
    priority: t.priority || "medium",
    cr: new Date().toISOString().split("T")[0],
    due: nextDue,
    assignedTo: t.assignedTo || "",
    repeat: rep,
    subtasks: [],
    notes: t.notes || "",
    tags: [...(t.tags || [])],
    chats: [],
    uploads: [],
  };
};
const fullTask = (text, prio="medium") => ({id:uid(),text,done:false,taskStatus:"in_proces",priority:prio,cr:new Date().toISOString().split("T")[0],due:"",assignedTo:"",repeat:"none",subtasks:[],notes:"",tags:[],chats:[],uploads:[]});
const toggleInTree = (tasks, id) => tasks.map(t=>t.id===id?{...t,done:!t.done,taskStatus:!t.done?"done":"in_proces"}:{...t,subtasks:toggleInTree(t.subtasks||[],id)});
const delInTree = (tasks, id) => tasks.filter(t=>t.id!==id).map(t=>({...t,subtasks:delInTree(t.subtasks||[],id)}));
const addSubInTree = (tasks, parentId, sub) => tasks.map(t=>t.id===parentId?{...t,subtasks:[...(t.subtasks||[]),sub]}:{...t,subtasks:addSubInTree(t.subtasks||[],parentId,sub)});
const updInTree = (tasks, id, upd) => tasks.map(t=>t.id===id?(typeof upd==="function"?upd(t):{...t,...upd}):{...t,subtasks:updInTree(t.subtasks||[],id,upd)});
const applyDoneWithRepeat = (p, id, makeDone) => {
  if (!makeDone) return updInTree(p, id, { done: false, taskStatus: "in_proces" });
  const t = findTaskInTree(p, id);
  if (!t || t.done) return p;
  const isRoot = (p || []).some(x => x.id === id);
  let next = updInTree(p, id, { done: true, taskStatus: "done" });
  if (t.repeat && t.repeat !== "none" && isRoot) {
    const c = cloneTaskForRepeat(t);
    if (c) next = [c, ...next];
  }
  return next;
};

const delMultipleInTree = (tasks, ids) => tasks.filter(t=>!ids.includes(t.id)).map(t=>({...t,subtasks:delMultipleInTree(t.subtasks||[],ids)}));

/** Task rădăcină apare la filtru dacă el sau orice subtask e desemnat la memberId */
function taskMatchesMemberFilter(t, memberId) {
  if (!memberId) return true;
  if ((t.assignedTo || "") === memberId) return true;
  return (t.subtasks || []).some(s => taskMatchesMemberFilter(s, memberId));
}
function filterRootTasksByMember(tasks, memberId) {
  if (!memberId) return tasks;
  return tasks.filter(t => taskMatchesMemberFilter(t, memberId));
}

function TasksView({ tasks, setTasks, th, sty, mob, compact=false, currentMemberId, onNotifyAssign, focusTaskId, onConsumeFocusTask, memberFilter="", setMemberFilter }) {
  const [newText, setNewText] = useState("");

  const [newDue, setNewDue] = useState("");

  const [viewMode, setViewMode] = useState("list"); // list | calendar | kanban

  const PC = {high:"#ef4444", medium:"#f59e0b", low:"#22c55e"};

  const TSL = {in_proces:"În proces",in_lucru:"În lucru",done:"Done"};

  const assignLabel = (aid) => { const m = MEMBERS.find(x=>x.id===aid); return m ? "@"+m.short : ""; };

    if(!newText.trim()) return;
    const t = fullTask(newText.trim(),newPrio);
    t.repeat = newRepeat || "none";
    if (newDue) t.due = newDue;
    if(newAssignee){
      t.assignedTo = newAssignee;
      if(onNotifyAssign && newAssignee !== currentMemberId)
        onNotifyAssign({ taskId:t.id, taskText:t.text, toMemberId:newAssignee, fromMemberId:currentMemberId });
    }
    setTasks(p=>[...p,t]);

  });

  const updTask = (id, upd) => setTasks(p=>updInTree(p,id,upd));
  const addTag = (tid, tag) => { if(!tag.trim()) return; updTask(tid,t=>({...t,tags:[...(t.tags||[]),tag.trim()]})); };
  const remTag = (tid, tag) => updTask(tid,t=>({...t,tags:(t.tags||[]).filter(x=>x!==tag)}));

  const addReply = (tid, chatId, txt) => { if(!txt.trim()) return; updTask(tid,t=>({...t,chats:(t.chats||[]).map(c=>c.id===chatId?{...c,replies:[...(c.replies||[]),{id:uid(),text:txt.trim(),date:new Date().toISOString(),author:"Eu"}]}:c)})); setReplyingTo(null); };
  const toggleExpanded = (id) => setExpandedIds(s=>{const n=new Set(s);if(n.has(id))n.delete(id);else n.add(id);return n;});

        {/* ── ROW COMPACT — click pe rând deschide/închide detaliile; creion = popup edit ── */}
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",minHeight:44,cursor:"pointer"}} onClick={()=>toggleExpanded(t.id)} title="Click pentru detalii">
          {/* Finalizat — cerc */}
          <div onClick={e=>{e.stopPropagation();toggle(t.id);}} title={isDone?"Marchează activ din nou":"Marchează finalizat"} style={{width:22,height:22,borderRadius:"50%",border:`2px solid ${prioColor}`,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:isDone?prioColor:"transparent",transition:"all .15s",boxShadow:isDone?`0 0 0 1px ${prioColor}40`:"none"}}>
            {isDone&&<span style={{color:"#fff",display:"flex",lineHeight:0}}><IcCheck s={12}/></span>}
          </div>

          {/* Text */}
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:500,textDecoration:isDone?"line-through":undefined,color:isDone?th.tm:th.t,lineHeight:1.4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
              {t.text}
            </div>
            {/* Meta chips — only show if set */}
            {(assignedM||t.due||(t.tags||[]).length>0||subs.length>0||repeatLabel)&&(
              <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap",alignItems:"center"}}>
                {assignedM&&<span style={{fontSize:11,color:th.a,fontWeight:600}}>{assignedM.e} {assignedM.short}</span>}
                {t.due&&<span style={{fontSize:11,fontWeight:600,color:isOverdue?"#ef4444":"#f59e0b",background:isOverdue?"rgba(239,68,68,.1)":"rgba(245,158,11,.1)",padding:"1px 6px",borderRadius:4}}>📅 {fDue(t.due)}</span>}
                {repeatLabel&&<span style={{fontSize:10,color:th.tm,background:th.h,padding:"1px 6px",borderRadius:4}}>🔁 {repeatLabel}</span>}
                {subs.length>0&&<span style={{fontSize:11,color:th.tm}}>{doneSubs}/{subs.length} subtasks</span>}
                {(t.tags||[]).slice(0,2).map(tg=><span key={tg} style={{fontSize:10,color:th.tm,background:th.h,padding:"1px 6px",borderRadius:4}}>#{tg}</span>)}
              </div>
            )}
          </div>

          {/* Avatar assigned (compact) */}
          {assignedM&&<div style={{width:26,height:26,borderRadius:"50%",background:"linear-gradient(135deg,"+prioColor+","+prioColor+"99)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}} title={assignedM.n}>{assignedM.e}</div>}

          <button type="button" onClick={e=>{e.stopPropagation(); setTaskModalId(t.id);}} style={{padding:6,border:"none",background:th.h,borderRadius:8,color:th.tm,cursor:"pointer",flexShrink:0}} title="Editare detaliată (fereastră)"><IcEdit s={14}/></button>
          <button type="button" onClick={e=>{e.stopPropagation();del(t.id);}} style={{padding:6,border:"none",background:"transparent",color:th.tm,cursor:"pointer",opacity:.55,flexShrink:0}} title="Șterge"><IcTrash s={12}/></button>
        </div>

        {/* ── EXPANDED PANEL ── */}
        {ex&&<div style={{borderTop:`1px solid ${th.bl}`,background:th.bg==="#09090b"?"rgba(255,255,255,.02)":"rgba(0,0,0,.02)",padding:"16px 18px 20px"}}>

          {/* Controale editare */}
          <div style={{display:"grid",gridTemplateColumns:mob?"1fr 1fr":"repeat(4,1fr)",gap:10,marginBottom:16}}>
            <div>
              <div style={{fontSize:10,color:th.tm,fontWeight:600,textTransform:"uppercase",letterSpacing:.5,marginBottom:5}}>Desemnat</div>
              <select value={t.assignedTo||""} onChange={e=>{
                const prev=t.assignedTo||""; const next=e.target.value;
                updTask(t.id,{assignedTo:next});
                if(onNotifyAssign&&next&&next!==currentMemberId&&next!==prev)
                  onNotifyAssign({taskId:t.id,taskText:t.text,toMemberId:next,fromMemberId:currentMemberId});
              }} className="modernSel" style={{...sty.i,width:"100%",padding:"8px 10px",fontSize:13,borderRadius:8}}>
                <option value="">— Nimeni</option>
                {MEMBERS.map(m=><option key={m.id} value={m.id}>{m.e} {m.short}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:10,color:th.tm,fontWeight:600,textTransform:"uppercase",letterSpacing:.5,marginBottom:5}}>Prioritate</div>
              <select value={t.priority||"medium"} onChange={e=>updTask(t.id,{priority:e.target.value})} className="modernSel" style={{...sty.i,width:"100%",padding:"8px 10px",fontSize:13,borderRadius:8,borderColor:prioColor,color:prioColor,fontWeight:600}}>
                <option value="high">🔴 Urgent</option>
                <option value="medium">🟡 Normal</option>
                <option value="low">🟢 Low</option>
              </select>
            </div>
            <div>
              <div style={{fontSize:10,color:th.tm,fontWeight:600,textTransform:"uppercase",letterSpacing:.5,marginBottom:5}}>Deadline</div>
              <input type="date" value={t.due||""} onChange={e=>updTask(t.id,{due:e.target.value})} style={{...sty.i,width:"100%",padding:"8px 10px",fontSize:13,borderRadius:8}}/>
            </div>
            <div>
              <div style={{fontSize:10,color:th.tm,fontWeight:600,textTransform:"uppercase",letterSpacing:.5,marginBottom:5}}>Repetare</div>
              <select value={t.repeat||"none"} onChange={e=>updTask(t.id,{repeat:e.target.value})} className="modernSel" style={{...sty.i,width:"100%",padding:"8px 10px",fontSize:13,borderRadius:8}}>
                {REPEAT_OPTS.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
              </select>
            </div>
          </div>

          {/* Tags */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:10,color:th.tm,fontWeight:600,textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Etichete</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
              {(t.tags||[]).map(tag=><span key={tag} style={{fontSize:12,padding:"4px 10px",borderRadius:8,background:th.ab,color:th.t,display:"flex",alignItems:"center",gap:5}}>{tag}<button onClick={()=>remTag(t.id,tag)} style={{padding:0,border:"none",background:"transparent",cursor:"pointer",fontSize:13,color:th.tm,lineHeight:1}}>×</button></span>)}
              <input placeholder="+ Tag (Enter)" onKeyDown={e=>{if(e.key==="Enter"&&e.target.value.trim()){addTag(t.id,e.target.value.trim());e.target.value="";}}} style={{...sty.i,width:120,padding:"6px 10px",fontSize:13,borderRadius:8}}/>
            </div>
          </div>

          {/* Note */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:10,color:th.tm,fontWeight:600,textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Note</div>
            <textarea value={t.notes||""} onChange={e=>updTask(t.id,{notes:e.target.value})} placeholder="Adaugă note..." style={{...sty.i,minHeight:64,fontSize:13,resize:"vertical",width:"100%",padding:"10px 12px",borderRadius:8}}/>
          </div>

          {/* Subtasks */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:10,color:th.tm,fontWeight:600,textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Subtasks {subs.length>0&&<span style={{fontWeight:400,color:th.tm}}>({doneSubs}/{subs.length})</span>}</div>
            {subs.map(s=><TaskCard key={s.id} t={{...s,subtasks:s.subtasks||[],tags:s.tags||[],chats:s.chats||[],uploads:s.uploads||[]}} isDone={s.done} depth={depth+1}/>)}
            <input placeholder="+ Subtask (Enter)" onKeyDown={e=>{if(e.key==="Enter"&&e.target.value.trim()){addSub(t.id,e.target.value.trim());e.target.value="";}}} style={{...sty.i,width:"100%",padding:"8px 12px",fontSize:13,marginTop:6,borderRadius:8}}/>
          </div>

          {/* Conversații */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:10,color:th.tm,fontWeight:600,textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Conversație</div>
            {(t.chats||[]).map(c=><div key={c.id} style={{padding:"10px 12px",background:th.c,borderRadius:8,marginBottom:6,fontSize:13,borderLeft:`3px solid ${th.b}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <span style={{fontSize:11,color:th.tm,fontWeight:600}}>{c.author} · {new Date(c.date).toLocaleString("ro")}</span>
                <button onClick={()=>setReplyingTo({tid:t.id,chatId:c.id})} style={{padding:"3px 8px",border:`1px solid ${th.b}`,borderRadius:5,background:"transparent",color:th.tm,cursor:"pointer",fontSize:11}}>Răspunde</button>
              </div>
              <div>{c.text}</div>
              {(c.replies||[]).map(r=><div key={r.id} style={{marginTop:5,marginLeft:12,padding:"8px 10px",background:th.h,borderRadius:6,borderLeft:`2px solid ${th.b}`}}><span style={{fontSize:10,color:th.tm}}>↳ {r.author} · {new Date(r.date).toLocaleString("ro")}</span><div style={{marginTop:3,fontSize:12}}>{r.text}</div></div>)}
              {isReplying&&replyingTo.chatId===c.id&&<div style={{marginTop:6,marginLeft:12}}><input placeholder="Răspunde... (Enter)" autoFocus onKeyDown={e=>{if(e.key==="Enter"){addReply(t.id,c.id,e.target.value);e.target.value="";}if(e.key==="Escape")setReplyingTo(null);}} style={{...sty.i,width:"100%",padding:"8px 10px",fontSize:13,borderRadius:7}}/></div>}
            </div>)}
            <input placeholder="+ Mesaj (Enter)" onKeyDown={e=>{if(e.key==="Enter"&&e.target.value.trim()){addChat(t.id,e.target.value.trim());e.target.value="";}}} style={{...sty.i,width:"100%",padding:"8px 12px",fontSize:13,borderRadius:8}}/>
          </div>

          {/* Link / Fișier */}
          {((t.uploads||[]).length>0||true)&&<div>
            <div style={{fontSize:10,color:th.tm,fontWeight:600,textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Link / Fișier</div>
            {(t.uploads||[]).map(u=>u&&<div key={u.id} style={{fontSize:12,padding:"7px 10px",marginBottom:4,background:th.h,borderRadius:7,display:"flex",alignItems:"center",gap:6}}>📎 <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.url?.startsWith("http")?<a href={u.url} target="_blank" rel="noreferrer" style={{color:th.a}}>{u.name}</a>:u.name}</span></div>)}
            <input placeholder="Link sau fișier (Enter)" onKeyDown={e=>{if(e.key==="Enter"){const v=e.target.value.trim();if(v){updTask(t.id,{uploads:[...(t.uploads||[]),{id:uid(),name:v,url:v}]});e.target.value="";}}}} style={{...sty.i,width:"100%",padding:"8px 12px",fontSize:13,borderRadius:8}}/>
          </div>}
        </div>}
      </div>
    );
  };

  return (
    <div>
      {taskModalId && (() => {
        const t = findTaskInTree(tasks, taskModalId);
        if(!t) return null;
        const isDone = t.done || t.taskStatus === "done";
        const prioColor = PC[t.priority||"medium"];
        const assignedM = t.assignedTo ? MEMBERS.find(m=>m.id===t.assignedTo) : null;
        const fDue2 = (d) => { if(!d) return null; const dt=new Date(d+"T00:00:00"); return dt.toLocaleDateString("ro-RO",{day:"numeric",month:"short"}); };
        const isOverdue2 = t.due && !isDone && new Date(t.due+"T00:00:00") < new Date();
        return (
          <div style={{position:"fixed",inset:0,background:th.ov,display:"flex",alignItems:mob?"flex-end":"center",justifyContent:"center",zIndex:1000}} onClick={()=>setTaskModalId(null)}>
            <div style={{background:th.c,border:`1px solid ${th.b}`,borderRadius:mob?18:14,width:mob?"100%":520,maxWidth:"100%",maxHeight:mob?"100vh":"90vh",overflow:"auto",boxShadow:"0 12px 40px rgba(0,0,0,.25"}} onClick={e=>e.stopPropagation()}>
              <div style={{padding:"18px 22px",borderBottom:`1px solid ${th.b}`,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:20}}>✓</span>
                  <div>
                    <h2 style={{fontSize:16,fontWeight:800,color:th.t,margin:0}}>Task</h2>
                    <div style={{fontSize:12,color:th.tm,marginTop:4}}>
                      {t.due ? `📅 ${fDue2(t.due)}` : "Fără deadline"}
                      {assignedM ? ` · ${assignedM.short}` : ""}
                    </div>
                  </div>
                </div>
                <button type="button" onClick={()=>setTaskModalId(null)} style={{padding:6,border:"none",background:"transparent",color:th.tm,cursor:"pointer"}}>
                  <IcX s={18}/>
                </button>
              </div>

              <div style={{padding:20,display:"flex",flexDirection:"column",gap:14}}>
                <div><label style={sty.l}>Titlu</label>
                  <textarea
                    value={t.text||""}
                    onChange={e=>updTask(t.id,{text:e.target.value})}
                    style={{...sty.i,width:"100%",minHeight:72,resize:"vertical",padding:"10px 12px",fontSize:15,borderLeft:`4px solid ${prioColor}`}}
                  />
                </div>

                <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:12}}>
                  <div><label style={sty.l}>Desemnat</label>
                    <select value={t.assignedTo||""} onChange={e=>{
                      const prev=t.assignedTo||"";
                      const next=e.target.value;
                      updTask(t.id,{assignedTo:next});
                      if(onNotifyAssign && next && next!==currentMemberId && next!==prev)
                        onNotifyAssign({taskId:t.id,taskText:t.text,toMemberId:next,fromMemberId:currentMemberId});
                    }} className="modernSel" style={{...sty.i,width:"100%",padding:"10px 12px",fontSize:14}}>
                      <option value="">— Nimeni</option>
                      {MEMBERS.map(m=><option key={m.id} value={m.id}>@{m.e} {m.short}</option>)}
                    </select>
                  </div>
                  <div><label style={sty.l}>Prioritate</label>
                    <select value={t.priority||"medium"} onChange={e=>updTask(t.id,{priority:e.target.value})} className="modernSel" style={{...sty.i,width:"100%",padding:"10px 12px",fontSize:14}}>
                      <option value="high">🔴 Urgent</option><option value="medium">🟡 Normal</option><option value="low">🟢 Low</option>
                    </select>
                  </div>
                  <div><label style={sty.l}>Deadline</label>
                    <input type="date" value={t.due||""} onChange={e=>updTask(t.id,{due:e.target.value})} style={{...sty.i,width:"100%",padding:"10px 12px",fontSize:14}}/>
                    {t.due && <div style={{marginTop:6,fontSize:11,color:isOverdue2?"#ef4444":"#f59e0b"}}>{isOverdue2?"Overdue":"Due soon"}: {fDue2(t.due)}</div>}
                  </div>
                  <div><label style={sty.l}>Repetare</label>
                    <select value={t.repeat||"none"} onChange={e=>updTask(t.id,{repeat:e.target.value})} className="modernSel" style={{...sty.i,width:"100%",padding:"10px 12px",fontSize:14}}>
                      {REPEAT_OPTS.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
                    </select>
                  </div>
                </div>

                <label style={{display:"flex",alignItems:"center",gap:10,fontSize:14,cursor:"pointer",userSelect:"none"}}>
                  <input type="checkbox" checked={!!isDone} onChange={()=>setTasks(p=>applyDoneWithRepeat(p,t.id,!isDone))} style={{accentColor:th.a,width:18,height:18}}/>
                  Finalizat
                </label>

                <div style={{paddingTop:10,borderTop:`1px solid ${th.bl}`}}>
                  <div style={{fontSize:10,color:th.tm,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>Etichete</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                    {(t.tags||[]).map(tag=>(
                      <span key={tag} style={{fontSize:12,padding:"4px 10px",borderRadius:8,background:th.ab,color:th.t,display:"flex",alignItems:"center",gap:5}}>
                        {tag}
                        <button onClick={()=>remTag(t.id,tag)} style={{padding:0,border:"none",background:"transparent",cursor:"pointer",fontSize:13,color:th.tm,lineHeight:1}}>×</button>
                      </span>
                    ))}
                    <input
                      placeholder="+ Tag (Enter)"
                      onKeyDown={e=>{if(e.key==="Enter"){const v=e.target.value.trim();if(v){addTag(t.id,v);e.target.value="";}}}}
                      style={{...sty.i,width:200,padding:"8px 10px",fontSize:13,borderRadius:10}}
                    />
                  </div>
                </div>

                <div><label style={sty.l}>Note</label>
                  <textarea
                    value={t.notes||""}
                    onChange={e=>updTask(t.id,{notes:e.target.value})}
                    placeholder="Adaugă note..."
                    style={{...sty.i,minHeight:96,fontSize:13,resize:"vertical",width:"100%",padding:"10px 12px",borderRadius:8}}
                  />
                </div>

                <div style={{paddingTop:10,borderTop:`1px solid ${th.bl}`}}>
                  <div style={{fontSize:10,color:th.tm,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>
                    Subtasks
                  </div>
                  {(t.subtasks||[]).length>0 ? (t.subtasks||[]).map(s=>(
                    <div key={s.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,padding:"10px 12px",background:th.h,borderRadius:10,border:`1px solid ${th.b}`,marginBottom:8}}>
                      <div style={{minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.text}</div>
                        <div style={{fontSize:11,color:th.tm,marginTop:2}}>{s.due ? `📅 ${fDue2(s.due)}` : "—"}</div>
                      </div>
                      <div style={{display:"flex",gap:6,flexShrink:0}}>
                        <button type="button" onClick={()=>setTaskModalId(s.id)} style={{border:"none",background:"transparent",color:th.a,cursor:"pointer"}} title="Editează"><IcEdit s={15}/></button>
                        <button type="button" onClick={()=>{del(s.id); if(taskModalId===s.id) setTaskModalId(null);}} style={{border:"none",background:"transparent",color:"#ef4444",cursor:"pointer"}} title="Șterge"><IcTrash s={15}/></button>
                      </div>
                    </div>
                  )) : <div style={{fontSize:12,color:th.tm}}>—</div>}
                  <input
                    placeholder="+ Adaugă subtask (Enter)"
                    onKeyDown={e=>{if(e.key==="Enter"&&e.target.value.trim()){addSub(t.id,e.target.value.trim());e.target.value="";}}}
                    style={{...sty.i,width:"100%",padding:"12px 14px",fontSize:14,borderRadius:12,marginTop:6}}
                  />
                </div>

                <div style={{display:"flex",gap:10,flexDirection:mob?"column":"row",marginTop:6}}>
                  <button type="button" onClick={()=>{del(t.id);setTaskModalId(null);}} style={{flex:1,padding:"12px 16px",borderRadius:10,border:"1px solid #ef4444",background:"transparent",color:"#ef4444",fontWeight:700,cursor:"pointer"}}>
                    Șterge task
                  </button>
                  <button type="button" onClick={()=>setTaskModalId(null)} style={{flex:1,padding:"12px 16px",borderRadius:10,border:"none",background:th.h,color:th.t,fontWeight:700,cursor:"pointer"}}>
                    Închide
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      })()}

      {compact && <div style={{fontSize:15,fontWeight:700,marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>📋 Tasks</span><span style={{fontSize:13,color:th.tm,fontWeight:400}}>{active.length} active</span>
      </div>}

      {!compact&&<div style={{display:"flex",gap:6,padding:8,background:th.bg==="#09090b"?th.h:"#f8f7f5",borderRadius:12,border:`1px solid ${th.bl}`,marginBottom:20}}>
        <button onClick={()=>setViewMode("list")} style={{padding:"12px 20px",borderRadius:10,border:"none",fontSize:15,fontWeight:viewMode==="list"?600:500,cursor:"pointer",background:viewMode==="list"?th.c:"transparent",color:viewMode==="list"?th.t:th.tm,boxShadow:viewMode==="list"?"0 1px 3px rgba(0,0,0,.06)":"none",transition:"all .15s"}}>Listă</button>
        <button onClick={()=>setViewMode("kanban")} style={{padding:"12px 20px",borderRadius:10,border:"none",fontSize:15,fontWeight:viewMode==="kanban"?600:500,cursor:"pointer",background:viewMode==="kanban"?th.c:"transparent",color:viewMode==="kanban"?th.t:th.tm,boxShadow:viewMode==="kanban"?"0 1px 3px rgba(0,0,0,.06)":"none",transition:"all .15s"}}>Kanban</button>
        <button onClick={()=>setViewMode("calendar")} style={{padding:"12px 20px",borderRadius:10,border:"none",fontSize:15,fontWeight:viewMode==="calendar"?600:500,cursor:"pointer",background:viewMode==="calendar"?th.c:"transparent",color:viewMode==="calendar"?th.t:th.tm,boxShadow:viewMode==="calendar"?"0 1px 3px rgba(0,0,0,.06)":"none",transition:"all .15s"}}>Calendar</button>
      </div>}

      {!compact&&setMemberFilter&&<div style={{display:"flex",gap:10,alignItems:"center",marginBottom:18,flexWrap:"wrap"}}>
        <span style={{fontSize:12,color:th.tm,fontWeight:600}}>Filtru membru</span>
        <select value={memberFilter} onChange={e=>setMemberFilter(e.target.value)} className="modernSel" style={{...sty.i,minWidth:168,padding:"10px 28px 10px 12px",fontSize:13,borderRadius:10}} title="Afișează doar task-urile unde acest membru e desemnat (inclusiv în subtask-uri)">
          <option value="">Toată trupa</option>
          {MEMBERS.map(m=><option key={m.id} value={m.id}>@{m.short}</option>)}
        </select>
        {currentMemberId&&<button type="button" onClick={()=>setMemberFilter(currentMemberId)} style={{...sty.bg,padding:"8px 14px",fontSize:12}}>Doar ale mele</button>}
        {memberFilter&&<button type="button" onClick={()=>setMemberFilter("")} style={{...sty.bg,padding:"8px 14px",fontSize:12}}>Arată pe toți</button>}
      </div>}

      {compact ? (
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:18}}>
          <input value={newText} onChange={e=>setNewText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}
            style={{...sty.i,width:"100%",padding:"12px 14px",fontSize:15,borderRadius:12,border:`1px solid ${th.bl}`}} placeholder="Task nou — Enter pentru a adăuga"/>
          <button type="button" onClick={()=>setNewDueOpen(o=>!o)} style={{...sty.i,width:"100%",padding:"10px 12px",fontSize:12,borderRadius:10,textAlign:"left",cursor:"pointer",color:newDue?th.t:th.tm}}>
            {newDue ? new Date(newDue+"T12:00:00").toLocaleDateString("ro-RO",{day:"2-digit",month:"2-digit",year:"numeric"}) : "Deadline / repetare…"}{newRepeat!=="none" ? ` · 🔁 ${REPEAT_OPTS.find(o=>o.v===newRepeat)?.l||""}` : ""}
          </button>
          {newDueOpen && <div style={{display:"flex",flexDirection:"column",gap:8,padding:10,borderRadius:10,border:`1px solid ${th.bl}`,background:th.h}}>
            <input type="date" value={newDue} onChange={e=>setNewDue(e.target.value)} style={{...sty.i,width:"100%",padding:"8px 10px",fontSize:13,borderRadius:8}} />

                      onMouseOver={e=>{e.currentTarget.style.transform="translateY(-1px)";e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,.08)";}}
                      onMouseOut={e=>{e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="0 1px 4px rgba(0,0,0,.05)";}}>
                      <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                        {!compact&&<div onClick={e=>e.stopPropagation()} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"2px 4px 0",borderRadius:8,border:`1px dashed rgba(99,102,241,.45)`,background:th.bg==="#09090b"?"rgba(99,102,241,.08)":"rgba(99,102,241,.06)"}} title="Selecție în masă">
                          <input type="checkbox" checked={selectedIds.includes(t.id)} onChange={()=>setSelectedIds(s=>s.includes(t.id)?s.filter(x=>x!==t.id):[...s,t.id])} style={{cursor:"pointer",width:16,height:16,accentColor:"#6366f1"}}/>
                          <span style={{fontSize:7,color:th.tm,fontWeight:700,textTransform:"uppercase"}}>grup</span>
                        </div>}
                        <div onClick={e=>{e.stopPropagation();toggle(t.id);}} title="Finalizat" style={{width:22,height:22,borderRadius:"50%",border:`2px solid ${TSC[taskStatus(t)]}`,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:taskStatus(t)==="done"?TSC[taskStatus(t)]:"transparent",marginTop:2}}>{taskStatus(t)==="done"&&<span style={{color:"#fff",display:"flex"}}><IcCheck s={12}/></span>}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:16,fontWeight:600,textDecoration:taskStatus(t)==="done"?"line-through":undefined,color:taskStatus(t)==="done"?th.tm:th.t,lineHeight:1.4}}>{t.text}{t.assignedTo&&<span style={{fontSize:12,color:th.a,marginLeft:8}}>{assignLabel(t.assignedTo)}</span>}</div>
                          <div style={{display:"flex",alignItems:"center",gap:6,marginTop:6,flexWrap:"wrap"}}>
                            <select value={t.assignedTo||""} onChange={e=>{
                              e.stopPropagation();
                              const prev = t.assignedTo||"";
                              const next = e.target.value;
                              updTask(t.id,{ assignedTo: next });
                              if(onNotifyAssign && next && next !== currentMemberId && next !== prev)
                                onNotifyAssign({ taskId:t.id, taskText:t.text, toMemberId:next, fromMemberId:currentMemberId });
                            }} onClick={e=>e.stopPropagation()} className="modernSel" style={{...sty.i,padding:"8px 24px 8px 10px",fontSize:12,borderRadius:8,border:`1px solid ${th.b}`}} title="@ desemnat">
                              <option value="">@ —</option>
                              {MEMBERS.map(m=><option key={m.id} value={m.id}>@{m.short}</option>)}
                            </select>
                            <select value={t.priority||"medium"} onChange={e=>{e.stopPropagation();updTask(t.id,{priority:e.target.value});}} onClick={e=>e.stopPropagation()} className="modernSel" style={{...sty.i,padding:"8px 28px 8px 12px",fontSize:13,borderRadius:8,border:`1px solid ${th.b}`}}>
                              <option value="high">Urgent</option><option value="medium">Normal</option><option value="low">Low</option>
                            </select>
                            <select value={t.repeat||"none"} onChange={e=>{e.stopPropagation();updTask(t.id,{repeat:e.target.value});}} onClick={e=>e.stopPropagation()} className="modernSel" style={{...sty.i,padding:"8px 24px 8px 10px",fontSize:11,borderRadius:8,border:`1px solid ${th.b}`,maxWidth:120}} title="Repetare">
                              {REPEAT_OPTS.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
                            </select>
                            {t.due&&<span style={{fontSize:10,color:th.tm}}><IcClock s={10}/> {fD(t.due)}</span>}
                            {(t.subtasks||[]).length>0&&<span style={{fontSize:10,color:th.tm}}>{(t.subtasks||[]).filter(s=>s.done).length}/{(t.subtasks||[]).length}</span>}
                          </div>
                        </div>
                        <button onClick={e=>{e.stopPropagation();del(t.id);}} style={{padding:4,border:"none",background:"transparent",color:th.tm,cursor:"pointer",opacity:.6}}><IcTrash s={14}/></button>
                      </div>
                      {expandedIds.has(t.id)&&<div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${th.b}`}}>
                        <div style={{fontSize:13,color:th.tm,fontWeight:600,marginBottom:8}}>Subtasks</div>
                        {(t.subtasks||[]).map(s=><TaskCard key={s.id} t={{...s,subtasks:s.subtasks||[],tags:s.tags||[],chats:s.chats||[],uploads:s.uploads||[]}} isDone={s.done} depth={1} showSelect={false}/>)}
                        <input placeholder="+ Adaugă subtask (Enter)" onKeyDown={e=>{if(e.key==="Enter"){addSub(t.id,e.target.value);e.target.value="";}}} style={{...sty.i,padding:"14px 16px",fontSize:15,marginTop:10,borderRadius:10}}/>
                      </div>}
                    </div>
                  ))}
                </div>
              </div>;
            })}
          </div>
        ) : viewMode==="calendar"&&!compact ? (
          <div style={{overflow:"hidden"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <button onClick={()=>setCalendarDate(p=>{let m=p.m-1;let y=p.y;if(m<0){m=11;y--;}return{m:m,y:y};})} style={{...sty.bg,padding:"8px 14px",fontSize:13}}>←</button>
              <div style={{fontSize:17,fontWeight:700,color:th.t,textTransform:"capitalize",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><span>{MONTHS_RO_CAL[calendarDate.m]} {calendarDate.y}</span><span style={{fontSize:10,color:th.tm,fontWeight:400}}>scroll ↑↓</span></div>
              <button onClick={()=>setCalendarDate(p=>{let m=p.m+1;let y=p.y;if(m>11){m=0;y++;}return{m:m,y:y};})} style={{...sty.bg,padding:"8px 14px",fontSize:13}}>→</button>
              <button onClick={()=>{const n=new Date();setCalendarDate({m:n.getMonth(),y:n.getFullYear()});}} style={{...sty.bg,padding:"6px 12px",fontSize:12}}>Azi</button>
            </div>
            <div ref={calendarScrollRef} onScroll={handleCalendarScroll} style={{height:420,overflowY:"auto",scrollSnapType:"y mandatory",scrollBehavior:"smooth",WebkitOverflowScrolling:"touch"}}>
              {[-1,0,1].map(offset=>{
                let m=calendarDate.m+offset; let y=calendarDate.y;
                if(m<0){m+=12;y--;} if(m>11){m-=12;y++;}
                return <div key={`${y}-${m}`} style={{minHeight:420,scrollSnapAlign:"start",scrollSnapStop:"always"}}>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
                    {["Lu","Ma","Mi","Jo","Vi","Sâ","Du"].map(d=><div key={d} style={{fontSize:10,color:th.tm,textAlign:"center",fontWeight:600,padding:"4px 0"}}>{d}</div>)}
                    {renderMonth(y,m)}
                  </div>
                </div>;
              })}
            </div>
          </div>
        ) : (
          active.map(t=><TaskCard key={t.id} t={t} isDone={false} showSelect={!compact}/>)
        )}
      </div>

      {done.length>0 && <>
        <div style={{fontSize:13,color:th.tm,fontWeight:600,textTransform:"uppercase",letterSpacing:1.2,marginTop:32,marginBottom:14}}>Finalizate ({done.length})</div>
        {(compact?done.slice(0,2):done).map(t=><TaskCard key={t.id} t={t} isDone={true} showSelect={!compact}/>)}
      </>}
    </div>
  );
}

// ─── Offers board, contract, offer preview ───
function OffersBoard({ evs, th, sty, mob, onSelect, onAddOffer, onStatusChange, onAvansToggle, onDeleteSelected, onBulkStatusChange, showSelection }) {
  const [sortBy, setSortBy] = useState("date");
  const [filterSt, setFilterSt] = useState("");
  const [filterCat, setFilterCat] = useState("");
  const [viewMode, setViewMode] = useState("list"); // list | grid | kanban
  const [dragOverCol, setDragOverCol] = useState(null);
  const [selectedIds, setSelectedIds] = useState([]);
  const [bulkOfferPick, setBulkOfferPick] = useState("");
  const toggleSel = (id) => setSelectedIds(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const now = new Date();
  const confConfirmate = evs.filter(e=>e.st==="confirmat"&&(!filterCat||e.cat===filterCat)).sort((a,b)=>evSortKey(b)-evSortKey(a));
  const respinseOffers = evs.filter(e=>e.st==="respins"&&(!filterCat||e.cat===filterCat)).sort((a,b)=>new Date(b.cr||0)-new Date(a.cr||0));
  const activeOffers = evs.filter(e=>["cerere","oferta","asteptare","plata_avans"].includes(e.st)&&(!filterCat||e.cat===filterCat));
  const activeSorted = [...activeOffers].sort((a,b)=>{
    if(sortBy==="date") return evSortKey(a)-evSortKey(b);
    if(sortBy==="dateDesc") return evSortKey(b)-evSortKey(a);
    if(sortBy==="cr") return new Date(b.cr||0)-new Date(a.cr||0);
    if(sortBy==="crAsc") return new Date(a.cr||0)-new Date(b.cr||0);
    if(sortBy==="fee") return (b.fee||0)-(a.fee||0);
    if(sortBy==="feeAsc") return (a.fee||0)-(b.fee||0);
    if(sortBy==="client") return (a.cn||"").localeCompare(b.cn||"");
    if(sortBy==="status") return (a.st||"").localeCompare(b.st||"");
    return 0;
  });
  let base = evs.filter(e=>{
    if(filterSt) { if(e.st!==filterSt) return false; }
    else { if(!["oferta","asteptare","plata_avans","confirmat"].includes(e.st)) return false; }
    if(filterCat&&e.cat!==filterCat) return false;
    return true;
  });
  const active = [...base].sort((a,b)=>{
    if(sortBy==="date") return evSortKey(a)-evSortKey(b);
    if(sortBy==="dateDesc") return evSortKey(b)-evSortKey(a);
    if(sortBy==="cr") return new Date(b.cr||0)-new Date(a.cr||0);
    if(sortBy==="crAsc") return new Date(a.cr||0)-new Date(b.cr||0);
    if(sortBy==="fee") return (b.fee||0)-(a.fee||0);
    if(sortBy==="feeAsc") return (a.fee||0)-(b.fee||0);
    if(sortBy==="client") return (a.cn||"").localeCompare(b.cn||"");
    if(sortBy==="status") return (a.st||"").localeCompare(b.st||"");
    return 0;
  });
  const allIds = active.map(e=>e.id);
  const allSelected = allIds.length>0&&allIds.every(id=>selectedIds.includes(id));
  const selectAll = () => setSelectedIds(allSelected?[]:allIds);
  const delSelected = () => { if(selectedIds.length===0||!onDeleteSelected) return; if(!window.confirm(`Ștergi ${selectedIds.length} ofertă/oferte?`)) return; onDeleteSelected(selectedIds); setSelectedIds([]); };
  const applyBulkOfferStatus = (st) => {
    if (!st || !onBulkStatusChange || selectedIds.length === 0) return;
    onBulkStatusChange([...selectedIds], st);
    setSelectedIds([]);
    setBulkOfferPick("");
  };
  const glowCardShadow = (st) => {
    if (st === "confirmat") return "0 2px 16px rgba(34, 197, 94, 0.22), 0 1px 3px rgba(0,0,0,.08)";
    if (st === "respins") return "0 2px 16px rgba(239, 68, 68, 0.22), 0 1px 3px rgba(0,0,0,.08)";
    return "0 1px 3px rgba(0,0,0,.1)";
  };
  return (
    <div style={{animation:"su .3s ease"}}>
      <div style={{marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:700,letterSpacing:"-0.5px"}}>Cereri</h1>
          <p style={{color:th.tm,fontSize:12,marginTop:2}}>{filterSt===""?activeOffers.length+confConfirmate.length+respinseOffers.length:active.length} intrări</p>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <div style={{display:"flex",gap:2,padding:4,background:th.h,borderRadius:8,border:`1px solid ${th.b}`}}>
            <button onClick={()=>setViewMode("list")} style={{padding:"6px 12px",borderRadius:6,border:"none",fontSize:12,fontWeight:600,cursor:"pointer",background:viewMode==="list"?th.ab:"transparent",color:viewMode==="list"?th.t:(th.bg==="#09090b"?"#e5e5e5":th.tm),fontFamily:"inherit"}}>Listă</button>
            <button onClick={()=>setViewMode("grid")} style={{padding:"6px 12px",borderRadius:6,border:"none",fontSize:12,fontWeight:600,cursor:"pointer",background:viewMode==="grid"?th.ab:"transparent",color:viewMode==="grid"?th.t:(th.bg==="#09090b"?"#e5e5e5":th.tm),fontFamily:"inherit"}}>Grid</button>
            <button onClick={()=>setViewMode("kanban")} style={{padding:"6px 12px",borderRadius:6,border:"none",fontSize:12,fontWeight:600,cursor:"pointer",background:viewMode==="kanban"?th.ab:"transparent",color:viewMode==="kanban"?th.t:(th.bg==="#09090b"?"#e5e5e5":th.tm),fontFamily:"inherit"}}>Kanban</button>
          </div>
          {onAddOffer&&<button onClick={onAddOffer} style={sty.b}><IcPlus s={14}/> Cerere nouă</button>}
        </div>

  id:uid(), title:title||"Piesă nouă", status:"idee", members:[], audioLinks:[],
  lyrics:{}, ideas:"", comments:[], tags:[], bpm:"", key:"", genre:"",
  cr:new Date().toISOString().split("T")[0],
});
const detectAudioType = (url) => {
  if(!url) return null;
  if(/soundcloud\.com/.test(url)) return "soundcloud";
  if(/youtube\.com\/watch|youtu\.be\//.test(url)) return "youtube";
  if(/\.(mp3|ogg|wav|m4a|aac)(\?|$)/i.test(url)) return "audio";
  return "link";
};
const getYoutubeEmbedUrl = (url) => {
  const m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/);
  return m?`https://www.youtube.com/embed/${m[1]}`:null;
};
const getSoundcloudEmbedUrl = (url) => `https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&color=%23ff5500&auto_play=false&hide_related=false&show_comments=false&show_user=true&show_reposts=false&show_teaser=false&visual=true`;

      {/* GRID VIEW */}
      {viewMode==="grid"&&filtered.length>0&&(

      {/* LIST VIEW */}
      {viewMode==="list"&&filtered.length>0&&(
        <div style={{...sty.cd,padding:0,overflow:mob?"auto":"hidden"}} className={mob?"table-scroll-mob":""}>

              <tr style={{borderBottom:`2px solid ${th.b}`}}>

              </tr>
            </thead>

              {filtered.map(s=>{

                const assigned=MEMBERS.filter(m=>(s.members||[]).includes(m.id));
                return <tr key={s.id} onClick={()=>setOpenSongId(s.id)} style={{borderBottom:`1px solid ${th.bl}`,cursor:"pointer"}} onMouseOver={e=>e.currentTarget.style.background=th.ab} onMouseOut={e=>e.currentTarget.style.background="transparent"}>

                  <td style={{padding:"12px",fontSize:14}}>{assigned.map(m=>m.emoji).join(" ")||<span style={{color:th.tm,fontSize:11}}>—</span>}</td>
                  <td style={{padding:"12px",fontSize:12,color:th.tm,whiteSpace:"nowrap"}}>{(s.audioLinks||[]).length>0?`🔊 ${s.audioLinks.length}`:<span style={{opacity:.5}}>—</span>}</td>
                  <td style={{padding:"12px",fontSize:12,color:th.tm,whiteSpace:"nowrap"}}>{Object.keys(s.lyrics||{}).length>0?`✍️ ${Object.keys(s.lyrics||{}).length} sec.`:<span style={{opacity:.5}}>—</span>}</td>
                  <td style={{padding:"12px",fontSize:12,color:th.tm,fontFamily:"monospace",whiteSpace:"nowrap"}}>{[s.bpm?s.bpm+"bpm":"",s.key].filter(Boolean).join(" · ")||<span style={{opacity:.5}}>—</span>}</td>

                </tr>;
              })}
            </tbody>
          </table>
        </div>
      )}

      {/* Song modal */}
      {openSong&&<SongModal song={openSong} th={th} sty={sty} mob={mob} currentMemberId={currentMemberId} onClose={()=>setOpenSongId(null)} onUpdate={updateSong}/>}
    </div>
  );
}

    })));

    // 5. Page breaks — CSS injectat temporar
    //    Pozele nu se taie. Playlist forțat pe o coloană (html2canvas nu redă CSS columns bine).
    //    Logo header (primul div) nu se desparte de poza hero care urmează.
    const styleTag = document.createElement("style");
    const printBreakCss = pdfSinglePage
      ? "#offer-print-content .print-break { page-break-before: auto !important; break-before: auto !important; }"
      : "#offer-print-content .print-break { page-break-before: always !important; break-before: page !important; }";
    styleTag.textContent = [
      "#offer-print-content img { page-break-inside: avoid; break-inside: avoid; display: block; }",
      "#offer-print-content > div:has(> img) { page-break-inside: avoid; break-inside: avoid; }",
      "#offer-print-content > div:first-child { page-break-after: avoid; break-after: avoid; }",
      "#offer-print-content [style*='columns'] { columns: 1 !important; column-count: 1 !important; }",
      "#offer-print-content [style*='border-left'] { border-left: none !important; }",
      printBreakCss,
      "#offer-print-content .offer-page-1 { page-break-inside: avoid !important; break-inside: avoid !important; }",
    ].join("\n");
    document.head.appendChild(styleTag);

    // 6. Elimină overflow care taie conținutul la export PDF
    //    Containerul părinte cu overflow:auto limitează capturarea; trebuie overflow:visible
    el.scrollIntoView({ block: "start" });
    const overflowRestores = [];
    let p = el.parentElement;
    while (p && p !== document.body) {
      const ov = p.style.overflow; const mh = p.style.maxHeight; const h = p.style.height;
      const needsFix = (ov === "auto" || ov === "hidden" || ov === "scroll") || (mh || h);
      if (needsFix) {
        if (ov === "auto" || ov === "hidden" || ov === "scroll") p.style.overflow = "visible";
        if (mh || h) { p.style.maxHeight = "unset"; p.style.height = "auto"; }
        overflowRestores.push({ el: p, ov, mh, h });
      }
      p = p.parentElement;
    }

    const restore = () => {
      pdfExtraNodes.slice().reverse().forEach(node => { try { if (node.parentNode) node.parentNode.removeChild(node); } catch(e){} });
      taRestores.forEach(({ div, ta }) => { try { div.parentNode.replaceChild(ta, div); } catch(e){} });
      iframeRestores.forEach(({ div, container, parent }) => { try { parent.replaceChild(container, div); } catch(e){} });
      btnRestores.forEach(({ btn, was }) => { btn.style.display = was; });
      filterRestores.forEach(({ img, origSrc, origFilter }) => { img.src = origSrc; img.style.filter = origFilter; img.style.webkitFilter = origFilter; });
      overflowRestores.forEach(({ el, ov, mh, h }) => { el.style.overflow = ov || ""; el.style.maxHeight = mh || ""; el.style.height = h || ""; });
      try { document.head.removeChild(styleTag); } catch(e) {}
    };

    try {
      if (pdfSinglePage && window.jspdf && window.jspdf.jsPDF) {
        try {
          const canvas = await html2pdf().set({
            margin: 0,
            image: { type: "jpeg", quality: 0.92 },
            html2canvas: {
              scale: 2, useCORS: true, allowTaint: true, logging: false,
              scrollY: -window.scrollY, scrollX: -window.scrollX,
              windowWidth: el.scrollWidth,
              backgroundColor: "#ffffff",
            },
            jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
          }).from(el).toCanvas();
          const imgData = canvas.toDataURL("image/jpeg", 0.92);
          const JsPDF = window.jspdf.jsPDF;
          const pdf = new JsPDF({ unit: "mm", format: "a4", orientation: "portrait" });
          const pageW = pdf.internal.pageSize.getWidth();
          const pageH = pdf.internal.pageSize.getHeight();
          const margin = 6;
          const imgProps = pdf.getImageProperties(imgData);
          const iw = imgProps.width;
          const ih = imgProps.height;
          let w = pageW - 2 * margin;
          let h = (ih / iw) * w;
          if (h > pageH - 2 * margin) {
            h = pageH - 2 * margin;
            w = (iw / ih) * h;
          }
          const x = margin + (pageW - 2 * margin - w) / 2;
          const y = margin + (pageH - 2 * margin - h) / 2;
          pdf.addImage(imgData, "JPEG", x, y, w, h);
          return pdf.output("blob");
        } catch (e1) { console.warn("PDF o pagină — fallback la paginare:", e1); }
      }
      return await html2pdf().set({
        margin: 12, filename: getPdfFilename("oferta"),
        image: { type: "jpeg", quality: 0.95 },
        html2canvas: {
          scale: 2, useCORS: true, allowTaint: true, logging: false,
          scrollY: -window.scrollY, scrollX: -window.scrollX,
        },
        jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
        pagebreak: { mode: ["css", "legacy"] },
      }).from(el).outputPdf("blob");
    } finally {
      restore();
    }
  };

  const generateContractPdf = async () => {
    const el = document.getElementById("contract-print-content");
    if (!el || typeof html2pdf==="undefined") return Promise.reject(new Error("html2pdf indisponibil"));
    const contractEl = el.querySelector("div") || el;
    const inputRestores = [];
    Array.from(contractEl.querySelectorAll("input")).forEach(inp => {
      const span = document.createElement("span");
      span.style.cssText = "border:none;border-bottom:1.5px solid #999;padding:1px 4px;font-size:13px;font-family:Georgia,serif;background:rgba(255,249,196,.6);color:#111;";
      span.textContent = inp.value || inp.placeholder || "___";
      inp.parentNode.replaceChild(span, inp);
      inputRestores.push({ span, inp });
    });
    const restore = () => inputRestores.forEach(({ span, inp }) => { try { span.parentNode.replaceChild(inp, span); } catch(e){} });
    return html2pdf().set({
      margin: 12, filename: getPdfFilename("contract"),
      image: {type:"jpeg", quality:0.95},
      html2canvas: { scale: 2, useCORS: true, allowTaint: true, logging: false },
      jsPDF: {unit:"mm", format:"a4", orientation:"portrait"},
      pagebreak: { mode: ["css", "legacy"] }
    }).from(contractEl).outputPdf("blob").then(blob => { restore(); return blob; }, err => { restore(); return Promise.reject(err); });
  };

  const handleSharePdf = async () => {

  const escHtmlTitle = (s) => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const buildStandaloneOfferContractHtml = () => {

  /** Link public stabil: același path per eveniment (upsert). Necesită Supabase + bucket fisa-public. */

    lines.push("Tip: "+(isPriv?"Privat":"Public"));

    lines.push("Data: "+fEvDate(ev),"");
    const repStr = isPriv
      ? (ev.repDurs&&ev.repDurs.length>0 ? ev.repDurs.map((d,i)=>`R${i+1}:${d}min`).join(" ") : `${ev.rep||1} reprize × ${ev.repDur||45} min`)
      : publicPrestatieLine();
    const v=ev.valuta||"EUR";
    lines.push("PHASER — "+repStr+" → "+fFmt(ev.fee,v),"");
    lines.push("TOTAL: "+fFmt(tot,v),"");
    lines.push("Avans "+fFmt(ev.dep||0,v)+" (10% din total) în 10 zile de la semnare");
    lines.push("Rest "+fFmt(tot-(ev.dep||0),v)+" în "+(ev.zileRest??5)+" zile de la eveniment — virament bancar");

    try { await navigator.clipboard.writeText(lines.join("\n")); } catch(e) {
      const ta=document.createElement("textarea"); ta.value=lines.join("\n"); ta.style.cssText="position:fixed;opacity:0";
      document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
    }
    setCopied(true); setTimeout(()=>setCopied(false),2000);

  const showRiderTab = !isPriv || ["Corporate","Private Party","Altele"].includes(ev.type);
  const baseTabs = isPriv
    ? (showRiderTab ? [{id:"oferta",l:"📄 Ofertă"},{id:"rider",l:"📋 Rider"}]
                    : [{id:"oferta",l:"📄 Ofertă"}])
    : [{id:"oferta",l:"📄 Ofertă"},{id:"rider",l:"📋 Rider"},{id:"pressKit",l:"📷 Press Kit"}];
  const isEvent = ["plata_avans","confirmat"].includes(localSt);
  const allTabs = isEvent
    ? [{id:"fisa",l:"📋 Fișa"},...baseTabs,{id:"contract",l:"📝 Contract"}]

      ? [...baseTabs,{id:"contract",l:"📝 Contract"}]
      : baseTabs;
  const singleViewMode = fromDetail && (initialTab==="contract"||initialTab==="oferta");

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1200}} onClick={onClose}>
      <div style={{background:"#fff",borderRadius:mob?0:16,width:mob?"100%":720,maxHeight:mob?"100vh":"93vh",height:mob?"100vh":"auto",display:"flex",flexDirection:"column",color:"#111",boxShadow:"0 32px 80px rgba(0,0,0,.5)"}} onClick={e=>e.stopPropagation()}>
        
        {/* Header simplu — trimite + close */}
        <div style={{padding:"14px 20px",borderBottom:"1px solid rgba(251,191,36,.2)",display:"flex",justifyContent:"space-between",alignItems:"center",background:"linear-gradient(135deg,#1a1510 0%,#2d2419 100%)",borderRadius:mob?"0":"16px 16px 0 0",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>

            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            {!isPriv&&<>
              <label style={{display:"flex",alignItems:"center",gap:6,color:"rgba(255,255,255,.88)",fontSize:11,cursor:"pointer",userSelect:"none"}}>

                Rider PDF

                  {offerLinkUrl&&<a href={offerLinkUrl} target="_blank" rel="noreferrer" style={{fontSize:11,fontWeight:600,color:"#93c5fd",textDecoration:"underline",maxWidth:mob?120:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={offerLinkUrl}>Deschide oferta</a>}
                  {offerLinkPanelOpen&&offerLinkUrl&&<>

                    <div style={{position:"fixed",top:"50%",left:"50%",transform:"translate(-50%,-50%)",background:"#1a1a1a",borderRadius:12,padding:16,width:"min(400px, 94vw)",maxHeight:"min(520px,90vh)",overflow:"auto",zIndex:1201,boxShadow:"0 12px 40px rgba(0,0,0,.8)",border:"1px solid rgba(255,255,255,.15)"}} onClick={e=>e.stopPropagation()}>
                      <div style={{fontSize:13,fontWeight:800,color:"#fff",marginBottom:6,lineHeight:1.3}}>Acesta este linkul tău</div>
                      <div style={{fontSize:11,color:"rgba(255,255,255,.45)",marginBottom:12,lineHeight:1.4}}>Trimite adresa de mai jos pe WhatsApp sau mail — clientul deschide pagina în browser. Nu trimite cod HTML.</div>
                      <textarea ref={offerLinkInputRef} value={offerLinkUrl} readOnly onClick={e=>e.target.select()} rows={3} style={{width:"100%",boxSizing:"border-box",padding:"10px 10px",borderRadius:8,border:"1px solid rgba(245,158,11,.35)",background:"rgba(255,255,255,.06)",color:"#fde68a",fontSize:12,fontFamily:"ui-monospace,monospace",marginBottom:10,wordBreak:"break-all",resize:"vertical",minHeight:64,lineHeight:1.45}}/>
                      <button type="button" onClick={copyOfferLinkAgain} style={{width:"100%",padding:"12px 14px",borderRadius:8,border:"none",background:offerLinkCopied?"#16a34a":"#22c55e",color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer",marginBottom:8}}>{offerLinkCopied?"✓ Copiat!":"Copiază linkul"}</button>
                      <a href={offerLinkUrl} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"10px 16px",borderRadius:8,background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.2)",color:"#e5e5e5",fontWeight:700,fontSize:12,textDecoration:"none",width:"100%",marginBottom:8,boxSizing:"border-box"}}>Deschide în browser nou</a>
                      <a href={"https://wa.me/?text="+encodeURIComponent(offerLinkUrl)} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"10px 16px",borderRadius:8,background:"#25d366",color:"#fff",fontWeight:700,fontSize:13,textDecoration:"none",width:"100%",marginBottom:8,boxSizing:"border-box"}}><span style={{fontSize:16}}>💬</span> Trimite link pe WhatsApp</a>
                      <button type="button" onClick={handleOfferSharePublicLink} disabled={offerLinkBusy} style={{width:"100%",padding:"6px",borderRadius:6,border:"1px solid rgba(255,255,255,.15)",background:"transparent",color:"rgba(255,255,255,.5)",fontSize:11,cursor:offerLinkBusy?"wait":"pointer",marginBottom:4}}>{offerLinkBusy?"⏳ …":"↻ Reîncarcă pagina (același link)"}</button>
                      <button type="button" onClick={()=>setOfferLinkPanelOpen(false)} style={{width:"100%",padding:"5px",borderRadius:6,border:"none",background:"transparent",color:"rgba(255,255,255,.35)",fontSize:10,cursor:"pointer"}}>Închide</button>
                    </div>
                  </>}
                </div>
            }
            <button onClick={onClose} style={{padding:mob?12:4,minWidth:mob?44:undefined,minHeight:mob?44:undefined,border:"none",background:"transparent",color:"rgba(255,255,255,.6)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><IcX s={18}/></button>
          </div>
        </div>

        {/* Tabs — ascunse când singleViewMode (doar contract sau ofertă din detail) */}
        {!singleViewMode&&<div style={{display:"flex",gap:1,padding:"8px 16px",borderBottom:"1px solid #e5e5e5",background:"#fafafa",flexShrink:0,overflowX:"auto"}} onClick={e=>e.stopPropagation()}>

// Imagine header draggabilă — trage poza în chenar pentru poziționare
function HeroImageEditor({ src, position, onChange }) {
  const parseY = (p) => { const s=String(p||""); if(s.includes("top"))return 0; if(s.includes("bottom"))return 100; const m=s.match(/(\d+\.?\d*)%?/); return m?Math.max(0,Math.min(100,parseFloat(m[1])||50)):50; };
  const [drag, setDrag] = useState(null);
  const posY = parseY(position);
  useEffect(() => {
    if (!drag) return;
    const onMove = (e) => {
      const dy = (e.touches?.[0]?.clientY ?? e.clientY) - drag.startY;
      const newY = Math.max(0, Math.min(100, drag.startPos - dy * 0.3));
      onChange("center " + Math.round(newY) + "%");
    };
    const onEnd = () => setDrag(null);
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onEnd);
    window.addEventListener("touchmove", onMove, { passive: true });
    window.addEventListener("touchend", onEnd);
    return () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onEnd); window.removeEventListener("touchmove", onMove); window.removeEventListener("touchend", onEnd); };
  }, [drag]);
  return (
    <div
      onMouseDown={e=>setDrag({startY:e.clientY,startPos:posY})}
      onTouchStart={e=>setDrag({startY:e.touches[0].clientY,startPos:posY})}
      style={{position:"relative",overflow:"hidden",height:260,borderRadius:10,border:"1px solid #ccc",cursor:"grab",userSelect:"none"}}
    >
      <img src={src} alt="" style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:position||"center 50%",pointerEvents:"none"}} onError={e=>{e.target.style.display="none";}}/>
      <div style={{position:"absolute",bottom:8,left:"50%",transform:"translateX(-50%)",fontSize:10,color:"rgba(255,255,255,.7)",background:"rgba(0,0,0,.5)",padding:"4px 8px",borderRadius:6}}>Trage poza pentru poziționare</div>
    </div>
  );
}
